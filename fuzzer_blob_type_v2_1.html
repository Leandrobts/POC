<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>PS4 WebKit – Blob.type Controls V2.1 (4 tests, ALERTA-only)</title>
</head>
<body>
  <h2>PS4 WebKit – V2.1 (apenas 4 testes) – Blob.type com caracteres de controle</h2>
  <p>Log apenas <b>[ALERTA]</b>. Tamanhos moderados. Sem CSS.</p>

  <button onclick="clearLog()">Limpar</button>
  <button onclick="tBlobFetch()">T6b Blob.type → fetch (Content-Type)</button>
  <button onclick="tBlobIframe()">T6c Blob.type → iframe load</button>
  <button onclick="tBlobFileReader()">T6d Blob.type → FileReader DataURL</button>
  <button onclick="tHeaders()">T6e Headers reject newline?</button>

  <hr>
  <pre id="log"></pre>
  <iframe id="f" width="360" height="120"></iframe>

<script>
/* =========================
   ALERTA-only logger (ES5)
   ========================= */
var $log = document.getElementById("log");
var ALERTS = 0;

function clearLog(){
  try{ $log.textContent = ""; }catch(e){}
  ALERTS = 0;
}

function LOG(m){
  try{ $log.textContent += m + "\\n"; }catch(e){}
}

function ALERT(m){
  ALERTS++;
  LOG("[ALERTA] " + m);
}

function safeRevoke(url){
  try{ if(url) URL.revokeObjectURL(url); }catch(e){}
}

/* =========================
   T6b: Blob.type -> fetch header content-type
   ALERTA if response header contains control chars
   ========================= */
function tBlobFetch(){
  clearLog();
  LOG("T6b start...");
  if(!window.Blob || !window.fetch || !window.URL){
    LOG("fetch/Blob/URL não disponível.");
    return;
  }

  var b = new Blob(["hello"], { type: "text/plain\\nbad\\n" });
  var url = URL.createObjectURL(b);

  fetch(url).then(function(r){
    var ct = null;
    try{
      if(r.headers && r.headers.get) ct = r.headers.get("content-type");
    }catch(e){}
    LOG("resp content-type: " + ct);

    if(ct && (ct.indexOf("\\n") !== -1 || ct.indexOf("\\r") !== -1)){
      ALERT("Content-Type header contém controle: " + ct);
    }
    return r.text();
  }).then(function(t){
    LOG("body: " + t);
    safeRevoke(url);
  }).catch(function(e){
    LOG("fetch error: " + e);
    safeRevoke(url);
  });
}

/* =========================
   T6c: Blob.type -> iframe load
   ALERTA only if clear anomaly (load but weird access errors not counted)
   ========================= */
function tBlobIframe(){
  clearLog();
  LOG("T6c start...");
  if(!window.Blob || !window.URL){
    LOG("Blob/URL não disponível.");
    return;
  }

  var b = new Blob(["<b>hi</b>"], { type: "text/html\\nbad\\n" });
  var url = URL.createObjectURL(b);
  var f = document.getElementById("f");

  f.onload = function(){
    LOG("iframe onload");
    try{
      var doc = f.contentDocument;
      if(doc && doc.body){
        var txt = doc.body.textContent || "";
        LOG("iframe body text: " + txt);
      }
    }catch(e){
      LOG("iframe access blocked/erro: " + e);
    }
    safeRevoke(url);
  };

  try{
    f.src = url;
  }catch(e2){
    ALERT("iframe src set falhou: " + e2);
    safeRevoke(url);
  }
}

/* =========================
   T6d: Blob.type -> FileReader DataURL
   ALERTA if resulting data URL contains control chars
   ========================= */
function tBlobFileReader(){
  clearLog();
  LOG("T6d start...");
  if(!window.FileReader || !window.Blob){
    LOG("FileReader/Blob não disponível.");
    return;
  }

  var b = new Blob(["hello"], { type: "text/plain\\nbad\\n" });
  var r = new FileReader();

  r.onload = function(){
    var s = "";
    try{ s = String(r.result || ""); }catch(e){}
    LOG("dataURL prefix: " + s.slice(0, 80));
    if(s.indexOf("\\n") !== -1 || s.indexOf("\\r") !== -1){
      ALERT("DataURL contém controle (\\n/\\r).");
    }
  };
  r.onerror = function(){
    LOG("FileReader error");
  };

  try{
    r.readAsDataURL(b);
  }catch(e2){
    ALERT("readAsDataURL lançou: " + e2);
  }
}

/* =========================
   T6e: Headers accept newline?
   ALERTA if Headers.set accepts newline in header value
   ========================= */
function tHeaders(){
  clearLog();
  LOG("T6e start...");
  if(!window.Headers){
    LOG("Headers não disponível.");
    return;
  }

  var ok = true;
  try{
    var h = new Headers();
    h.set("content-type", "text/plain\\nbad\\n");
  }catch(e){
    ok = false;
    LOG("Headers.set lançou (bom): " + e);
  }

  if(ok){
    ALERT("Headers aceitou newline em header value (ruim).");
  }
}
</script>
</body>
</html>
