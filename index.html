<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>PS4 Impossible Invariants Tests (401-450) - No CSS</title>
</head>
<body>
  <h1>PS4 Impossible Invariants Tests (401–450) — No CSS</h1>

  <div>
    <button id="btnReset">Reset log</button>
    <button id="btnRunAll">Run ALL (401..450)</button>
    <button id="btnStop">Stop</button>
  </div>

  <div>
    Delay (ms): <input id="delayMs" type="number" value="80" min="0" step="10">
    Timeout por teste (ms): <input id="timeoutMs" type="number" value="1400" min="100" step="50">
    Intensidade (1..5): <input id="intensity" type="number" value="3" min="1" max="5" step="1">
    Modo:
    <select id="mode">
      <option value="balanced">balanced</option>
      <option value="pressure">pressure</option>
      <option value="teardown">teardown</option>
    </select>
  </div>

  <pre id="log"></pre>

<script>
(() => {
  "use strict";

  const $log = document.getElementById("log");
  let STOP = false;
  let RUN_ID = 0;

  function ts() { return Date.now(); }
  function logLine(s) { $log.textContent += `[${ts()}] ${s}\n`; }
  function resetLog() { $log.textContent = ""; logLine("Reset."); }
  function stopNow() { STOP = true; logLine("STOP requested."); }
  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  function alertVuln(testNum, msg, extraObj) {
    const extra = extraObj ? ("\n" + JSON.stringify(extraObj, null, 2)) : "";
    const full = `ALERTA TEST ${testNum}: ${msg}${extra}`;
    logLine(full);
    try { alert(full); } catch (_) {}
  }

  function withTimeout(promise, ms) {
    let t;
    const timeout = new Promise((_, rej) => { t = setTimeout(() => rej(new Error("TIMEOUT")), ms); });
    return Promise.race([promise.finally(() => clearTimeout(t)), timeout]);
  }

  // =========================
  // Strong victim model (XOR blocks + spot samples)
  // =========================
  function xorshift32(seed) {
    let x = seed >>> 0;
    return () => {
      x ^= (x << 13) >>> 0;
      x ^= (x >>> 17) >>> 0;
      x ^= (x << 5) >>> 0;
      return x >>> 0;
    };
  }

  function fillVictim(u8, seed) {
    const rnd = xorshift32(seed);
    for (let i = 0; i < u8.length; i++) {
      const r = rnd();
      u8[i] = (r ^ (r >>> 8) ^ (r >>> 16) ^ (r >>> 24)) & 0xFF;
    }
  }

  function blockXor32(u8, blockBytes) {
    const nBlocks = Math.ceil(u8.length / blockBytes);
    const out = new Uint32Array(nBlocks);
    const dv = new DataView(u8.buffer, u8.byteOffset, u8.byteLength);

    for (let b = 0; b < nBlocks; b++) {
      const start = b * blockBytes;
      const end = Math.min(u8.length, start + blockBytes);
      let acc = 0 >>> 0;

      let i = start;
      for (; i + 4 <= end; i += 4) acc ^= dv.getUint32(i, true);
      for (; i < end; i++) acc ^= (u8[i] << (((i - start) & 3) * 8)) >>> 0;

      out[b] = acc >>> 0;
    }
    return out;
  }

  function snapshotVictim(u8, blockBytes) {
    const sum = blockXor32(u8, blockBytes);
    const spots = [];
    const step = Math.max(1, Math.floor(u8.length / 32));
    for (let i = 0; i < u8.length; i += step) spots.push(u8[i]);
    return { len: u8.length, blockBytes, sum, spots };
  }

  function compareSnapshot(u8, snap) {
    if (u8.length !== snap.len) return { ok:false, reason:"victim length changed", gotLen:u8.length, expLen:snap.len };

    const now = blockXor32(u8, snap.blockBytes);
    if (now.length !== snap.sum.length) return { ok:false, reason:"checksum blocks length mismatch", gotBlocks:now.length, expBlocks:snap.sum.length };

    for (let i = 0; i < now.length; i++) {
      if (now[i] !== snap.sum[i]) {
        const start = i * snap.blockBytes;
        const end = Math.min(u8.length, start + 32);
        const bytes = [];
        for (let j = start; j < end; j++) bytes.push(u8[j]);
        return { ok:false, reason:"checksum mismatch", blockIndex:i, exp:snap.sum[i]>>>0, got:now[i]>>>0, first32BytesOfBlock:bytes };
      }
    }

    const spots = [];
    const step = Math.max(1, Math.floor(u8.length / 32));
    for (let i = 0; i < u8.length; i += step) spots.push(u8[i]);

    for (let k = 0; k < spots.length; k++) {
      if (spots[k] !== snap.spots[k]) return { ok:false, reason:"spot sample mismatch", spotIndex:k, exp:snap.spots[k], got:spots[k] };
    }
    return { ok:true };
  }

  function makeVictim(bytes, seed) {
    const ab = new ArrayBuffer(bytes);
    const u8 = new Uint8Array(ab);
    fillVictim(u8, seed);
    return { ab, u8 };
  }

  // =========================
  // Pressure helpers (bounded)
  // =========================
  function heapSpray(intensity) {
    const count = 24 * intensity;
    const size = 0x4000;
    const arr = [];
    for (let i = 0; i < count; i++) {
      const ab = new ArrayBuffer(size);
      const u32 = new Uint32Array(ab);
      for (let j = 0; j < u32.length; j += 128) u32[j] = (0x41414141 ^ i ^ j) >>> 0;
      arr.push(ab);
    }
    return arr;
  }

  function makeHoles(intensity) {
    const holes = [];
    const n = 120 * intensity;
    for (let i = 0; i < n; i++) holes.push(new ArrayBuffer(0x180));
    for (let i = 0; i < holes.length; i += 2) holes[i] = null;
    return holes;
  }

  function objectSpray(intensity) {
    const n = 280 * intensity;
    const out = [];
    for (let i = 0; i < n; i++) {
      const o = { a:i, b:i*2, s:"x"+i };
      if ((i & 7) === 0) o.buf = new ArrayBuffer(0x80);
      out.push(o);
    }
    return out;
  }

  async function microtaskChurn(intensity) {
    let p = Promise.resolve();
    const n = 200 * intensity;
    for (let i = 0; i < n; i++) p = p.then(() => {});
    await p;
  }

  function maybePressure(mode, intensity) {
    if (mode !== "pressure") return null;
    const keep = [];
    keep.push(heapSpray(intensity));
    keep.push(makeHoles(intensity));
    keep.push(objectSpray(intensity));
    return keep;
  }

  // =========================
  // Detach helpers
  // =========================
  function safeStructuredClone(obj, transferList) {
    if (typeof structuredClone !== "function") return { supported:false };
    try {
      const v = transferList ? structuredClone(obj, { transfer: transferList }) : structuredClone(obj);
      return { supported:true, value:v };
    } catch (e) {
      return { supported:true, error:(e && e.name) ? e.name : "ERR" };
    }
  }

  async function messageChannelTransferOnce(bytes, payload0, waitBudgetMs) {
    if (typeof MessageChannel !== "function") return { supported:false };

    const ch = new MessageChannel();
    const ab = new ArrayBuffer(bytes);
    const u8 = new Uint8Array(ab);
    u8[0] = payload0;

    let got = undefined;
    let gotSet = false;
    ch.port2.onmessage = (ev) => { got = ev.data; gotSet = true; };

    let postThrew = false;
    try { ch.port1.postMessage(ab, [ab]); } catch (_) { postThrew = true; }

    if (postThrew) return { supported:true, postThrew:true };

    // Espera por entrega até budget (evita falso "drop" por janela curta)
    const start = Date.now();
    while (!gotSet && (Date.now() - start) < waitBudgetMs) {
      await sleep(0);
    }

    return {
      supported:true,
      postThrew:false,
      senderLen: ab.byteLength,
      gotSet,
      got,
      tag: Object.prototype.toString.call(got)
    };
  }

  function expectedSubarrayRange(len, begin, end) {
    let b = begin | 0;
    let e = (end === undefined) ? len : (end | 0);

    if (b < 0) b = Math.max(len + b, 0); else b = Math.min(b, len);
    if (e < 0) e = Math.max(len + e, 0); else e = Math.min(e, len);
    if (e < b) e = b;
    return { b, e, length: e - b };
  }

  // =========================
  // Cross-buffer victim harness
  // =========================
  async function crossBufferIsolation(testNum, label, stressFn, intensity, mode) {
    const victim = makeVictim(64 * 1024, (0xC0FFEE00 ^ testNum) >>> 0);
    const snap = snapshotVictim(victim.u8, 256);

    const keep = maybePressure(mode, intensity);
    await microtaskChurn(Math.min(5, intensity));

    await stressFn(intensity, mode);

    const cmp = compareSnapshot(victim.u8, snap);
    if (!cmp.ok) alertVuln(testNum, label + ": VICTIM CORRUPTED (checksum mismatch).", cmp);

    void keep;
  }

  // =========================
  // Tests 401..450 (impossible invariants focus)
  // =========================
  const tests = [];
  function addTest(num, name, fn) { tests.push({ num, name, fn }); }

  // 401: TypedArray.length descriptor cannot be writable/configurable (impossible)
  addTest(401, "TypedArray.length descriptor impossible", async () => {
    const ta = new Uint8Array(10);
    const d = Object.getOwnPropertyDescriptor(Object.getPrototypeOf(ta), "length")
           || Object.getOwnPropertyDescriptor(ta, "length");
    // Em engines normais, length é accessor no %TypedArray%.prototype (não writable)
    // Se aparecer writable/configurable true, é fortíssimo (ou bug enorme).
    if (d && (d.writable === true || d.configurable === true)) {
      alertVuln(401, "TypedArray.length ficou writable/configurable (IMPOSSIBLE).", d);
    }
  });

  // 402: TypedArray.byteLength/byteOffset cannot be writable/configurable (impossible)
  addTest(402, "TypedArray.byteLength/byteOffset descriptor impossible", async () => {
    const ta = new Uint8Array(10);
    const proto = Object.getPrototypeOf(ta);
    const dBL = Object.getOwnPropertyDescriptor(proto, "byteLength") || Object.getOwnPropertyDescriptor(ta, "byteLength");
    const dBO = Object.getOwnPropertyDescriptor(proto, "byteOffset") || Object.getOwnPropertyDescriptor(ta, "byteOffset");
    const bad = [];
    if (dBL && (dBL.writable === true || dBL.configurable === true)) bad.push({ prop:"byteLength", desc:dBL });
    if (dBO && (dBO.writable === true || dBO.configurable === true)) bad.push({ prop:"byteOffset", desc:dBO });
    if (bad.length) alertVuln(402, "byteLength/byteOffset ficaram writable/configurable (IMPOSSIBLE).", bad);
  });

  // 403: ArrayBuffer.byteLength cannot be writable/configurable (impossible)
  addTest(403, "ArrayBuffer.byteLength descriptor impossible", async () => {
    const ab = new ArrayBuffer(16);
    const d = Object.getOwnPropertyDescriptor(Object.getPrototypeOf(ab), "byteLength")
           || Object.getOwnPropertyDescriptor(ab, "byteLength");
    if (d && (d.writable === true || d.configurable === true)) {
      alertVuln(403, "ArrayBuffer.byteLength writable/configurable (IMPOSSIBLE).", d);
    }
  });

  // 404: DefineProperty should not make TA index configurable in a weird way (impossible-ish)
  addTest(404, "DefineProperty on TA index invariants", async () => {
    const ta = new Uint8Array(4);
    ta[0] = 7;
    let ok = true;
    try {
      Object.defineProperty(ta, "0", { configurable:true, writable:true, value: 9 });
      ok = true;
    } catch (_) {
      ok = false; // normal: TypeError
    }
    // Se defineProperty "funcionar", descriptor NÃO pode virar configurable=true em typed arrays.
    if (ok) {
      const d = Object.getOwnPropertyDescriptor(ta, "0");
      if (d && d.configurable === true) {
        alertVuln(404, "TA index virou configurable=true via defineProperty (IMPOSSIBLE).", d);
      }
    }
  });

  // 405: Detach signature must be consistent across repetitions (same behavior)
  addTest(405, "Detach signature repeat consistency", async (intensity, mode) => {
    // Usa structuredClone transfer se existir; caso contrário tenta MessageChannel.
    const reps = 6;
    let sig0 = null;

    for (let i = 0; i < reps; i++) {
      const ab = new ArrayBuffer(4096);
      const u8 = new Uint8Array(ab);
      const u32 = new Uint32Array(ab);
      u8[0] = 0xAA;

      let detached = false;

      if (typeof structuredClone === "function") {
        const r = safeStructuredClone(ab, [ab]);
        if (!r.supported || r.error) return;
        detached = true;
      } else if (typeof MessageChannel === "function") {
        const r = await messageChannelTransferOnce(4096, 0xAA, 50);
        if (!r.supported || r.postThrew) return;
        detached = (r.senderLen === 0);
      } else {
        return;
      }

      // Observa comportamento das views após detach
      const sample = [];
      function readTA(name, obj) {
        const s = { name };
        try { s.length = obj.length; } catch (e) { s.length = "THREW:" + (e && e.name ? e.name : "ERR"); }
        try { s.byteLength = obj.byteLength; } catch (e) { s.byteLength = "THREW:" + (e && e.name ? e.name : "ERR"); }
        try { s.r0 = obj[0]; } catch (e) { s.r0 = "THREW:" + (e && e.name ? e.name : "ERR"); }
        try { obj[0] = 0x7A; s.wrote = true; } catch (e) { s.wrote = "THREW:" + (e && e.name ? e.name : "ERR"); }
        try { s.r0b = obj[0]; } catch (e) { s.r0b = "THREW:" + (e && e.name ? e.name : "ERR"); }
        return s;
      }

      sample.push(readTA("Uint8Array", u8));
      sample.push(readTA("Uint32Array", u32));

      const sig = JSON.stringify({ abLen: ab.byteLength, detached, sample });
      if (sig0 === null) sig0 = sig;
      else if (sig !== sig0) {
        alertVuln(405, "Comportamento pós-detach variou entre repetições (suspeito forte).", { base: sig0, got: sig });
        return;
      }

      // Invariante forte: se detach ocorreu, ab.byteLength deve ser 0 (se suportado)
      if (detached && ab.byteLength !== 0) {
        alertVuln(405, "Detach ocorreu mas ab.byteLength != 0 (IMPOSSIBLE nesse caminho).", { abLen: ab.byteLength, sample });
        return;
      }

      void intensity; void mode;
    }
  });

  // 406: MessageChannel transfer MUST either (a) detach sender or (b) throw. Sender in-between is impossible.
  addTest(406, "MessageChannel transfer senderLen impossible states", async () => {
    if (typeof MessageChannel !== "function") return;
    const r = await messageChannelTransferOnce(4096, 0xAA, 200);
    if (!r.supported) return;
    if (r.postThrew) return;

    // Estado impossível: senderLen não ser 0 nem original (4096)
    if (r.senderLen !== 0 && r.senderLen !== 4096) {
      alertVuln(406, "senderLen ficou em estado impossível após postMessage transfer.", { senderLen: r.senderLen, tag: r.tag });
      return;
    }
  });

  // 407: If sender detached, receiver must be readable and payload intact (with longer wait budget).
  addTest(407, "MessageChannel detach => receiver must be readable+intact", async () => {
    if (typeof MessageChannel !== "function") return;
    const r = await messageChannelTransferOnce(4096, 0xAA, 800);

    if (!r.supported || r.postThrew) return;
    if (r.senderLen !== 0) return; // não detacheou → não é caminho

    // Se detacheou, mas não chegou nada até budget: isso é anomalia de entrega.
    // Não é corrupção automaticamente, mas é um “impossible-ish” forte se for determinístico.
    if (!r.gotSet || !r.got) {
      alertVuln(407, "Sender detacheou, mas receiver não recebeu payload dentro do budget (anomalia de entrega).", {
        gotSet: r.gotSet, gotType: typeof r.got, tag: r.tag
      });
      return;
    }

    // Validar tipo+leitura
    let rLen = null, r0 = null;
    try {
      const tag = r.tag;
      const isAB = (tag === "[object ArrayBuffer]") || (r.got && typeof r.got.byteLength === "number" && typeof r.got.slice === "function");
      const isView = (r.got && typeof r.got === "object" && typeof r.got.byteLength === "number" && typeof r.got.buffer === "object");

      let r8;
      if (isAB) r8 = new Uint8Array(r.got);
      else if (isView) r8 = (r.got instanceof Uint8Array) ? r.got : new Uint8Array(r.got.buffer);
      else {
        alertVuln(407, "Receiver não é ArrayBuffer nem view após detach (IMPOSSIBLE).", { tag });
        return;
      }

      rLen = r8.length;
      r0 = r8[0];
    } catch (e) {
      alertVuln(407, "Falha ao ler receiver após detach (suspeito forte).", { err: e && e.name, tag: r.tag });
      return;
    }

    if (rLen !== 4096 || r0 !== 0xAA) {
      alertVuln(407, "Receiver payload/len inesperado após detach (suspeito forte).", { rLen, r0, tag: r.tag });
    }
  });

  // 408: Subarray negative clamp fuzzer: must match expected range (many cases)
  addTest(408, "Subarray negative clamp fuzzer (expected range)", async (intensity) => {
    const ta = new Uint8Array(256);
    for (let i = 0; i < ta.length; i++) ta[i] = i & 0xFF;

    const rounds = 50 * intensity;
    for (let i = 0; i < rounds; i++) {
      const begin = (Math.random() * 800 - 400) | 0;
      const end = (Math.random() * 800 - 400) | 0;
      const exp = expectedSubarrayRange(ta.length, begin, end);
      const sub = ta.subarray(begin, end);

      if (sub.length !== exp.length) {
        alertVuln(408, "Clamp FAIL: sub.length != expected.", { begin, end, exp, gotLen: sub.length });
        return;
      }
      // Conteúdo deve bater no mínimo para first/last
      if (sub.length) {
        if (sub[0] !== ta[exp.b] || sub[sub.length - 1] !== ta[exp.e - 1]) {
          alertVuln(408, "Clamp FAIL: conteúdo não bate com expected.", {
            begin, end, exp, gotFirst: sub[0], expFirst: ta[exp.b], gotLast: sub[sub.length-1], expLast: ta[exp.e-1]
          });
          return;
        }
      }
    }
  });

  // 409: TypedArray OOR write must be no-op (checksum)
  addTest(409, "TypedArray OOR write must be no-op (checksum)", async () => {
    const victim = makeVictim(4096, 0x409 ^ 0xA11CE551);
    const snap = snapshotVictim(victim.u8, 128);
    const ta = new Uint32Array(victim.ab);

    const idx = ta.length; // OOR
    try { ta[idx] = 0xDEADBEEF; } catch (_) {}

    const cmp = compareSnapshot(victim.u8, snap);
    if (!cmp.ok) alertVuln(409, "OOR write alterou victim (IMPOSSIBLE).", cmp);
  });

  // 410: DataView OOR get must throw or be stable, but must not mutate (checksum)
  addTest(410, "DataView OOR get/set must not mutate (checksum)", async () => {
    const victim = makeVictim(4096, 0x410 ^ 0xC0DE);
    const snap = snapshotVictim(victim.u8, 128);
    const dv = new DataView(victim.ab);

    try { dv.getUint32(0x7fffffff, true); } catch (_) {}
    try { dv.setUint32(0x7fffffff, 0x11223344, true); } catch (_) {}

    const cmp = compareSnapshot(victim.u8, snap);
    if (!cmp.ok) alertVuln(410, "DataView OOR causou mutação (IMPOSSIBLE).", cmp);
  });

  // 411: Clone independence (structuredClone) must not alias (if supported)
  addTest(411, "structuredClone(ArrayBuffer) must not alias", async () => {
    if (typeof structuredClone !== "function") return;
    const ab = new ArrayBuffer(512);
    const u8 = new Uint8Array(ab);
    u8[0] = 0x11;

    const r = safeStructuredClone(ab);
    if (!r.supported || r.error || !r.value) return;

    const clone = r.value;
    const r8 = new Uint8Array(clone);
    const before = r8[0];
    u8[0] = 0x22;
    const after = r8[0];

    if (before !== after) {
      alertVuln(411, "Clone refletiu mutação do original (aliasing IMPOSSIBLE).", { before, after });
    }
  });

  // 412: ArrayBuffer.slice must not alias (same as before, but keep as "impossible")
  addTest(412, "ArrayBuffer.slice must not alias", async () => {
    const ab = new ArrayBuffer(64);
    const u8 = new Uint8Array(ab);
    u8[0] = 0x11;
    const ab2 = ab.slice(0);
    const v2 = new Uint8Array(ab2);
    const before = v2[0];
    u8[0] = 0x22;
    const after = v2[0];
    if (before !== after) alertVuln(412, "ArrayBuffer.slice aliasing detectado (IMPOSSIBLE).", { before, after });
  });

  // 413: Proxy "length trap" on TypedArray.from must not corrupt cross-buffer victim
  addTest(413, "TypedArray.from Proxy length trap (cross-buffer checksum)", async (intensity, mode) => {
    await crossBufferIsolation(413, "TA.from Proxy length trap", async () => {
      const src = new Proxy({ length: 1 }, {
        get(t, p) {
          if (p === "length") return 1000000;
          if (p === "0") return 7;
          return t[p];
        }
      });
      try { Uint8Array.from(src); } catch (_) {}
    }, intensity, mode);
  });

  // 414: Iterator concurrent modification - must not produce impossible index behavior (basic invariant)
  addTest(414, "Array iterator concurrent modification sanity (no impossible)", async () => {
    const a = new Array(100);
    for (let i = 0; i < a.length; i++) a[i] = i;

    let seenBad = false;
    let i = 0;
    for (const v of a) {
      if (i === 10) a.length = 5; // shrink
      if (v !== undefined && typeof v !== "number") seenBad = true;
      i++;
      if (i > 200) { // impossível em array 100
        alertVuln(414, "Iterator percorreu >200 passos (impossível).", { i });
        return;
      }
    }
    if (seenBad) alertVuln(414, "Iterator retornou tipo impossível (suspeito).", {});
  });

  // 415..449: variants that try to break invariants through side effects + checksums
  // (still “impossible” oriented: they only ALERT if checksum/descriptor invariants break)
  for (let num = 415; num <= 449; num++) {
    addTest(num, "Impossible-focused variant " + num, async (intensity, mode) => {
      await crossBufferIsolation(num, "Impossible variant " + num, async () => {
        const v = num % 7;

        if (v === 0) {
          // Many detach attempts but only validate "no corruption"
          if (typeof structuredClone === "function") {
            for (let i = 0; i < 5 * intensity; i++) {
              const ab = new ArrayBuffer(1024);
              safeStructuredClone(ab, [ab]);
            }
          } else if (typeof MessageChannel === "function") {
            for (let i = 0; i < 5 * intensity; i++) {
              await messageChannelTransferOnce(1024, 0x5A, 50);
            }
          }
        } else if (v === 1) {
          // Subarray clamp storms
          const ta = new Uint8Array(512);
          for (let i = 0; i < 50 * intensity; i++) ta.subarray((-1000 + i) | 0, (1000 - i) | 0);
        } else if (v === 2) {
          // DataView unaligned churn
          const ab = new ArrayBuffer(4096);
          const dv = new DataView(ab);
          for (let off = 1; off < 128; off++) {
            dv.setUint32(off, (0x11223344 ^ off) >>> 0, true);
            dv.getUint32(off, true);
          }
        } else if (v === 3) {
          // TypedArray chain with side alloc
          const ta = new Uint8Array(8192);
          ta.map((x, i) => { if ((i & 255) === 0) new Uint8Array(new ArrayBuffer(2048)); return (x ^ (i & 255)) & 255; });
          ta.filter((x, i) => { if ((i & 255) === 0) new Uint32Array(new ArrayBuffer(1024)); return ((x + i) & 7) === 0; });
        } else if (v === 4) {
          // JSON/toStringTag side effects
          const obj = {};
          Object.defineProperty(obj, Symbol.toStringTag, { get() { new Uint8Array(new ArrayBuffer(4096)); return "X"; } });
          Object.prototype.toString.call(obj);
          try { JSON.stringify({ obj }); } catch (_) {}
        } else if (v === 5) {
          // DOM teardown (only when mode=teardown)
          if (mode === "teardown") {
            const arr = [];
            for (let i = 0; i < 10 * intensity; i++) {
              const f = document.createElement("iframe");
              f.style.display = "none";
              document.body.appendChild(f);
              arr.push(f);
            }
            for (const f of arr) { try { f.remove(); } catch (_) {} }
          }
        } else {
          // Allocation patterns
          heapSpray(intensity);
          makeHoles(intensity);
          objectSpray(intensity);
          await microtaskChurn(intensity);
        }
      }, intensity, mode);
    });
  }

  // 450: Comprehensive invariant sweep (descriptors + victim checksum)
  addTest(450, "Comprehensive sweep: descriptors + victim checksum", async (intensity, mode) => {
    const victim = makeVictim(128 * 1024, 0x450 ^ 0xC0FFEE);
    const snap = snapshotVictim(victim.u8, 256);
    const keep = maybePressure(mode, intensity);

    // Descriptor checks again (strong)
    const ta = new Uint8Array(16);
    const protoTA = Object.getPrototypeOf(ta);
    const props = ["length", "byteLength", "byteOffset"];
    const bad = [];
    for (const p of props) {
      const d = Object.getOwnPropertyDescriptor(protoTA, p) || Object.getOwnPropertyDescriptor(ta, p);
      if (d && (d.writable === true || d.configurable === true)) bad.push({ prop: p, desc: d });
    }
    if (bad.length) {
      alertVuln(450, "Descriptors impossíveis detectados.", bad);
      return;
    }

    // Benign churn
    const tmp = [];
    for (let i = 0; i < 200 * intensity; i++) tmp.push(new Uint8Array(new ArrayBuffer(1024)));
    for (let i = 0; i < tmp.length; i += 3) tmp[i] = null;
    await microtaskChurn(Math.min(5, intensity));

    const cmp = compareSnapshot(victim.u8, snap);
    if (!cmp.ok) alertVuln(450, "Victim corrompido após churn benigno (IMPOSSIBLE).", cmp);

    void keep;
  });

  // =========================
  // Runner
  // =========================
  async function runAll() {
    STOP = false;
    RUN_ID++;
    const runId = RUN_ID;

    const delayMs = Math.max(0, parseInt(document.getElementById("delayMs").value || "0", 10));
    const timeoutMs = Math.max(100, parseInt(document.getElementById("timeoutMs").value || "1400", 10));
    const intensity = Math.min(5, Math.max(1, parseInt(document.getElementById("intensity").value || "3", 10)));
    const mode = document.getElementById("mode").value;

    logLine("============================================================");
    logLine("Run ALL :: 50 tests (401..450) [IMPOSSIBLE INVARIANTS]");
    logLine("Config :: mode=" + mode + " intensity=" + intensity + " timeout=" + timeoutMs + "ms delay=" + delayMs + "ms");
    logLine("============================================================");

    for (let i = 0; i < tests.length; i++) {
      if (STOP || runId !== RUN_ID) break;
      const t = tests[i];

      try {
        logLine("RUN :: TEST " + t.num + ": " + t.name);
        const p = Promise.resolve(t.fn(intensity, mode));
        await withTimeout(p, timeoutMs);
        logLine("DONE :: TEST " + t.num);
      } catch (e) {
        // Exceções sozinhas não são sinal de corrupção: não alertar.
        logLine("DONE :: TEST " + t.num + " (exception ignored: " + ((e && e.name) ? e.name : "ERR") + ")");
      }

      if (delayMs) await sleep(delayMs);
    }

    logLine("ALL DONE.");
  }

  document.getElementById("btnReset").onclick = resetLog;
  document.getElementById("btnStop").onclick = stopNow;
  document.getElementById("btnRunAll").onclick = runAll;

  resetLog();
})();
</script>
