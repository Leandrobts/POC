<!DOCTYPE html>
<html>
<head>
    <title>PS4 Browser Memory Corruption Tests v2</title>
    <meta charset="UTF-8">
</head>
<body>
    <h1>PS4 Browser Memory Corruption Test Suite v2</h1>
    <div id="log"></div>
    <button onclick="runAllTests()">Run All Tests</button>
    <button onclick="clearLog()">Clear Log</button>

    <script>
        var logDiv = document.getElementById('log');
        var testResults = [];

        function log(msg) {
            var p = document.createElement('p');
            p.textContent = msg;
            logDiv.appendChild(p);
            testResults.push(msg);
        }

        function clearLog() {
            logDiv.innerHTML = '';
            testResults = [];
        }

        // Test 1: Array length setter race condition
        function test1() {
            log("Test 1: START");
            try {
                var arr = [1,2,3,4,5];
                Object.defineProperty(arr, 'length', {
                    set: function(val) {
                        arr.push(100);
                    }
                });
                arr.length = 0;
            } catch(e) {}
            log("Test 1: END");
        }

        // Test 2: TypedArray with resized buffer
        function test2() {
            log("Test 2: START");
            try {
                var buf = new ArrayBuffer(100);
                var view1 = new Uint8Array(buf);
                var view2 = new Uint32Array(buf);
                for(var i = 0; i < 1000; i++) {
                    view1[i] = 0x41;
                    view2[i] = 0x42424242;
                }
            } catch(e) {}
            log("Test 2: END");
        }

        // Test 3: Object.preventExtensions bypass
        function test3() {
            log("Test 3: START");
            try {
                var obj = {a: 1};
                Object.preventExtensions(obj);
                obj.__proto__ = {b: 2};
                obj.c = 3;
            } catch(e) {}
            log("Test 3: END");
        }

        // Test 4: Array holes manipulation
        function test4() {
            log("Test 4: START");
            try {
                var arr = new Array(100);
                arr[0] = 1;
                arr[99] = 2;
                delete arr[0];
                arr.reverse();
                arr.sort();
            } catch(e) {}
            log("Test 4: END");
        }

        // Test 5: String replace with getter
        function test5() {
            log("Test 5: START");
            try {
                var obj = {
                    toString: function() {
                        obj.toString = function() { return "X".repeat(100000); };
                        return "AAA";
                    }
                };
                "test".replace(/t/g, obj);
            } catch(e) {}
            log("Test 5: END");
        }

        // Test 6: Array shift/unshift chain
        function test6() {
            log("Test 6: START");
            try {
                var arr = new Array(1000);
                for(var i = 0; i < arr.length; i++) arr[i] = {};
                for(var i = 0; i < 500; i++) {
                    arr.shift();
                    arr.unshift({});
                }
            } catch(e) {}
            log("Test 6: END");
        }

        // Test 7: DataView mixed endianness
        function test7() {
            log("Test 7: START");
            try {
                var buf = new ArrayBuffer(16);
                var view = new DataView(buf);
                for(var i = 0; i < 100; i++) {
                    view.setUint32(0, 0x12345678, true);
                    view.setUint32(0, 0x12345678, false);
                    view.getFloat64(0, true);
                }
            } catch(e) {}
            log("Test 7: END");
        }

        // Test 8: Function arguments mutation
        function test8() {
            log("Test 8: START");
            try {
                function f() {
                    arguments.length = 0x100000;
                    for(var i = 0; i < arguments.length; i++) {
                        arguments[i] = {};
                    }
                }
                f(1,2,3,4,5);
            } catch(e) {}
            log("Test 8: END");
        }

        // Test 9: Array concat with proxy
        function test9() {
            log("Test 9: START");
            try {
                if(typeof Proxy !== 'undefined') {
                    var arr = [1,2,3];
                    var handler = {
                        get: function(target, prop) {
                            if(prop === 'length') return 0x8000000;
                            return target[prop];
                        }
                    };
                    var p = new Proxy([], handler);
                    arr.concat(p);
                }
            } catch(e) {}
            log("Test 9: END");
        }

        // Test 10: RegExp lastIndex overflow
        function test10() {
            log("Test 10: START");
            try {
                var re = /a/g;
                re.lastIndex = 0x7FFFFFFF;
                re.exec("aaaaaaa");
            } catch(e) {}
            log("Test 10: END");
        }

        // Test 11: Object spread with getter
        function test11() {
            log("Test 11: START");
            try {
                var count = 0;
                var obj = {
                    get prop() {
                        if(count++ < 10) {
                            obj.prop = {};
                        }
                        return count;
                    }
                };
                var copy = {...obj};
            } catch(e) {}
            log("Test 11: END");
        }

        // Test 12: Array buffer neutering race
        function test12() {
            log("Test 12: START");
            try {
                var buf = new ArrayBuffer(1000);
                var view = new Uint8Array(buf);
                view[0] = 1;
                if(buf.transfer) {
                    buf.transfer(500);
                    view[0] = 2;
                }
            } catch(e) {}
            log("Test 12: END");
        }

        // Test 13: Array join with recursive toString
        function test13() {
            log("Test 13: START");
            try {
                var arr = new Array(100);
                arr.fill({
                    toString: function() {
                        arr.length = 0;
                        return "X";
                    }
                });
                arr.join(",");
            } catch(e) {}
            log("Test 13: END");
        }

        // Test 14: Number.toFixed edge cases
        function test14() {
            log("Test 14: START");
            try {
                var n = 1.23;
                n.toFixed(100);
                n.toFixed(-1);
                (1e308).toFixed(0);
            } catch(e) {}
            log("Test 14: END");
        }

        // Test 15: Array fill with accessor
        function test15() {
            log("Test 15: START");
            try {
                var arr = new Array(1000);
                var obj = {};
                Object.defineProperty(obj, '0', {
                    get: function() { arr.length = 0; return 1; }
                });
                Array.prototype.fill.call(obj, 42);
            } catch(e) {}
            log("Test 15: END");
        }

        // Test 16: String localeCompare overflow
        function test16() {
            log("Test 16: START");
            try {
                var s1 = "A".repeat(10000);
                var s2 = "B".repeat(10000);
                s1.localeCompare(s2);
            } catch(e) {}
            log("Test 16: END");
        }

        // Test 17: Map forEach mutation
        function test17() {
            log("Test 17: START");
            try {
                if(typeof Map !== 'undefined') {
                    var m = new Map();
                    for(var i = 0; i < 100; i++) m.set(i, i);
                    m.forEach(function(v, k) {
                        m.delete(k);
                        m.set(k + 1000, v);
                    });
                }
            } catch(e) {}
            log("Test 17: END");
        }

        // Test 18: Array includes with modified length
        function test18() {
            log("Test 18: START");
            try {
                if(Array.prototype.includes) {
                    var arr = [1,2,3,4,5];
                    Object.defineProperty(arr, '0', {
                        get: function() {
                            arr.length = 100000;
                            return 1;
                        }
                    });
                    arr.includes(1);
                }
            } catch(e) {}
            log("Test 18: END");
        }

        // Test 19: TypedArray from with iterator
        function test19() {
            log("Test 19: START");
            try {
                var count = 0;
                var obj = {
                    [Symbol.iterator]: function*() {
                        while(count++ < 100000) yield count;
                    }
                };
                Uint8Array.from(obj);
            } catch(e) {}
            log("Test 19: END");
        }

        // Test 20: Object.keys with changing prototype
        function test20() {
            log("Test 20: START");
            try {
                var obj = {a: 1};
                Object.keys(obj);
                obj.__proto__ = {b: 2, c: 3, d: 4};
                Object.keys(obj);
            } catch(e) {}
            log("Test 20: END");
        }

        // Test 21: Array flat with depth overflow
        function test21() {
            log("Test 21: START");
            try {
                if(Array.prototype.flat) {
                    var arr = [[[[[1]]]]];
                    arr.flat(0x7FFFFFFF);
                }
            } catch(e) {}
            log("Test 21: END");
        }

        // Test 22: Set values mutation during iteration
        function test22() {
            log("Test 22: START");
            try {
                if(typeof Set !== 'undefined') {
                    var s = new Set([1,2,3,4,5]);
                    for(var v of s) {
                        s.delete(v);
                        s.add(v + 100);
                    }
                }
            } catch(e) {}
            log("Test 22: END");
        }

        // Test 23: ArrayBuffer slice with negative values
        function test23() {
            log("Test 23: START");
            try {
                var buf = new ArrayBuffer(100);
                buf.slice(-0x7FFFFFFF, -0x7FFFFFFE);
            } catch(e) {}
            log("Test 23: END");
        }

        // Test 24: Function bind with excessive arguments
        function test24() {
            log("Test 24: START");
            try {
                var f = function() {};
                var args = new Array(10000);
                f.bind.apply(f, args);
            } catch(e) {}
            log("Test 24: END");
        }

        // Test 25: Array some with length mutation
        function test25() {
            log("Test 25: START");
            try {
                var arr = [1,2,3,4,5];
                arr.some(function(v, i) {
                    arr.length = i;
                    return false;
                });
            } catch(e) {}
            log("Test 25: END");
        }

        // Test 26: String split with limit overflow
        function test26() {
            log("Test 26: START");
            try {
                var s = "A,B,C,D,E".repeat(1000);
                s.split(",", 0x7FFFFFFF);
            } catch(e) {}
            log("Test 26: END");
        }

        // Test 27: WeakSet add/delete cycle
        function test27() {
            log("Test 27: START");
            try {
                if(typeof WeakSet !== 'undefined') {
                    var ws = new WeakSet();
                    for(var i = 0; i < 1000; i++) {
                        var obj = {};
                        ws.add(obj);
                        ws.delete(obj);
                    }
                }
            } catch(e) {}
            log("Test 27: END");
        }

        // Test 28: Array indexOf with getter side effects
        function test28() {
            log("Test 28: START");
            try {
                var arr = [1,2,3,4,5];
                Object.defineProperty(arr, '2', {
                    get: function() {
                        arr.length = 1000;
                        return 3;
                    }
                });
                arr.indexOf(3);
            } catch(e) {}
            log("Test 28: END");
        }

        // Test 29: TypedArray reverse with detached buffer
        function test29() {
            log("Test 29: START");
            try {
                var buf = new ArrayBuffer(100);
                var view = new Uint8Array(buf);
                for(var i = 0; i < view.length; i++) view[i] = i;
                postMessage(buf, "*", [buf]);
                Array.prototype.reverse.call(view);
            } catch(e) {}
            log("Test 29: END");
        }

        // Test 30: Object.values with deleted properties
        function test30() {
            log("Test 30: START");
            try {
                if(Object.values) {
                    var obj = {a: 1, b: 2, c: 3};
                    Object.defineProperty(obj, 'a', {
                        get: function() {
                            delete obj.b;
                            delete obj.c;
                            return 1;
                        }
                    });
                    Object.values(obj);
                }
            } catch(e) {}
            log("Test 30: END");
        }

        // Test 31: Array flatMap with expanding callback
        function test31() {
            log("Test 31: START");
            try {
                if(Array.prototype.flatMap) {
                    var arr = [1,2,3];
                    arr.flatMap(function(v) {
                        return new Array(10000).fill(v);
                    });
                }
            } catch(e) {}
            log("Test 31: END");
        }

        // Test 32: String repeat with large count
        function test32() {
            log("Test 32: START");
            try {
                "ABC".repeat(0x1000000);
            } catch(e) {}
            log("Test 32: END");
        }

        // Test 33: Map set with recursive value
        function test33() {
            log("Test 33: START");
            try {
                if(typeof Map !== 'undefined') {
                    var m = new Map();
                    var obj = {ref: m};
                    m.set(obj, obj);
                    m.set(m, m);
                }
            } catch(e) {}
            log("Test 33: END");
        }

        // Test 34: Array lastIndexOf reverse search overflow
        function test34() {
            log("Test 34: START");
            try {
                var arr = new Array(1000);
                arr.fill(42);
                arr.lastIndexOf(42, 0x7FFFFFFF);
            } catch(e) {}
            log("Test 34: END");
        }

        // Test 35: TypedArray fill with offset overflow
        function test35() {
            log("Test 35: START");
            try {
                var arr = new Uint8Array(100);
                arr.fill(0xFF, 50, 200);
            } catch(e) {}
            log("Test 35: END");
        }

        // Test 36: Date setFullYear with extreme values
        function test36() {
            log("Test 36: START");
            try {
                var d = new Date();
                d.setFullYear(0x7FFFFFFF);
                d.setMonth(0x7FFFFFFF);
                d.setDate(0x7FFFFFFF);
            } catch(e) {}
            log("Test 36: END");
        }

        // Test 37: Array entries iterator mutation
        function test37() {
            log("Test 37: START");
            try {
                var arr = [1,2,3,4,5];
                var it = arr.entries();
                arr.length = 100;
                for(var entry of it) {
                    arr.length = 0;
                }
            } catch(e) {}
            log("Test 37: END");
        }

        // Test 38: Object.fromEntries with generator
        function test38() {
            log("Test 38: START");
            try {
                if(Object.fromEntries) {
                    function* gen() {
                        for(var i = 0; i < 10000; i++) {
                            yield [i, i];
                        }
                    }
                    Object.fromEntries(gen());
                }
            } catch(e) {}
            log("Test 38: END");
        }

        // Test 39: Array reduce with accumulator mutation
        function test39() {
            log("Test 39: START");
            try {
                var arr = [1,2,3,4,5];
                arr.reduce(function(acc, v) {
                    acc.length = 0;
                    acc.push(v);
                    return acc;
                }, []);
            } catch(e) {}
            log("Test 39: END");
        }

        // Test 40: String padStart with large length
        function test40() {
            log("Test 40: START");
            try {
                if(String.prototype.padStart) {
                    "test".padStart(0x1000000, "X");
                }
            } catch(e) {}
            log("Test 40: END");
        }

        // Test 41: TypedArray subarray with negative indices
        function test41() {
            log("Test 41: START");
            try {
                var arr = new Uint8Array(100);
                arr.subarray(-200, -100);
            } catch(e) {}
            log("Test 41: END");
        }

        // Test 42: Array constructor with float length
        function test42() {
            log("Test 42: START");
            try {
                new Array(1.5);
                new Array(-1);
                new Array(0x100000000);
            } catch(e) {}
            log("Test 42: END");
        }

        // Test 43: Object.getOwnPropertyDescriptors race
        function test43() {
            log("Test 43: START");
            try {
                if(Object.getOwnPropertyDescriptors) {
                    var obj = {a: 1};
                    Object.defineProperty(obj, 'b', {
                        get: function() {
                            delete obj.a;
                            obj.c = 3;
                            return 2;
                        },
                        enumerable: true
                    });
                    Object.getOwnPropertyDescriptors(obj);
                }
            } catch(e) {}
            log("Test 43: END");
        }

        // Test 44: Array with modified species constructor
        function test44() {
            log("Test 44: START");
            try {
                var arr = [1,2,3];
                arr.constructor = {
                    [Symbol.species]: function(len) {
                        return new Array(len * 1000);
                    }
                };
                arr.map(function(v) { return v * 2; });
            } catch(e) {}
            log("Test 44: END");
        }

        // Test 45: String matchAll with sticky regex
        function test45() {
            log("Test 45: START");
            try {
                if(String.prototype.matchAll) {
                    var s = "test test test";
                    var re = /t/y;
                    var matches = s.matchAll(re);
                    for(var m of matches) {}
                }
            } catch(e) {}
            log("Test 45: END");
        }

        // Test 46: TypedArray map with buffer mutation
        function test46() {
            log("Test 46: START");
            try {
                var buf = new ArrayBuffer(100);
                var view = new Uint8Array(buf);
                for(var i = 0; i < view.length; i++) view[i] = i;
                view.map(function(v, i) {
                    postMessage(buf, "*", [buf]);
                    return v * 2;
                });
            } catch(e) {}
            log("Test 46: END");
        }

        // Test 47: Array concat with length overflow chain
        function test47() {
            log("Test 47: START");
            try {
                var arr1 = new Array(0x7FFFFFFF);
                var arr2 = [1,2,3];
                arr1.concat(arr2);
            } catch(e) {}
            log("Test 47: END");
        }

        // Test 48: Object.setPrototypeOf circular chain
        function test48() {
            log("Test 48: START");
            try {
                var obj1 = {};
                var obj2 = {};
                var obj3 = {};
                Object.setPrototypeOf(obj1, obj2);
                Object.setPrototypeOf(obj2, obj3);
                Object.setPrototypeOf(obj3, obj1);
            } catch(e) {}
            log("Test 48: END");
        }

        // Test 49: Array slice with huge range
        function test49() {
            log("Test 49: START");
            try {
                var arr = [1,2,3,4,5];
                arr.slice(0, 0x7FFFFFFF);
            } catch(e) {}
            log("Test 49: END");
        }

        // Test 50: TypedArray sort with comparison throwing
        function test50() {
            log("Test 50: START");
            try {
                var arr = new Uint8Array([5,4,3,2,1]);
                var count = 0;
                arr.sort(function(a, b) {
                    if(count++ > 50) throw new Error("stop");
                    return a - b;
                });
            } catch(e) {}
            log("Test 50: END");
        }

        function runAllTests() {
            log("=== Starting All Tests v2 ===");
            var tests = [
                test1, test2, test3, test4, test5, test6, test7, test8, test9, test10,
                test11, test12, test13, test14, test15, test16, test17, test18, test19, test20,
                test21, test22, test23, test24, test25, test26, test27, test28, test29, test30,
                test31, test32, test33, test34, test35, test36, test37, test38, test39, test40,
                test41, test42, test43, test44, test45, test46, test47, test48, test49, test50
            ];
            
            var currentTest = 0;
            function runNext() {
                if(currentTest < tests.length) {
                    try {
                        tests[currentTest]();
                    } catch(e) {
                        log("Test " + (currentTest + 1) + " exception: " + e.message);
                    }
                    currentTest++;
                    setTimeout(runNext, 100);
                } else {
                    log("=== All Tests Complete v2 ===");
                }
            }
            runNext();
        }
    </script>
</body>
</html>
