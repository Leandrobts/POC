<!DOCTYPE html>
<html>
<head>
  <title>Stress Test: TypedArray Impossible Invariants (Severity Check)</title>
  <style>
    body { font-family: monospace; background: #1a1a1a; color: #0f0; padding: 20px; }
    .alert { color: #ff4444; font-weight: bold; border-left: 4px solid #ff4444; padding-left: 10px; margin: 10px 0; }
    .info { color: #44aaff; }
    #log { background: #000; padding: 15px; border-radius: 5px; overflow-x: auto; }
  </style>
</head>
<body>
  <h2>PS4 Severity Stress Test: Logic -> Exploitation Path</h2>
  <button id="runBtn">Iniciar Teste de Estresse</button>
  <pre id="log"></pre>

<script>
(function() {
  const log = (msg, cls = "") => {
    const div = document.createElement("div");
    div.className = cls;
    div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    document.getElementById("log").appendChild(div);
  };

  function testAccessorInjection() {
    log("--- Fase 1: Accessor Injection (High Severity) ---", "info");
    const ta = new Uint8Array(8);
    
    // Tenta injetar um getter em um índice numérico (Proibido pela Spec)
    const success = Reflect.defineProperty(ta, "0", {
      get: function() { 
        log("!!! GETTER EXECUTADO EM TYPEDARRAY[0] !!!", "alert");
        return 0xEE; 
      },
      configurable: true,
      enumerable: true
    });

    if (success) {
      log("SUCESSO: O motor aceitou um GETTER em um índice numérico!", "alert");
      log("Valor lido: " + ta[0]);
    } else {
      log("Falhou: O motor bloqueou a injeção de accessor (comportamento esperado).");
    }
  }

  function testJITCorruption() {
    log("--- Fase 2: JIT Speculation Trap ---", "info");
    const ta = new Uint8Array(16);
    ta[0] = 0x11;

    // Função para o JIT otimizar
    function readValue(arr) {
      let x = arr[0];
      let y = arr[0];
      return x + y;
    }

    // "Aquecendo" o JIT
    for (let i = 0; i < 10000; i++) readValue(ta);

    // Agora aplica o bug
    Reflect.defineProperty(ta, "0", {
      value: 0x22,
      configurable: true,
      writable: true
    });

    const result = readValue(ta);
    log("Resultado JIT (esperado 68): " + result);
    
    if (result !== 68) {
      log("ALERTA: Inconsistência no JIT detectada!", "alert");
    }
  }

  function testFrozenBypass() {
    log("--- Fase 3: Object.freeze Integrity ---", "info");
    const ta = new Uint8Array(8);
    
    // Define como configurável antes de congelar
    Reflect.defineProperty(ta, "0", { value: 1, configurable: true });
    Object.freeze(ta);
    
    // Tenta deletar algo de um objeto congelado
    const deleted = delete ta[0];
    if (deleted) {
      log("ALERTA: Propriedade deletada de um objeto CONGELADO!", "alert");
    } else {
      log("O freeze foi respeitado para exclusão.");
    }
  }

  document.getElementById("runBtn").onclick = () => {
    document.getElementById("log").innerHTML = "";
    try {
      testAccessorInjection();
      testJITCorruption();
      testFrozenBypass();
      log("\nTeste Finalizado. Se houver linhas vermelhas (ALERTA), o bug tem potencial para exploit.", "info");
    } catch (e) {
      log("CRASH/ERRO: " + e.message, "alert");
    }
  };
})();
</script>
</body>
</html>
