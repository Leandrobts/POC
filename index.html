<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 UaD Window Probe — MessageChannel</title>
</head>
<body>

<h2>PS4 Potential Use-After-Detach Window</h2>

<button onclick="run()">RUN UaD AUTO</button>
<button onclick="stop()">STOP</button>
<button onclick="resetLog()">Reset log</button>

<p>
Attempts: <input id="n" type="number" value="20">
Delay(ms): <input id="delay" type="number" value="30">
Timeout(ms): <input id="timeout" type="number" value="1200">
</p>

<pre id="log"></pre>

<script>
let running = false;

function log(s){
  document.getElementById("log").textContent +=
    "["+Date.now()+"] "+s+"\n";
}

function resetLog(){
  document.getElementById("log").textContent="";
  log("Reset.");
}

function stop(){ running=false; }

function delay(ms){ return new Promise(r=>setTimeout(r,ms)); }

async function run(){

  running=true;

  const N = +n.value;
  const delayMs = +delay.value;
  const timeoutMs = +timeout.value;

  log("============================================================");
  log("RUN UaD Window Probe");
  log("============================================================");

  let stats = {
    drops:0,
    uadReadable:0,
    uadCloneable:0,
    uadRetransfer:0,
    uadDataView:0
  };

  for(let i=0;i<N && running;i++){

    const ch = new MessageChannel();

    const ab = new ArrayBuffer(4096);
    const u8 = new Uint8Array(ab);
    u8[0]=0xAA;

    let got;
    ch.port2.onmessage = e=>got=e.data;

    try{
      ch.port1.postMessage(ab,[ab]);
    }catch(e){
      continue;
    }

    await delay(0);
    await delay(delayMs);

    const detached = (ab.byteLength===0);

    if(detached && got===undefined){

      stats.drops++;
      log("DROP detected → probing UaD window");

      // Probe 1 — Old view read
      try{
        let v = u8[0];
        if(v!==undefined){
          stats.uadReadable++;
          log("UaD: old view readable="+v);
        }
      }catch(e){}

      // Probe 2 — DataView
      try{
        const dv = new DataView(ab);
        let v = dv.getUint8(0);
        stats.uadDataView++;
        log("UaD: DataView readable="+v);
      }catch(e){}

      // Probe 3 — structuredClone
      try{
        structuredClone(ab);
        stats.uadCloneable++;
        log("UaD: structuredClone worked");
      }catch(e){}

      // Probe 4 — retransfer
      try{
        const ch2=new MessageChannel();
        ch2.port1.postMessage(ab,[ab]);
        stats.uadRetransfer++;
        log("UaD: retransfer worked");
      }catch(e){}

    }

    if(delayMs) await delay(delayMs);
  }

  log("------------------------------------------------------------");
  log("SUMMARY:");
  log(JSON.stringify(stats,null,2));
  log("DONE.");
}
</script>
</body>
</html>
