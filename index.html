<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>PS4 POC Pack — TA/AB Impossible Invariants + MessageChannel Drop</title>
</head>
<body>
  <h2>PS4 POC Pack — TypedArray/ArrayBuffer Invariants (no exploitation)</h2>

  <button id="btnReset">Reset log</button>
  <button id="btnAB">T1 :: AB.byteLength descriptor audit</button>
  <button id="btnA">A :: Object.defineProperty on ta[0]</button>
  <button id="btnB">B :: Reflect.defineProperty on ta[0]</button>
  <button id="btnC">C :: Proxy wrapper invariants</button>
  <button id="btnD">D :: Cross-realm iframe reproduce</button>
  <button id="btnT8">T8 :: MessageChannel transfer DROP detector (handshake)</button>

  <div style="margin-top:10px;">
    N (T8 reps): <input id="N" type="number" value="30" min="1" step="1">
    Delay (ms): <input id="delayMs" type="number" value="50" min="0" step="10">
    Timeout (ms): <input id="timeoutMs" type="number" value="1200" min="100" step="50">
  </div>

  <pre id="log" style="white-space:pre-wrap; margin-top:10px;"></pre>

<script>
(() => {
  "use strict";

  const $log = document.getElementById("log");

  function ts(){ return Date.now(); }
  function logLine(s){ $log.textContent += `[${ts()}] ${s}\n`; }
  function resetLog(){ $log.textContent = ""; logLine("Reset."); }

  function j(x){
    try { return JSON.stringify(x, null, 2); }
    catch(e){ return String(x); }
  }

  function alertBox(tag, msg, extra){
    const blob = extra ? ("\n" + j(extra)) : "";
    const full = `${tag}: ${msg}${blob}`;
    logLine(full);
    alert(full);
  }

  // -------------------------
  // Helpers
  // -------------------------
  function auditDesc(obj, prop){
    let d = null, threw = false, err = null;
    try { d = Object.getOwnPropertyDescriptor(obj, prop); }
    catch(e){ threw = true; err = e && e.name; }
    return { threw, err, desc: d };
  }

  // IMPORTANT:
  // Não assumimos "configurable deve ser false/true" (porque isso varia por spec/engine/historic).
  // O que medimos é CONSISTÊNCIA:
  //  - se desc diz configurable:true, delete não deveria lançar TypeError (comportamento típico de non-configurable).
  //  - se delete falha/lança, mas desc diz configurable:true => inconsistente.
  function taIndexConsistencyReport(label, defineFn){
    const ab = new ArrayBuffer(16);
    const ta = new Uint8Array(ab);
    ta[0] = 7;

    const baselineOwnDesc = auditDesc(ta, "0").desc;
    logLine(`${label} Initial ta[0]=${ta[0]} baselineOwnDesc=${j(baselineOwnDesc)}`);

    const defineRes = { ok: null, threw: false, err: null, desc: null };
    try {
      defineRes.ok = defineFn(ta);
    } catch (e) {
      defineRes.threw = true;
      defineRes.err = e && e.name;
    }
    defineRes.desc = auditDesc(ta, "0").desc;

    logLine(`${label} defineProperty result = ${j(defineRes)}`);
    logLine(`${label} After defineProperty ta[0] = ${ta[0]}`);

    // write afterwards
    ta[0] = 0x33;

    // delete paths
    let del1 = null, del2 = null, del1Threw = false, del1Err = null;
    try { del1 = delete ta[0]; }
    catch(e){ del1Threw = true; del1Err = e && e.name; del1 = `THREW:${del1Err || "ERR"}`; }

    try { del2 = Reflect.deleteProperty(ta, "0"); }
    catch(e){ del2 = `THREW:${(e && e.name) || "ERR"}`; }

    const descNow = auditDesc(ta, "0").desc;
    const keys = (() => { try { return Reflect.ownKeys(ta); } catch(_) { return []; } })();

    const report = {
      baselineOwnDesc,
      defineRes,
      afterWrite: ta[0],
      delete1: del1,
      delete2: del2,
      descNow,
      ownKeys: keys
    };

    logLine(`${label} After ta[0]=0x33 / deletes / keys => ${j(report)}`);

    // Consistency check:
    // If descriptor claims configurable:true but delete behaves like non-configurable (throws TypeError / false),
    // that is an invariant inconsistency worth reporting.
    const cfg = descNow && typeof descNow.configurable === "boolean" ? descNow.configurable : null;

    const deleteLooksNonConfig =
      (del1Threw && del1Err === "TypeError") ||
      (del2 === false) ||
      (typeof del2 === "string" && del2.indexOf("THREW:TypeError") === 0);

    if (cfg === true && deleteLooksNonConfig) {
      alertBox("ALERTA", "TA index: descriptor diz configurable:true, mas delete falha/lança como se fosse non-configurable (inconsistência de invariantes).", report);
      return;
    }

    logLine(`${label} OK: sem inconsistência forte detectada (neste run).`);
  }

  // Detach helper
  function detachAttempt(ab){
    if (typeof structuredClone === "function") {
      try { structuredClone(ab, { transfer: [ab] }); return { attempted:true, ok:true, via:"structuredClone" }; }
      catch(e){ return { attempted:true, ok:false, via:"structuredClone", err:(e&&e.name)||"ERR" }; }
    }
    if (typeof postMessage === "function") {
      try { postMessage("x", "*", [ab]); return { attempted:true, ok:true, via:"postMessage" }; }
      catch(e){ return { attempted:true, ok:false, via:"postMessage", err:(e&&e.name)||"ERR" }; }
    }
    return { attempted:false, ok:false, via:"none" };
  }

  async function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

  async function waitMessageOnce(port, timeoutMs){
    return new Promise((resolve) => {
      let done = false;
      const t = setTimeout(() => {
        if (done) return;
        done = true;
        cleanup();
        resolve({ ok:false, reason:"timeout", data:undefined });
      }, timeoutMs);

      function onMsg(ev){
        if (done) return;
        done = true;
        cleanup();
        resolve({ ok:true, data: ev.data });
      }

      function cleanup(){
        clearTimeout(t);
        try { port.onmessage = null; } catch(_) {}
      }

      try { port.onmessage = onMsg; } catch(_) {}
      try { port.start && port.start(); } catch(_) {}
    });
  }

  // -------------------------
  // Buttons
  // -------------------------
  document.getElementById("btnReset").onclick = resetLog;

  // T1: AB descriptor audit (não chama de "impossible" por si só)
  document.getElementById("btnAB").onclick = async () => {
    logLine("============================================================");
    logLine("POC: ArrayBuffer.prototype.byteLength descriptor audit");
    logLine("============================================================");

    const d = auditDesc(ArrayBuffer.prototype, "byteLength").desc;
    logLine(`Descriptor(ArrayBuffer.prototype.byteLength) = ${j(d)}`);

    // Quick detach sample
    const ab = new ArrayBuffer(16);
    const beforeLen = ab.byteLength;
    const det = detachAttempt(ab);
    const afterLen = ab.byteLength;

    logLine(`Sample: beforeLen=${beforeLen} afterLen=${afterLen} detachAttempted=${det.attempted} via=${det.via} ok=${det.ok}`);

    // Aqui o "impacto" que vale reportar é: descriptor configurável pode quebrar hardening baseado em descriptor.
    // Não é "corrupção", é "policy/integrity hazard".
    if (d && d.configurable === true) {
      alertBox("INFO", "AB.byteLength aparece configurable:true. Isso por si só não prova corrupção; mas pode afetar hardening baseado em descriptors (impacto comportamental).", { desc:d, detachSample:{beforeLen, afterLen, det} });
    }
  };

  // A
  document.getElementById("btnA").onclick = async () => {
    logLine("============================================================");
    logLine("POC A: Object.defineProperty em ta[0]");
    logLine("============================================================");
    taIndexConsistencyReport("A", (ta) => Object.defineProperty(ta, "0", { value: 9, writable: true, enumerable: true, configurable: true }));
  };

  // B
  document.getElementById("btnB").onclick = async () => {
    logLine("============================================================");
    logLine("POC B: Reflect.defineProperty em ta[0]");
    logLine("============================================================");
    taIndexConsistencyReport("B", (ta) => Reflect.defineProperty(ta, "0", { value: 9, writable: true, enumerable: true, configurable: true }));
  };

  // C
  document.getElementById("btnC").onclick = async () => {
    logLine("============================================================");
    logLine("POC C: Proxy invariants (defineProperty via Proxy wrapper)");
    logLine("============================================================");
    taIndexConsistencyReport("C", (ta) => {
      const p = new Proxy(ta, {});
      return Reflect.defineProperty(p, "0", { value: 9, writable: true, enumerable: true, configurable: true });
    });
  };

  // D
  document.getElementById("btnD").onclick = async () => {
    logLine("============================================================");
    logLine("POC D: Cross-realm iframe reproduce");
    logLine("============================================================");

    const f = document.createElement("iframe");
    f.style.display = "none";
    document.body.appendChild(f);

    let res = null;
    try {
      const w = f.contentWindow;
      const ta = new w.Uint8Array(new w.ArrayBuffer(16));
      ta[0] = 7;

      let ok = null, threw=false, err=null;
      try {
        ok = w.Reflect.defineProperty(ta, "0", { value: 9, writable:true, enumerable:true, configurable:true });
      } catch(e){ threw=true; err=(e&&e.name)||"ERR"; }

      const desc = w.Object.getOwnPropertyDescriptor(ta, "0");
      res = { ok, threw, err, desc, ta0: ta[0] };

      logLine(`iframe result => ${j(res)}`);

      // Mesma regra: se desc diz configurable:true e delete falha => inconsistente
      let del2 = null;
      try { del2 = w.Reflect.deleteProperty(ta, "0"); } catch(e){ del2 = `THREW:${(e&&e.name)||"ERR"}`; }

      if (desc && desc.configurable === true && del2 === false) {
        alertBox("ALERTA", "Cross-realm: descriptor configurable:true mas Reflect.deleteProperty=false (inconsistência).", { res, del2 });
      } else {
        logLine("D OK: sem inconsistencia forte detectada (neste run).");
      }
    } finally {
      try { f.remove(); } catch(_) {}
    }
  };

  // T8
  document.getElementById("btnT8").onclick = async () => {
    const N = Math.max(1, parseInt(document.getElementById("N").value || "30", 10));
    const delayMs = Math.max(0, parseInt(document.getElementById("delayMs").value || "50", 10));
    const timeoutMs = Math.max(100, parseInt(document.getElementById("timeoutMs").value || "1200", 10));

    logLine("============================================================");
    logLine("POC T8: MessageChannel transfer drop detector (handshake)");
    logLine("============================================================");
    logLine(`Config :: N=${N} delayMs=${delayMs} timeoutMs=${timeoutMs}`);

    let ok_detach = 0, ok_clone = 0, transfer_throw = 0;
    let drops_detach_path = 0, sender_impossible = 0, other = 0;

    for (let i = 0; i < N; i++) {
      const ch = new MessageChannel();
      const ab = new ArrayBuffer(4096);
      const u8 = new Uint8Array(ab);
      u8[0] = 0xAA;

      // Arm message waiter BEFORE posting
      const waiter = waitMessageOnce(ch.port2, timeoutMs);

      let threw = false;
      try { ch.port1.postMessage(ab, [ab]); }
      catch(e){ threw = true; }

      if (threw) {
        transfer_throw++;
        if (delayMs) await sleep(delayMs);
        continue;
      }

      const senderLen = ab.byteLength;
      if (senderLen !== 0 && senderLen !== 4096) {
        sender_impossible++;
        if (delayMs) await sleep(delayMs);
        continue;
      }

      const msg = await waiter;

      if (senderLen === 0) {
        // Transfer path: receiver SHOULD arrive eventually. If timeout => treat as "drop under timeout".
        if (!msg.ok || msg.data === undefined) {
          drops_detach_path++;
        } else {
          try {
            const r8 = (Object.prototype.toString.call(msg.data) === "[object ArrayBuffer]")
              ? new Uint8Array(msg.data)
              : (msg.data && msg.data.buffer ? new Uint8Array(msg.data.buffer) : null);

            if (r8 && r8.length === 4096 && r8[0] === 0xAA) ok_detach++;
            else other++;
          } catch(_) { other++; }
        }
      } else {
        // Clone path: detach didn't happen
        ok_clone++;
      }

      if (delayMs) await sleep(delayMs);
    }

    const summary = { ok_detach, ok_clone, transfer_throw, drops_detach_path, sender_impossible, other };
    logLine(`RESULTADOS: ${j(summary)}`);

    // Só alerta se tiver drop relevante em detach path.
    if (drops_detach_path > 0) {
      alertBox("ALERTA", "MessageChannel: detach confirmado (senderLen==0) mas receiver não chegou dentro do timeout (DROP/atraso severo). Isso é inconsistência observável (pode ser bug de entrega, não necessariamente corrupção).", summary);
    } else {
      logLine("OK: nenhum drop detectado nas condições atuais.");
    }
  };

  // init
  resetLog();
})();
</script>
</body>
</html>
