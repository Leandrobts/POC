<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>PS4 302 Isolator - MessageChannel transfer drop</title>
</head>
<body>
  <h2>PS4 302 Isolator (MessageChannel transfer)</h2>

  <button id="reset">Reset log</button>
  <button id="run">Run 302 (N)</button>
  <button id="stop">Stop</button>

  <div style="margin-top:8px;">
    <label>N (iterações):
      <input id="N" type="number" value="30" min="1" step="1">
    </label>
    <label style="margin-left:12px;">Timeout por iteração (ms):
      <input id="TO" type="number" value="1200" min="50" step="50">
    </label>
    <label style="margin-left:12px;">Delay entre iterações (ms):
      <input id="DELAY" type="number" value="50" min="0" step="10">
    </label>
  </div>

  <pre id="log" style="white-space:pre-wrap;margin-top:10px;"></pre>

<script>
(function(){
  const $log = document.getElementById('log');
  const now = () => String(Date.now());
  const log = (s) => { $log.textContent += `[${now()}] ${s}\n`; };

  let STOP = false;

  function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

  function waitFor(condFn, timeoutMs){
    // polling leve (compatível com engines antigas)
    const start = Date.now();
    return new Promise(resolve => {
      (function tick(){
        if (condFn()) return resolve(true);
        if ((Date.now() - start) >= timeoutMs) return resolve(false);
        setTimeout(tick, 0);
      })();
    });
  }

  function classifyPayload(x){
    const tag = Object.prototype.toString.call(x);
    const isAB = (tag === "[object ArrayBuffer]") ||
                 (x && typeof x === "object" && typeof x.byteLength === "number" && typeof x.slice === "function");
    const isView = (x && typeof x === "object" && typeof x.byteLength === "number" && x.buffer && typeof x.buffer === "object");
    return { tag, isAB, isView, type: typeof x };
  }

  function readFirstByte(payload){
    // Retorna {ok, len, b0, err}
    try {
      let u8;
      const cls = classifyPayload(payload);
      if (cls.isAB) u8 = new Uint8Array(payload);
      else if (cls.isView) {
        if (payload instanceof Uint8Array) u8 = payload;
        else u8 = new Uint8Array(payload.buffer);
      } else {
        return { ok:false, len:null, b0:null, err:"NOT_AB_OR_VIEW", cls };
      }
      return { ok:true, len:u8.length, b0:u8[0], err:null, cls };
    } catch (e) {
      return { ok:false, len:null, b0:null, err:(e && e.name) || "ERR", cls: classifyPayload(payload) };
    }
  }

  async function runOne(iter, timeoutMs){
    if (typeof MessageChannel !== "function") {
      return { iter, status:"SKIP_NO_MESSAGECHANNEL" };
    }

    const ch = new MessageChannel();

    // IMPORTANT: alguns engines antigos requerem start()
    try { ch.port1.start && ch.port1.start(); } catch(_){}
    try { ch.port2.start && ch.port2.start(); } catch(_){}

    let gotPing = false;
    let got = undefined;

    ch.port2.onmessage = (ev) => {
      // Primeiro evento pode ser o ping, segundo o payload
      if (ev && ev.data === 123) gotPing = true;
      else got = ev ? ev.data : ev;
    };

    // Invariante A: canal vivo (ping sem transfer)
    let pingPostThrew = false;
    try { ch.port1.postMessage(123); } catch (e) { pingPostThrew = true; }

    if (pingPostThrew) {
      // Se nem ping funciona, não dá pra afirmar nada sobre transfer
      return { iter, status:"PING_POST_THREW" };
    }

    const pingOk = await waitFor(() => gotPing === true, timeoutMs);
    if (!pingOk) {
      return { iter, status:"PING_TIMEOUT" };
    }

    // Invariante B: transfer real (detach)
    const ab = new ArrayBuffer(4096);
    const u8 = new Uint8Array(ab);
    u8[0] = 0xAA;

    let transferPostThrew = false;
    try { ch.port1.postMessage(ab, [ab]); } catch(e) { transferPostThrew = true; }

    if (transferPostThrew) {
      return { iter, status:"TRANSFER_POST_THREW" };
    }

    const senderLen = ab.byteLength; // 0 => detach real, 4096 => clone
    if (senderLen !== 0 && senderLen !== 4096) {
      return { iter, status:"SENDERLEN_IMPOSSIBLE", senderLen };
    }

    // Invariante C: se detach real, receiver deve receber payload íntegro
    // (se clone, a entrega pode variar; não usamos para sinal forte)
    if (senderLen === 0) {
      const gotOk = await waitFor(() => got !== undefined, timeoutMs);

      if (!gotOk) {
        return { iter, status:"DROP_DETACH_NO_MESSAGE", senderLen, gotType: typeof got, tag: classifyPayload(got).tag };
      }
      if (!got) {
        // null / 0 / false etc — aqui esperamos objeto
        return { iter, status:"DROP_DETACH_GOT_FALSY", senderLen, gotType: typeof got, tag: classifyPayload(got).tag };
      }

      const r = readFirstByte(got);
      if (!r.ok) {
        return {
          iter,
          status:"DETACH_GOT_UNREADABLE",
          senderLen,
          gotType: typeof got,
          tag: r.cls && r.cls.tag,
          err: r.err
        };
      }

      if (r.len !== 4096 || r.b0 !== 0xAA) {
        return {
          iter,
          status:"DETACH_BAD_CONTENT",
          senderLen,
          tag: r.cls.tag,
          rLen: r.len,
          r0: r.b0
        };
      }

      return { iter, status:"OK_DETACH", senderLen };
    }

    // clone path (senderLen === 4096): não tratamos como bug se não entregar,
    // mas se entregar e refletir mutação (aliasing), isso é interessante.
    const gotMaybe = await waitFor(() => got !== undefined, Math.min(200, timeoutMs));
    if (!gotMaybe) return { iter, status:"OK_CLONE_NO_DELIVERY", senderLen };

    const cls = classifyPayload(got);
    if (!cls.isAB && !cls.isView) return { iter, status:"OK_CLONE_NONBUFFER", senderLen, tag: cls.tag };

    const r = readFirstByte(got);
    if (!r.ok) return { iter, status:"OK_CLONE_UNREADABLE", senderLen, tag: cls.tag };

    const before = r.b0;
    u8[0] = 0xBB;
    const afterRead = readFirstByte(got);
    if (afterRead.ok && afterRead.b0 !== before) {
      return { iter, status:"ALIASING_IN_CLONE_UNEXPECTED", senderLen, tag: cls.tag, before, after: afterRead.b0 };
    }

    return { iter, status:"OK_CLONE", senderLen };
  }

  async function runAll(){
    STOP = false;
    const N = Math.max(1, parseInt(document.getElementById('N').value, 10) || 30);
    const TO = Math.max(50, parseInt(document.getElementById('TO').value, 10) || 1200);
    const DELAY = Math.max(0, parseInt(document.getElementById('DELAY').value, 10) || 50);

    log("============================================================");
    log(`Run 302 isolator :: N=${N} timeout=${TO}ms delay=${DELAY}ms`);
    log("============================================================");

    const stats = {
      ok_detach:0,
      ok_clone:0,
      ping_fail:0,
      transfer_throw:0,
      drops:0,
      senderlen_impossible:0,
      aliasing_in_clone:0,
      other:0
    };

    const dropSamples = [];

    for (let i = 1; i <= N; i++){
      if (STOP) break;

      const r = await runOne(i, TO);

      // Contabiliza
      switch (r.status) {
        case "OK_DETACH": stats.ok_detach++; break;
        case "OK_CLONE":
        case "OK_CLONE_NO_DELIVERY":
        case "OK_CLONE_NONBUFFER":
        case "OK_CLONE_UNREADABLE":
          stats.ok_clone++; break;
        case "PING_POST_THREW":
        case "PING_TIMEOUT":
          stats.ping_fail++; break;
        case "TRANSFER_POST_THREW":
          stats.transfer_throw++; break;
        case "SENDERLEN_IMPOSSIBLE":
          stats.senderlen_impossible++; break;
        case "ALIASING_IN_CLONE_UNEXPECTED":
          stats.aliasing_in_clone++;
          // isso é raro; amostra
          if (dropSamples.length < 3) dropSamples.push(r);
          break;
        case "DROP_DETACH_NO_MESSAGE":
        case "DROP_DETACH_GOT_FALSY":
        case "DETACH_GOT_UNREADABLE":
        case "DETACH_BAD_CONTENT":
          stats.drops++;
          if (dropSamples.length < 5) dropSamples.push(r);
          break;
        default:
          if (r.status && r.status.startsWith("SKIP")) stats.other++;
          else stats.other++;
      }

      // Log mínimo (sem spam)
      if (r.status !== "OK_DETACH" && r.status !== "OK_CLONE" && r.status !== "OK_CLONE_NO_DELIVERY") {
        log(`iter ${i}: ${r.status}` + (r.senderLen !== undefined ? ` (senderLen=${r.senderLen})` : ""));
      }

      if (DELAY) await sleep(DELAY);
    }

    log("------------------------------------------------------------");
    log(`RESULTADOS: ok_detach=${stats.ok_detach} ok_clone=${stats.ok_clone} ping_fail=${stats.ping_fail} transfer_throw=${stats.transfer_throw}`);
    log(`          drops(detach path)=${stats.drops} senderlen_impossible=${stats.senderlen_impossible} aliasing_in_clone=${stats.aliasing_in_clone} other=${stats.other}`);

    if (dropSamples.length) {
      log("AMOSTRAS:");
      for (const s of dropSamples) log("  " + JSON.stringify(s));
    }

    // ALERTA FINAL: somente se for algo defensável
    // - drop no caminho detach (canal vivo + detach real) OU senderLen impossível OU aliasing inesperado
    if (stats.drops > 0 || stats.senderlen_impossible > 0 || stats.aliasing_in_clone > 0) {
      alert("302 ISOLATOR ALERTA: achou inconsistência.\n" +
            `drops(detach)=${stats.drops} senderLenImpossible=${stats.senderlen_impossible} aliasingInClone=${stats.aliasing_in_clone}\n` +
            "Veja o log (amostras em JSON).");
    } else {
      log("OK: nenhuma inconsistência detectada nas condições atuais.");
    }
  }

  document.getElementById('reset').onclick = () => { $log.textContent = ""; log("Reset."); };
  document.getElementById('run').onclick = runAll;
  document.getElementById('stop').onclick = () => { STOP = true; log("Stop requested."); };

  log("Pronto. Dica: se no PS4 der drop, aumente Timeout e reduza Delay para achar janela de falha.");
})();
</script>
</body>
</html>
