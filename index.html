
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>PS4 Deep Fuzzer - V7 (UAF Edition)</title>
    
</head>
<body>

<div id="sidebar">
    <div class="header">PS4 DEEP FUZZER [UAF HUNTER]</div>
    <div class="stats">
        STATUS: <span id="ui-state" style="color:#fff">AGUARDANDO MÓDULOS...</span><br>
        TESTES: <span id="ui-tests">0</span><br>
        CICLOS GC: <span id="ui-gc" class="gc-text">0</span><br>
        ANOMALIAS: <span id="ui-anoms">0</span>
    </div>
    <div style="margin-bottom: 15px;">
        <span style="font-size: 10px; color: #666;">ALVO ATUAL:</span>
        <div id="ui-target" class="target-box">---</div>
    </div>
    <button id="btn-start" disabled>INICIAR FUZZER</button>
    <button onclick="location.reload()">RELOAD</button>
</div>

<div id="main">
    <div id="log-output"></div>
</div>

<script type="module">
    import { Factory } from './mod_factory.js';
    import { Mutator } from './mod_mutator.js';
    import { Executor } from './mod_executor.js';

    const UI = {
        state: document.getElementById('ui-state'),
        tests: document.getElementById('ui-tests'),
        gc: document.getElementById('ui-gc'),
        anoms: document.getElementById('ui-anoms'),
        target: document.getElementById('ui-target'),
        log: document.getElementById('log-output'),
        btn: document.getElementById('btn-start')
    };

    let fuzzerState = { running: false, engine: null, totalAnomalies: 0, gcCycles: 0 };

    const targets = Factory.buildTargets();
    const payloads = Mutator.getPayloads();

    UI.state.innerText = `PRONTO: ${targets.length} Alvos`;
    UI.state.style.color = "#0fa";
    UI.btn.disabled = false;

    function logAnomaly(data) {
        fuzzerState.totalAnomalies++;
        UI.anoms.innerText = fuzzerState.totalAnomalies;
        const div = document.createElement('div');
        div.className = 'entry anomaly';
        div.innerHTML = `
            <div><span class="tag">TARGET</span> <strong>${data.api}</strong></div>
            <div style="margin-top: 3px;"><span class="tag">ACTION</span> ${data.action}</div>
            <div style="margin-top: 3px;"><span class="tag">RETURN</span> <span style="color: #fff">${data.val}</span></div>
            <div style="margin-top: 6px; font-style: italic; font-weight: bold; color: #ff00ff;">&raquo; ${data.reason}</div>
        `;
        UI.log.insertBefore(div, UI.log.firstChild);
    }

    function runLoop() {
        if (!fuzzerState.running) return;
        if (!fuzzerState.engine) fuzzerState.engine = Executor.run(targets, payloads);

        let step = fuzzerState.engine.next();

        if (step.done) {
            UI.state.innerText = "CICLO COMPLETO";
            UI.state.style.color = "#0f0";
            fuzzerState.running = false;
            UI.btn.innerText = "NOVA VARREDURA";
            fuzzerState.engine = null; 
            return;
        }

        const data = step.value;
        if (data.type === 'STATUS') {
            UI.target.innerText = data.target;
        } else if (data.type === 'TICK') {
            UI.tests.innerText = data.count;
        } else if (data.type === 'GC_TICK') {
            fuzzerState.gcCycles++;
            UI.gc.innerText = fuzzerState.gcCycles; // Atualiza o contador de Heap Sweeps
        } else if (data.type === 'ANOMALY') {
            logAnomaly(data);
        }

        setTimeout(runLoop, 5);
    }

    UI.btn.onclick = () => {
        fuzzerState.running = !fuzzerState.running;
        if (fuzzerState.running) {
            UI.state.innerText = "CAÇANDO UAF...";
            UI.state.style.color = "#ff8800";
            UI.btn.innerText = "PAUSAR ATAQUE";
            runLoop();
        } else {
            UI.state.innerText = "ATAQUE PAUSADO";
            UI.state.style.color = "#fff";
            UI.btn.innerText = "RETOMAR ATAQUE";
        }
    };
</script>
</body>
</html>
