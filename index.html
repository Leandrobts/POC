<!doctype html>
<meta charset="utf-8">
<title>PS4 WebKit - Triagem V3 (50 testes agressivos) sem CSS</title>

<h2>PS4 WebKit - Triagem V3 (50 testes agressivos) sem CSS/sem style</h2>
<p>
  Objetivo: aumentar chance de crash/instabilidade real via teardown/races (sem exploração).<br>
  Alertas: <b>IMPOSSIBLE / CORRUPTION-SUSPECT</b> = invariantes quebradas.
</p>

<button id="reset">Reset log</button>
<button id="runAll">Run ALL (1..50)</button>
<button id="stop">Stop</button>

<p>
  Delay (ms): <input id="delay" type="number" value="140" min="0" step="20">
  Timeout por teste (ms): <input id="timeout" type="number" value="2000" min="500" step="100">
  Intensidade (1..5): <input id="intensity" type="number" value="2" min="1" max="5" step="1">
</p>

<pre id="log"></pre>

<script>
(function(){
  var $log = document.getElementById('log');
  var STOP=false, RUNNING=false, runCounter=0;

  function now(){ return (Date.now()>>>0); }
  function log(s){ $log.textContent += "["+now()+"] "+s+"\n"; }
  function sep(n,name){
    log("============================================================");
    log("RUN #"+(++runCounter)+" :: TEST "+n+(name?(" :: "+name):""));
    log("============================================================");
  }
  function impossible(msg){
    log("!!! IMPOSSIBLE / CORRUPTION-SUSPECT: "+msg);
    try{ alert("IMPOSSIBLE / CORRUPTION-SUSPECT\n"+msg); }catch(_){}
  }
  function assertTrue(cond,msg){ cond ? log("OK: "+msg) : impossible(msg); }
  function assertEq(a,b,msg){ (a===b) ? log("OK: "+msg) : impossible(msg+" (got="+a+" exp="+b+")"); }

  function safeToString(e){
    try{ return String(e && (e.stack||e.message||e)); }catch(_){ return "[unprintable]"; }
  }

  function u8Pattern(n){
    var u=new Uint8Array(n);
    for (var i=0;i<n;i++) u[i]=(i*7+3)&255;
    return u;
  }
  function bytesEqual(a,b){
    if(!a||!b||a.length!==b.length) return false;
    for (var i=0;i<a.length;i++) if(a[i]!==b[i]) return false;
    return true;
  }
  function checksumU8(u){
    var s=0; for (var i=0;i<u.length;i++) s=(s+u[i])>>>0;
    return s>>>0;
  }
  function gcLite(mult){
    var m = mult||1;
    var arr=[];
    for (var k=0;k<250*m;k++){
      var u=new Uint8Array(256);
      u[0]=k&255;
      arr.push(u);
    }
    return arr;
  }
  function withTimeout(ms, done){
    var fired=false;
    var t=setTimeout(function(){ if(fired) return; fired=true; done("TIMEOUT"); }, ms);
    return function finish(err){
      if(fired) return;
      fired=true; clearTimeout(t);
      done(err);
    };
  }
  function I(){ return +document.getElementById("intensity").value || 2; }
  function hasStructuredClone(){ return (typeof structuredClone==="function"); }

  var tests=[];

  // 1) structuredClone (sem funções) + teardown
  tests[1]=function(done){
    sep(1,"structuredClone: obj + TypedArray + gcLite");
    try{
      if(!hasStructuredClone()){ log("NOTE: sem structuredClone"); done(null); return; }
      var u=u8Pattern(128*I());
      var o={tag:"T1", u8:u, sum:checksumU8(u)};
      var c=structuredClone(o);
      assertEq(c.tag,"T1","tag ok");
      assertTrue(c.u8 && c.u8.length===u.length,"u8 length ok");
      assertEq(c.sum>>>0,o.sum>>>0,"checksum ok");
      assertTrue(bytesEqual(c.u8,u),"bytes ok");
      assertTrue(c.u8.buffer!==u.buffer,"clone sem alias");
      gcLite(I());
      u[0]^=0xFF;
      assertTrue(c.u8[0]!==u[0],"mutação original não contamina clone");
      done(null);
    }catch(e){ log("ERR: "+safeToString(e)); done("EXC"); }
  };

  // 2) JSON.stringify + toJSON side-effect (aqui é o lugar certo)
  tests[2]=function(done){
    sep(2,"JSON.stringify: toJSON side-effect count");
    try{
      var hits=0;
      var obj={
        a:1,
        toJSON:function(){
          hits++;
          gcLite(I());
          return {a:1,b:2};
        }
      };
      var s=JSON.stringify(obj);
      log("hits="+hits+" json="+s);
      assertTrue(hits===1,"toJSON chamado exatamente 1x");
      assertTrue(s.indexOf('"b":2')>=0,"stringify refletiu objeto retornado");
      done(null);
    }catch(e){ log("ERR: "+safeToString(e)); done("EXC"); }
  };

  // 3) MessageChannel ping-pong REAL (corrige bug do V2)
  tests[3]=function(done){
    sep(3,"MessageChannel: ping-pong real (eco) 20x");
    try{
      if(typeof MessageChannel!=="function"){ log("NOTE: sem MessageChannel"); done(null); return; }
      var ch=new MessageChannel();
      var tok="T3_"+now()+"_"+Math.floor(Math.random()*1e9);
      var u=u8Pattern(64);
      var sum=checksumU8(u);
      var n=0, target=20;

      ch.port2.onmessage=function(ev){
        var d=ev.data;
        if(!d||d.tok!==tok) return;
        // eco
        ch.port2.postMessage(d);
      };

      ch.port1.onmessage=function(ev){
        try{
          var d=ev.data;
          if(!d||d.tok!==tok) return;
          n++;
          if(n===1){
            assertEq(d.sum>>>0,sum>>>0,"checksum ok");
            assertTrue(d.u8 && d.u8.length===u.length,"u8 length ok");
            assertTrue(bytesEqual(d.u8,u),"bytes ok");
            assertTrue(d.u8.buffer!==u.buffer,"clone sem alias");
          }
          if(n>=target){
            log("ping-pong count="+n);
            try{ ch.port1.close(); ch.port2.close(); }catch(_){}
            done(null);
          }else{
            ch.port1.postMessage({tok:tok,u8:u,sum:sum});
          }
        }catch(e){
          log("ERR onmessage: "+safeToString(e));
          try{ ch.port1.close(); ch.port2.close(); }catch(_){}
          done("EXC");
        }
      };

      ch.port1.postMessage({tok:tok,u8:u,sum:sum});
    }catch(e){ log("ERR: "+safeToString(e)); done("EXC"); }
  };

  // 4) popstate robusto (corrige timeout do V2)
  tests[4]=function(done){
    sep(4,"history: go(-1)/go(1) com delays maiores");
    try{
      var base="#v3_"+now();
      history.pushState({tag:"A"}, "", base+"_A");
      history.pushState({tag:"B"}, "", base+"_B");
      var seen=[];
      var fin=withTimeout(+document.getElementById("timeout").value, function(err){
        window.removeEventListener("popstate", onPop);
        if(err) log("NOTE: timeout popstate (ambiente)");
        done(null);
      });

      function onPop(e){
        seen.push(e.state && e.state.tag);
        log("popstate tag=" + (e.state?e.state.tag:"NULL"));
        if(seen.length===1){
          setTimeout(function(){ try{ history.go(1); }catch(_){ } }, 180);
        }else if(seen.length===2){
          if(seen[0]) assertEq(seen[0],"A","back -> A");
          if(seen[1]) assertEq(seen[1],"B","forward -> B");
          window.removeEventListener("popstate", onPop);
          fin(null);
        }
      }
      window.addEventListener("popstate", onPop);
      setTimeout(function(){ try{ history.go(-1); }catch(_){ fin(null); } }, 180);
    }catch(e){ log("ERR: "+safeToString(e)); done("EXC"); }
  };

  // 5) iframe churn + postMessage + remove durante tráfego
  tests[5]=function(done){
    sep(5,"iframe churn: create/write/msg/remove race (bounded)");
    try{
      var rounds=5*I();
      var idx=0;
      function one(){
        if(idx>=rounds){ done(null); return; }
        idx++;

        var tok="T5_"+now()+"_"+idx;
        var f=document.createElement("iframe");
        document.body.appendChild(f);

        function cleanup(){
          try{ window.removeEventListener("message", onMsg); }catch(_){}
          try{ f.remove(); }catch(_){}
        }

        var fin=withTimeout(800+200*I(), function(err){
          cleanup();
          if(err) log("NOTE: iframe round timeout (ambiente)");
          setTimeout(one, 40);
        });

        function onMsg(e){
          var d=e.data;
          if(!d||d.tok!==tok) return;
          if(d.kind==="READY"){
            f.contentWindow.postMessage({tok:tok,kind:"PING",u8:u8Pattern(64)}, "*");
            // remove cedo (race)
            if(idx%2===0) setTimeout(function(){ try{ f.remove(); }catch(_){} }, 0);
          }else if(d.kind==="PONG"){
            assertTrue(d.u8 && d.u8.length===64,"pong u8 len ok");
            fin(null);
          }
        }
        window.addEventListener("message", onMsg);

        var doc=f.contentWindow.document;
        doc.open();
        doc.write("<!doctype html><meta charset=utf-8><script>"+
          "var TOK='"+tok.replace(/'/g,"\\'")+"';"+
          "function send(o){try{parent.postMessage(o,'*')}catch(e){}}"+
          "addEventListener('message',function(e){var d=e.data; if(!d||d.tok!==TOK)return;"+
            "if(d.kind==='PING'){ send({tok:TOK,kind:'PONG',u8:d.u8}); }"+
          "});"+
          "send({tok:TOK,kind:'READY'});"+
        "<\/script>");
        doc.close();
      }
      one();
    }catch(e){ log('ERR: '+safeToString(e)); done("EXC"); }
  };

  // 6) canvas: resize + getImageData intercalado (bounded)
  tests[6]=function(done){
    sep(6,"Canvas churn: resize + getImageData (bounded)");
    try{
      var c=document.createElement("canvas");
      var ctx=c.getContext && c.getContext("2d");
      if(!ctx||!ctx.getImageData){ log("NOTE: sem canvas 2d"); done(null); return; }
      var loops=40*I();
      for(var i=0;i<loops;i++){
        c.width=16+(i%8);
        c.height=16+((i*3)%8);
        ctx.fillRect(0,0,1,1);
        var img=ctx.getImageData(0,0,Math.min(8,c.width),Math.min(8,c.height));
        assertTrue(img.data && img.data.length===img.width*img.height*4,"ImageData length coerente");
      }
      done(null);
    }catch(e){ log("ERR: "+safeToString(e)); done("EXC"); }
  };

  // 7) AudioContext churn: create nodes connect/disconnect, close
  tests[7]=function(done){
    sep(7,"Audio churn: nodes connect/disconnect + close");
    try{
      var AC=window.AudioContext||window.webkitAudioContext;
      if(!AC){ log("NOTE: sem AudioContext"); done(null); return; }
      var ac=new AC();
      var osc=ac.createOscillator();
      var gain=ac.createGain();
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.start();
      var loops=20*I();
      for(var i=0;i<loops;i++){
        try{ gain.disconnect(); }catch(_){}
        try{ gain.connect(ac.destination); }catch(_){}
      }
      osc.stop();
      var r=ac.close();
      if(r&&typeof r.then==="function"){
        r.then(function(){ log("AudioContext closed"); done(null); })
         .catch(function(){ log("NOTE: close rejected"); done(null); });
      }else{
        log("AudioContext close invoked");
        done(null);
      }
    }catch(e){ log("ERR: "+safeToString(e)); done("EXC"); }
  };

  // 8) Media element churn (sem rede): cria/remove, troca src blob
  tests[8]=function(done){
    sep(8,"Media churn: video element create/remove + src swap (blob)");
    try{
      if(typeof Blob!=="function"){ log("NOTE: sem Blob"); done(null); return; }
      var rounds=10*I();
      for(var i=0;i<rounds;i++){
        var v=document.createElement("video");
        document.body.appendChild(v);
        var b=new Blob([u8Pattern(256)], {type:"application/octet-stream"});
        var url=URL.createObjectURL(b);
        v.src=url;
        // remove rápido (race-ish)
        v.remove();
        try{ URL.revokeObjectURL(url); }catch(_){}
      }
      done(null);
    }catch(e){ log("ERR: "+safeToString(e)); done("EXC"); }
  };

  // 9) Promise microtasks + postMessage intercalado
  tests[9]=function(done){
    sep(9,"microtasks + postMessage churn (bounded)");
    try{
      if(typeof Promise!=="function"){ log("NOTE: sem Promise"); done(null); return; }
      var tok="T9_"+now();
      var n=0, target=200*I();
      function onMsg(e){
        if(e.data!==tok) return;
        n++;
        if(n>=target){
          window.removeEventListener("message", onMsg);
          log("messages="+n);
          done(null);
        }
      }
      window.addEventListener("message", onMsg);
      (function pump(i){
        if(i>=target){ return; }
        Promise.resolve().then(function(){
          window.postMessage(tok,"*");
          pump(i+1);
        });
      })(0);
    }catch(e){ log("ERR: "+safeToString(e)); done("EXC"); }
  };

  // 10) DOM churn: innerHTML + remove no meio
  tests[10]=function(done){
    sep(10,"DOM churn: innerHTML replace + remove mid-way");
    try{
      var host=document.createElement("div");
      document.body.appendChild(host);
      var loops=60*I();
      for(var i=0;i<loops;i++){
        host.innerHTML="<p>"+i+"</p><span>"+(i+1)+"</span>";
        if(i===Math.floor(loops/2)) host.remove();
        if(i%15===0) gcLite(I());
      }
      done(null);
    }catch(e){ log("ERR: "+safeToString(e)); done("EXC"); }
  };

  // 11..50: variações agressivas curtas (sem rede, sem CSS)
  // (mantém o arquivo compacto, mas cobre muitas interações teardown/IPC/DOM)
  for(let t=11;t<=50;t++){
    tests[t]=function(done){
      sep(t,"aggressive micro-variant #"+t);
      try{
        var k=t%5;
        if(k===0){
          // MessageChannel: transfer + close
          if(typeof MessageChannel!=="function"){ log("NOTE: sem MessageChannel"); done(null); return; }
          var ch=new MessageChannel();
          var ab=new ArrayBuffer(32);
          var u=new Uint8Array(ab); for(var i=0;i<u.length;i++) u[i]=(i*7)&255;
          ch.port1.onmessage=function(ev){
            try{
              var buf=ev.data;
              assertTrue(buf instanceof ArrayBuffer,"recv AB");
              assertEq(buf.byteLength,32,"len=32");
            }catch(_){}
            try{ ch.port1.close(); ch.port2.close(); }catch(_){}
            done(null);
          };
          ch.port2.postMessage(ab,[ab]);
          setTimeout(function(){ try{ ch.port1.close(); ch.port2.close(); }catch(_){} }, 20);
          return;
        } else if(k===1){
          // history burst curto + go back/forward sem depender de evento
          var base="#v3t"+t+"_"+now();
          history.pushState({tag:"H"+t, n:t}, "", base);
          history.replaceState({tag:"H"+t, n:t+1}, "", base+"_r");
          assertTrue(history.state && history.state.n>=t,"history.state coerente");
          done(null);
        } else if(k===2){
          // iframe create/remove em loop
          var loops=8*I();
          for(var i=0;i<loops;i++){
            var f=document.createElement("iframe");
            document.body.appendChild(f);
            f.remove();
          }
          done(null);
        } else if(k===3){
          // Canvas minimal
          var c=document.createElement("canvas");
          var ctx=c.getContext && c.getContext("2d");
          if(!ctx){ log("NOTE: sem canvas"); done(null); return; }
          c.width=8+(t%4); c.height=8+((t*2)%4);
          ctx.fillRect(0,0,1,1);
          var img=ctx.getImageData(0,0,Math.min(8,c.width),Math.min(8,c.height));
          assertTrue(img.data.length===img.width*img.height*4,"imagedata coerente");
          done(null);
        } else {
          // Blob + FileReader churn
          if(typeof Blob!=="function"||typeof FileReader!=="function"){ log("NOTE: sem Blob/FileReader"); done(null); return; }
          var u=u8Pattern(64);
          var b=new Blob([u]);
          var fr=new FileReader();
          fr.onload=function(){
            try{
              var ab=fr.result;
              assertTrue(ab && ab.byteLength===u.length,"FR len ok");
              var r=new Uint8Array(ab);
              assertTrue(bytesEqual(r,u),"FR bytes ok");
            }catch(_){}
            done(null);
          };
          fr.onerror=function(){ log("NOTE: FileReader error"); done(null); };
          fr.readAsArrayBuffer(b);
          return;
        }
      }catch(e){ log("ERR: "+safeToString(e)); done("EXC"); }
    };
  }

  function runTest(n, cb){
    if(STOP){ cb(); return; }
    var fn=tests[n];
    if(typeof fn!=="function"){ log("missing test "+n); cb(); return; }
    var tmo=+document.getElementById("timeout").value;
    var finished=false;
    var fin=withTimeout(tmo,function(err){
      if(finished) return;
      finished=true;
      if(err) log("DONE TEST "+n+" (fail: "+err+")");
      else log("DONE TEST "+n);
      cb();
    });
    try{
      fn(function(err){
        if(finished) return;
        finished=true;
        if(err) log("DONE TEST "+n+" (fail: "+err+")");
        else log("DONE TEST "+n);
        fin(null);
        cb();
      });
    }catch(e){
      log("EXC: "+safeToString(e));
      if(!finished){
        finished=true;
        log("DONE TEST "+n+" (fail: EXC)");
        fin(null);
        cb();
      }
    }
  }

  function reset(){
    STOP=false; RUNNING=false; runCounter=0;
    $log.textContent="";
    log("Reset.");
  }
  function runAll(){
    if(RUNNING) return;
    RUNNING=true; STOP=false;
    var delay=+document.getElementById("delay").value;
    var i=1;
    (function next(){
      if(STOP){ RUNNING=false; log("Stopped."); return; }
      if(i>50){ RUNNING=false; log("ALL DONE."); return; }
      runTest(i,function(){ i++; setTimeout(next, delay); });
    })();
  }

  document.getElementById("reset").onclick=reset;
  document.getElementById("stop").onclick=function(){ STOP=true; };
  document.getElementById("runAll").onclick=runAll;

  reset();
})();
</script>
