<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>PS4 Deep Fuzzer - Modular Edition</title>
    <style>
        body { background: #050505; color: #0fa; font-family: monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 320px; border-right: 1px solid #222; padding: 15px; background: #0a0a0a; z-index: 10; display: flex; flex-direction: column;}
        #main { flex-grow: 1; display: flex; flex-direction: column; background: #000; }
        .header { color: #0fa; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; font-weight: bold; }
        #log-output { flex-grow: 1; overflow-y: auto; padding: 15px; font-size: 11px; color: #ccc; }
        .entry { border-bottom: 1px solid #111; padding: 10px 0; border-left: 4px solid #444; padding-left: 12px; margin-bottom: 6px; }
        .anomaly { border-left-color: #ff0055; background: #1a000b; color: #ff5588; }
        .stats { font-size: 12px; color: #888; margin-bottom: 20px; line-height: 1.6; }
        .target-box { color: #ff0; font-size: 11px; background: #222; padding: 4px; display: block; margin-top: 5px; word-break: break-all; }
        button { background: #111; color: #0fa; border: 1px solid #0fa; padding: 12px; margin-bottom: 5px; cursor: pointer; width: 100%; font-size: 11px; font-weight: bold; }
        button:hover { background: #033; }
        .tag { font-size: 9px; padding: 2px 4px; background: #333; color: #fff; margin-right: 5px; border-radius: 2px; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="header">PS4 DEEP FUZZER [MODULAR]</div>
    <div class="stats">
        STATUS: <span id="ui-state" style="color:#fff">AGUARDANDO MÓDULOS...</span><br>
        TESTES: <span id="ui-tests">0</span><br>
        ANOMALIAS: <span id="ui-anoms">0</span>
    </div>
    <div style="margin-bottom: 15px;">
        <span style="font-size: 10px; color: #666;">ALVO ATUAL:</span>
        <div id="ui-target" class="target-box">---</div>
    </div>
    <button id="btn-start" disabled>INICIAR FUZZER</button>
    <button onclick="location.reload()">RELOAD</button>
</div>

<div id="main">
    <div id="log-output"></div>
</div>

<script type="module">
    // Importaremos os próximos módulos aqui assim que os criarmos
    import { Factory } from './mod_factory.js';
    // import { Mutator } from './mod_mutator.js';
    // import { Executor } from './mod_executor.js';

    const UI = {
        state: document.getElementById('ui-state'),
        btn: document.getElementById('btn-start'),
        target: document.getElementById('ui-target')
    };

    // Teste de sanidade para garantir que o Módulo 1 carregou
    try {
        const testTargets = Factory.buildTargets();
        UI.state.innerText = `MÓDULOS OK (${testTargets.length} Alvos)`;
        UI.state.style.color = "#0fa";
        UI.btn.disabled = false;
        
        UI.btn.onclick = () => {
            UI.state.innerText = "MÓDULOS PRONTOS. AGUARDANDO EXECUTOR.";
        };
    } catch (e) {
        UI.state.innerText = "ERRO AO CARREGAR MÓDULOS";
        UI.state.style.color = "#ff0000";
    }
</script>
</body>
</html>
