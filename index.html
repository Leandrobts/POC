<!DOCTYPE html>
<html>
<head>
    <title>PS4 Browser Memory Corruption Tests v2</title>
    <meta charset="UTF-8">
</head>
<body>
    <h1>PS4 Browser Memory Corruption Test Suite v2</h1>
    <div id="log"></div>
    <button onclick="runAllTests()">Run All Tests</button>
    <button onclick="clearLog()">Clear Log</button>

    <script>
        var logDiv = document.getElementById('log');
        var testResults = [];

        function log(msg) {
            var p = document.createElement('p');
            p.textContent = msg;
            logDiv.appendChild(p);
            testResults.push(msg);
        }

        function clearLog() {
            logDiv.innerHTML = '';
            testResults = [];
        }

        // Test 1: Array hole manipulation
        function test1() {
            log("Test 1: START");
            try {
                var arr = [1,2,3];
                delete arr[1];
                arr.length = 10;
                arr.reverse();
                arr[5] = arr;
            } catch(e) {}
            log("Test 1: END");
        }

        // Test 2: TypedArray with negative offset
        function test2() {
            log("Test 2: START");
            try {
                var buf = new ArrayBuffer(100);
                var view = new Int32Array(buf, -4);
            } catch(e) {}
            log("Test 2: END");
        }

        // Test 3: Object.preventExtensions bypass attempt
        function test3() {
            log("Test 3: START");
            try {
                var obj = {a: 1};
                Object.preventExtensions(obj);
                obj.__proto__ = {b: 2};
                obj.c = 3;
            } catch(e) {}
            log("Test 3: END");
        }

        // Test 4: Array constructor with float
        function test4() {
            log("Test 4: START");
            try {
                var arr = new Array(3.14159);
            } catch(e) {}
            log("Test 4: END");
        }

        // Test 5: DataView misaligned access
        function test5() {
            log("Test 5: START");
            try {
                var buf = new ArrayBuffer(10);
                var view = new DataView(buf);
                view.setFloat64(5, 1.23);
            } catch(e) {}
            log("Test 5: END");
        }

        // Test 6: String.fromCharCode with invalid values
        function test6() {
            log("Test 6: START");
            try {
                var s = String.fromCharCode(-1, 0x110000, NaN, Infinity);
            } catch(e) {}
            log("Test 6: END");
        }

        // Test 7: Array.prototype on non-array
        function test7() {
            log("Test 7: START");
            try {
                var obj = {length: 5, 0: 'a', 1: 'b'};
                Array.prototype.pop.call(obj);
                Array.prototype.shift.call(obj);
            } catch(e) {}
            log("Test 7: END");
        }

        // Test 8: Getters causing side effects
        function test8() {
            log("Test 8: START");
            try {
                var arr = [1,2,3];
                Object.defineProperty(arr, '1', {
                    get: function() { arr.length = 1; return 5; }
                });
                arr.slice(0, 3);
            } catch(e) {}
            log("Test 8: END");
        }

        // Test 9: TypedArray from array with holes
        function test9() {
            log("Test 9: START");
            try {
                var arr = [1,,3,,5];
                var typed = new Uint32Array(arr);
            } catch(e) {}
            log("Test 9: END");
        }

        // Test 10: Object.setPrototypeOf circular
        function test10() {
            log("Test 10: START");
            try {
                var obj1 = {};
                var obj2 = {};
                Object.setPrototypeOf(obj1, obj2);
                Object.setPrototypeOf(obj2, obj1);
            } catch(e) {}
            log("Test 10: END");
        }

        // Test 11: Array.prototype.concat with proxy
        function test11() {
            log("Test 11: START");
            try {
                if(typeof Proxy !== 'undefined') {
                    var arr = [1,2,3];
                    var p = new Proxy(arr, {
                        get: function(target, prop) {
                            if(prop === 'length') return -1;
                            return target[prop];
                        }
                    });
                    [].concat(p);
                }
            } catch(e) {}
            log("Test 11: END");
        }

        // Test 12: Date with invalid values
        function test12() {
            log("Test 12: START");
            try {
                var d = new Date(NaN);
                d.setUTCMonth(-10);
                d.setUTCDate(100);
            } catch(e) {}
            log("Test 12: END");
        }

        // Test 13: Array.prototype.fill on frozen
        function test13() {
            log("Test 13: START");
            try {
                var arr = [1,2,3,4,5];
                Object.freeze(arr);
                arr.fill(0);
            } catch(e) {}
            log("Test 13: END");
        }

        // Test 14: TypedArray subarray with invalid range
        function test14() {
            log("Test 14: START");
            try {
                var arr = new Uint8Array(10);
                var sub = arr.subarray(5, 2);
            } catch(e) {}
            log("Test 14: END");
        }

        // Test 15: Object.defineProperty on array index
        function test15() {
            log("Test 15: START");
            try {
                var arr = [1,2,3];
                Object.defineProperty(arr, '10', {
                    value: 42,
                    writable: false
                });
                arr[10] = 99;
            } catch(e) {}
            log("Test 15: END");
        }

        // Test 16: ArrayBuffer slice with NaN
        function test16() {
            log("Test 16: START");
            try {
                var buf = new ArrayBuffer(50);
                var sliced = buf.slice(NaN, Infinity);
            } catch(e) {}
            log("Test 16: END");
        }

        // Test 17: Array sort stability test
        function test17() {
            log("Test 17: START");
            try {
                var arr = [{v:1},{v:2},{v:3}];
                arr.sort(function(a,b) {
                    delete arr[1];
                    return 0;
                });
            } catch(e) {}
            log("Test 17: END");
        }

        // Test 18: String.prototype.split with limit
        function test18() {
            log("Test 18: START");
            try {
                var s = "a,b,c,d,e";
                s.split(",", -1);
                s.split(",", 2.5);
            } catch(e) {}
            log("Test 18: END");
        }

        // Test 19: TypedArray constructor type confusion
        function test19() {
            log("Test 19: START");
            try {
                var arr = new Int8Array(10);
                var arr2 = new Int32Array(arr.buffer, 1, 5);
            } catch(e) {}
            log("Test 19: END");
        }

        // Test 20: Array.prototype.indexOf on sparse
        function test20() {
            log("Test 20: START");
            try {
                var arr = new Array(100);
                arr[50] = 1;
                arr.indexOf(undefined);
            } catch(e) {}
            log("Test 20: END");
        }

        // Test 21: Object.assign to sealed object
        function test21() {
            log("Test 21: START");
            try {
                var target = {a: 1};
                Object.seal(target);
                Object.assign(target, {b: 2, a: 3});
            } catch(e) {}
            log("Test 21: END");
        }

        // Test 22: Array.from with custom this
        function test22() {
            log("Test 22: START");
            try {
                if(Array.from) {
                    function CustomArray() {}
                    CustomArray.prototype = null;
                    Array.from.call(CustomArray, [1,2,3]);
                }
            } catch(e) {}
            log("Test 22: END");
        }

        // Test 23: TypedArray set with offset overflow
        function test23() {
            log("Test 23: START");
            try {
                var arr1 = new Uint8Array(5);
                var arr2 = new Uint8Array(5);
                arr1.set(arr2, 3);
            } catch(e) {}
            log("Test 23: END");
        }

        // Test 24: JSON.stringify with toJSON mutation
        function test24() {
            log("Test 24: START");
            try {
                var obj = {
                    a: 1,
                    toJSON: function() {
                        delete this.a;
                        this.b = 2;
                        return this;
                    }
                };
                JSON.stringify(obj);
            } catch(e) {}
            log("Test 24: END");
        }

        // Test 25: Array.prototype.join on modified
        function test25() {
            log("Test 25: START");
            try {
                var arr = [1,2,3];
                Object.defineProperty(arr, '1', {
                    get: function() { arr.length = 10; return 'x'; }
                });
                arr.join(',');
            } catch(e) {}
            log("Test 25: END");
        }

        // Test 26: Symbol.species manipulation
        function test26() {
            log("Test 26: START");
            try {
                if(Symbol.species) {
                    function MyArray() {}
                    MyArray.prototype = [];
                    MyArray[Symbol.species] = function() { return {}; };
                    var arr = new MyArray();
                    arr.map(x => x);
                }
            } catch(e) {}
            log("Test 26: END");
        }

        // Test 27: DataView constructor with odd length
        function test27() {
            log("Test 27: START");
            try {
                var buf = new ArrayBuffer(7);
                var view1 = new DataView(buf, 1, 3);
                view1.setInt32(0, 42);
            } catch(e) {}
            log("Test 27: END");
        }

        // Test 28: Array.prototype.reduce empty array
        function test28() {
            log("Test 28: START");
            try {
                var arr = [];
                arr.reduce(function(a,b) { return a+b; });
            } catch(e) {}
            log("Test 28: END");
        }

        // Test 29: Object.keys on proxy
        function test29() {
            log("Test 29: START");
            try {
                if(typeof Proxy !== 'undefined') {
                    var p = new Proxy({a:1, b:2}, {
                        ownKeys: function() { return ['a','a','b']; }
                    });
                    Object.keys(p);
                }
            } catch(e) {}
            log("Test 29: END");
        }

        // Test 30: TypedArray reverse byte order
        function test30() {
            log("Test 30: START");
            try {
                var arr = new Uint16Array([0x1234, 0x5678]);
                var bytes = new Uint8Array(arr.buffer);
                bytes.reverse();
            } catch(e) {}
            log("Test 30: END");
        }

        // Test 31: Array.prototype.lastIndexOf sparse
        function test31() {
            log("Test 31: START");
            try {
                var arr = [1,,3,,5];
                arr.lastIndexOf(undefined);
            } catch(e) {}
            log("Test 31: END");
        }

        // Test 32: String.prototype.substr negative
        function test32() {
            log("Test 32: START");
            try {
                var s = "hello world";
                s.substr(-100, 5);
                s.substr(5, -10);
            } catch(e) {}
            log("Test 32: END");
        }

        // Test 33: Array constructor with negative
        function test33() {
            log("Test 33: START");
            try {
                var arr = new Array(-5);
            } catch(e) {}
            log("Test 33: END");
        }

        // Test 34: Object.entries on non-enumerable
        function test34() {
            log("Test 34: START");
            try {
                if(Object.entries) {
                    var obj = {};
                    Object.defineProperty(obj, 'a', {
                        value: 1,
                        enumerable: false
                    });
                    Object.entries(obj);
                }
            } catch(e) {}
            log("Test 34: END");
        }

        // Test 35: Array.prototype.includes with fromIndex
        function test35() {
            log("Test 35: START");
            try {
                if(Array.prototype.includes) {
                    var arr = [1,2,3,4,5];
                    arr.includes(3, -100);
                    arr.includes(3, 100);
                }
            } catch(e) {}
            log("Test 35: END");
        }

        // Test 36: TypedArray copyWithin self-overlap
        function test36() {
            log("Test 36: START");
            try {
                if(Uint8Array.prototype.copyWithin) {
                    var arr = new Uint8Array([1,2,3,4,5]);
                    arr.copyWithin(1, 0, 4);
                }
            } catch(e) {}
            log("Test 36: END");
        }

        // Test 37: RegExp with invalid flags
        function test37() {
            log("Test 37: START");
            try {
                var re = new RegExp("test", "gii");
            } catch(e) {}
            log("Test 37: END");
        }

        // Test 38: Array.prototype.some mutation
        function test38() {
            log("Test 38: START");
            try {
                var arr = [1,2,3,4,5];
                arr.some(function(v, i) {
                    if(i === 2) arr.length = 2;
                    return false;
                });
            } catch(e) {}
            log("Test 38: END");
        }

        // Test 39: Object.getOwnPropertyDescriptor chain
        function test39() {
            log("Test 39: START");
            try {
                var obj = Object.create({a: 1});
                Object.getOwnPropertyDescriptor(obj, 'a');
            } catch(e) {}
            log("Test 39: END");
        }

        // Test 40: ArrayBuffer with non-integer length
        function test40() {
            log("Test 40: START");
            try {
                var buf = new ArrayBuffer(10.5);
            } catch(e) {}
            log("Test 40: END");
        }

        // Test 41: Array.prototype.flatMap depth
        function test41() {
            log("Test 41: START");
            try {
                if(Array.prototype.flatMap) {
                    var arr = [1,2,3];
                    arr.flatMap(x => [x, [x, [x]]]);
                }
            } catch(e) {}
            log("Test 41: END");
        }

        // Test 42: TypedArray from with mapFn
        function test42() {
            log("Test 42: START");
            try {
                if(Uint8Array.from) {
                    Uint8Array.from([1,2,3], function(x) {
                        this.push(x);
                        return x * 2;
                    }, []);
                }
            } catch(e) {}
            log("Test 42: END");
        }

        // Test 43: String.prototype.padStart overflow
        function test43() {
            log("Test 43: START");
            try {
                if(String.prototype.padStart) {
                    var s = "test";
                    s.padStart(-5, "x");
                }
            } catch(e) {}
            log("Test 43: END");
        }

        // Test 44: Array isArray on proxy
        function test44() {
            log("Test 44: START");
            try {
                if(typeof Proxy !== 'undefined') {
                    var p = new Proxy([], {});
                    Array.isArray(p);
                }
            } catch(e) {}
            log("Test 44: END");
        }

        // Test 45: Object.values on frozen
        function test45() {
            log("Test 45: START");
            try {
                if(Object.values) {
                    var obj = {a:1, b:2};
                    Object.freeze(obj);
                    Object.values(obj);
                }
            } catch(e) {}
            log("Test 45: END");
        }

        // Test 46: Array.prototype.at negative index
        function test46() {
            log("Test 46: START");
            try {
                if(Array.prototype.at) {
                    var arr = [1,2,3,4,5];
                    arr.at(-10);
                    arr.at(-1.5);
                }
            } catch(e) {}
            log("Test 46: END");
        }

        // Test 47: TypedArray slice negative indices
        function test47() {
            log("Test 47: START");
            try {
                var arr = new Int16Array([1,2,3,4,5]);
                arr.slice(-10, -20);
            } catch(e) {}
            log("Test 47: END");
        }

        // Test 48: Object.fromEntries invalid
        function test48() {
            log("Test 48: START");
            try {
                if(Object.fromEntries) {
                    Object.fromEntries([[1,2], [3]]);
                }
            } catch(e) {}
            log("Test 48: END");
        }

        // Test 49: Array with non-writable length
        function test49() {
            log("Test 49: START");
            try {
                var arr = [1,2,3];
                Object.defineProperty(arr, 'length', {writable: false});
                arr.push(4);
            } catch(e) {}
            log("Test 49: END");
        }

        // Test 50: TypedArray buffer detachment check
        function test50() {
            log("Test 50: START");
            try {
                var buf = new ArrayBuffer(20);
                var view = new Uint8Array(buf);
                if(typeof postMessage !== 'undefined') {
                    try {
                        postMessage('', '*', [buf]);
                    } catch(e2) {}
                }
                view[0] = 42;
            } catch(e) {}
            log("Test 50: END");
        }

        function runAllTests() {
            log("=== Starting All Tests ===");
            var tests = [
                test1, test2, test3, test4, test5, test6, test7, test8, test9, test10,
                test11, test12, test13, test14, test15, test16, test17, test18, test19, test20,
                test21, test22, test23, test24, test25, test26, test27, test28, test29, test30,
                test31, test32, test33, test34, test35, test36, test37, test38, test39, test40,
                test41, test42, test43, test44, test45, test46, test47, test48, test49, test50
            ];
            
            var currentTest = 0;
            function runNext() {
                if(currentTest < tests.length) {
                    try {
                        tests[currentTest]();
                    } catch(e) {
                        log("Test " + (currentTest + 1) + " exception: " + e.message);
                    }
                    currentTest++;
                    setTimeout(runNext, 150);
                } else {
                    log("=== All Tests Complete ===");
                }
            }
            runNext();
        }
    </script>
</body>
</html>
