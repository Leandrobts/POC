
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PS4 Memory Corruption Tests (201-250) - NO FALSE POSITIVES</title>
</head>
<body>
    <h1>PS4 Memory Corruption Tests (201-250)</h1>
    <h2>Zero false positives - Rigorous verification only</h2>
    <div id="output"></div>
    
    <script>
        const log = (msg) => {
            const div = document.getElementById('output');
            div.innerHTML += msg + '<br>';
            console.log(msg);
        };

        const alert_vuln = (testNum, msg) => {
            const alertMsg = `ALERTA TEST ${testNum}: ${msg}`;
            log('<strong style="color:red">' + alertMsg + '</strong>');
            alert(alertMsg);
        };

        // Helper: Check if it's a real element access vs property
        function isRealElement(array, index) {
            // Properties show up in hasOwnProperty, real OOB doesn't
            return Object.prototype.hasOwnProperty.call(array, String(index));
        }

        // Helper: Verify buffer contamination between SEPARATE buffers
        function checkBufferContamination(victim, victimSentinel, testNum) {
            const view = new Uint32Array(victim);
            for (let i = 0; i < view.length; i++) {
                if (view[i] !== victimSentinel && view[i] !== 0) {
                    return true;
                }
            }
            return false;
        }

        // Helper: Verify detached buffer state
        function isDetached(arrayBuffer) {
            return arrayBuffer.byteLength === 0;
        }

        // TEST 201: True OOB write with buffer contamination proof
        try {
            log('TEST 201: OOB write with separate buffer contamination');
            
            // Allocate two separate buffers with sentinels
            const buffer1 = new ArrayBuffer(0x100);
            const buffer2 = new ArrayBuffer(0x100);
            
            const ta1 = new Uint32Array(buffer1);
            const ta2 = new Uint32Array(buffer2);
            
            // Fill with sentinels
            const SENTINEL1 = 0xAAAAAAAA;
            const SENTINEL2 = 0xBBBBBBBB;
            
            for (let i = 0; i < ta1.length; i++) ta1[i] = SENTINEL1;
            for (let i = 0; i < ta2.length; i++) ta2[i] = SENTINEL2;
            
            // Try OOB write on ta1
            const oobIndex = 0x1000;
            ta1[oobIndex] = 0x41414141;
            
            // Check if it's a real element (not property)
            if (isRealElement(ta1, oobIndex)) {
                log('TEST 201: Index created as property (false positive avoided)');
            } else {
                // Check if buffer2 was contaminated
                if (checkBufferContamination(buffer2, SENTINEL2, 201)) {
                    alert_vuln(201, 'TRUE OOB: Separate buffer contaminated!');
                }
            }
        } catch(e) {
            log('TEST 201: Exception - ' + e.message);
        }

        // TEST 202: Negative index - property vs element distinction
        try {
            log('TEST 202: Negative index property vs element');
            
            const ta = new Uint32Array(100);
            ta[0] = 0x12345678;
            
            // Write to negative index
            ta[-1] = 0x42424242;
            
            // Check if it's a property
            const isProp = isRealElement(ta, -1);
            
            if (isProp) {
                log('TEST 202: Negative index created property (expected, not OOB)');
            } else {
                // If NOT a property but value exists, that's weird
                if (ta[-1] === 0x42424242) {
                    alert_vuln(202, 'Negative index behaving as buffer access!');
                }
            }
        } catch(e) {
            log('TEST 202: Exception - ' + e.message);
        }

        // TEST 203: Buffer transfer with strict validation
        try {
            log('TEST 203: Buffer transfer strict validation');
            
            if (typeof structuredClone !== 'undefined') {
                const ab = new ArrayBuffer(0x1000);
                const ta = new Uint32Array(ab);
                
                ta[0] = 0x43434343;
                const originalLength = ab.byteLength;
                
                // Transfer
                let transferred = false;
                let cloned = null;
                try {
                    cloned = structuredClone(ab, {transfer: [ab]});
                    transferred = true;
                } catch(e2) {}
                
                if (transferred) {
                    // Strict checks
                    const isNowDetached = isDetached(ab);
                    
                    if (!isNowDetached) {
                        alert_vuln(203, 'Buffer not detached after transfer! byteLength=' + ab.byteLength);
                    }
                    
                    // Try to access
                    let accessThrew = false;
                    try {
                        ta[0] = 0x44444444;
                    } catch(e3) {
                        accessThrew = true;
                    }
                    
                    if (!accessThrew) {
                        // Check if value actually changed
                        if (ta[0] === 0x44444444) {
                            alert_vuln(203, 'Write to detached buffer succeeded!');
                        }
                    }
                    
                    log('TEST 203: Detached=' + isNowDetached + ', AccessThrew=' + accessThrew);
                }
            } else {
                log('TEST 203: structuredClone not available');
            }
        } catch(e) {
            log('TEST 203: Exception - ' + e.message);
        }

        // TEST 204: Subarray length validation (avoid clamp false positive)
        try {
            log('TEST 204: Subarray with out-of-range indices');
            
            const ta = new Uint32Array(100);
            for (let i = 0; i < ta.length; i++) ta[i] = i;
            
            // Subarray with end > parent length
            const sub = ta.subarray(10, 200);
            
            // Expected: clamps to [10, 100], so length = 90
            const expectedLength = 90;
            
            if (sub.length !== expectedLength) {
                alert_vuln(204, 'Subarray length unexpected! Expected ' + expectedLength + ', got ' + sub.length);
            } else {
                log('TEST 204: Subarray clamped correctly to length ' + sub.length);
            }
            
            // Try to access beyond clamped length
            sub[95] = 0x45454545;
            
            // This should NOT appear in sub, as sub is only [10..99] (indices 0..89)
            if (isRealElement(sub, 95)) {
                log('TEST 204: Index 95 is property (false positive avoided)');
            }
        } catch(e) {
            log('TEST 204: Exception - ' + e.message);
        }

        // TEST 205: TypedArray.set overflow with contamination check
        try {
            log('TEST 205: TypedArray.set overflow validation');
            
            const victim = new ArrayBuffer(0x100);
            const victimView = new Uint32Array(victim);
            const VICTIM_SENTINEL = 0xCCCCCCCC;
            for (let i = 0; i < victimView.length; i++) victimView[i] = VICTIM_SENTINEL;
            
            const target = new Uint32Array(10);
            const source = new Uint32Array(100);
            for (let i = 0; i < source.length; i++) source[i] = 0x46460000 + i;
            
            // Try to set (should throw)
            let threw = false;
            try {
                target.set(source, 0);
            } catch(e2) {
                threw = true;
            }
            
            if (!threw) {
                // If didn't throw, check victim buffer
                if (checkBufferContamination(victim, VICTIM_SENTINEL, 205)) {
                    alert_vuln(205, 'TypedArray.set overflow contaminated separate buffer!');
                } else {
                    log('TEST 205: set completed but no contamination detected');
                }
            } else {
                log('TEST 205: set threw exception (expected)');
            }
        } catch(e) {
            log('TEST 205: Exception - ' + e.message);
        }

        // TEST 206: Float64 type confusion with bit-level verification
        try {
            log('TEST 206: Float64 type confusion verification');
            
            const ab = new ArrayBuffer(16);
            const fa = new Float64Array(ab);
            const ua = new Uint32Array(ab);
            
            // Write known bit pattern via Float64
            // Value: 1.9499519595454033e-289 should give 0x4141414141414141
            fa[0] = 1.9499519595454033e-289;
            
            // Read back via Uint32
            const low = ua[0];
            const high = ua[1];
            
            // Verify expected pattern (little-endian)
            const expectedLow = 0x41414141;
            const expectedHigh = 0x41414141;
            
            if (low === expectedLow && high === expectedHigh) {
                log('TEST 206: Type confusion worked as expected (IEEE 754 conversion)');
                
                // Now try to use this to create fake pointer
                // Write to second slot
                fa[1] = 1.1823397047269973e-289; // Different pattern
                
                const low2 = ua[2];
                const high2 = ua[3];
                
                log('TEST 206: Second value: 0x' + high2.toString(16) + low2.toString(16));
            } else {
                alert_vuln(206, 'Type confusion produced unexpected values! low=0x' + low.toString(16) + ' high=0x' + high.toString(16));
            }
        } catch(e) {
            log('TEST 206: Exception - ' + e.message);
        }

        // TEST 207: DataView unaligned access with strict bounds
        try {
            log('TEST 207: DataView unaligned bounds check');
            
            const ab = new ArrayBuffer(8);
            const dv = new DataView(ab);
            
            // Write at aligned position
            dv.setUint32(0, 0x12345678);
            
            // Try to read past end with unaligned
            let threw = false;
            try {
                const val = dv.getUint32(6); // Would read bytes 6,7,8,9 but buffer is only 8 bytes
            } catch(e2) {
                threw = true;
            }
            
            if (!threw) {
                alert_vuln(207, 'DataView allowed read past buffer boundary!');
            } else {
                log('TEST 207: Bounds check working correctly');
            }
        } catch(e) {
            log('TEST 207: Exception - ' + e.message);
        }

        // TEST 208: Integer overflow in size calculation
        try {
            log('TEST 208: Size calculation integer overflow');
            
            // Try sizes near 32-bit boundary
            const testSizes = [
                {size: 0x3FFFFFFF, name: '1GB-1'},
                {size: 0x40000000, name: '1GB'},
                {size: 0x7FFFFFFF, name: '2GB-1'}
            ];
            
            for (let test of testSizes) {
                try {
                    const ab = new ArrayBuffer(test.size);
                    const actualSize = ab.byteLength;
                    
                    // Check for wrap-around
                    if (actualSize !== test.size && actualSize < 0x10000) {
                        alert_vuln(208, 'Size wrapped! Requested 0x' + test.size.toString(16) + ' got ' + actualSize);
                    } else if (actualSize === test.size) {
                        log('TEST 208: ' + test.name + ' allocation succeeded');
                    }
                } catch(e2) {
                    // Expected for large sizes
                }
            }
        } catch(e) {
            log('TEST 208: Exception - ' + e.message);
        }

        // TEST 209: copyWithin with external buffer check
        try {
            log('TEST 209: copyWithin strict validation');
            
            const victim = new ArrayBuffer(0x100);
            const victimView = new Uint32Array(victim);
            const SENTINEL = 0xDDDDDDDD;
            for (let i = 0; i < victimView.length; i++) victimView[i] = SENTINEL;
            
            const ta = new Uint32Array(100);
            for (let i = 0; i < ta.length; i++) ta[i] = i;
            
            // copyWithin with out-of-range
            let threw = false;
            try {
                ta.copyWithin(0, 50, 200);
            } catch(e2) {
                threw = true;
            }
            
            // Even if no throw, check victim wasn't affected
            if (checkBufferContamination(victim, SENTINEL, 209)) {
                alert_vuln(209, 'copyWithin contaminated external buffer!');
            }
        } catch(e) {
            log('TEST 209: Exception - ' + e.message);
        }

        // TEST 210: Slice with reverse indices strict check
        try {
            log('TEST 210: Slice reverse indices validation');
            
            const ta = new Uint32Array(100);
            for (let i = 0; i < ta.length; i++) ta[i] = i;
            
            const sliced = ta.slice(80, 20);
            
            // Should be empty
            if (sliced.length !== 0) {
                alert_vuln(210, 'Reverse slice non-empty! length=' + sliced.length);
            }
            
            // Verify it's a different buffer
            if (sliced.buffer === ta.buffer) {
                alert_vuln(210, 'Slice returned same buffer reference!');
            }
        } catch(e) {
            log('TEST 210: Exception - ' + e.message);
        }

        // TEST 211: Fill with side-effect object (strict validation)
        try {
            log('TEST 211: Fill side-effect validation');
            
            const victim = new ArrayBuffer(0x100);
            const victimView = new Uint32Array(victim);
            const SENTINEL = 0xEEEEEEEE;
            for (let i = 0; i < victimView.length; i++) victimView[i] = SENTINEL;
            
            const ta = new Uint32Array(100);
            
            let callCount = 0;
            const obj = {
                valueOf: function() {
                    callCount++;
                    // Try to write to external buffer during valueOf
                    victimView[0] = 0x47474747;
                    return 0x48484848;
                }
            };
            
            ta.fill(obj);
            
            // Check if victim was modified (side effect executed)
            // But this is NOT a vulnerability, just normal behavior
            // So we DON'T alert here
            log('TEST 211: valueOf called ' + callCount + ' times (expected behavior)');
        } catch(e) {
            log('TEST 211: Exception - ' + e.message);
        }

        // TEST 212: Sort with comparator - NO false positive
        try {
            log('TEST 212: Sort comparator mutation check');
            
            const victim = new ArrayBuffer(0x100);
            const victimView = new Uint32Array(victim);
            const SENTINEL = 0xFFFFFFFF;
            for (let i = 0; i < victimView.length; i++) victimView[i] = SENTINEL;
            
            const ta = new Uint32Array([5, 2, 8, 1, 9]);
            
            ta.sort(function(a, b) {
                // Mutate during sort - this is allowed behavior
                ta[0] = 0x49494949;
                return a - b;
            });
            
            // Check victim for contamination (real issue)
            if (checkBufferContamination(victim, SENTINEL, 212)) {
                alert_vuln(212, 'Sort contaminated external buffer!');
            }
        } catch(e) {
            log('TEST 212: Exception - ' + e.message);
        }

        // TEST 213: Map with buffer growing attempt
        try {
            log('TEST 213: Map buffer growing check');
            
            const ta = new Uint32Array(10);
            const originalLength = ta.length;
            
            const mapped = ta.map(function(val, idx, arr) {
                // Try to extend during map
                arr[idx + 100] = 0x4A4A4A4A;
                return val * 2;
            });
            
            // Check if original array grew
            if (ta.length !== originalLength) {
                alert_vuln(213, 'TypedArray length changed during map!');
            }
            
            // Check if writes created elements (vs properties)
            if (isRealElement(ta, 100)) {
                log('TEST 213: Index 100 is property (expected, not growth)');
            } else if (ta[100] === 0x4A4A4A4A) {
                alert_vuln(213, 'OOB index behaving as element!');
            }
        } catch(e) {
            log('TEST 213: Exception - ' + e.message);
        }

        // TEST 214: Reduce with array extension strict check
        try {
            log('TEST 214: Reduce extension validation');
            
            const ta = new Uint32Array([1, 2, 3, 4, 5]);
            const originalLength = ta.length;
            let maxIndex = -1;
            
            ta.reduce(function(acc, val, idx, arr) {
                maxIndex = Math.max(maxIndex, idx);
                arr[10] = 0x4B4B4B4B;
                return acc + val;
            }, 0);
            
            // Check if reduce iterated beyond original length
            if (maxIndex >= originalLength) {
                alert_vuln(214, 'Reduce iterated beyond original length! maxIndex=' + maxIndex);
            }
            
            log('TEST 214: Reduce iterated 0..' + maxIndex + ' (expected 0..4)');
        } catch(e) {
            log('TEST 214: Exception - ' + e.message);
        }

        // TEST 215: Filter with detach attempt
        try {
            log('TEST 215: Filter with buffer detach');
            
            if (typeof structuredClone !== 'undefined') {
                const ab = new ArrayBuffer(0x1000);
                const ta = new Uint32Array(ab);
                for (let i = 0; i < ta.length; i++) ta[i] = i;
                
                let detachAttempted = false;
                let iterationAfterDetach = 0;
                
                const filtered = ta.filter(function(val, idx) {
                    if (idx === 100 && !detachAttempted) {
                        try {
                            structuredClone(ab, {transfer: [ab]});
                            detachAttempted = true;
                        } catch(e2) {}
                    }
                    
                    if (detachAttempted) {
                        iterationAfterDetach++;
                    }
                    
                    return val % 2 === 0;
                });
                
                if (detachAttempted && iterationAfterDetach > 0) {
                    alert_vuln(215, 'Filter continued ' + iterationAfterDetach + ' iterations after detach!');
                }
            }
        } catch(e) {
            log('TEST 215: Exception - ' + e.message);
        }

        // TEST 216: Find with strict iteration count
        try {
            log('TEST 216: Find iteration validation');
            
            const ta = new Uint32Array(100);
            for (let i = 0; i < ta.length; i++) ta[i] = i;
            
            let iterCount = 0;
            const found = ta.find(function(val, idx) {
                iterCount++;
                return val === 50;
            });
            
            // Should stop at index 50, so 51 iterations
            if (iterCount > 51) {
                alert_vuln(216, 'Find iterated more than needed! count=' + iterCount);
            }
            
            log('TEST 216: Find stopped after ' + iterCount + ' iterations (expected ≤51)');
        } catch(e) {
            log('TEST 216: Exception - ' + e.message);
        }

        // TEST 217: Reverse with aliasing verification
        try {
            log('TEST 217: Reverse aliasing check');
            
            const ab = new ArrayBuffer(0x100);
            const ta1 = new Uint32Array(ab);
            const ta2 = new Uint32Array(ab);
            
            for (let i = 0; i < ta1.length; i++) ta1[i] = i;
            
            const firstValue = ta1[0];
            const lastValue = ta1[ta1.length - 1];
            
            ta1.reverse();
            
            // Both views should see reversed
            if (ta1[0] !== ta2[0] || ta1[ta1.length - 1] !== ta2[ta2.length - 1]) {
                alert_vuln(217, 'Reverse broke aliasing! ta1[0]=' + ta1[0] + ' ta2[0]=' + ta2[0]);
            }
            
            // Verify actual reversal
            if (ta1[0] !== lastValue || ta1[ta1.length - 1] !== firstValue) {
                alert_vuln(217, 'Reverse didn\'t actually reverse!');
            }
        } catch(e) {
            log('TEST 217: Exception - ' + e.message);
        }

        // TEST 218: Every with early termination check
        try {
            log('TEST 218: Every early termination');
            
            const ta = new Uint32Array(1000);
            for (let i = 0; i < ta.length; i++) ta[i] = i;
            
            ta[500] = 0; // Make one fail
            
            let iterCount = 0;
            const result = ta.every(function(val) {
                iterCount++;
                return val !== 0;
            });
            
            // Should stop at first 0 (index 500)
            if (iterCount > 501) {
                alert_vuln(218, 'Every didn\'t stop early! iterations=' + iterCount);
            }
            
            log('TEST 218: Every stopped after ' + iterCount + ' iterations');
        } catch(e) {
            log('TEST 218: Exception - ' + e.message);
        }

        // TEST 219: Some with early termination check
        try {
            log('TEST 219: Some early termination');
            
            const ta = new Uint32Array(1000);
            for (let i = 0; i < ta.length; i++) ta[i] = 0;
            
            ta[500] = 1; // Make one succeed
            
            let iterCount = 0;
            const result = ta.some(function(val) {
                iterCount++;
                return val === 1;
            });
            
            // Should stop at first match
            if (iterCount > 501) {
                alert_vuln(219, 'Some didn\'t stop early! iterations=' + iterCount);
            }
            
            log('TEST 219: Some stopped after ' + iterCount + ' iterations');
        } catch(e) {
            log('TEST 219: Exception - ' + e.message);
        }

        // TEST 220: indexOf with NaN (strict equality check)
        try {
            log('TEST 220: indexOf NaN behavior');
            
            const fa = new Float64Array([1.1, 2.2, NaN, 3.3, 4.4]);
            
            const idx = fa.indexOf(NaN);
            
            // indexOf uses strict equality, NaN !== NaN, so should return -1
            if (idx !== -1) {
                alert_vuln(220, 'indexOf found NaN at index ' + idx + ' (NaN === NaN should be false!)');
            }
            
            log('TEST 220: indexOf(NaN) = ' + idx + ' (expected -1)');
        } catch(e) {
            log('TEST 220: Exception - ' + e.message);
        }

        // TEST 221: includes with NaN (SameValueZero check)
        try {
            log('TEST 221: includes NaN behavior');
            
            const fa = new Float64Array([1.1, 2.2, NaN, 3.3, 4.4]);
            
            const hasNaN = fa.includes(NaN);
            
            // includes uses SameValueZero, so should find NaN
            if (!hasNaN) {
                log('TEST 221: includes(NaN) = false (SameValueZero should find it)');
            } else {
                log('TEST 221: includes(NaN) = true (expected)');
            }
        } catch(e) {
            log('TEST 221: Exception - ' + e.message);
        }

        // TEST 222: Uint8ClampedArray strict clamping
        try {
            log('TEST 222: Uint8ClampedArray clamping validation');
            
            const ta = new Uint8ClampedArray(10);
            
            const tests = [
                {input: -1, expected: 0, name: 'negative'},
                {input: 256, expected: 255, name: 'overflow'},
                {input: 127.4, expected: 127, name: 'round down'},
                {input: 127.5, expected: 128, name: 'round up'},
                {input: Infinity, expected: 255, name: 'infinity'},
                {input: NaN, expected: 0, name: 'NaN'}
            ];
            
            for (let i = 0; i < tests.length && i < ta.length; i++) {
                ta[i] = tests[i].input;
                if (ta[i] !== tests[i].expected) {
                    alert_vuln(222, 'Clamping wrong for ' + tests[i].name + ': got ' + ta[i] + ', expected ' + tests[i].expected);
                }
            }
            
            log('TEST 222: All clamping tests passed');
        } catch(e) {
            log('TEST 222: Exception - ' + e.message);
        }

        // TEST 223: Int8Array wrap validation
        try {
            log('TEST 223: Int8Array wrapping validation');
            
            const ta = new Int8Array(5);
            
            const tests = [
                {input: 127, expected: 127},
                {input: 128, expected: -128},
                {input: 129, expected: -127},
                {input: -128, expected: -128},
                {input: -129, expected: 127},
                {input: 255, expected: -1}
            ];
            
            for (let i = 0; i < tests.length && i < ta.length; i++) {
                ta[i] = tests[i].input;
                if (ta[i] !== tests[i].expected) {
                    alert_vuln(223, 'Wrapping wrong: input=' + tests[i].input + ', got=' + ta[i] + ', expected=' + tests[i].expected);
                }
            }
            
            log('TEST 223: All wrap tests passed');
        } catch(e) {
            log('TEST 223: Exception - ' + e.message);
        }

        // TEST 224: Buffer growing with contamination check
        try {
            log('TEST 224: Buffer growing contamination');
            
            const victim = new ArrayBuffer(0x100);
            const victimView = new Uint32Array(victim);
            const SENTINEL = 0x11111111;
            for (let i = 0; i < victimView.length; i++) victimView[i] = SENTINEL;
            
            const buffers = [];
            for (let i = 0; i < 100; i++) {
                buffers.push(new ArrayBuffer(0x100));
            }
            
            // Free some
            for (let i = 0; i < buffers.length; i += 2) {
                buffers[i] = null;
            }
            
            // Allocate new
            const newBuffer = new ArrayBuffer(0x100);
            const newView = new Uint32Array(newBuffer);
            newView[0] = 0x4C4C4C4C;
            
            // Check victim
            if (checkBufferContamination(victim, SENTINEL, 224)) {
                alert_vuln(224, 'Buffer allocation contaminated existing buffer!');
            }
        } catch(e) {
            log('TEST 224: Exception - ' + e.message);
        }

        // TEST 225: Float32 denormalized numbers
        try {
            log('TEST 225: Float32 denormal validation');
            
            const ab = new ArrayBuffer(4);
            const fa = new Float32Array(ab);
            const ua = new Uint32Array(ab);
            
            // Create smallest denormalized number
            ua[0] = 0x00000001;
            const denorm = fa[0];
            
            if (denorm !== 0 && !isNaN(denorm)) {
                log('TEST 225: Denormalized number: ' + denorm);
            }
            
            // Create largest denormalized
            ua[0] = 0x007FFFFF;
            const maxDenorm = fa[0];
            
            log('TEST 225: Max denorm: ' + maxDenorm);
        } catch(e) {
            log('TEST 225: Exception - ' + e.message);
        }

        // TEST 226: ArrayBuffer slice contamination
        try {
            log('TEST 226: ArrayBuffer slice contamination');
            
            const victim = new ArrayBuffer(0x100);
            const victimView = new Uint32Array(victim);
            const SENTINEL = 0x22222222;
            for (let i = 0; i < victimView.length; i++) victimView[i] = SENTINEL;
            
            const ab = new ArrayBuffer(0x1000);
            const ta = new Uint32Array(ab);
            for (let i = 0; i < ta.length; i++) ta[i] = i;
            
            // Slice
            const sliced = ab.slice(0x100, 0x200);
            const slicedView = new Uint32Array(sliced);
            slicedView[0] = 0x4D4D4D4D;
            
            // Check victim
            if (checkBufferContamination(victim, SENTINEL, 226)) {
                alert_vuln(226, 'Slice contaminated external buffer!');
            }
        } catch(e) {
            log('TEST 226: Exception - ' + e.message);
        }

        // TEST 227: DataView byteLength overflow strict
        try {
            log('TEST 227: DataView byteLength overflow');
            
            const ab = new ArrayBuffer(0x100);
            
            let created = false;
            try {
                const dv = new DataView(ab, 0, 0xFFFFFFFF);
                created = true;
            } catch(e2) {}
            
            if (created) {
                alert_vuln(227, 'DataView created with byteLength overflow!');
            } else {
                log('TEST 227: Overflow rejected (expected)');
            }
        } catch(e) {
            log('TEST 227: Exception - ' + e.message);
        }

        // TEST 228: TypedArray constructor with fractional length
        try {
            log('TEST 228: Fractional length handling');
            
            const tests = [
                {len: 10.1, expected: 10},
                {len: 10.9, expected: 10},
                {len: -0, expected: 0}
            ];
            
            for (let test of tests) {
                try {
                    const ta = new Uint32Array(test.len);
                    if (ta.length !== test.expected) {
                        alert_vuln(228, 'Fractional length ' + test.len + ' gave length ' + ta.length + ', expected ' + test.expected);
                    }
                } catch(e2) {}
            }
            
            log('TEST 228: Fractional lengths handled correctly');
        } catch(e) {
            log('TEST 228: Exception - ' + e.message);
        }

        // TEST 229: Multiple views write order
        try {
            log('TEST 229: Multi-view write ordering');
            
            const ab = new ArrayBuffer(16);
            const v8 = new Uint8Array(ab);
            const v32 = new Uint32Array(ab);
            
            // Write via v32
            v32[0] = 0x12345678;
            
            // Read via v8 and verify byte order
            const bytes = [v8[0], v8[1], v8[2], v8[3]];
            
            // Little-endian: [0x78, 0x56, 0x34, 0x12]
            // Big-endian: [0x12, 0x34, 0x56, 0x78]
            const isLE = (bytes[0] === 0x78 && bytes[3] === 0x12);
            const isBE = (bytes[0] === 0x12 && bytes[3] === 0x78);
            
            if (!isLE && !isBE) {
                alert_vuln(229, 'Unexpected byte order! bytes=' + bytes.map(b => '0x'+b.toString(16)).join(','));
            }
            
            log('TEST 229: Byte order is ' + (isLE ? 'little' : 'big') + '-endian');
        } catch(e) {
            log('TEST 229: Exception - ' + e.message);
        }

        // TEST 230: Set with overlapping source/target on same buffer
        try {
            log('TEST 230: Set with same-buffer overlap');
            
            const ab = new ArrayBuffer(0x400);
            const ta1 = new Uint32Array(ab, 0, 100);
            const ta2 = new Uint32Array(ab, 0x100, 100);
            
            for (let i = 0; i < ta2.length; i++) ta2[i] = 0x4E4E0000 + i;
            
            // Set from ta2 to ta1 (different offsets, same buffer)
            ta1.set(ta2, 0);
            
            // Verify copy worked correctly
            let correct = true;
            for (let i = 0; i < ta2.length; i++) {
                if (ta1[i] !== 0x4E4E0000 + i) {
                    correct = false;
                    alert_vuln(230, 'Same-buffer set corrupted at index ' + i);
                    break;
                }
            }
            
            if (correct) {
                log('TEST 230: Same-buffer set worked correctly');
            }
        } catch(e) {
            log('TEST 230: Exception - ' + e.message);
        }

        // TEST 231: Resizable ArrayBuffer strict checks
        try {
            log('TEST 231: Resizable ArrayBuffer validation');
            
            if (typeof ArrayBuffer.prototype.resize === 'function') {
                const ab = new ArrayBuffer(0x100, {maxByteLength: 0x1000});
                const ta = new Uint32Array(ab);
                
                ta[0] = 0x4F4F4F4F;
                const originalLength = ta.length;
                
                // Resize
                ab.resize(0x200);
                
                // Check if length updated
                const newLength = ta.length;
                if (newLength <= originalLength) {
                    alert_vuln(231, 'TypedArray length didn\'t update after resize!');
                }
                
                // Resize back smaller
                ab.resize(0x80);
                
                // Access old region
                let threw = false;
                try {
                    const val = ta[originalLength - 1];
                } catch(e2) {
                    threw = true;
                }
                
                log('TEST 231: Resize working, access after shrink threw=' + threw);
            }
        } catch(e) {
            log('TEST 231: Exception or not supported - ' + e.message);
        }

        // TEST 232: SharedArrayBuffer strict isolation
        try {
            log('TEST 232: SharedArrayBuffer isolation');
            
            if (typeof SharedArrayBuffer !== 'undefined') {
                const sab = new SharedArrayBuffer(0x100);
                const ta1 = new Uint32Array(sab);
                const ta2 = new Uint32Array(sab);
                
                ta1[0] = 0x50505050;
                
                // Immediate read from ta2 should see it
                if (ta2[0] !== 0x50505050) {
                    alert_vuln(232, 'SharedArrayBuffer not sharing! ta2[0]=' + ta2[0]);
                }
                
                // Modify via ta2
                ta2[1] = 0x51515151;
                
                // ta1 should see it
                if (ta1[1] !== 0x51515151) {
                    alert_vuln(232, 'SharedArrayBuffer sharing broken! ta1[1]=' + ta1[1]);
                }
                
                log('TEST 232: SharedArrayBuffer working correctly');
            }
        } catch(e) {
            log('TEST 232: Exception - ' + e.message);
        }

        // TEST 233: Atomics bounds checking
        try {
            log('TEST 233: Atomics OOB check');
            
            if (typeof SharedArrayBuffer !== 'undefined' && typeof Atomics !== 'undefined') {
                const sab = new SharedArrayBuffer(0x100);
                const ta = new Int32Array(sab);
                
                // Try OOB atomic operation
                let threw = false;
                try {
                    Atomics.add(ta, 1000, 1);
                } catch(e2) {
                    threw = true;
                }
                
                if (!threw) {
                    alert_vuln(233, 'Atomics allowed OOB operation!');
                } else {
                    log('TEST 233: Atomics OOB blocked (expected)');
                }
            }
        } catch(e) {
            log('TEST 233: Exception - ' + e.message);
        }

        // TEST 234: BigInt64Array strict bounds
        try {
            log('TEST 234: BigInt64Array bounds');
            
            if (typeof BigInt64Array !== 'undefined') {
                const ta = new BigInt64Array(10);
                
                ta[0] = 0x7FFFFFFFFFFFFFFFn;
                
                // Try OOB
                let oobWorked = false;
                ta[100] = 0x5252525252525252n;
                
                if (isRealElement(ta, 100)) {
                    log('TEST 234: Index 100 is property (expected)');
                } else if (ta[100] === 0x5252525252525252n) {
                    alert_vuln(234, 'BigInt64Array OOB write worked!');
                }
            }
        } catch(e) {
            log('TEST 234: Exception - ' + e.message);
        }

        // TEST 235: Cross-type constructor contamination
        try {
            log('TEST 235: Cross-type constructor check');
            
            const victim = new ArrayBuffer(0x100);
            const victimView = new Uint32Array(victim);
            const SENTINEL = 0x33333333;
            for (let i = 0; i < victimView.length; i++) victimView[i] = SENTINEL;
            
            const f64 = new Float64Array([1.1, 2.2, 3.3]);
            const u32 = new Uint32Array(f64);
            
            // u32 should be conversion, not bit copy
            // Check victim wasn't affected
            if (checkBufferContamination(victim, SENTINEL, 235)) {
                alert_vuln(235, 'Cross-type constructor contaminated external buffer!');
            }
        } catch(e) {
            log('TEST 235: Exception - ' + e.message);
        }

        // TEST 236: Proxy with length trap strict check
        try {
            log('TEST 236: Proxy length trap');
            
            if (typeof Proxy !== 'undefined') {
                const ta = new Uint32Array(10);
                for (let i = 0; i < ta.length; i++) ta[i] = i;
                
                let getLengthCount = 0;
                const proxy = new Proxy(ta, {
                    get: function(target, prop) {
                        if (prop === 'length') {
                            getLengthCount++;
                            return 1000;
                        }
                        return target[prop];
                    }
                });
                
                // Try to iterate
                let iterCount = 0;
                for (let val of proxy) {
                    iterCount++;
                    if (iterCount > 20) break; // Safety
                }
                
                log('TEST 236: Proxy length accessed ' + getLengthCount + ' times, iterated ' + iterCount);
            }
        } catch(e) {
            log('TEST 236: Exception - ' + e.message);
        }

        // TEST 237: Object.freeze doesn't prevent element writes
        try {
            log('TEST 237: Frozen array element modification');
            
            const ta = new Uint32Array(10);
            ta[0] = 0x53535353;
            
            Object.freeze(ta);
            
            // In non-strict mode, write silently fails
            // In strict mode, write throws
            let threw = false;
            let writeSucceeded = false;
            
            try {
                ta[0] = 0x54545454;
                writeSucceeded = (ta[0] === 0x54545454);
            } catch(e2) {
                threw = true;
            }
            
            if (writeSucceeded) {
                alert_vuln(237, 'Frozen TypedArray element was modified!');
            }
            
            log('TEST 237: Freeze write threw=' + threw + ', succeeded=' + writeSucceeded);
        } catch(e) {
            log('TEST 237: Exception - ' + e.message);
        }

        // TEST 238: Object.seal allows element modification
        try {
            log('TEST 238: Sealed array element modification');
            
            const ta = new Uint32Array(10);
            ta[0] = 0x55555555;
            
            Object.seal(ta);
            
            // Sealed allows modification of existing indices
            ta[0] = 0x56565656;
            
            if (ta[0] !== 0x56565656) {
                alert_vuln(238, 'Sealed array element modification failed unexpectedly!');
            }
            
            // But shouldn't allow extension
            ta[100] = 0x57575757;
            
            if (isRealElement(ta, 100)) {
                log('TEST 238: Index 100 became property (expected for sealed)');
            }
            
            log('TEST 238: Sealed allows modification, prevents extension (expected)');
        } catch(e) {
            log('TEST 238: Exception - ' + e.message);
        }

        // TEST 239: Symbol.toStringTag side effects strict validation
        try {
            log('TEST 239: toStringTag side effects');
            
            const victim = new ArrayBuffer(0x100);
            const victimView = new Uint32Array(victim);
            const SENTINEL = 0x44444444;
            for (let i = 0; i < victimView.length; i++) victimView[i] = SENTINEL;
            
            const ab = new ArrayBuffer(0x100);
            
            let getterCalled = false;
            Object.defineProperty(ab, Symbol.toStringTag, {
                get: function() {
                    getterCalled = true;
                    // Side effect
                    victimView[0] = 0x58585858;
                    return 'CustomBuffer';
                }
            });
            
            const str = Object.prototype.toString.call(ab);
            
            // Getter executing is normal, but we check victim wasn't affected by CORRUPTION
            // (side effects themselves aren't vulnerabilities)
            log('TEST 239: toStringTag getter called=' + getterCalled + ' (expected behavior)');
        } catch(e) {
            log('TEST 239: Exception - ' + e.message);
        }

        // TEST 240: Constructor property doesn't affect map behavior
        try {
            log('TEST 240: Constructor property override');
            
            const ta = new Uint32Array([1, 2, 3, 4, 5]);
            
            ta.constructor = function() {
                return new Uint32Array(1000);
            };
            
            const mapped = ta.map(x => x * 2);
            
            // map should use species, not constructor property directly
            // Length should match original
            if (mapped.length !== ta.length) {
                log('TEST 240: Mapped length=' + mapped.length + ', original=' + ta.length);
            } else {
                log('TEST 240: Map ignored constructor property (expected)');
            }
        } catch(e) {
            log('TEST 240: Exception - ' + e.message);
        }

        // TEST 241: valueOf coercion side effects
        try {
            log('TEST 241: valueOf coercion validation');
            
            const victim = new ArrayBuffer(0x100);
            const victimView = new Uint32Array(victim);
            const SENTINEL = 0x55555555;
            for (let i = 0; i < victimView.length; i++) victimView[i] = SENTINEL;
            
            const ta = new Uint32Array(10);
            
            let coercionCount = 0;
            const malicious = {
                valueOf: function() {
                    coercionCount++;
                    return coercionCount;
                }
            };
            
            const idx = malicious; // Will be coerced
            ta[idx] = 0x59595959;
            
            // valueOf executing is normal behavior, not a vulnerability
            log('TEST 241: valueOf called ' + coercionCount + ' times (expected behavior)');
        } catch(e) {
            log('TEST 241: Exception - ' + e.message);
        }

        // TEST 242: Recursive modification depth limit
        try {
            log('TEST 242: Recursive modification check');
            
            const ta = new Uint32Array(100);
            let maxDepth = 0;
            
            function recursive(arr, depth) {
                maxDepth = Math.max(maxDepth, depth);
                if (depth > 1000) return; // Safety
                
                arr[depth % arr.length] = depth;
                recursive(arr, depth + 1);
            }
            
            try {
                recursive(ta, 0);
            } catch(e2) {
                // Stack overflow expected
            }
            
            log('TEST 242: Max recursion depth: ' + maxDepth);
        } catch(e) {
            log('TEST 242: Exception - ' + e.message);
        }

        // TEST 243: Method chain state consistency
        try {
            log('TEST 243: Method chain consistency');
            
            const victim = new ArrayBuffer(0x100);
            const victimView = new Uint32Array(victim);
            const SENTINEL = 0x66666666;
            for (let i = 0; i < victimView.length; i++) victimView[i] = SENTINEL;
            
            const ta = new Uint32Array([1, 2, 3, 4, 5]);
            
            const result = ta
                .map(x => x * 2)
                .filter(x => x > 4)
                .reduce((a, b) => a + b, 0);
            
            // Check victim
            if (checkBufferContamination(victim, SENTINEL, 243)) {
                alert_vuln(243, 'Method chain contaminated external buffer!');
            }
            
            log('TEST 243: Method chain result=' + result);
        } catch(e) {
            log('TEST 243: Exception - ' + e.message);
        }

        // TEST 244: Allocation pattern contamination
        try {
            log('TEST 244: Allocation pattern check');
            
            const buffers = [];
            const PATTERNS = [0xAAAAAAAA, 0xBBBBBBBB, 0xCCCCCCCC];
            
            // Allocate with different patterns
            for (let i = 0; i < 30; i++) {
                const ab = new ArrayBuffer(0x100);
                const ta = new Uint32Array(ab);
                const pattern = PATTERNS[i % PATTERNS.length];
                
                for (let j = 0; j < ta.length; j++) {
                    ta[j] = pattern;
                }
                
                buffers.push({ab, ta, pattern});
            }
            
            // Verify no cross-contamination
            for (let i = 0; i < buffers.length; i++) {
                const {ta, pattern} = buffers[i];
                for (let j = 0; j < ta.length; j++) {
                    if (ta[j] !== pattern) {
                        alert_vuln(244, 'Buffer ' + i + ' contaminated! Expected 0x' + pattern.toString(16) + ' got 0x' + ta[j].toString(16));
                        break;
                    }
                }
            }
            
            log('TEST 244: All buffers maintained isolation');
        } catch(e) {
            log('TEST 244: Exception - ' + e.message);
        }

        // TEST 245: Slice independence verification
        try {
            log('TEST 245: Slice buffer independence');
            
            const ab = new ArrayBuffer(0x1000);
            const ta = new Uint32Array(ab);
            for (let i = 0; i < ta.length; i++) ta[i] = i;
            
            const sliced = ab.slice(0x100, 0x200);
            const slicedView = new Uint32Array(sliced);
            
            // Modify original
            ta[0] = 0x5A5A5A5A;
            
            // Sliced should be independent
            if (slicedView[0] !== ta[0x40]) {
                log('TEST 245: Sliced buffer is independent (expected)');
            } else if (slicedView[0] === 0x5A5A5A5A) {
                alert_vuln(245, 'Sliced buffer not independent!');
            }
        } catch(e) {
            log('TEST 245: Exception - ' + e.message);
        }

        // TEST 246: Endianness consistency across operations
        try {
            log('TEST 246: Endianness consistency');
            
            const ab = new ArrayBuffer(8);
            const dv = new DataView(ab);
            
            // Write with explicit endianness
            dv.setUint32(0, 0x12345678, true); // LE
            dv.setUint32(4, 0xABCDEF00, false); // BE
            
            // Read back with same endianness
            const le = dv.getUint32(0, true);
            const be = dv.getUint32(4, false);
            
            if (le !== 0x12345678) {
                alert_vuln(246, 'LE consistency broken! Expected 0x12345678 got 0x' + le.toString(16));
            }
            
            if (be !== 0xABCDEF00) {
                alert_vuln(246, 'BE consistency broken! Expected 0xABCDEF00 got 0x' + be.toString(16));
            }
            
            log('TEST 246: Endianness consistent');
        } catch(e) {
            log('TEST 246: Exception - ' + e.message);
        }

        // TEST 247: Memory pressure no contamination
        try {
            log('TEST 247: Memory pressure isolation');
            
            const sentinel = new ArrayBuffer(0x100);
            const sentinelView = new Uint32Array(sentinel);
            const SENTINEL = 0x77777777;
            for (let i = 0; i < sentinelView.length; i++) sentinelView[i] = SENTINEL;
            
            // Allocate many buffers
            const allocations = [];
            for (let i = 0; i < 50; i++) {
                try {
                    allocations.push(new ArrayBuffer(0x10000)); // 64KB each
                } catch(e2) {
                    break;
                }
            }
            
            // Check sentinel
            if (checkBufferContamination(sentinel, SENTINEL, 247)) {
                alert_vuln(247, 'Memory pressure contaminated sentinel buffer!');
            }
            
            log('TEST 247: Allocated ' + allocations.length + ' buffers, no contamination');
            
            // Cleanup
            allocations.length = 0;
        } catch(e) {
            log('TEST 247: Exception - ' + e.message);
        }

        // TEST 248: Unaligned DataView write/read consistency
        try {
            log('TEST 248: Unaligned DataView consistency');
            
            const ab = new ArrayBuffer(16);
            const dv = new DataView(ab);
            
            // Write unaligned
            dv.setUint32(1, 0x12345678, true);
            
            // Read back
            const val = dv.getUint32(1, true);
            
            if (val !== 0x12345678) {
                alert_vuln(248, 'Unaligned DataView corrupted! Expected 0x12345678 got 0x' + val.toString(16));
            }
            
            log('TEST 248: Unaligned access consistent');
        } catch(e) {
            log('TEST 248: Exception - ' + e.message);
        }

        // TEST 249: Array-like to TypedArray conversion contamination
        try {
            log('TEST 249: Array-like conversion check');
            
            const victim = new ArrayBuffer(0x100);
            const victimView = new Uint32Array(victim);
            const SENTINEL = 0x88888888;
            for (let i = 0; i < victimView.length; i++) victimView[i] = SENTINEL;
            
            const arrayLike = {
                length: 5,
                0: 0x5B5B5B5B,
                1: 0x5C5C5C5C,
                2: 0x5D5D5D5D,
                3: 0x5E5E5E5E,
                4: 0x5F5F5F5F
            };
            
            const ta = new Uint32Array(arrayLike);
            
            // Check victim
            if (checkBufferContamination(victim, SENTINEL, 249)) {
                alert_vuln(249, 'Array-like conversion contaminated external buffer!');
            }
            
            log('TEST 249: Array-like conversion successful');
        } catch(e) {
            log('TEST 249: Exception - ' + e.message);
        }

        // TEST 250: Final comprehensive contamination test
        try {
            log('TEST 250: Comprehensive contamination test');
            
            // Create sentinel buffers
            const sentinels = [];
            for (let i = 0; i < 10; i++) {
                const ab = new ArrayBuffer(0x100);
                const ta = new Uint32Array(ab);
                const sentinel = 0x99990000 + i;
                
                for (let j = 0; j < ta.length; j++) {
                    ta[j] = sentinel;
                }
                
                sentinels.push({ab, ta, sentinel});
            }
            
            // Perform various operations
            const testBuffer = new ArrayBuffer(0x1000);
            const testView = new Uint32Array(testBuffer);
            
            // Fill
            testView.fill(0x60606060);
            
            // Slice
            const sliced = testBuffer.slice(0, 0x100);
            const slicedView = new Uint32Array(sliced);
            slicedView[0] = 0x61616161;
            
            // Copy
            const copy = new Uint32Array(testView);
            copy[0] = 0x62626262;
            
            // Subarray
            const sub = testView.subarray(10, 50);
            sub[0] = 0x63636363;
            
            // Check all sentinels
            let contaminated = false;
            for (let i = 0; i < sentinels.length; i++) {
                const {ta, sentinel} = sentinels[i];
                for (let j = 0; j < ta.length; j++) {
                    if (ta[j] !== sentinel) {
                        alert_vuln(250, 'COMPREHENSIVE TEST: Sentinel ' + i + ' contaminated!');
                        contaminated = true;
                        break;
                    }
                }
                if (contaminated) break;
            }
            
            if (!contaminated) {
                log('TEST 250: COMPREHENSIVE TEST PASSED - No contamination detected');
            }
            
        } catch(e) {
            log('TEST 250: Exception - ' + e.message);
        }

        log('========================================');
        log('ALL 50 TESTS COMPLETE (201-250)');
        log('========================================');
        log('ZERO FALSE POSITIVES - Only real vulnerabilities trigger ALERTA');
        log('Run on PS4 and compare with Chrome/Safari/Edge');
    </script>
