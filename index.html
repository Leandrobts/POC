<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>POC-3 — Mapeamento do Desync</title>
</head>
<body>

<h2>POC-3 — Mapeamento do Desync silencioso</h2>
<p>O engine retornou seq=196 após burst de 200 em dois testes diferentes.
Isso significa que os últimos replaceState foram ignorados silenciosamente.
Estes testes mapeiam exatamente isso.</p>

<div>
  <button id="btn1" onclick="run_T1()">T1 — Mapa do último seq retornado</button>
  <button id="btn2" onclick="run_T2()">T2 — Os objetos perdidos (197-199)</button>
  <button id="btn3" onclick="run_T3()">T3 — Desync em burst menor (abaixo do threshold)</button>
  <button onclick="resetLog()">RESET</button>
</div>
<br>
<pre id="log"></pre>

<script>
(function(){
"use strict";

const $log = document.getElementById("log");
function log(m)     { $log.textContent += m + "\n"; }
function logOK(m)   { $log.textContent += "[OK]   " + m + "\n"; }
function logWARN(m) { $log.textContent += "[WARN] " + m + "\n"; }
function logSep(t)  { $log.textContent += "\n=== " + t + " ===\n"; }
window.resetLog     = function(){ $log.textContent = ""; };

function randHex(n){ n=n||4; return ((Math.random()*(1<<24))|0).toString(16).padStart(6,"0").slice(0,n); }
function hrefNoHash(){ return location.href.split("#")[0]; }

// ============================================================
// T1 — Mapa do último seq retornado por burst
//
// Testa burst de 50 até 500 em passos.
// Para cada burst: faz os replaceState, lê history.state,
// compara seq retornado vs seq esperado (último do loop).
// Mapeia: "em burst=N, o engine comitou até seq=X"
// ============================================================
window.run_T1 = async function(){
  document.getElementById("btn1").disabled = true;
  $log.textContent = "";
  logSep("T1 — Mapa do último seq comitado pelo engine");
  log("Para cada tamanho de burst, verifica qual seq history.state retorna.");
  log("Se seq < burst-1, o engine ignorou os últimos replaceState.\n");

  const bursts = [10, 20, 50, 100, 150, 200, 250, 300, 400, 500];
  var resultados = [];

  for(var b=0; b<bursts.length; b++){
    var size = bursts[b];
    var runId = "M_"+Date.now().toString(16)+"_"+randHex(4);

    // Setup limpo
    history.replaceState({ tok:"BASE", run:runId }, "", hrefNoHash());
    history.pushState({ tok:"ENTRY", run:runId }, "", hrefNoHash());

    // Burst sincrono
    for(var k=0; k<size; k++){
      history.replaceState({ tok:"B", run:runId, seq:k }, "", hrefNoHash());
    }

    // Lê IMEDIATAMENTE após loop (sem await, sem setTimeout)
    var st = history.state;
    var seqRetornado = st ? st.seq : null;
    var seqEsperado  = size - 1;
    var delta        = seqRetornado !== null ? (seqEsperado - seqRetornado) : null;

    log("burst=" + size + " → esperado seq=" + seqEsperado + " | retornou seq=" + seqRetornado + " | delta=" + delta);
    resultados.push({ size:size, esperado:seqEsperado, retornou:seqRetornado, delta:delta });

    // Pequeno delay entre bursts
    await new Promise(function(r){ setTimeout(r, 30); });
  }

  // Relatório
  logSep("RELATÓRIO T1");
  log("");
  log("burst | esperado | retornou | delta (ignorados)");
  log("------|----------|----------|------------------");
  for(var i=0; i<resultados.length; i++){
    var r = resultados[i];
    var marker = r.delta > 0 ? " <<<" : "";
    log("  " + String(r.size).padStart(4) + " | " + String(r.esperado).padStart(6) + "   | " + String(r.retornou).padStart(6) + "   | " + String(r.delta).padStart(3) + marker);
  }
  log("");

  // Análise do padrão
  var comDelta = [];
  for(var i=0; i<resultados.length; i++){
    if(resultados[i].delta > 0) comDelta.push(resultados[i]);
  }
  if(comDelta.length === 0){
    logOK("Sem delta em nenhum burst. O seq=196 anterior pode ter sido timing.");
  } else {
    logWARN("Delta encontrado em " + comDelta.length + " bursts.");
    log("O engine ignorou silenciosamente os últimos replaceState nesses casos.");

    // Verifica se o delta é consistente
    var deltas = comDelta.map(function(r){ return r.delta; });
    var todos_iguais = deltas.every(function(d){ return d === deltas[0]; });
    if(todos_iguais){
      log("Delta é CONSISTENTE: sempre " + deltas[0] + " replaceState ignorados.");
    } else {
      log("Deltas variáveis: " + JSON.stringify(deltas));
    }
  }

  document.getElementById("btn1").disabled = false;
};

// ============================================================
// T2 — Os objetos perdidos
//
// Se o engine ignorou seq 197, 198, 199:
//   - Os objetos passados nesses replaceState foram serializados?
//   - O que aconteceu com a memória deles?
//   - Eles existem acessíveis de alguma forma?
//
// Teste: passa objetos com marcadores únicos nos últimos
// replaceState, depois tenta acessar de várias formas.
// ============================================================
window.run_T2 = async function(){
  document.getElementById("btn2").disabled = true;
  $log.textContent = "";
  logSep("T2 — Destino dos objetos nos replaceState ignorados");
  log("Se o engine ignorou os últimos replaceState, o que aconteceu com os objetos?\n");

  const BURST = 200;
  const runId = "T2_"+Date.now().toString(16)+"_"+randHex(4);

  // Setup
  history.replaceState({ tok:"BASE", run:runId }, "", hrefNoHash());
  history.pushState({ tok:"ENTRY", idx:1, run:runId }, "", hrefNoHash());
  history.pushState({ tok:"ENTRY2", idx:2, run:runId }, "", hrefNoHash());

  // Marcadores únicos para os últimos 10 replaceState
  // Usa strings muito específicas que não poderiam aparecer por acidente
  var marcadores = {};
  for(var k=0; k<BURST; k++){
    var marker = null;
    if(k >= BURST - 10){
      // Últimos 10: marcador único
      marker = "MARKER_PERDIDO_" + k + "_" + randHex(8);
      marcadores[k] = marker;
    }
    history.replaceState({
      tok: "B",
      run: runId,
      seq: k,
      marker: marker,
      // Dado grande nos últimos para maximizar pressão de memória
      data: k >= BURST-10 ? new Array(1000).fill("DADO_" + k) : null
    }, "", hrefNoHash());
  }

  log("Burst de " + BURST + " concluído.");
  log("Marcadores únicos nos últimos 10 (seq 190-199):\n");
  var keys = Object.keys(marcadores);
  for(var i=0; i<keys.length; i++){
    log("  seq=" + keys[i] + " → " + marcadores[keys[i]]);
  }
  log("");

  // Lê history.state
  var st = history.state;
  log("history.state retornou seq=" + (st?st.seq:"null"));
  log("marker retornado: " + (st?st.marker:"null"));
  log("");

  if(st && st.seq !== null && st.seq < BURST-1){
    log("Engine comitou até seq=" + st.seq + ". Objetos seq=" + (st.seq+1) + " a " + (BURST-1) + " foram ignorados.");
    log("");

    // Tenta encontrar os marcadores perdidos via:
    // 1. Navegar para trás e verificar popstate states
    // 2. Verificar se history.state muda sem navegação

    log("Tentando recuperar via back() + popstate...");
    var encontrados = [];

    // back para idx=1
    var pop1 = await new Promise(function(resolve){
      var done = false;
      window.onpopstate = function(ev){
        if(done) return;
        done = true;
        resolve(ev.state);
      };
      setTimeout(function(){ if(!done){ done=true; resolve(null); }}, 3000);
      history.back();
    });

    if(pop1){
      log("popstate chegou: seq=" + pop1.seq + " marker=" + pop1.marker);
      if(pop1.marker && pop1.marker.indexOf("MARKER_PERDIDO") !== -1){
        encontrados.push(pop1.seq);
        log("  MARCADOR ENCONTRADO no popstate!");
      }
    } else {
      log("popstate não chegou (timeout).");
    }
    log("");

    // Relatório
    if(encontrados.length > 0){
      logWARN("Marcadores dos replaceState 'ignorados' foram encontrados via popstate.");
      log("Isso significa que o engine processou mas não expôs via history.state.");
    } else {
      log("Marcadores não encontrados via popstate.");
      log("Os objetos dos replaceState ignorados não são acessíveis pelo JS.");
      logWARN("Se foram serializados mas não são acessíveis, onde estão na memória?");
    }

  } else {
    logOK("Engine comitou até o último seq. Sem objetos perdidos nesta execução.");
  }

  document.getElementById("btn2").disabled = false;
};

// ============================================================
// T3 — Desync em burst menor
//
// O desync (seq=196 em burst=200) aconteceu com burst acima
// do threshold de timeout. Mas o que acontece com burst
// ABAIXO do timeout (burst=10-15, onde popstate ainda chega)?
//
// Se o desync acontece mesmo com burst pequeno, é comportamento
// mais fundamental do engine.
// Se acontece só com burst grande, está ligado à mesma condição
// que causa o timeout.
// ============================================================
window.run_T3 = async function(){
  document.getElementById("btn3").disabled = true;
  $log.textContent = "";
  logSep("T3 — Desync em bursts pequenos (abaixo do timeout)");
  log("Testa se o engine ignora replaceState mesmo com burst pequeno.");
  log("5 repetições por tamanho.\n");

  const bursts = [5, 10, 15, 20, 25, 30];
  const reps = 5;

  for(var b=0; b<bursts.length; b++){
    var size = bursts[b];
    logSep("burst=" + size + " (" + reps + " reps)");
    var deltas = [];

    for(var r=0; r<reps; r++){
      var runId = "S_"+Date.now().toString(16)+"_"+randHex(4);
      history.replaceState({ tok:"BASE", run:runId }, "", hrefNoHash());
      history.pushState({ tok:"E", run:runId }, "", hrefNoHash());

      // Burst
      for(var k=0; k<size; k++){
        history.replaceState({ tok:"B", run:runId, seq:k }, "", hrefNoHash());
      }

      // Lê imediatamente
      var st = history.state;
      var seqR = st ? st.seq : null;
      var esperado = size - 1;
      var delta = seqR !== null ? (esperado - seqR) : -1;
      deltas.push(delta);

      log("  rep " + (r+1) + ": esperado=" + esperado + " retornou=" + seqR + " delta=" + delta + (delta > 0 ? " <<<" : ""));

      await new Promise(function(r2){ setTimeout(r2, 20); });
    }

    // Resumo
    var comDelta = deltas.filter(function(d){ return d > 0; });
    if(comDelta.length > 0){
      logWARN("Desync em " + comDelta.length + "/" + reps + " reps. Deltas: " + JSON.stringify(comDelta));
    } else {
      logOK("Sem desync. Engine comitou todos os replaceState.");
    }
  }

  document.getElementById("btn3").disabled = false;
};

})();
</script>
</body>
</html>
