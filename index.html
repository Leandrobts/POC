<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>PS4 T8 Retest — MessageChannel Transfer DROP (Minimal Log)</title>
</head>
<body>
  <h1>PS4 T8 Retest — MessageChannel Transfer DROP (Auto, Minimal Log)</h1>

  <button id="run">RUN T8 AUTO</button>
  <button id="stop">STOP</button>
  <button id="reset">Reset log</button>

  <p>
    Attempts (N): <input id="N" type="number" value="60" min="10" step="10">
    Timeout per attempt (ms): <input id="timeout" type="number" value="1200" min="200" step="100">
    Delay between attempts (ms): <input id="delay" type="number" value="30" min="0" step="10">
    Mode:
    <select id="mode">
      <option value="baseline">baseline</option>
      <option value="pressure">pressure</option>
      <option value="teardown">teardown</option>
      <option value="mix" selected>mix</option>
    </select>
  </p>

  <pre id="log"></pre>

<script>
(() => {
  "use strict";

  const $log = document.getElementById("log");
  const $run = document.getElementById("run");
  const $stop = document.getElementById("stop");
  const $reset = document.getElementById("reset");

  let STOP = false;
  let RUN_ID = 0;

  function ts(){ return Date.now(); }
  function logLine(s){ $log.textContent += `[${ts()}] ${s}\n`; }
  function resetLog(){ $log.textContent=""; logLine("Reset."); }
  function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

  async function withTimeout(promise, ms){
    let t;
    const timeout = new Promise((_, rej) => { t = setTimeout(() => rej(new Error("TIMEOUT")), ms); });
    try { return await Promise.race([promise, timeout]); }
    finally { clearTimeout(t); }
  }

  // --- light, bounded "pressure" (no DoS)
  function lightPressure(){
    // Small churn: allocate a few medium buffers + touch them
    const arr = [];
    for (let i = 0; i < 24; i++){
      const ab = new ArrayBuffer(0x4000); // 16KB
      const u32 = new Uint32Array(ab);
      u32[0] = 0x41414141 ^ i;
      u32[u32.length-1] = 0x42424242 ^ i;
      arr.push(ab);
    }
    return arr;
  }

  function lightTeardown(){
    // Create/remove iframe + small microtask chain
    const f = document.createElement("iframe");
    document.body.appendChild(f);
    try { f.contentWindow && f.contentWindow.location; } catch(_){}
    try { f.remove(); } catch(_){}
    // microtask churn (bounded)
    let p = Promise.resolve();
    for (let i = 0; i < 40; i++) p = p.then(() => {});
    return p;
  }

  function classifyPayload(got){
    const tag = Object.prototype.toString.call(got);
    const isAB = (tag === "[object ArrayBuffer]") ||
                 (got && typeof got === "object" && typeof got.byteLength === "number" && typeof got.slice === "function");
    const isView = (got && typeof got === "object" && typeof got.byteLength === "number" && got.buffer && typeof got.buffer === "object");
    return { tag, isAB, isView };
  }

  async function oneAttempt(kind, timeoutMs){
    // kind: baseline | pressure | teardown
    const ch = new MessageChannel();
    const ab = new ArrayBuffer(4096);
    const u8 = new Uint8Array(ab);
    u8[0] = 0xAA;
    u8[1] = 0x55;
    u8[4095] = 0xCC;

    let got = undefined;
    let recvCount = 0;

    ch.port2.onmessage = (ev) => { got = ev.data; recvCount++; };

    let threw = false;
    try { ch.port1.postMessage(ab, [ab]); }
    catch(_){ threw = true; }

    if (threw) return { outcome:"THROW" };

    // Interleave stress between post and receive
    if (kind === "pressure") lightPressure();
    if (kind === "teardown") await lightTeardown();

    // Wait delivery (or timeout)
    try {
      await withTimeout(
        (async () => {
          // spin a few ticks
          for (let i = 0; i < 6; i++){
            if (recvCount) break;
            await sleep(0);
          }
        })(),
        timeoutMs
      );
    } catch(_){
      // fallthrough to classify
    }

    const senderLen = ab.byteLength;

    // Sender byteLength should be 0 (transfer) or 4096 (clone)
    if (senderLen !== 0 && senderLen !== 4096) {
      return { outcome:"SENDER_IMP", senderLen };
    }

    if (senderLen === 0) {
      // transfer path: receiver must exist + be readable + preserve markers
      if (got === undefined || got === null) {
        return { outcome:"DROP", senderLen, gotType: typeof got };
      }
      const c = classifyPayload(got);

      try {
        let r8 = null;
        if (c.isAB) r8 = new Uint8Array(got);
        else if (c.isView) {
          if (got instanceof Uint8Array) r8 = got;
          else r8 = new Uint8Array(got.buffer);
        } else {
          return { outcome:"BAD_PAYLOAD", senderLen, tag: c.tag };
        }

        if (r8.length !== 4096) return { outcome:"BAD_PAYLOAD", senderLen, tag: c.tag, rLen: r8.length };

        const ok = (r8[0] === 0xAA && r8[1] === 0x55 && r8[4095] === 0xCC);
        if (!ok) return { outcome:"BAD_PAYLOAD", senderLen, tag: c.tag, r0:r8[0], r1:r8[1], rLast:r8[4095] };

        return { outcome:"DETACH_OK" };
      } catch(e){
        return { outcome:"BAD_PAYLOAD", senderLen, err: (e && e.name) ? e.name : "ERR" };
      }
    } else {
      // clone path (rare on some engines). Validate no alias:
      if (got === undefined || got === null) return { outcome:"CLONE_UNKNOWN" };
      const c = classifyPayload(got);
      try {
        let r8 = c.isAB ? new Uint8Array(got) :
                 (c.isView ? (got instanceof Uint8Array ? got : new Uint8Array(got.buffer)) : null);
        if (!r8) return { outcome:"CLONE_UNKNOWN" };

        const before = r8[0];
        u8[0] = 0xBB;
        const after = r8[0];
        if (before !== after) return { outcome:"ALIAS_IN_CLONE" };
        return { outcome:"CLONE_OK" };
      } catch(_){
        return { outcome:"CLONE_UNKNOWN" };
      }
    }
  }

  function pickKind(mode, i){
    if (mode === "baseline") return "baseline";
    if (mode === "pressure") return "pressure";
    if (mode === "teardown") return "teardown";
    // mix: 2 baseline, 1 pressure, 1 teardown repeating
    const r = i % 4;
    if (r === 0 || r === 1) return "baseline";
    if (r === 2) return "pressure";
    return "teardown";
  }

  async function runAuto(){
    STOP = false;
    RUN_ID++;
    const runId = RUN_ID;

    if (typeof MessageChannel !== "function"){
      logLine("MessageChannel not available.");
      return;
    }

    const N = Math.max(10, parseInt(document.getElementById("N").value || "60", 10));
    const timeoutMs = Math.max(200, parseInt(document.getElementById("timeout").value || "1200", 10));
    const delayMs = Math.max(0, parseInt(document.getElementById("delay").value || "30", 10));
    const mode = document.getElementById("mode").value || "mix";

    const stats = {
      DETACH_OK:0,
      DROP:0,
      SENDER_IMP:0,
      BAD_PAYLOAD:0,
      THROW:0,
      TIMEOUT:0,
      CLONE_OK:0,
      ALIAS_IN_CLONE:0,
      CLONE_UNKNOWN:0
    };

    // Keep only first few "samples" to avoid huge logs
    const samples = [];
    const maxSamples = 6;

    logLine("============================================================");
    logLine(`Run T8 AUTO :: N=${N} timeout=${timeoutMs}ms delay=${delayMs}ms mode=${mode}`);
    logLine("============================================================");

    for (let i = 0; i < N; i++){
      if (STOP || runId !== RUN_ID) break;

      const kind = pickKind(mode, i);
      let r;
      try {
        r = await oneAttempt(kind, timeoutMs);
      } catch(e){
        r = { outcome:"TIMEOUT", err:(e && e.name) ? e.name : "ERR" };
      }

      const o = r.outcome || "TIMEOUT";
      if (stats[o] === undefined) stats[o] = 0;
      stats[o]++;

      if ((o === "DROP" || o === "SENDER_IMP" || o === "BAD_PAYLOAD" || o === "ALIAS_IN_CLONE") && samples.length < maxSamples){
        samples.push({ i, kind, ...r });
      }

      // Minimal progress ping every 10
      if ((i+1) % 10 === 0) logLine(`progress: ${i+1}/${N}`);

      if (delayMs) await sleep(delayMs);
    }

    logLine("------------------------------------------------------------");
    logLine("RESULT SUMMARY:");
    logLine(JSON.stringify(stats));
    if (samples.length){
      logLine("SAMPLES (first failures):");
      logLine(JSON.stringify(samples));
    } else {
      logLine("SAMPLES: none (no interesting failures captured).");
    }
    logLine("DONE.");
  }

  $run.onclick = () => runAuto().catch(() => logLine("ERRO: runAuto failed."));
  $stop.onclick = () => { STOP = true; logLine("STOP requested."); };
  $reset.onclick = resetLog;

  resetLog();
})();
</script>
</body>
</html>
