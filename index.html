<!DOCTYPE html>
<html>
<head>
    <title>PS4 Browser Memory Corruption Tests</title>
    <meta charset="UTF-8">
</head>
<body>
    <h1>PS4 Browser Memory Corruption Test Suite</h1>
    <div id="log"></div>
    <button onclick="runAllTests()">Run All Tests</button>
    <button onclick="clearLog()">Clear Log</button>

    <script>
        var logDiv = document.getElementById('log');
        var testResults = [];

        function log(msg) {
            var p = document.createElement('p');
            p.textContent = msg;
            logDiv.appendChild(p);
            testResults.push(msg);
        }

        function clearLog() {
            logDiv.innerHTML = '';
            testResults = [];
        }

        // Test 1: Array.prototype manipulation
        function test1() {
            log("Test 1: START");
            try {
                var arr = new Array(0x100000);
                arr.length = 0;
                arr.length = 0xFFFFFFFF;
                for(var i = 0; i < 100; i++) arr[i] = {};
            } catch(e) {}
            log("Test 1: END");
        }

        // Test 2: Typed array boundary
        function test2() {
            log("Test 2: START");
            try {
                var buf = new ArrayBuffer(0x1000);
                var view = new Uint32Array(buf);
                for(var i = 0; i < 0x2000; i++) view[i] = 0x41414141;
            } catch(e) {}
            log("Test 2: END");
        }

        // Test 3: String concatenation overflow
        function test3() {
            log("Test 3: START");
            try {
                var s = "A";
                for(var i = 0; i < 30; i++) s += s;
            } catch(e) {}
            log("Test 3: END");
        }

        // Test 4: Object property overflow
        function test4() {
            log("Test 4: START");
            try {
                var obj = {};
                for(var i = 0; i < 0x100000; i++) obj["prop" + i] = i;
            } catch(e) {}
            log("Test 4: END");
        }

        // Test 5: Recursive function stack
        function test5() {
            log("Test 5: START");
            try {
                function recurse(n) {
                    var arr = new Array(1000);
                    if(n > 0) recurse(n - 1);
                }
                recurse(10000);
            } catch(e) {}
            log("Test 5: END");
        }

        // Test 6: Array sort with custom comparator
        function test6() {
            log("Test 6: START");
            try {
                var arr = new Array(100000);
                for(var i = 0; i < arr.length; i++) arr[i] = i;
                arr.sort(function(a, b) {
                    arr.length = 0;
                    return a - b;
                });
            } catch(e) {}
            log("Test 6: END");
        }

        // Test 7: RegExp backtracking
        function test7() {
            log("Test 7: START");
            try {
                var s = "A".repeat(10000) + "B";
                var re = /^(A+)+B$/;
                re.test(s);
            } catch(e) {}
            log("Test 7: END");
        }

        // Test 8: ArrayBuffer detachment
        function test8() {
            log("Test 8: START");
            try {
                var buf = new ArrayBuffer(1000);
                var view = new Uint8Array(buf);
                postMessage(buf, "*", [buf]);
                for(var i = 0; i < 1000; i++) view[i] = 0xFF;
            } catch(e) {}
            log("Test 8: END");
        }

        // Test 9: Prototype chain pollution
        function test9() {
            log("Test 9: START");
            try {
                var obj = {};
                obj.__proto__.__proto__ = obj;
                JSON.stringify(obj);
            } catch(e) {}
            log("Test 9: END");
        }

        // Test 10: DataView range
        function test10() {
            log("Test 10: START");
            try {
                var buf = new ArrayBuffer(8);
                var view = new DataView(buf);
                for(var i = 0; i < 1000; i++) {
                    view.setUint32(i * 4, 0x41424344);
                }
            } catch(e) {}
            log("Test 10: END");
        }

        // Test 11: Function.prototype.apply with large args
        function test11() {
            log("Test 11: START");
            try {
                var args = new Array(0x100000);
                Math.max.apply(null, args);
            } catch(e) {}
            log("Test 11: END");
        }

        // Test 12: Array concat overflow
        function test12() {
            log("Test 12: START");
            try {
                var arr1 = new Array(0x80000);
                var arr2 = new Array(0x80000);
                arr1.concat(arr2);
            } catch(e) {}
            log("Test 12: END");
        }

        // Test 13: Object.defineProperty descriptor
        function test13() {
            log("Test 13: START");
            try {
                var obj = {};
                Object.defineProperty(obj, "prop", {
                    get: function() { delete obj.prop; return 1; },
                    configurable: true
                });
                for(var i = 0; i < 1000; i++) obj.prop;
            } catch(e) {}
            log("Test 13: END");
        }

        // Test 14: Array slice with negative indices
        function test14() {
            log("Test 14: START");
            try {
                var arr = [1,2,3,4,5];
                arr.slice(-0x80000000, 0x7FFFFFFF);
            } catch(e) {}
            log("Test 14: END");
        }

        // Test 15: TypedArray set overflow
        function test15() {
            log("Test 15: START");
            try {
                var arr1 = new Uint8Array(100);
                var arr2 = new Uint8Array(1000);
                arr1.set(arr2, 50);
            } catch(e) {}
            log("Test 15: END");
        }

        // Test 16: String.prototype.replace callback
        function test16() {
            log("Test 16: START");
            try {
                var s = "AAAA";
                s.replace(/A/g, function() {
                    s += s;
                    return "B";
                });
            } catch(e) {}
            log("Test 16: END");
        }

        // Test 17: Array map mutation
        function test17() {
            log("Test 17: START");
            try {
                var arr = [1,2,3,4,5];
                arr.map(function(v, i) {
                    arr.length = 0;
                    return v * 2;
                });
            } catch(e) {}
            log("Test 17: END");
        }

        // Test 18: JSON.parse circular reference
        function test18() {
            log("Test 18: START");
            try {
                var obj = {};
                obj.self = obj;
                var s = JSON.stringify(obj);
                JSON.parse(s);
            } catch(e) {}
            log("Test 18: END");
        }

        // Test 19: Array reduceRight mutation
        function test19() {
            log("Test 19: START");
            try {
                var arr = new Array(1000);
                for(var i = 0; i < arr.length; i++) arr[i] = i;
                arr.reduceRight(function(acc, v, i) {
                    arr.length = i;
                    return acc + v;
                }, 0);
            } catch(e) {}
            log("Test 19: END");
        }

        // Test 20: Date.prototype manipulation
        function test20() {
            log("Test 20: START");
            try {
                var d = new Date(0x100000000000);
                d.setTime(0x8000000000000000);
            } catch(e) {}
            log("Test 20: END");
        }

        // Test 21: Array.from with iterator mutation
        function test21() {
            log("Test 21: START");
            try {
                var obj = {
                    length: 1000,
                    0: 1,
                    [Symbol.iterator]: function*() {
                        this.length = 0;
                        yield 1;
                    }
                };
                Array.from(obj);
            } catch(e) {}
            log("Test 21: END");
        }

        // Test 22: SharedArrayBuffer race (if available)
        function test22() {
            log("Test 22: START");
            try {
                if(typeof SharedArrayBuffer !== 'undefined') {
                    var sab = new SharedArrayBuffer(1024);
                    var view = new Int32Array(sab);
                    for(var i = 0; i < 1000; i++) view[i % view.length]++;
                }
            } catch(e) {}
            log("Test 22: END");
        }

        // Test 23: Array splice during iteration
        function test23() {
            log("Test 23: START");
            try {
                var arr = new Array(1000);
                for(var i = 0; i < arr.length; i++) arr[i] = i;
                arr.forEach(function(v, i) {
                    arr.splice(i, 1);
                });
            } catch(e) {}
            log("Test 23: END");
        }

        // Test 24: Object.freeze bypass
        function test24() {
            log("Test 24: START");
            try {
                var obj = {a: 1};
                Object.freeze(obj);
                Object.defineProperty(obj, "a", {value: 2});
            } catch(e) {}
            log("Test 24: END");
        }

        // Test 25: Array unshift overflow
        function test25() {
            log("Test 25: START");
            try {
                var arr = new Array(100);
                var items = new Array(0x100000);
                arr.unshift.apply(arr, items);
            } catch(e) {}
            log("Test 25: END");
        }

        // Test 26: Proxy handler recursion
        function test26() {
            log("Test 26: START");
            try {
                if(typeof Proxy !== 'undefined') {
                    var handler = {
                        get: function(target, prop) {
                            return target[prop];
                        }
                    };
                    var p = new Proxy({}, handler);
                    handler.get = function(target, prop) {
                        return p[prop];
                    };
                    p.test;
                }
            } catch(e) {}
            log("Test 26: END");
        }

        // Test 27: Map/Set size manipulation
        function test27() {
            log("Test 27: START");
            try {
                if(typeof Map !== 'undefined') {
                    var m = new Map();
                    for(var i = 0; i < 0x100000; i++) {
                        m.set(i, i);
                    }
                }
            } catch(e) {}
            log("Test 27: END");
        }

        // Test 28: Symbol.toPrimitive recursion
        function test28() {
            log("Test 28: START");
            try {
                var obj = {
                    [Symbol.toPrimitive]: function() {
                        return obj;
                    }
                };
                obj + 1;
            } catch(e) {}
            log("Test 28: END");
        }

        // Test 29: WeakMap key reuse
        function test29() {
            log("Test 29: START");
            try {
                if(typeof WeakMap !== 'undefined') {
                    var wm = new WeakMap();
                    var key = {};
                    wm.set(key, 1);
                    key = null;
                    for(var i = 0; i < 1000; i++) {
                        wm.set({}, i);
                    }
                }
            } catch(e) {}
            log("Test 29: END");
        }

        // Test 30: ArrayBuffer slice overflow
        function test30() {
            log("Test 30: START");
            try {
                var buf = new ArrayBuffer(100);
                buf.slice(-0x80000000, 0x7FFFFFFF);
            } catch(e) {}
            log("Test 30: END");
        }

        // Test 31: TypedArray subarray boundary
        function test31() {
            log("Test 31: START");
            try {
                var arr = new Uint8Array(100);
                var sub = arr.subarray(50, 200);
                for(var i = 0; i < 200; i++) sub[i] = 0xFF;
            } catch(e) {}
            log("Test 31: END");
        }

        // Test 32: Object seal violation
        function test32() {
            log("Test 32: START");
            try {
                var obj = {a: 1};
                Object.seal(obj);
                delete obj.a;
                obj.b = 2;
            } catch(e) {}
            log("Test 32: END");
        }

        // Test 33: Array filter mutation
        function test33() {
            log("Test 33: START");
            try {
                var arr = new Array(1000);
                for(var i = 0; i < arr.length; i++) arr[i] = i;
                arr.filter(function(v, i) {
                    arr.length = 10;
                    return true;
                });
            } catch(e) {}
            log("Test 33: END");
        }

        // Test 34: Number.prototype manipulation
        function test34() {
            log("Test 34: START");
            try {
                var n = 0x7FFFFFFF;
                n.toString(37);
            } catch(e) {}
            log("Test 34: END");
        }

        // Test 35: Array every mutation
        function test35() {
            log("Test 35: START");
            try {
                var arr = [1,2,3,4,5];
                arr.every(function(v, i) {
                    arr.push(v);
                    return i < 100;
                });
            } catch(e) {}
            log("Test 35: END");
        }

        // Test 36: String charCodeAt overflow
        function test36() {
            log("Test 36: START");
            try {
                var s = "test";
                for(var i = 0; i < 0x10000; i++) {
                    s.charCodeAt(i);
                }
            } catch(e) {}
            log("Test 36: END");
        }

        // Test 37: Object.create null prototype
        function test37() {
            log("Test 37: START");
            try {
                var obj = Object.create(null);
                obj.toString();
            } catch(e) {}
            log("Test 37: END");
        }

        // Test 38: Array copyWithin overlap
        function test38() {
            log("Test 38: START");
            try {
                if(Array.prototype.copyWithin) {
                    var arr = new Uint8Array(100);
                    for(var i = 0; i < arr.length; i++) arr[i] = i;
                    arr.copyWithin(0, 50, 200);
                }
            } catch(e) {}
            log("Test 38: END");
        }

        // Test 39: Promise chain overflow
        function test39() {
            log("Test 39: START");
            try {
                var p = Promise.resolve();
                for(var i = 0; i < 10000; i++) {
                    p = p.then(function() {});
                }
            } catch(e) {}
            log("Test 39: END");
        }

        // Test 40: Array find mutation
        function test40() {
            log("Test 40: START");
            try {
                if(Array.prototype.find) {
                    var arr = [1,2,3,4,5];
                    arr.find(function(v, i) {
                        arr.length = 0;
                        return false;
                    });
                }
            } catch(e) {}
            log("Test 40: END");
        }

        // Test 41: TypedArray constructor confusion
        function test41() {
            log("Test 41: START");
            try {
                var arr = new Uint8Array(new ArrayBuffer(100), 50, 100);
            } catch(e) {}
            log("Test 41: END");
        }

        // Test 42: Object.assign circular
        function test42() {
            log("Test 42: START");
            try {
                var obj1 = {};
                var obj2 = {ref: obj1};
                obj1.ref = obj2;
                Object.assign({}, obj1);
            } catch(e) {}
            log("Test 42: END");
        }

        // Test 43: Array.of with modified constructor
        function test43() {
            log("Test 43: START");
            try {
                if(Array.of) {
                    Array.prototype.constructor = function() {
                        return {};
                    };
                    Array.of(1,2,3);
                }
            } catch(e) {}
            log("Test 43: END");
        }

        // Test 44: String.prototype.normalize edge
        function test44() {
            log("Test 44: START");
            try {
                if(String.prototype.normalize) {
                    var s = "\uD800\uDC00".repeat(10000);
                    s.normalize("NFC");
                }
            } catch(e) {}
            log("Test 44: END");
        }

        // Test 45: Generator function mutation
        function test45() {
            log("Test 45: START");
            try {
                function* gen() {
                    var arr = [1,2,3];
                    for(var v of arr) {
                        arr.length = 0;
                        yield v;
                    }
                }
                var g = gen();
                while(!g.next().done) {}
            } catch(e) {}
            log("Test 45: END");
        }

        // Test 46: ArrayBuffer transfer
        function test46() {
            log("Test 46: START");
            try {
                var buf = new ArrayBuffer(1000);
                var view = new Uint8Array(buf);
                if(buf.transfer) {
                    var newBuf = buf.transfer(500);
                    for(var i = 0; i < 1000; i++) view[i] = 0xFF;
                }
            } catch(e) {}
            log("Test 46: END");
        }

        // Test 47: Object property descriptor race
        function test47() {
            log("Test 47: START");
            try {
                var obj = {};
                Object.defineProperty(obj, "prop", {
                    get: function() {
                        Object.defineProperty(obj, "prop", {value: 2});
                        return 1;
                    },
                    configurable: true
                });
                obj.prop;
                obj.prop;
            } catch(e) {}
            log("Test 47: END");
        }

        // Test 48: Array reverse typed array
        function test48() {
            log("Test 48: START");
            try {
                var arr = new Uint32Array(1000);
                for(var i = 0; i < arr.length; i++) arr[i] = i;
                Array.prototype.reverse.call(arr);
            } catch(e) {}
            log("Test 48: END");
        }

        // Test 49: Symbol property enumeration
        function test49() {
            log("Test 49: START");
            try {
                var obj = {};
                for(var i = 0; i < 10000; i++) {
                    obj[Symbol()] = i;
                }
                Object.getOwnPropertySymbols(obj);
            } catch(e) {}
            log("Test 49: END");
        }

        // Test 50: TypedArray sort custom comparator
        function test50() {
            log("Test 50: START");
            try {
                var arr = new Uint8Array(1000);
                for(var i = 0; i < arr.length; i++) arr[i] = i % 256;
                arr.sort(function(a, b) {
                    arr[0] = 255;
                    return a - b;
                });
            } catch(e) {}
            log("Test 50: END");
        }

        function runAllTests() {
            log("=== Starting All Tests ===");
            var tests = [
                test1, test2, test3, test4, test5, test6, test7, test8, test9, test10,
                test11, test12, test13, test14, test15, test16, test17, test18, test19, test20,
                test21, test22, test23, test24, test25, test26, test27, test28, test29, test30,
                test31, test32, test33, test34, test35, test36, test37, test38, test39, test40,
                test41, test42, test43, test44, test45, test46, test47, test48, test49, test50
            ];
            
            var currentTest = 0;
            function runNext() {
                if(currentTest < tests.length) {
                    try {
                        tests[currentTest]();
                    } catch(e) {
                        log("Test " + (currentTest + 1) + " exception: " + e.message);
                    }
                    currentTest++;
                    setTimeout(runNext, 100);
                } else {
                    log("=== All Tests Complete ===");
                }
            }
            runNext();
        }
    </script>
</body>
</html>
