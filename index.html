<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PS4 POC Pack — TypedArray/ArrayBuffer Invariants (Minimal+Impact)</title>
</head>
<body>
  <h1>PS4 POC Pack — TypedArray/ArrayBuffer Invariants (Minimal+Impact)</h1>

  <button id="btnReset">Reset log</button>
  <button id="btnRunAll">Run ALL (T1 + A + B + C + D + T8)</button>
  <hr>

  <button id="btnT1">T1 :: AB.byteLength descriptor audit (+ policy)</button>
  <button id="btnA">A :: Object.defineProperty on ta[0] (+ policy)</button>
  <button id="btnB">B :: Reflect.defineProperty on ta[0] (+ policy)</button>
  <button id="btnC">C :: Proxy wrapper invariants (+ policy)</button>
  <button id="btnD">D :: Cross-realm iframe reproduce (+ policy)</button>
  <button id="btnT8">T8 :: MessageChannel transfer DROP detector</button>

  <p>
    N (T8 reps): <input id="t8N" type="number" value="30" min="1" step="1">
    Delay (ms): <input id="t8Delay" type="number" value="50" min="0" step="10">
    Timeout (ms): <input id="t8Timeout" type="number" value="1200" min="50" step="50">
  </p>

  <pre id="log" style="white-space:pre-wrap;"></pre>

<script>
(() => {
  "use strict";

  const $log = document.getElementById("log");
  let STOP = false;
  let RUN_ID = 0;

  function ts(){ return Date.now(); }
  function logLine(s){ $log.textContent += `[${ts()}] ${s}\n`; }
  function resetLog(){ $log.textContent=""; logLine("Reset."); }

  function j(x){
    try { return JSON.stringify(x, null, 2); } catch(e){ return String(x); }
  }

  function section(title){
    logLine("============================================================");
    logLine(title);
    logLine("============================================================");
  }

  function safeCall(fn){
    try { return { threw:false, val: fn() }; }
    catch(e){ return { threw:true, err:(e&&e.name)||"ERR", msg:(e&&e.message)||"" }; }
  }

  function tryGetDesc(obj, prop){
    const r = safeCall(() => Object.getOwnPropertyDescriptor(obj, prop) || null);
    if (r.threw) return { threw:true, err:r.err };
    return r.val;
  }

  function verdictLine(name, ok, detailsObj){
    logLine(`${ok ? "PASS" : "FAIL"} :: ${name}${detailsObj ? " :: " + j(detailsObj).replace(/\n/g, " ") : ""}`);
  }

  function hardeningPolicyOnIndex(realm, label, target, key /* "0" */){
    // Policy model (non-exploit):
    // - If descriptor claims configurable:true, we SHOULD be able to delete.
    // - If engine refuses delete while saying configurable:true -> enforcement mismatch.
    // - Try "normalize": defineProperty configurable:false and see if descriptor updates.
    const Object_ = realm.Object || Object;
    const Reflect_ = realm.Reflect || Reflect;

    const out = {
      key,
      preDesc: null,
      claimedConfigurable: null,
      delDeleteOp: null,
      delReflect: null,
      postDelDesc: null,
      normalizeDefine: null,
      postNormalizeDesc: null,
      ownKeys: null
    };

    out.preDesc = safeCall(() => Object_.getOwnPropertyDescriptor(target, key));
    const preD = out.preDesc.threw ? null : out.preDesc.val;
    out.claimedConfigurable = preD && typeof preD === "object" ? preD.configurable : undefined;

    out.delDeleteOp = safeCall(() => { return (delete target[key]); });
    out.delReflect = safeCall(() => Reflect_.deleteProperty(target, key));
    out.postDelDesc = safeCall(() => Object_.getOwnPropertyDescriptor(target, key));

    // Try to "normalize" (if engine allows). This is still non-exploit: integrity enforcement attempt.
    out.normalizeDefine = safeCall(() => {
      return Reflect_.defineProperty(target, key, { value: 9, writable: true, enumerable: true, configurable: false });
    });

    out.postNormalizeDesc = safeCall(() => Object_.getOwnPropertyDescriptor(target, key));
    out.ownKeys = safeCall(() => Reflect_.ownKeys(target));

    // Determine mismatch:
    // Mismatch = descriptor CLAIMS configurable:true, but delete fails/throws.
    const claimed = (out.claimedConfigurable === true);
    const delFailed =
      out.delDeleteOp.threw || out.delDeleteOp.val === false ||
      out.delReflect.threw || out.delReflect.val === false;

    const mismatch = claimed && delFailed;

    return { mismatch, out };
  }

  function typedArrayCase(label, defineFn){
    section(`POC ${label}: TypedArray index invariants (+ policy)`);
    const ta = new Uint8Array(16);
    ta[0] = 7;

    const baselineOwnDesc = tryGetDesc(ta, "0");
    logLine(`${label} baseline desc(ta,"0")=${j(baselineOwnDesc)}`);

    // Step: defineProperty per variant
    let defineRes = { ok:null, threw:false, err:null, desc:null };
    try {
      const ok = defineFn(ta);
      defineRes.ok = ok;
      defineRes.desc = tryGetDesc(ta, "0");
    } catch(e){
      defineRes.threw = true;
      defineRes.err = (e && e.name) ? e.name : "ERR";
      defineRes.desc = tryGetDesc(ta, "0");
    }
    logLine(`${label} defineProperty result=${j(defineRes)}`);
    logLine(`${label} after define, ta[0]=${ta[0]}`);

    // Mutate value (normal)
    ta[0] = 0x33;

    // Run hardening policy simulation on index "0"
    const pol = hardeningPolicyOnIndex({ Object, Reflect }, label, ta, "0");

    // Compact summary for triage
    const preD = pol.out.preDesc.threw ? null : pol.out.preDesc.val;
    const postD = pol.out.postNormalizeDesc.threw ? null : pol.out.postNormalizeDesc.val;

    const summary = {
      ta0_afterWrite: ta[0],
      claimedConfigurable: pol.out.claimedConfigurable,
      deleteOp: pol.out.delDeleteOp.threw ? ("THREW:"+pol.out.delDeleteOp.err) : pol.out.delDeleteOp.val,
      reflectDelete: pol.out.delReflect.threw ? ("THREW:"+pol.out.delReflect.err) : pol.out.delReflect.val,
      normalizeDefine: pol.out.normalizeDefine.threw ? ("THREW:"+pol.out.normalizeDefine.err) : pol.out.normalizeDefine.val,
      preDesc: preD,
      postNormalizeDesc: postD
    };

    if (pol.mismatch) {
      logLine(`ALERTA: ${label} policy FAIL :: engine reporta configurable:true mas delete falha/lança (invariantes inconsistentes).`);
      verdictLine(`${label}/PolicyEnforcement`, false, summary);
    } else {
      verdictLine(`${label}/PolicyEnforcement`, true, summary);
    }
  }

  // --- T1: ArrayBuffer.prototype.byteLength descriptor audit + policy test
  function runT1(){
    section("T1 :: ArrayBuffer.prototype.byteLength descriptor audit (+ policy)");
    const desc = tryGetDesc(ArrayBuffer.prototype, "byteLength");
    logLine(`T1 desc(ArrayBuffer.prototype,"byteLength")=${j(desc)}`);

    // Policy simulation: if configurable:true, attempt to lock it down (defineProperty configurable:false)
    // NOTE: This is not exploitation; it's a demonstration of whether descriptor-based policy is meaningful here.
    const attempt = safeCall(() => {
      return Reflect.defineProperty(ArrayBuffer.prototype, "byteLength", { configurable: false });
    });

    const desc2 = tryGetDesc(ArrayBuffer.prototype, "byteLength");

    // Small detach sample to show transfers work (not a vuln)
    const ab = new ArrayBuffer(16);
    const beforeLen = ab.byteLength;
    let det = { attempted:false, ok:false, via:null, err:null };
    if (typeof structuredClone === "function") {
      det.attempted = true;
      det.via = "structuredClone";
      try { structuredClone(ab, { transfer:[ab] }); det.ok = true; }
      catch(e){ det.ok = false; det.err = (e&&e.name)||"ERR"; }
    }
    const afterLen = ab.byteLength;

    const policyInfo = {
      definePropertyResult: attempt.threw ? ("THREW:"+attempt.err) : attempt.val,
      descBefore: desc,
      descAfter: desc2,
      detachSample: { beforeLen, afterLen, det }
    };

    // We don't assert "impossible" here; we assert "policy meaningfulness":
    // If desc says configurable but defineProperty behavior doesn't align, that's also an enforcement mismatch surface.
    const cfg = desc && typeof desc === "object" ? desc.configurable : undefined;
    const attemptFailed = attempt.threw;

    if (cfg === true && attemptFailed) {
      logLine("ALERTA: T1 policy mismatch :: descriptor sugere configurável, mas policy (defineProperty) falhou/lançou.");
      verdictLine("T1/DescriptorPolicy", false, policyInfo);
    } else {
      verdictLine("T1/DescriptorPolicy", true, policyInfo);
    }
  }

  // --- A/B/C
  function runA(){
    typedArrayCase("A", (ta) => {
      Object.defineProperty(ta, "0", { value: 9, writable: true, enumerable: true, configurable: true });
      return true;
    });
  }

  function runB(){
    typedArrayCase("B", (ta) => {
      return Reflect.defineProperty(ta, "0", { value: 9, writable: true, enumerable: true, configurable: true });
    });
  }

  function runC(){
    section("POC C: Proxy wrapper invariants (+ policy)");
    const ta = new Uint8Array(16);
    ta[0] = 7;

    const baselineOwnDesc = tryGetDesc(ta, "0");
    logLine(`C baseline desc(ta,"0")=${j(baselineOwnDesc)}`);

    const p = new Proxy(ta, {
      defineProperty(target, prop, desc) { return Reflect.defineProperty(target, prop, desc); },
      getOwnPropertyDescriptor(target, prop) { return Reflect.getOwnPropertyDescriptor(target, prop); },
      deleteProperty(target, prop) { return Reflect.deleteProperty(target, prop); },
      ownKeys(target) { return Reflect.ownKeys(target); }
    });

    // Apply defineProperty via Proxy
    const defineRes = safeCall(() => Reflect.defineProperty(p, "0", { value: 9, writable: true, enumerable: true, configurable: true }));
    const descAfterDefine = safeCall(() => Reflect.getOwnPropertyDescriptor(p, "0"));
    logLine(`C defineProperty via Proxy => ${j({ defineRes, descAfterDefine, ta0: ta[0] })}`);

    ta[0] = 0x33;

    // Policy hardening on Proxy target "0"
    const pol = hardeningPolicyOnIndex({ Object, Reflect }, "C", p, "0");

    const preD = pol.out.preDesc.threw ? null : pol.out.preDesc.val;
    const postD = pol.out.postNormalizeDesc.threw ? null : pol.out.postNormalizeDesc.val;

    const summary = {
      ta0_afterWrite: ta[0],
      claimedConfigurable: pol.out.claimedConfigurable,
      deleteOp: pol.out.delDeleteOp.threw ? ("THREW:"+pol.out.delDeleteOp.err) : pol.out.delDeleteOp.val,
      reflectDelete: pol.out.delReflect.threw ? ("THREW:"+pol.out.delReflect.err) : pol.out.delReflect.val,
      normalizeDefine: pol.out.normalizeDefine.threw ? ("THREW:"+pol.out.normalizeDefine.err) : pol.out.normalizeDefine.val,
      preDesc: preD,
      postNormalizeDesc: postD
    };

    if (pol.mismatch) {
      logLine("ALERTA: C policy FAIL via Proxy :: configurable:true reportado, delete falha/lança.");
      verdictLine("C/PolicyEnforcement", false, summary);
    } else {
      verdictLine("C/PolicyEnforcement", true, summary);
    }
  }

  // --- D (iframe)
  function runD(){
    section("POC D: Cross-realm iframe reproduce (+ policy)");
    const f = document.createElement("iframe");
    document.body.appendChild(f);

    try {
      const w = f.contentWindow;
      const ta = new w.Uint8Array(16);
      ta[0] = 7;

      // defineProperty in iframe realm
      const defineRes = safeCall(() => w.Reflect.defineProperty(ta, "0", { value: 9, writable: true, enumerable: true, configurable: true }));
      const desc = safeCall(() => w.Object.getOwnPropertyDescriptor(ta, "0"));
      logLine(`D defineProperty in iframe => ${j({ defineRes, desc, ta0: ta[0] })}`);

      ta[0] = 0x33;

      // Policy hardening in iframe realm
      const pol = hardeningPolicyOnIndex({ Object: w.Object, Reflect: w.Reflect }, "D", ta, "0");

      const preD = pol.out.preDesc.threw ? null : pol.out.preDesc.val;
      const postD = pol.out.postNormalizeDesc.threw ? null : pol.out.postNormalizeDesc.val;

      const summary = {
        ta0_afterWrite: ta[0],
        claimedConfigurable: pol.out.claimedConfigurable,
        deleteOp: pol.out.delDeleteOp.threw ? ("THREW:"+pol.out.delDeleteOp.err) : pol.out.delDeleteOp.val,
        reflectDelete: pol.out.delReflect.threw ? ("THREW:"+pol.out.delReflect.err) : pol.out.delReflect.val,
        normalizeDefine: pol.out.normalizeDefine.threw ? ("THREW:"+pol.out.normalizeDefine.err) : pol.out.normalizeDefine.val,
        preDesc: preD,
        postNormalizeDesc: postD
      };

      if (pol.mismatch) {
        logLine("ALERTA: D cross-realm policy FAIL :: configurable:true reportado, delete falha/lança.");
        verdictLine("D/CrossRealmPolicyEnforcement", false, summary);
      } else {
        verdictLine("D/CrossRealmPolicyEnforcement", true, summary);
      }

    } catch(e){
      logLine(`ERRO: D falhou: ${(e&&e.name)||"ERR"}`);
    } finally {
      try { f.remove(); } catch(_) {}
    }
  }

  // --- T8: MessageChannel transfer DROP detector
  async function withTimeout(promise, ms){
    let t;
    const timeout = new Promise((_, rej) => { t = setTimeout(() => rej(new Error("TIMEOUT")), ms); });
    try { return await Promise.race([promise, timeout]); }
    finally { clearTimeout(t); }
  }
  function delay(ms){ return new Promise(r => setTimeout(r, ms)); }

  async function runT8(){
    section("T8 :: MessageChannel transfer DROP detector (handshake)");

    if (typeof MessageChannel !== "function") {
      logLine("INFO: MessageChannel não disponível.");
      return;
    }

    const N = Math.max(1, parseInt(document.getElementById("t8N").value || "30", 10));
    const delayMs = Math.max(0, parseInt(document.getElementById("t8Delay").value || "50", 10));
    const timeoutMs = Math.max(50, parseInt(document.getElementById("t8Timeout").value || "1200", 10));
    logLine(`Config :: N=${N} delayMs=${delayMs} timeoutMs=${timeoutMs}`);

    const stats = {
      ok_detach: 0,
      ok_clone: 0,
      transfer_throw: 0,
      drops_detach_path: 0,
      sender_impossible: 0,
      other: 0
    };

    for (let i = 0; i < N; i++) {
      const ch = new MessageChannel();
      const ab = new ArrayBuffer(4096);
      const u8 = new Uint8Array(ab);
      u8[0] = 0xAA;

      let got = undefined;
      ch.port2.onmessage = (ev) => { got = ev.data; };

      let postThrew = false;
      try { ch.port1.postMessage(ab, [ab]); }
      catch (_) { postThrew = true; }

      if (postThrew) {
        stats.transfer_throw++;
        if (delayMs) await delay(delayMs);
        continue;
      }

      // wait delivery window
      try { await withTimeout(delay(0), timeoutMs); } catch(_) {}

      const senderLen = ab.byteLength;
      if (senderLen !== 0 && senderLen !== 4096) {
        stats.sender_impossible++;
        if (delayMs) await delay(delayMs);
        continue;
      }

      if (senderLen === 0) {
        // transfer path: must have receiver payload
        if (got === undefined || got === null) {
          stats.drops_detach_path++;
        } else {
          // best-effort read
          let ok = false;
          try {
            const tag = Object.prototype.toString.call(got);
            const isAB = (tag === "[object ArrayBuffer]") || (got && typeof got.byteLength === "number" && typeof got.slice === "function");
            const isView = (got && typeof got === "object" && typeof got.byteLength === "number" && typeof got.buffer === "object");
            let r8 = isAB ? new Uint8Array(got) : (got instanceof Uint8Array ? got : (isView ? new Uint8Array(got.buffer) : null));
            if (r8 && r8.length === 4096 && r8[0] === 0xAA) ok = true;
          } catch(_) {}
          if (ok) stats.ok_detach++;
          else stats.other++;
        }
      } else {
        stats.ok_clone++;
      }

      if (delayMs) await delay(delayMs);
    }

    logLine(`RESULTADOS: ${j(stats)}`);

    if (stats.drops_detach_path > 0) {
      logLine("ALERTA: T8 DROP :: sender detacha (len=0) mas receiver veio undefined/null em algumas repetições.");
      verdictLine("T8/MessageChannelDrop", false, stats);
    } else {
      verdictLine("T8/MessageChannelDrop", true, stats);
    }
  }

  async function runAll(){
    STOP = false;
    RUN_ID++;
    const runId = RUN_ID;
    section("Run ALL :: T1 + A + B + C + D + T8");
    try {
      if (runId !== RUN_ID || STOP) return;
      runT1();
      if (runId !== RUN_ID || STOP) return;
      runA();
      if (runId !== RUN_ID || STOP) return;
      runB();
      if (runId !== RUN_ID || STOP) return;
      runC();
      if (runId !== RUN_ID || STOP) return;
      runD();
      if (runId !== RUN_ID || STOP) return;
      await runT8();
    } catch (e) {
      logLine(`ERRO em Run ALL: ${(e&&e.name)||"ERR"}`);
    }
    logLine("ALL DONE.");
  }

  // Wire
  document.getElementById("btnReset").onclick = resetLog;
  document.getElementById("btnRunAll").onclick = () => runAll().catch(() => logLine("ERRO: Run ALL falhou."));
  document.getElementById("btnT1").onclick = runT1;
  document.getElementById("btnA").onclick = runA;
  document.getElementById("btnB").onclick = runB;
  document.getElementById("btnC").onclick = runC;
  document.getElementById("btnD").onclick = runD;
  document.getElementById("btnT8").onclick = () => runT8().catch(() => logLine("ERRO: T8 falhou."));

  resetLog();
})();
</script>
</body>
</html>
