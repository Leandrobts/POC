<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PS4 Memory Corruption Tests 302 (isolator baseline + variants)</title>
</head>
<body>
  <h1>PS4 Memory Corruption Tests (302) - Isolator (baseline-preserving)</h1>

  <div>
    <button id="btnReset">Reset log</button>
    <button id="btnRun">Run 302 isolator</button>
    <button id="btnStop">Stop</button>
  </div>

  <div style="margin-top:8px;">
    N (iterações): <input id="nIter" type="number" value="30" min="1" step="1">
    Delay (ms): <input id="delayMs" type="number" value="80" min="0" step="10">
    Timeout por iteração (ms): <input id="timeoutMs" type="number" value="1400" min="100" step="50">
    Intensidade (1..5): <input id="intensity" type="number" value="3" min="1" max="5" step="1">
  </div>

  <div style="margin-top:8px;">
    Modo:
    <select id="mode">
      <option value="baseline">baseline (sem start, canal novo, 1 post)</option>
      <option value="reuse">reuse channel (sem start, canal único)</option>
      <option value="nostart_burst">no-start + burst (16 posts in-flight)</option>
      <option value="start_burst">start + burst (16 posts in-flight)</option>
      <option value="teardown">teardown (close ports após post)</option>
      <option value="pressure">pressure (alloc + microtasks)</option>
      <option value="pressure_teardown">pressure + teardown</option>
    </select>
    Burst count:
    <input id="burstCount" type="number" value="16" min="1" max="64" step="1">
  </div>

  <pre id="log" style="white-space:pre-wrap; margin-top:10px;"></pre>

<script>
(() => {
  "use strict";

  const $log = document.getElementById("log");
  let STOP = false;
  let RUN_ID = 0;

  function ts() { return Date.now(); }
  function logLine(s) { $log.textContent += `[${ts()}] ${s}\n`; }
  function resetLog() { $log.textContent = ""; logLine("Reset."); }
  function stopNow() { STOP = true; logLine("STOP requested."); }

  function alertVuln(testNum, msg, extraObj) {
    const extra = extraObj ? ("\n" + JSON.stringify(extraObj, null, 2)) : "";
    const full = `ALERTA TEST ${testNum}: ${msg}${extra}`;
    logLine(full);
    alert(full);
  }

  // -------------------------
  // Small bounded amplifiers
  // -------------------------
  function heapSpray(intensity) {
    const count = 30 * intensity;
    const size = 0x4000;
    const keep = [];
    for (let i = 0; i < count; i++) {
      const ab = new ArrayBuffer(size);
      const u32 = new Uint32Array(ab);
      for (let j = 0; j < u32.length; j += 128) u32[j] = (0x41414141 ^ i ^ j) >>> 0;
      keep.push(ab);
    }
    return keep;
  }

  function domChurn(intensity) {
    const n = 60 * intensity;
    const host = document.createElement("div");
    document.body.appendChild(host);
    for (let i = 0; i < n; i++) {
      const d = document.createElement("div");
      d.textContent = "x" + i;
      host.appendChild(d);
      if ((i & 3) === 0) host.removeChild(d);
    }
    host.remove();
  }

  function microtaskChurn(n) {
    let p = Promise.resolve();
    for (let i = 0; i < n; i++) p = p.then(() => {});
    return p;
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  // -------------------------
  // Robust payload classifier
  // -------------------------
  function classifyPayload(got) {
    const tag = Object.prototype.toString.call(got);

    const isAB = (tag === "[object ArrayBuffer]") ||
                 (got && typeof got === "object" && typeof got.byteLength === "number" &&
                  typeof got.slice === "function" && typeof got.constructor === "function");

    // "view-ish": any TypedArray/DataView-like with .buffer and .byteLength
    const isView = (got && typeof got === "object" && typeof got.byteLength === "number" &&
                    got.buffer && typeof got.buffer === "object" &&
                    typeof got.buffer.byteLength === "number");

    return { tag, isAB, isView };
  }

  function readFirstByteAndLen(got, cls) {
    // returns { ok, rLen, r0, err }
    try {
      let u8;
      if (cls.isAB) {
        u8 = new Uint8Array(got);
      } else if (cls.isView) {
        // Prefer direct Uint8Array if it already is one; else wrap the underlying buffer.
        if (Object.prototype.toString.call(got) === "[object Uint8Array]") u8 = got;
        else u8 = new Uint8Array(got.buffer);
      } else {
        return { ok: false, err: "NOT_AB_NOR_VIEW" };
      }
      return { ok: true, rLen: u8.length, r0: u8.length ? u8[0] : undefined };
    } catch (e) {
      return { ok: false, err: (e && e.name) ? e.name : "ERR" };
    }
  }

  // -------------------------
  // Core: one iteration (single post)
  // -------------------------
  async function onePostIteration(opts) {
    // opts: { startPorts, reuseChannelObj?, teardown, pressure, intensity, timeoutMs }
    const intensity = opts.intensity;

    if (opts.pressure) {
      heapSpray(intensity);
      domChurn(Math.max(1, intensity - 1));
      await microtaskChurn(50 * intensity);
    }

    const ch = opts.reuseChannelObj || new MessageChannel();

    if (opts.startPorts) {
      try { ch.port1.start && ch.port1.start(); } catch (_) {}
      try { ch.port2.start && ch.port2.start(); } catch (_) {}
    }

    const ab = new ArrayBuffer(4096);
    const u8 = new Uint8Array(ab);
    u8[0] = 0xAA;

    let got = undefined;
    let gotSet = false;

    // Important: assign handler each iteration (matches many "original" patterns)
    ch.port2.onmessage = (ev) => { got = ev.data; gotSet = true; };

    let postThrew = false;
    try {
      // Baseline behavior: transfer attempt
      ch.port1.postMessage(ab, [ab]);
    } catch (e) {
      postThrew = true;
    }

    if (postThrew) return { kind: "transfer_throw" };

    if (opts.teardown) {
      // Teardown ASAP after post (common race trigger)
      try { ch.port1.close && ch.port1.close(); } catch (_) {}
      // Keep port2 alive unless you want harsher teardown
      if (opts.teardown === "hard") {
        try { ch.port2.close && ch.port2.close(); } catch (_) {}
        try { ch.port2.onmessage = null; } catch (_) {}
      }
    }

    // Wait for delivery (macro tick). We do NOT over-wait: we want to catch drops.
    await Promise.resolve();
    await sleep(0);

    const senderLen = ab.byteLength;

    // SenderLen invariant: should be 0 (transfer) or 4096 (clone/fallback).
    if (senderLen !== 0 && senderLen !== 4096) {
      return { kind: "senderlen_impossible", senderLen };
    }

    // If transfer path: we expect a message payload to arrive with the pattern.
    if (senderLen === 0) {
      if (!gotSet || got == null) {
        return { kind: "drop_detach_path", gotSet, gotType: typeof got };
      }

      const cls = classifyPayload(got);
      const r = readFirstByteAndLen(got, cls);

      if (!r.ok) {
        return { kind: "recv_unreadable", cls, err: r.err };
      }

      if (r.rLen !== 4096 || r.r0 !== 0xAA) {
        return { kind: "recv_mismatch_after_transfer", cls, rLen: r.rLen, r0: r.r0 };
      }

      return { kind: "ok_detach" };
    }

    // Clone path: validate non-aliasing (receiver must not reflect sender mutation).
    if (senderLen === 4096) {
      // Some engines might not deliver anything quickly; do not call that corruption.
      if (!gotSet || got == null) return { kind: "ok_clone_nodelivery" };

      const cls = classifyPayload(got);
      if (!cls.isAB && !cls.isView) return { kind: "ok_clone_unclassified", cls };

      const r = readFirstByteAndLen(got, cls);
      if (!r.ok) return { kind: "ok_clone_unreadable", cls, err: r.err };

      const before = r.r0;
      u8[0] = 0xBB;

      const r2 = readFirstByteAndLen(got, cls);
      if (r2.ok && r2.r0 !== before) {
        return { kind: "aliasing_in_clone", cls, before, after: r2.r0 };
      }

      return { kind: "ok_clone" };
    }

    return { kind: "other" };
  }

  // -------------------------
  // Burst: multiple posts in flight (higher chance to trigger PS4-only weirdness)
  // -------------------------
  async function burstIteration(opts) {
    const intensity = opts.intensity;
    const burstCount = opts.burstCount;

    if (opts.pressure) {
      heapSpray(intensity);
      await microtaskChurn(80 * intensity);
    }

    const ch = opts.reuseChannelObj || new MessageChannel();

    if (opts.startPorts) {
      try { ch.port1.start && ch.port1.start(); } catch (_) {}
      try { ch.port2.start && ch.port2.start(); } catch (_) {}
    }

    const results = [];
    const recv = [];
    let recvCount = 0;

    ch.port2.onmessage = (ev) => {
      recv.push(ev.data);
      recvCount++;
    };

    // Prepare burst ABs with distinct marker bytes.
    const abs = [];
    for (let i = 0; i < burstCount; i++) {
      const ab = new ArrayBuffer(4096);
      const u8 = new Uint8Array(ab);
      u8[0] = (0xA0 + (i & 0x1F)) & 0xFF;
      abs.push(ab);
    }

    // Post all quickly (in-flight)
    let throwCount = 0;
    for (let i = 0; i < abs.length; i++) {
      try { ch.port1.postMessage(abs[i], [abs[i]]); }
      catch (_) { throwCount++; }
    }

    if (throwCount) return { kind: "transfer_throw", throwCount };

    if (opts.teardown) {
      try { ch.port1.close && ch.port1.close(); } catch (_) {}
      if (opts.teardown === "hard") {
        try { ch.port2.close && ch.port2.close(); } catch (_) {}
        try { ch.port2.onmessage = null; } catch (_) {}
      }
    }

    await Promise.resolve();
    await sleep(0);

    // SenderLen invariants (all)
    for (let i = 0; i < abs.length; i++) {
      const sl = abs[i].byteLength;
      if (sl !== 0 && sl !== 4096) {
        return { kind: "senderlen_impossible", idx: i, senderLen: sl };
      }
    }

    // Drops only count as suspicious if we actually detached many senders but received far fewer.
    const detachedCount = abs.reduce((a, ab) => a + (ab.byteLength === 0 ? 1 : 0), 0);

    // Validate received payloads for detached ones: each should be AB/view and match the first byte markers.
    // We tolerate reordering; we just ensure no "impossible" content.
    let badPayload = null;
    for (let i = 0; i < recv.length; i++) {
      const cls = classifyPayload(recv[i]);
      const r = readFirstByteAndLen(recv[i], cls);
      if (!r.ok || r.rLen !== 4096) { badPayload = { i, cls, r }; break; }
    }
    if (badPayload) return { kind: "recv_bad_payload", badPayload };

    if (detachedCount > 0 && recvCount === 0) {
      return { kind: "drop_detach_path", detachedCount, recvCount };
    }

    // If we detached a lot but received far fewer, flag as suspicious "delivery loss" (PS4-only candidate).
    if (detachedCount >= 4 && recvCount < Math.floor(detachedCount / 2)) {
      return { kind: "drop_many", detachedCount, recvCount };
    }

    return { kind: "ok_burst", detachedCount, recvCount };
  }

  // -------------------------
  // Runner
  // -------------------------
  function withTimeout(promise, ms) {
    let t;
    const timeout = new Promise((_, rej) => { t = setTimeout(() => rej(new Error("TIMEOUT")), ms); });
    return Promise.race([promise.finally(() => clearTimeout(t)), timeout]);
  }

  async function run() {
    STOP = false;
    RUN_ID++;
    const runId = RUN_ID;

    const nIter = Math.max(1, parseInt(document.getElementById("nIter").value || "30", 10));
    const delayMs = Math.max(0, parseInt(document.getElementById("delayMs").value || "0", 10));
    const timeoutMs = Math.max(100, parseInt(document.getElementById("timeoutMs").value || "1400", 10));
    const intensity = Math.min(5, Math.max(1, parseInt(document.getElementById("intensity").value || "3", 10)));
    const mode = document.getElementById("mode").value;
    const burstCount = Math.min(64, Math.max(1, parseInt(document.getElementById("burstCount").value || "16", 10)));

    logLine("Pronto. Dica: se no PS4 der drop, aumente Timeout e reduza Delay para achar janela de falha.");
    logLine("============================================================");
    logLine(`Run 302 isolator :: N=${nIter} timeout=${timeoutMs}ms delay=${delayMs}ms mode=${mode} intensity=${intensity} burst=${burstCount}`);
    logLine("============================================================");

    const stats = {
      ok_detach: 0,
      ok_clone: 0,
      ok_clone_nodelivery: 0,
      ok_burst: 0,
      transfer_throw: 0,
      senderlen_impossible: 0,
      aliasing_in_clone: 0,
      drop_detach_path: 0,
      drop_many: 0,
      recv_mismatch_after_transfer: 0,
      recv_unreadable: 0,
      recv_bad_payload: 0,
      timeouts: 0,
      other: 0
    };

    // For modes that reuse channel, keep one MessageChannel instance.
    let reuse = null;
    if (mode === "reuse") reuse = new MessageChannel();
    if (mode === "nostart_burst" || mode === "start_burst") reuse = new MessageChannel();
    if (mode === "teardown" || mode === "pressure" || mode === "pressure_teardown") reuse = new MessageChannel();

    for (let i = 0; i < nIter; i++) {
      if (STOP || runId !== RUN_ID) break;

      try {
        let res;

        if (mode === "baseline") {
          res = await withTimeout(onePostIteration({
            startPorts: false,
            reuseChannelObj: null,  // canal novo por iteração
            teardown: false,
            pressure: false,
            intensity,
            timeoutMs
          }), timeoutMs);

        } else if (mode === "reuse") {
          res = await withTimeout(onePostIteration({
            startPorts: false,
            reuseChannelObj: reuse, // canal único
            teardown: false,
            pressure: false,
            intensity,
            timeoutMs
          }), timeoutMs);

        } else if (mode === "nostart_burst") {
          res = await withTimeout(burstIteration({
            startPorts: false,
            reuseChannelObj: reuse,
            teardown: false,
            pressure: false,
            intensity,
            burstCount
          }), timeoutMs);

        } else if (mode === "start_burst") {
          res = await withTimeout(burstIteration({
            startPorts: true,
            reuseChannelObj: reuse,
            teardown: false,
            pressure: false,
            intensity,
            burstCount
          }), timeoutMs);

        } else if (mode === "teardown") {
          res = await withTimeout(onePostIteration({
            startPorts: false,
            reuseChannelObj: reuse,
            teardown: "hard",
            pressure: false,
            intensity,
            timeoutMs
          }), timeoutMs);

        } else if (mode === "pressure") {
          res = await withTimeout(onePostIteration({
            startPorts: false,
            reuseChannelObj: reuse,
            teardown: false,
            pressure: true,
            intensity,
            timeoutMs
          }), timeoutMs);

        } else if (mode === "pressure_teardown") {
          res = await withTimeout(onePostIteration({
            startPorts: false,
            reuseChannelObj: reuse,
            teardown: "hard",
            pressure: true,
            intensity,
            timeoutMs
          }), timeoutMs);

        } else {
          res = { kind: "other" };
        }

        const k = res && res.kind ? res.kind : "other";
        if (stats[k] === undefined) stats.other++;
        else stats[k]++;

        // ALERT policy: only "impossible / corruption-suspect" conditions
        if (k === "senderlen_impossible") {
          alertVuln(302, "MessageChannel: sender ab.byteLength ficou em estado impossível.", res);
        } else if (k === "drop_detach_path") {
          alertVuln(302, "MessageChannel: sender detacheou, mas receiver não recebeu payload (drop) dentro da janela.", res);
        } else if (k === "drop_many") {
          alertVuln(302, "MessageChannel: muitos detaches, mas poucas mensagens entregues (loss suspeito).", res);
        } else if (k === "recv_unreadable") {
          alertVuln(302, "MessageChannel: receiver chegou, mas falhou leitura como ArrayBuffer/view após detach.", res);
        } else if (k === "recv_mismatch_after_transfer") {
          alertVuln(302, "MessageChannel: receiver conteúdo/len inesperado após transfer real.", res);
        } else if (k === "recv_bad_payload") {
          alertVuln(302, "MessageChannel: payload recebido inválido (len != 4096 / tipo estranho) em burst.", res);
        } else if (k === "aliasing_in_clone") {
          alertVuln(302, "MessageChannel: aliasing inesperado (clone refletiu mutação do sender).", res);
        }

      } catch (e) {
        stats.timeouts++;
        // TIMEOUT sozinho não é corrupção, mas é útil: pode indicar janela ruim / dead path
      }

      if (delayMs) await sleep(delayMs);
    }

    logLine("------------------------------------------------------------");
    logLine(`RESULTADOS: ok_detach=${stats.ok_detach} ok_clone=${stats.ok_clone} ok_clone_nodelivery=${stats.ok_clone_nodelivery} ok_burst=${stats.ok_burst}`);
    logLine(`          transfer_throw=${stats.transfer_throw} timeouts=${stats.timeouts}`);
    logLine(`          drops(detach path)=${stats.drop_detach_path} drops_many=${stats.drop_many} senderlen_impossible=${stats.senderlen_impossible}`);
    logLine(`          recv_mismatch=${stats.recv_mismatch_after_transfer} recv_unreadable=${stats.recv_unreadable} recv_bad_payload=${stats.recv_bad_payload}`);
    logLine(`          aliasing_in_clone=${stats.aliasing_in_clone} other=${stats.other}`);
    logLine("OK: nenhuma inconsistência detectada nas condições atuais.");
  }

  document.getElementById("btnReset").onclick = resetLog;
  document.getElementById("btnStop").onclick = stopNow;
  document.getElementById("btnRun").onclick = run;

  resetLog();
})();
</script>
</body>
</html>
