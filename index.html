
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>PS4 Deep Fuzzer - V7 (UAF Edition)</title>
    <style>
        body { background: #050505; color: #0fa; font-family: monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 320px; border-right: 1px solid #222; padding: 15px; background: #0a0a0a; z-index: 10; display: flex; flex-direction: column;}
        #main { flex-grow: 1; display: flex; flex-direction: column; background: #000; }
        .header { color: #0fa; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; font-weight: bold; }
        #log-output { flex-grow: 1; overflow-y: auto; padding: 15px; font-size: 11px; color: #ccc; }
        .entry { border-bottom: 1px solid #111; padding: 10px 0; border-left: 4px solid #444; padding-left: 12px; margin-bottom: 6px; }
        .anomaly { border-left-color: #ff0055; background: #1a000b; color: #ff5588; }
        .stats { font-size: 12px; color: #888; margin-bottom: 20px; line-height: 1.6; }
        .target-box { color: #ff0; font-size: 11px; background: #222; padding: 4px; display: block; margin-top: 5px; word-break: break-all; }
        button { background: #111; color: #0fa; border: 1px solid #0fa; padding: 12px; margin-bottom: 5px; cursor: pointer; width: 100%; font-size: 11px; font-weight: bold; }
        button:hover { background: #033; }
        .tag { font-size: 9px; padding: 2px 4px; background: #333; color: #fff; margin-right: 5px; border-radius: 2px; }
        .gc-text { color: #ff8800; font-weight: bold; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="header">PS4 DEEP FUZZER [UAF HUNTER]</div>
    <div class="stats">
        STATUS: <span id="ui-state" style="color:#fff">AGUARDANDO MÓDULOS...</span><br>
        TESTES: <span id="ui-tests">0</span><br>
        CICLOS GC: <span id="ui-gc" class="gc-text">0</span><br>
        ANOMALIAS: <span id="ui-anoms">0</span>
    </div>
    <div style="margin-bottom: 15px;">
        <span style="font-size: 10px; color: #666;">ALVO ATUAL:</span>
        <div id="ui-target" class="target-box">---</div>
    </div>
    <button id="btn-start" disabled>INICIAR FUZZER</button>
    <button onclick="location.reload()">RELOAD</button>
</div>

<div id="main">
    <div id="log-output"></div>
</div>

<script type="module">
    import { Factory } from './mod_factory.js';
    import { Mutator } from './mod_mutator.js';
    import { Executor } from './mod_executor.js';

    const UI = {
        state: document.getElementById('ui-state'),
        tests: document.getElementById('ui-tests'),
        gc: document.getElementById('ui-gc'),
        anoms: document.getElementById('ui-anoms'),
        target: document.getElementById('ui-target'),
        log: document.getElementById('log-output'),
        btn: document.getElementById('btn-start')
    };

    let fuzzerState = { running: false, engine: null, totalAnomalies: 0, gcCycles: 0 };

    const targets = Factory.buildTargets();
    const payloads = Mutator.getPayloads();

    UI.state.innerText = `PRONTO: ${targets.length} Alvos`;
    UI.state.style.color = "#0fa";
    UI.btn.disabled = false;

    function logAnomaly(data) {
        fuzzerState.totalAnomalies++;
        UI.anoms.innerText = fuzzerState.totalAnomalies;
        const div = document.createElement('div');
        div.className = 'entry anomaly';
        div.innerHTML = `
            <div><span class="tag">TARGET</span> <strong>${data.api}</strong></div>
            <div style="margin-top: 3px;"><span class="tag">ACTION</span> ${data.action}</div>
            <div style="margin-top: 3px;"><span class="tag">RETURN</span> <span style="color: #fff">${data.val}</span></div>
            <div style="margin-top: 6px; font-style: italic; font-weight: bold; color: #ff00ff;">&raquo; ${data.reason}</div>
        `;
        UI.log.insertBefore(div, UI.log.firstChild);
    }

    // 3. O Loop de Execução Assíncrona (AGORA COM AUTO-RELOAD)
    function runLoop() {
        if (!fuzzerState.running) return;
        
        if (!fuzzerState.engine) {
            fuzzerState.engine = Executor.run(targets, payloads);
        }

        // Dá um passo no fuzzer
        let step = fuzzerState.engine.next();

        // ========================================================
        // O SEGREDO DA METRALHADORA:
        // Quando os 5 testes acabam, recarregamos as armas!
        // ========================================================
        if (step.done) {
            // A cada ciclo, recriamos as vítimas e o DataView. 
            // Isso fragmenta brutalmente a Gigacage (bmalloc)!
            targets.length = 0; // Limpa alvos antigos
            targets.push(...Factory.buildTargets()); 
            
            fuzzerState.engine = null; // Reseta o motor
            
            // Continua rodando sem parar!
            setTimeout(runLoop, 2); 
            return;
        }

        // Processa o resultado do passo
        const data = step.value;
        if (data.type === 'STATUS') {
            UI.target.innerText = data.target;
        } else if (data.type === 'TICK') {
            UI.tests.innerText = parseInt(UI.tests.innerText) + data.count; // Soma os testes globais
        } else if (data.type === 'GC_TICK') {
            fuzzerState.gcCycles++;
            UI.gc.innerText = fuzzerState.gcCycles; 
        } else if (data.type === 'ANOMALY') {
            logAnomaly(data);
            // Se acharmos o OOB Write, nós PARARMOS o fuzzer por segurança
            fuzzerState.running = false; 
            UI.btn.innerText = "CORRUPÇÃO DETECTADA - SISTEMA PAUSADO";
            UI.state.style.color = "#ff0033";
            UI.state.innerText = "ALERTA CRÍTICO DE MEMÓRIA";
            return;
        }

        // Chama o próximo passo
        setTimeout(runLoop, 2);
    }

    UI.btn.onclick = () => {
        fuzzerState.running = !fuzzerState.running;
        if (fuzzerState.running) {
            UI.state.innerText = "CAÇANDO UAF...";
            UI.state.style.color = "#ff8800";
            UI.btn.innerText = "PAUSAR ATAQUE";
            runLoop();
        } else {
            UI.state.innerText = "ATAQUE PAUSADO";
            UI.state.style.color = "#fff";
            UI.btn.innerText = "RETOMAR ATAQUE";
        }
    };
</script>
</body>
</html>
