<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>PS4 WebKit - History Write/Desync Probe (V2.3)</title>
<style>
  body{background:#000;color:#0f0;font-family:monospace}
  button{padding:10px 14px;margin:6px 6px 6px 0;font-size:14px}
  #log{white-space:pre-wrap;border:1px solid #0f0;padding:10px;margin-top:10px;max-height:65vh;overflow:auto}
  .ok{color:#0f0}.warn{color:#ff0}.bad{color:#f66}.dim{color:#8f8}
  input,select{background:#000;color:#0f0;border:1px solid #0f0;padding:2px 6px}
</style>
</head>
<body>
<h2>History API – Write Acceptance / Engine Desync Probe (V2.3)</h2>

<div>
  <button onclick="clearLog()">Limpar</button>
  <button onclick="resetAndShow()">Reset (BASE/A + BASE/B)</button>
  <button onclick="runProbe()">RUN PROBE</button>
  <button onclick="runSweep()">THRESHOLD SWEEP</button>
  <button onclick="runRecoveryOnly()">SETUP RECOVERY ONLY</button>
</div>

<div style="margin-top:10px">
  <label>Mode:
    <select id="mode">
      <option value="replace_only">replaceState only (baseline)</option>
      <option value="replace_hash_toggle">replaceState + hash toggle (#B/#B1)</option>
      <option value="mix_push_replace" selected>mix pushState+replaceState (stronger)</option>
    </select>
  </label>

  <label style="margin-left:10px">Max i:
    <input id="maxI" type="number" value="1500" min="1" step="1">
  </label>

  <label style="margin-left:10px">Payload bytes:
    <select id="pbytes">
      <option value="64">64</option>
      <option value="256">256</option>
      <option value="1024" selected>1024</option>
      <option value="2048">2048</option>
      <option value="4096">4096</option>
    </select>
  </label>

  <label style="margin-left:10px">Pace:
    <select id="pace">
      <option value="immediate">immediate</option>
      <option value="microtask">microtask</option>
      <option value="raf">raf</option>
      <option value="mixed" selected>mixed (micro+rAF)</option>
    </select>
  </label>

  <label style="margin-left:10px">
    Persist fail window:
    <input id="persistN" type="number" value="8" min="1" step="1" style="width:70px">
  </label>

  <label style="margin-left:10px">
    <input id="gc" type="checkbox"> GC pressure leve
  </label>

  <label style="margin-left:10px">
    <input id="capLen" type="checkbox" checked> Cap history.length (keep <= 12)
  </label>
</div>

<div style="margin-top:8px">
  <label>Sweep start:
    <input id="swStart" type="number" value="200" min="1" step="10" style="width:90px">
  </label>
  <label style="margin-left:10px">Sweep end:
    <input id="swEnd" type="number" value="2400" min="1" step="10" style="width:90px">
  </label>
  <label style="margin-left:10px">Sweep step:
    <input id="swStep" type="number" value="200" min="1" step="10" style="width:90px">
  </label>
  <label style="margin-left:10px">Reps:
    <input id="swReps" type="number" value="2" min="1" step="1" style="width:70px">
  </label>
</div>

<div id="log"></div>

<script>
const $ = (id)=>document.getElementById(id);
const logEl = $("log");

function now(){ return (performance.now()).toFixed(2); }
function escapeHtml(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function L(msg, cls="dim"){
  const line = `[${now()}] ${msg}\n`;
  if(cls==="ok") logEl.innerHTML += `<span class="ok">${escapeHtml(line)}</span>`;
  else if(cls==="warn") logEl.innerHTML += `<span class="warn">${escapeHtml(line)}</span>`;
  else if(cls==="bad") logEl.innerHTML += `<span class="bad">${escapeHtml(line)}</span>`;
  else logEl.innerHTML += `<span class="dim">${escapeHtml(line)}</span>`;
  logEl.scrollTop = logEl.scrollHeight;
}
function clearLog(){ logEl.textContent=""; }

function safeStateSummary(st){
  if(!st) return "null";
  try{
    const o = {};
    if ("kind" in st) o.kind = st.kind;
    if ("entry" in st) o.entry = st.entry;
    if ("id" in st) o.id = st.id;
    if ("stamp" in st) o.stamp = st.stamp;
    if ("marker" in st) o.marker = st.marker;
    return JSON.stringify(o);
  }catch(e){ return "[unserializable]"; }
}

function tick(){ return new Promise(r=>setTimeout(r,0)); }
function micro(){ return Promise.resolve(); }
function raf(){ return new Promise(r=>requestAnimationFrame(()=>r())); }

async function paceStep(kind){
  const p = $("pace").value;
  if(p==="immediate") return;
  if(p==="microtask") return micro();
  if(p==="raf") return raf();
  // mixed
  if(kind==="write") { await micro(); return; }
  await raf();
}

function makePayload(bytes){
  // string grande é suficiente para stress de clone/heap sem “DoS”
  return "X".repeat(bytes);
}

function makeState(kind, extra){
  return Object.assign({ kind, stamp: Date.now() }, extra||{});
}

function isExpectedB(){
  const st = history.state;
  return (location.hash === "#B" && st && st.kind==="BASE" && st.entry==="B");
}

// Mantém history “curto” pra evitar crescimento infinito em runs longos.
// Estratégia: sempre que length > 12, fazemos um "soft reset" (replace->A, replace->B via push).
async function capHistoryLength(){
  if(!$("capLen").checked) return;
  if(history.length <= 12) return;
  // “soft reset” (não garante redução real de length em todos os engines,
  // mas estabiliza o ponto atual e evita acumular entradas úteis)
  history.replaceState(makeState("BASE",{entry:"A"}), "", "#A");
  history.pushState(makeState("BASE",{entry:"B"}), "", "#B");
  await tick();
}

async function resetAllVerified(retries=3){
  for(let k=1;k<=retries;k++){
    history.replaceState(makeState("BASE",{entry:"A"}), "", "#A");
    history.pushState(makeState("BASE",{entry:"B"}), "", "#B");
    await tick();

    const ok = isExpectedB();
    L(`[SETUP] attempt=${k} href=${location.href}`, ok?"ok":"bad");
    L(`[SETUP] history.length=${history.length}`, ok?"ok":"bad");
    L(`[SETUP] state=${safeStateSummary(history.state)}`, ok?"ok":"bad");
    if(ok){
      L(`[SETUP] OK: BASE/B aplicado e hash #B.`, "ok");
      return true;
    }
    L(`[SETUP] FAIL: setup não “grudou”. Possível engine desync/no-op.`, "bad");
    await tick();
  }
  L(`[FATAL] ENGINE DESYNC: setup write failed após retries.`, "bad");
  L(`[ACTION] Recarregue a página manualmente (reload) e rode novamente.`, "warn");
  return false;
}

function gcPressureLight(){
  const a=[];
  for(let i=0;i<220;i++) a.push(new Uint8Array(0x2000));
  return a;
}

function observedId(){
  const st = history.state;
  if(st && typeof st==="object" && "id" in st) return st.id;
  return undefined;
}

async function readback3phases(expectId){
  // immediate
  let got0 = observedId();
  if(got0===expectId) return { ok:true, got:got0, phase:"immediate" };

  await micro();
  let got1 = observedId();
  if(got1===expectId) return { ok:true, got:got1, phase:"microtask" };

  await raf();
  let got2 = observedId();
  if(got2===expectId) return { ok:true, got:got2, phase:"raf" };

  return { ok:false, got:got2, phase:"raf" };
}

async function writeStep(mode, i, payloadBytes){
  const payload = makePayload(payloadBytes);
  const st = makeState("BURST", { id:i, marker:`M${i}`, payload });

  if(mode==="replace_only"){
    history.replaceState(st, "", "#B");
    return;
  }

  if(mode==="replace_hash_toggle"){
    const h = (i % 2 === 0) ? "#B" : "#B1";
    history.replaceState(st, "", h);
    return;
  }

  // mix_push_replace (mais “forte”):
  // - a cada 16 iterações, cria uma entry (pushState)
  // - nas demais, replaceState em cima da entry atual
  // - alterna hash de leve pra mexer em URL path
  const h = (i % 2 === 0) ? "#B" : "#B1";
  if((i % 16) === 0){
    history.pushState(st, "", h);
  }else{
    history.replaceState(st, "", h);
  }
}

async function runProbeOnce(maxI){
  const mode = $("mode").value;
  const pbytes = parseInt($("pbytes").value,10);
  const persistN = Math.max(1, parseInt($("persistN").value||"8",10));
  const doGC = $("gc").checked;

  L(`===== RUN PROBE (mode=${mode} maxI=${maxI} payload=${pbytes}B pace=${$("pace").value}) =====`, "ok");

  const okSetup = await resetAllVerified(3);
  if(!okSetup) return { ok:false, reason:"setup_failed" };

  let firstFail = null;
  let lastOk = 0;
  let afterFailCount = 0;

  for(let i=1;i<=maxI;i++){
    await capHistoryLength();

    await writeStep(mode, i, pbytes);
    await paceStep("write");

    if(doGC && (i % 25 === 0)) gcPressureLight();

    const rb = await readback3phases(i);

    if(rb.ok){
      lastOk = i;
      if(i % 100 === 0) L(`[OK] i=${i} (phase=${rb.phase}) len=${history.length}`, "ok");
      await paceStep("read");
      continue;
    }

    // FAIL: expectedId != observedId
    if(!firstFail){
      firstFail = { i, got: rb.got, phase: rb.phase, len: history.length, href: location.href };
      L(`[FAIL] i=${i} readback got=${rb.got} (phase=${rb.phase}) len=${history.length}`, "bad");
      L(`[STATE] history.state=${safeStateSummary(history.state)}`, "bad");
    } else {
      afterFailCount++;
      if(afterFailCount % 2 === 0) L(`[after-fail] i=${i} got=${rb.got}`, "warn");
    }

    // persistência: se falhou por N passos, encerra
    if(firstFail && (i - firstFail.i) >= persistN){
      L(`[PERSIST] fail persisted for ${persistN} steps. stopping.`, "bad");
      break;
    }

    await paceStep("read");
  }

  L(`----- SUMMARY -----`, "ok");
  L(`lastOk=${lastOk} firstFail=${firstFail ? JSON.stringify(firstFail) : "none"}`, firstFail?"warn":"ok");

  L(`----- POST-COLLAPSE SETUP CHECK -----`, firstFail?"warn":"dim");
  const okSetup2 = await resetAllVerified(3);
  L(`postCollapseSetupOK=${okSetup2}`, okSetup2?"ok":"bad");

  return { ok:true, lastOk, firstFail, postCollapseSetupOK: okSetup2 };
}

async function runProbe(){
  clearLog();
  const maxI = Math.max(1, parseInt($("maxI").value||"1500",10));
  await runProbeOnce(maxI);
}

async function runSweep(){
  clearLog();
  const start = Math.max(1, parseInt($("swStart").value||"200",10));
  const end   = Math.max(start, parseInt($("swEnd").value||"2400",10));
  const step  = Math.max(1, parseInt($("swStep").value||"200",10));
  const reps  = Math.max(1, parseInt($("swReps").value||"2",10));

  L(`===== THRESHOLD SWEEP (${start}..${end} step=${step}; reps=${reps}) =====`, "ok");

  for(let maxI=start; maxI<=end; maxI+=step){
    for(let r=1;r<=reps;r++){
      L(`[SWEEP] maxI=${maxI} rep=${r}`, "dim");
      const res = await runProbeOnce(maxI);
      if(res && res.firstFail){
        L(`[HIT] firstFail at maxI=${maxI} rep=${r}: ${JSON.stringify(res.firstFail)}`, "bad");
        L(`[STOP] sweep stopped on first reproducible fail.`, "warn");
        return;
      }
      await tick();
    }
  }
  L(`[SWEEP] completed with no fails.`, "ok");
}

async function runRecoveryOnly(){
  clearLog();
  L(`===== SETUP RECOVERY ONLY =====`, "ok");
  for(let t=1;t<=10;t++){
    const ok = await resetAllVerified(3);
    L(`[RECOVERY] trial=${t} ok=${ok}`, ok?"ok":"bad");
    if(!ok) break;
    await tick();
  }
}

async function resetAndShow(){
  await resetAllVerified(3);
}
</script>
</body>
</html>
