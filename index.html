<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>WebKit PS4 Fuzzer V13</title>
    <style>
        body { 
            background: #0d0d0d; color: #00ffcc; font-family: monospace; 
            margin: 0; padding: 20px; overflow-x: hidden;
        }
        #ui-panel {
            border: 1px solid #333; padding: 15px; margin-bottom: 20px;
            background: #1a1a1a; display: flex; justify-content: space-between;
        }
        button {
            background: #ff003c; color: white; border: none; padding: 15px 30px;
            font-size: 18px; font-weight: bold; cursor: pointer; text-transform: uppercase;
        }
        button:active { background: #cc0030; }
        .log-entry { margin: 5px 0; border-bottom: 1px dashed #333; padding-bottom: 5px; }
        .anomaly { color: #ff003c; font-weight: bold; background: rgba(255,0,60,0.1); padding: 10px; border-left: 5px solid #ff003c; }
        .status { color: #aaa; }
    </style>
</head>
<body>

    <div id="ui-panel">
        <div>
            <h2>💀 PS4 WebKit Fuzzer - V13.0</h2>
            <p>Motor: JavaScriptCore | Modo: Sniper (CoreJS + IPC + Media)</p>
        </div>
        <div>
            <button id="btn-start">Iniciar Fuzzer</button>
        </div>
    </div>

    <div id="log"></div>

    <div id="groomer-sandbox" style="position: absolute; top: -9999px; visibility: hidden;"></div>

    <script type="module">
        import { Factory }  from './mod_factory.js';
        import { Executor } from './mod_executor.js';

        const btnStart = document.getElementById('btn-start');
        const logDiv = document.getElementById('log');
        let fuzzerTask = null;

        function printLog(msg, isAnomaly = false) {
            const div = document.createElement('div');
            div.className = isAnomaly ? 'log-entry anomaly' : 'log-entry status';
            div.innerHTML = msg;
            logDiv.prepend(div);
            // Mantém apenas os últimos 50 logs para não estourar a memória visual
            if (logDiv.children.length > 50) logDiv.lastChild.remove();
        }

        // 🚨 O BYPASS ESTÁ AQUI: O evento de clique (isTrusted: true) é passado para a cadeia de execução
        btnStart.addEventListener('click', async () => {
            if (Executor.isRunning) {
                Executor.stop();
                btnStart.innerText = "Iniciar Fuzzer";
                btnStart.style.background = "#ff003c";
                printLog("⏹️ Fuzzer Parado.");
                return;
            }

            btnStart.innerText = "Parar Fuzzer";
            btnStart.style.background = "#555";
            printLog("▶️ Gesto do utilizador capturado. Iniciando bateria de testes...");

            const scenarios = Factory.buildScenarios();
            fuzzerTask = Executor.run(scenarios);

            for await (const event of fuzzerTask) {
                if (event.type === 'STATUS') {
                    // Atualiza silenciosamente na aba do navegador ou console se necessário
                    document.title = event.target; 
                } else if (event.type === 'ANOMALY') {
                    printLog(`[${event.risk}] ${event.api} <br>
                              📊 TELEMETRIA: ${event.telemetry || 'CORRUPÇÃO'}<br>
                              » ${event.reason}`, true);
                }
            }
        });

        // 🚨 TRUQUE DO MASHING: Ocultamos a interface para que qualquer clique na TV renove o gesto
        document.body.addEventListener('click', () => {
            // Se você apertar X no controle aleatoriamente, o WebKit renova o token silenciosamente!
            window.lastGestureTime = performance.now();
        });
    </script>
</body>
</html>
