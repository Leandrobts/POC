<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>PS4 WebKit - History Write-Stuck Sanity (V2.2)</title>
<style>
  body { background:#000; color:#0f0; font-family: monospace; }
  button { padding:10px 14px; margin:6px 6px 6px 0; font-size:14px; }
  #log { white-space:pre-wrap; border:1px solid #0f0; padding:10px; margin-top:10px; }
  .ok{color:#0f0} .warn{color:#ff0} .bad{color:#f66} .dim{color:#8f8}
</style>
</head>
<body>
<h2>History API Sanity – Write Acceptance / Setup Stickiness (V2.2)</h2>

<div>
  <button onclick="resetAndShow()">Reset (BASE/A + BASE/B)</button>
  <button onclick="runAcceptanceProbe()">Run Acceptance Probe (replaceState loop)</button>
  <button onclick="runRecoveryProbe()">Run Setup Recovery Probe (apply BASE)</button>
  <button onclick="clearLog()">Limpar</button>
</div>

<div style="margin-top:8px">
  <label>Max i:
    <input id="maxI" type="number" value="80" min="1" step="1">
  </label>
  <label style="margin-left:10px">Readback steps:
    <select id="rbMode">
      <option value="immediate">immediate</option>
      <option value="microtask">microtask</option>
      <option value="raf">raf</option>
      <option value="all" selected>all (immediate+microtask+raf)</option>
    </select>
  </label>
  <label style="margin-left:10px">
    <input id="gc" type="checkbox"> GC pressure leve
  </label>
</div>

<div id="log"></div>

<script>
const $ = (id)=>document.getElementById(id);
const logEl = $("log");

function now(){ return (performance.now()).toFixed(2); }
function L(msg, cls="dim"){
  const line = `[${now()}] ${msg}\n`;
  if(cls==="ok") logEl.innerHTML += `<span class="ok">${escapeHtml(line)}</span>`;
  else if(cls==="warn") logEl.innerHTML += `<span class="warn">${escapeHtml(line)}</span>`;
  else if(cls==="bad") logEl.innerHTML += `<span class="bad">${escapeHtml(line)}</span>`;
  else logEl.innerHTML += `<span class="dim">${escapeHtml(line)}</span>`;
  logEl.scrollTop = logEl.scrollHeight;
}
function escapeHtml(s){
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function clearLog(){ logEl.textContent=""; }

function safeStateSummary(st){
  if(!st) return "null";
  try{
    // resumo curto e estável
    const o = {};
    if ("kind" in st) o.kind = st.kind;
    if ("entry" in st) o.entry = st.entry;
    if ("id" in st) o.id = st.id;
    if ("stamp" in st) o.stamp = st.stamp;
    if ("marker" in st) o.marker = st.marker;
    return JSON.stringify(o);
  }catch(e){
    return "[unserializable]";
  }
}

function tick(){ return new Promise(r=>setTimeout(r,0)); }
function micro(){ return Promise.resolve(); }
function raf(){ return new Promise(r=>requestAnimationFrame(()=>r())); }

function makeState(kind, extra){
  // objeto NOVO sempre (evita “mesma referência”)
  const st = Object.assign({ kind, stamp: Date.now() }, extra||{});
  return st;
}

function isExpectedB(){
  const st = history.state;
  return (location.hash === "#B" && st && st.kind==="BASE" && st.entry==="B");
}

async function resetAllVerified(retries=3){
  for(let k=1;k<=retries;k++){
    history.replaceState(makeState("BASE",{entry:"A"}), "", "#A");
    history.pushState(makeState("BASE",{entry:"B"}), "", "#B");
    await tick();

    const ok = isExpectedB();
    L(`[SETUP] attempt=${k} href=${location.href}`, ok?"ok":"bad");
    L(`[SETUP] history.length=${history.length}`, ok?"ok":"bad");
    L(`[SETUP] state=${safeStateSummary(history.state)}`, ok?"ok":"bad");

    if(ok){
      L(`[SETUP] OK: BASE/B aplicado e hash #B.`, "ok");
      return true;
    }
    L(`[SETUP] FAIL: setup não “grudou”. Possível engine desync/no-op.`, "bad");
    await tick();
  }
  L(`[FATAL] ENGINE DESYNC: setup write failed após retries.`, "bad");
  L(`[ACTION] Recarregue a página manualmente (reload) e rode novamente.`, "warn");
  return false;
}

async function resetAndShow(){
  await resetAllVerified(3);
}

function gcPressureLight(){
  // leve e curto (não quer DoS)
  const a = [];
  for(let i=0;i<200;i++){
    a.push(new Uint8Array(0x2000));
  }
  return a;
}

async function readbackCheck(expectId, mode){
  // retorna {ok, gotId, phase}
  const phases = (mode==="all") ? ["immediate","microtask","raf"] : [mode];
  for(const ph of phases){
    if(ph==="microtask") await micro();
    if(ph==="raf") await raf();

    const st = history.state;
    const got = (st && typeof st==="object" && "id" in st) ? st.id : undefined;
    if(got === expectId){
      return { ok:true, gotId: got, phase: ph };
    }
  }
  // último observado:
  const st = history.state;
  const got = (st && typeof st==="object" && "id" in st) ? st.id : undefined;
  return { ok:false, gotId: got, phase: phases[phases.length-1] };
}

async function runAcceptanceProbe(){
  clearLog();
  const maxI = Math.max(1, parseInt($("maxI").value||"80",10));
  const rbMode = $("rbMode").value;
  const doGC = $("gc").checked;

  L(`===== ACCEPTANCE PROBE =====`, "ok");
  const okSetup = await resetAllVerified(3);
  if(!okSetup) return;

  let firstFail = null;
  let lastOk = null;

  for(let i=1;i<=maxI;i++){
    const st = makeState("BURST",{ id:i, marker:`M${i}`, payload:"X".repeat(64) });
    history.replaceState(st, "", "#B"); // mantém hash, só troca state
    if(doGC && (i % 10 === 0)) gcPressureLight();

    const rb = await readbackCheck(i, rbMode);

    if(!rb.ok){
      if(firstFail === null){
        firstFail = { i, got: rb.gotId, phase: rb.phase };
        L(`[FAIL] i=${i} readback got=${rb.gotId} (phase=${rb.phase})`, "bad");
        L(`[STATE] history.state=${safeStateSummary(history.state)}`, "bad");
        // mais uma tentativa imediata para confirmar persistência
        await tick();
        const rb2 = await readbackCheck(i, "immediate");
        L(`[CONFIRM] immediate recheck ok=${rb2.ok} got=${rb2.gotId}`, rb2.ok?"warn":"bad");
      } else {
        // depois do primeiro fail, só amostra
        if(i % 5 === 0) L(`[after-fail] i=${i} got=${rb.gotId}`, "warn");
      }
    } else {
      lastOk = i;
      if(i % 10 === 0) L(`[OK] i=${i} (phase=${rb.phase})`, "ok");
    }

    // se entrou em fail, não precisa ir até o fim — mas deixo rodar até maxI se você quiser.
    if(firstFail && i - firstFail.i >= 8) break;
  }

  L(`----- SUMMARY -----`, "ok");
  L(`lastOk=${lastOk} firstFail=${firstFail ? JSON.stringify(firstFail) : "none"}`, firstFail?"warn":"ok");

  // Agora testa se o setup ainda "gruda" depois do colapso:
  L(`----- POST-COLLAPSE SETUP CHECK -----`, "warn");
  const okSetup2 = await resetAllVerified(3);
  L(`postCollapseSetupOK=${okSetup2}`, okSetup2?"ok":"bad");
}

async function runRecoveryProbe(){
  clearLog();
  L(`===== SETUP RECOVERY PROBE =====`, "ok");

  // tenta várias vezes, sem rodar burst.
  for(let t=1;t<=6;t++){
    const ok = await resetAllVerified(3);
    L(`[RECOVERY] trial=${t} ok=${ok}`, ok?"ok":"bad");
    if(!ok) break;
    await tick();
  }

  L(`(Se isso falhar SEM burst, então há algo externo interferindo.)`, "dim");
}
</script>
</body>
</html>
