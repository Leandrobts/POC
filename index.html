<!doctype html>
<meta charset="utf-8">
<title>PS4 WebKit – CRLF Diagnostic V3.1</title>
<h3>CRLF Diagnostic V3.1 (charcodes + A(real) vs B(literal))</h3>
<button onclick="run()">Run</button>
<pre id="log"></pre>
<script>
var L=document.getElementById('log');
function log(s){ L.textContent += s + "\n"; }
function codes(s, max){
  s = String(s);
  var out=[], i, n=Math.min(s.length, max||40);
  for(i=0;i<n;i++) out.push(s.charCodeAt(i));
  return out.join(",");
}
function trySet(val){
  var ok=true, err="";
  try{
    var h = new Headers();
    h.set("x-test", val);
    var g = h.get("x-test");
    return {ok:true, got:g, gotCodes:codes(g,60)};
  }catch(e){
    return {ok:false, err:String(e)};
  }
}
function run(){
  L.textContent="";
  log("UA: " + navigator.userAgent);

  // A: LF/CRLF reais
  var A_LF   = "a\nb";
  var A_CRLF = "a\r\nb";
  // B: texto literal "\n" e "\r\n"
  var B_LF   = "a\\nb";
  var B_CRLF = "a\\r\\nb";

  log("--- Headers.set A_LF (real LF) ---");
  var r1 = trySet(A_LF);
  log("ok=" + r1.ok + (r1.ok ? (" got=" + JSON.stringify(r1.got) + " codes=" + r1.gotCodes) : (" err=" + r1.err)));

  log("--- Headers.set B_LF (literal \\\\n) ---");
  var r2 = trySet(B_LF);
  log("ok=" + r2.ok + (r2.ok ? (" got=" + JSON.stringify(r2.got) + " codes=" + r2.gotCodes) : (" err=" + r2.err)));

  log("--- Headers.set A_CRLF (real CRLF) ---");
  var r3 = trySet(A_CRLF);
  log("ok=" + r3.ok + (r3.ok ? (" got=" + JSON.stringify(r3.got) + " codes=" + r3.gotCodes) : (" err=" + r3.err)));

  log("--- Headers.set B_CRLF (literal \\\\r\\\\n) ---");
  var r4 = trySet(B_CRLF);
  log("ok=" + r4.ok + (r4.ok ? (" got=" + JSON.stringify(r4.got) + " codes=" + r4.gotCodes) : (" err=" + r4.err)));

  // Blob.type + FileReader DataURL (confirmar se entra LF real)
  log("\n--- Blob.type + DataURL check ---");
  var blobA = new Blob(["hello"], {type:"text/plain\nbad\n"});   // LF real
  var blobB = new Blob(["hello"], {type:"text/plain\\nbad\\n"}); // literal \n

  log("blobA.type=" + JSON.stringify(blobA.type) + " codes=" + codes(blobA.type,60));
  log("blobB.type=" + JSON.stringify(blobB.type) + " codes=" + codes(blobB.type,60));

  var fr = new FileReader();
  fr.onload = function(){
    var s = String(fr.result||"");
    log("DataURL(A) prefix=" + JSON.stringify(s.slice(0,80)));
    log("DataURL(A) codes=" + codes(s.slice(0,80),80));
  };
  fr.readAsDataURL(blobA);
}
</script>
