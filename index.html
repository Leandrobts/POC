
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PS4 T8 DROP + Queue/GC Impact Harness (Auto, Minimal Log)</title>
</head>
<body>
  <h1>PS4 T8 DROP + Queue/GC Impact Harness (Auto, Minimal Log)</h1>

  <button id="btnRunAll">RUN ALL (Auto)</button>
  <button id="btnRunPoc">RUN PoC (HackerOne minimal)</button>
  <button id="btnStop">STOP</button>
  <button id="btnReset">Reset log</button>

  <p>
    Attempts (N): <input id="inN" type="number" value="200" min="1" step="10">
    Timeout per attempt (ms): <input id="inTimeout" type="number" value="500" min="50" step="50">
    Delay between attempts (ms): <input id="inDelay" type="number" value="0" min="0" step="10">
  </p>

  <p>
    Post-DROP followups:
    Queue test pings: <input id="inPings" type="number" value="6" min="1" step="1">
    GC probe allocations: <input id="inGcAllocs" type="number" value="80" min="0" step="10">
    GC probe buf size (bytes): <input id="inGcSize" type="number" value="65536" min="1024" step="1024">
  </p>

  <p>
    Strategies (amplify):
    <label><input id="stBaseline" type="checkbox" checked> baseline</label>
    <label><input id="stMicrotask" type="checkbox" checked> microtasks</label>
    <label><input id="stPortClose" type="checkbox" checked> close race</label>
    <label><input id="stDomChurn" type="checkbox" checked> DOM churn</label>
    <label><input id="stGcPressure" type="checkbox" checked> GC pressure</label>
  </p>

  <pre id="log"></pre>

<script>
(() => {
  "use strict";

  const $log = document.getElementById("log");
  const $ = (id) => document.getElementById(id);

  let STOP = false;

  function ts(){ return Date.now(); }
  function logLine(s){ $log.textContent += `[${ts()}] ${s}\n`; }
  function resetLog(){ $log.textContent = ""; logLine("Reset."); }

  function j(x){
    try { return JSON.stringify(x); } catch(e){ return String(x); }
  }

  function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

  async function waitFor(condFn, ms){
    const t0 = Date.now();
    while ((Date.now() - t0) < ms) {
      if (condFn()) return true;
      // yield microtask + task
      await Promise.resolve();
      await sleep(0);
    }
    return false;
  }

  function mkMarker(){
    // marker 4 bytes
    const m = (Math.random() * 0xFFFFFFFF) >>> 0;
    return m;
  }

  function writeMarker(u8, m){
    u8[0] = (m       ) & 0xFF;
    u8[1] = (m >>>  8) & 0xFF;
    u8[2] = (m >>> 16) & 0xFF;
    u8[3] = (m >>> 24) & 0xFF;
  }

  function readMarker(u8){
    return (u8[0] | (u8[1]<<8) | (u8[2]<<16) | (u8[3]<<24)) >>> 0;
  }

  async function microtaskBurst(n){
    // bounded, não DoS
    let p = Promise.resolve();
    for (let i=0;i<n;i++){
      p = p.then(() => 0);
    }
    await p;
  }

  function domChurnOnce(){
    // bounded
    const d = document.createElement("div");
    d.textContent = "x";
    document.body.appendChild(d);
    d.remove();
  }

  function gcPressureOnce(bytesTotal){
    // bounded allocation churn
    const arr = [];
    const chunk = 4096;
    const n = Math.max(1, (bytesTotal / chunk) | 0);
    for (let i=0;i<n;i++){
      arr.push(new Uint8Array(chunk));
    }
    // drop refs
  }

  function getStrategies(){
    const list = [];
    if ($("stBaseline").checked) list.push("baseline");
    if ($("stMicrotask").checked) list.push("microtask");
    if ($("stPortClose").checked) list.push("close");
    if ($("stDomChurn").checked) list.push("dom");
    if ($("stGcPressure").checked) list.push("gc");
    if (!list.length) list.push("baseline");
    return list;
  }

  async function applyStrategy(kind){
    // todas são pequenas / bounded
    if (kind === "microtask") {
      await microtaskBurst(200);
    } else if (kind === "dom") {
      for (let i=0;i<6;i++) domChurnOnce();
    } else if (kind === "gc") {
      gcPressureOnce(64 * 1024);
      await microtaskBurst(50);
    }
  }

  async function tryTransferOnce(kind, timeoutMs){
    // Retorna: { outcome, senderLen, gotType, gotTag, gotMarkerOk, gotLen, threw }
    const ch = new MessageChannel();
    let got = undefined;
    let gotSet = false;

    ch.port2.onmessage = (ev) => { got = ev.data; gotSet = true; };

    const ab = new ArrayBuffer(4096);
    const u8 = new Uint8Array(ab);
    const marker = mkMarker();
    writeMarker(u8, marker);

    // Strategy pre-conditioning (bounded)
    await applyStrategy(kind);

    let threw = false;
    try {
      ch.port1.postMessage(ab, [ab]);
    } catch (e) {
      threw = true;
    }

    // "close race" strategy: close after posting (pode aumentar DROP sem ser DoS)
    if (kind === "close") {
      try { ch.port1.close(); } catch(_){}
      // não fechar port2 aqui para ainda permitir entrega; isso gera janela de race
    }

    // aguarda delivery (não loga interno)
    await waitFor(() => gotSet, timeoutMs);

    const senderLen = ab.byteLength;
    const gotType = (got === null) ? "null" : (typeof got);
    const gotTag = (got !== undefined && got !== null) ? Object.prototype.toString.call(got) : "";
    let gotMarkerOk = false;
    let gotLen = -1;

    try {
      let r8 = null;
      if (gotTag === "[object ArrayBuffer]") r8 = new Uint8Array(got);
      else if (got && got.buffer && typeof got.byteLength === "number") r8 = new Uint8Array(got.buffer);
      if (r8) {
        gotLen = r8.length;
        gotMarkerOk = (r8.length >= 4 && readMarker(r8) === marker);
      }
    } catch(_){}

    let outcome = "OTHER";
    if (threw) outcome = "THROW";
    else if (senderLen === 0 && !gotSet) outcome = "DROP";
    else if (senderLen === 0 && gotSet && gotMarkerOk) outcome = "DETACH_OK";
    else if (senderLen === 4096 && gotSet) outcome = "CLONE_OK";
    else if (!gotSet) outcome = "TIMEOUT_OR_NODLV";
    else outcome = "BAD_PAYLOAD";

    // cleanup
    try { ch.port1.close(); } catch(_){}
    try { ch.port2.close(); } catch(_){}

    return { kind, outcome, senderLen, gotType, gotTag, gotMarkerOk, gotLen, threw };
  }

  async function postDropQueueTest(timeoutMs, pings){
    // Objetivo: detectar fila/porta "stuck", reorder, loss após um DROP.
    // Estratégia: criar um channel novo, induzir DROP, então testar sequência ping/pong + 2 transfers.
    // Como não temos controle absoluto sobre indução, vamos: executar um DROP-attempt loop pequeno e,
    // ao primeiro DROP, rodar validação usando *o mesmo channel* daquele attempt.
    const maxAttempts = 40; // bounded
    const strategies = getStrategies();

    for (let a=0; a<maxAttempts && !STOP; a++){
      const kind = strategies[a % strategies.length];
      const ch = new MessageChannel();
      let got = [];
      ch.port2.onmessage = (ev) => { got.push(ev.data); };

      const ab = new ArrayBuffer(4096);
      const u8 = new Uint8Array(ab);
      const marker = mkMarker();
      writeMarker(u8, marker);

      await applyStrategy(kind);

      let threw = false;
      try { ch.port1.postMessage(ab, [ab]); } catch(e){ threw = true; }
      if (kind === "close") { try { ch.port1.close(); } catch(_){} }

      // wait for first delivery window
      await sleep(Math.min(50, timeoutMs));
      const senderLen = ab.byteLength;
      const firstGot = got.length ? got[0] : undefined;

      const isDrop = (!threw && senderLen === 0 && firstGot === undefined);
      if (!isDrop) {
        try { ch.port1.close(); } catch(_){}
        try { ch.port2.close(); } catch(_){}
        continue;
      }

      // Achou DROP -> agora testa "fila/porta" no MESMO channel:
      // 1) ping/pong strings
      // 2) novo transfer
      // 3) ver se entrega fica travada ou perde ordem

      got = [];
      // ping burst
      for (let i=0;i<pings;i++){
        try { ch.port1.postMessage("PING#" + i); } catch(_){}
      }
      // send a second transfer
      const ab2 = new ArrayBuffer(2048);
      const u82 = new Uint8Array(ab2);
      const m2 = mkMarker();
      writeMarker(u82, m2);
      try { ch.port1.postMessage(ab2, [ab2]); } catch(_){}

      // wait
      await waitFor(() => got.length >= (pings + 1), timeoutMs);

      // analyze
      let pingOk = 0, pingMissing = 0;
      const seen = new Set();
      for (const msg of got){
        if (typeof msg === "string" && msg.indexOf("PING#") === 0) {
          seen.add(msg);
        }
      }
      for (let i=0;i<pings;i++){
        if (seen.has("PING#" + i)) pingOk++;
        else pingMissing++;
      }

      // check transfer2 delivered + marker
      let t2Ok = false;
      for (const msg of got){
        const tag = (msg !== undefined && msg !== null) ? Object.prototype.toString.call(msg) : "";
        if (tag === "[object ArrayBuffer]") {
          try {
            const r = new Uint8Array(msg);
            if (r.length >= 4 && readMarker(r) === m2) t2Ok = true;
          } catch(_){}
        }
      }

      // detect "stuck": got nothing or far less than expected
      const stuck = (got.length === 0) || (pingOk === 0 && !t2Ok);

      try { ch.port1.close(); } catch(_){}
      try { ch.port2.close(); } catch(_){}

      return {
        foundDrop: true,
        kind,
        pingOk, pingMissing,
        t2Ok,
        gotCount: got.length,
        stuck
      };
    }

    return { foundDrop: false };
  }

  async function postDropGcProbe(gcAllocs, gcSize){
    // Não é “exploit”: é um *probe* para ver se aparece memória não inicializada / reuse anômalo.
    // Após pressão, cria buffers e checa se algum contém padrões improváveis.
    // Observação: isso é heurístico.
    const needle = mkMarker();
    let hits = 0;
    let samples = 0;

    // pressure a bit
    for (let i=0;i<10;i++){
      if (STOP) break;
      gcPressureOnce(128 * 1024);
      await microtaskBurst(30);
      await sleep(0);
    }

    // allocate & scan first 16 bytes only (bounded)
    for (let i=0;i<gcAllocs && !STOP;i++){
      const ab = new ArrayBuffer(gcSize);
      const u8 = new Uint8Array(ab);
      // normally should be zeroed
      const head = (u8[0] | (u8[1]<<8) | (u8[2]<<16) | (u8[3]<<24)) >>> 0;
      if (head === needle) hits++;
      samples++;
      // tiny yield
      if ((i % 20) === 0) await sleep(0);
    }

    return { needle, samples, hits };
  }

  async function runAll(){
    if (typeof MessageChannel !== "function") {
      logLine("ERRO: MessageChannel não disponível.");
      return;
    }
    STOP = false;

    const N = Math.max(1, parseInt($("inN").value || "200", 10));
    const timeoutMs = Math.max(50, parseInt($("inTimeout").value || "500", 10));
    const delayMs = Math.max(0, parseInt($("inDelay").value || "0", 10));
    const pings = Math.max(1, parseInt($("inPings").value || "6", 10));
    const gcAllocs = Math.max(0, parseInt($("inGcAllocs").value || "80", 10));
    const gcSize = Math.max(1024, parseInt($("inGcSize").value || "65536", 10));

    const strategies = getStrategies();

    logLine("============================================================");
    logLine("Run ALL :: Amplifier + Post-DROP Queue + GC Probe (minimal)");
    logLine(`Config :: ${j({ N, timeoutMs, delayMs, strategies, pings, gcAllocs, gcSize, ua:navigator.userAgent })}`);
    logLine("============================================================");

    const stats = {
      DETACH_OK:0, DROP:0, BAD_PAYLOAD:0, THROW:0, TIMEOUT:0, CLONE_OK:0, OTHER:0
    };

    const firstDrops = [];
    const firstBad = [];

    const progressStep = Math.max(1, Math.floor(N / 10));

    for (let i=0;i<N && !STOP;i++){
      const kind = strategies[i % strategies.length];
      const r = await tryTransferOnce(kind, timeoutMs);

      if (r.outcome in stats) stats[r.outcome]++; else stats.OTHER++;

      if (r.outcome === "DROP" && firstDrops.length < 5) {
        firstDrops.push({ i, kind:r.kind, senderLen:r.senderLen, gotType:r.gotType });
      }
      if (r.outcome === "BAD_PAYLOAD" && firstBad.length < 3) {
        firstBad.push({ i, kind:r.kind, senderLen:r.senderLen, gotType:r.gotType, gotTag:r.gotTag, gotLen:r.gotLen, gotMarkerOk:r.gotMarkerOk });
      }

      if (((i+1) % progressStep) === 0) {
        logLine(`progress: ${i+1}/${N}`);
      }

      if (delayMs) await sleep(delayMs);
    }

    logLine("------------------------------------------------------------");
    logLine(`RESULT SUMMARY: ${j(stats)}`);
    if (firstDrops.length) logLine(`SAMPLES (first DROPs): ${j(firstDrops)}`);
    if (firstBad.length) logLine(`SAMPLES (first BAD_PAYLOAD): ${j(firstBad)}`);

    // Post-DROP tests (only if we saw DROP at least once)
    if (!STOP && stats.DROP > 0) {
      logLine("------------------------------------------------------------");
      logLine("POST-DROP :: Queue corruption check (reuse channel on first DROP found)");
      const q = await postDropQueueTest(timeoutMs, pings);
      logLine(`QUEUE_CHECK: ${j(q)}`);

      logLine("------------------------------------------------------------");
      logLine("POST-DROP :: GC/orphan probe (heuristic, non-exploit)");
      const g = await postDropGcProbe(gcAllocs, gcSize);
      logLine(`GC_PROBE: ${j(g)}`);
      if (g.hits > 0) {
        logLine("ALERTA: GC_PROBE encontrou head==needle em novo ArrayBuffer. Isso é altamente incomum (verificar repetição).");
      }
    } else {
      logLine("POST-DROP :: skipped (no DROP observed in this run).");
    }

    logLine("DONE.");
  }

  async function runPocMinimal(){
    if (typeof MessageChannel !== "function") {
      logLine("ERRO: MessageChannel não disponível.");
      return;
    }
    STOP = false;

    const N = 60;                 // pequeno e copiável
    const timeoutMs = 250;        // curto para amplificar em FW PS4
    const delayMs = 10;
    const strategies = ["baseline","close","microtask","dom"]; // amplifica sem DoS

    logLine("============================================================");
    logLine("PoC (HackerOne minimal) :: MessageChannel transfer may detach without delivery");
    logLine(`Env :: ${j({ fw_hint:"PS4", ua:navigator.userAgent })}`);
    logLine(`Config :: ${j({ N, timeoutMs, delayMs, strategies })}`);
    logLine("============================================================");

    const stats = { DETACH_OK:0, DROP:0, THROW:0, TIMEOUT:0, OTHER:0 };
    const samples = [];

    for (let i=0;i<N && !STOP;i++){
      const kind = strategies[i % strategies.length];
      const r = await tryTransferOnce(kind, timeoutMs);

      if (r.outcome === "DETACH_OK") stats.DETACH_OK++;
      else if (r.outcome === "DROP") stats.DROP++;
      else if (r.outcome === "THROW") stats.THROW++;
      else if (r.outcome === "TIMEOUT_OR_NODLV") stats.TIMEOUT++;
      else stats.OTHER++;

      if (r.outcome === "DROP" && samples.length < 3) {
        samples.push({ i, kind:r.kind, senderLen:r.senderLen, gotType:r.gotType });
      }

      if (delayMs) await sleep(delayMs);
    }

    logLine("------------------------------------------------------------");
    logLine(`SUMMARY: ${j(stats)}`);
    if (samples.length) logLine(`SAMPLES: ${j(samples)}`);

    // Snippet pronto para report
    logLine("------------------------------------------------------------");
    logLine("REPORT_SNIPPET (copy/paste):");
    logLine("Title: MessageChannel transfer can detach ArrayBuffer without delivery (DROP)");
    logLine(`Observed: DETACH_OK=${stats.DETACH_OK}, DROP=${stats.DROP}, THROW=${stats.THROW}, TIMEOUT=${stats.TIMEOUT} over N=${N}`);
    logLine("Invariant: sender byteLength==0 (detached) but receiver got undefined (no payload), no exception");
    if (samples.length) logLine("Sample indices: " + samples.map(s => s.i + ":" + s.kind).join(", "));
    logLine("DONE.");
  }

  $("btnReset").onclick = resetLog;
  $("btnStop").onclick = () => { STOP = true; logLine("STOP requested."); };
  $("btnRunAll").onclick = () => runAll().catch(e => logLine("ERRO(runAll): " + (e && e.name ? e.name : "ERR")));
  $("btnRunPoc").onclick = () => runPocMinimal().catch(e => logLine("ERRO(runPoc): " + (e && e.name ? e.name : "ERR")));

  resetLog();
})();
</script>
</body>
</html>
