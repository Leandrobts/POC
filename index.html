<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PS4 Memory Corruption Tests (251-300) - Ultra-Rigorous v2 (Strong Invariants)</title>
</head>
<body>
  <h1>PS4 Memory Corruption Tests (251-300) - Ultra-Rigorous v2</h1>

  <div>
    <button id="btnReset">Reset log</button>
    <button id="btnRunAll">Run ALL (251..300)</button>
    <button id="btnStop">Stop</button>
  </div>

  <div style="margin-top:8px;">
    Delay (ms): <input id="delayMs" type="number" value="80" min="0" step="10">
    Timeout por teste (ms): <input id="timeoutMs" type="number" value="1200" min="100" step="50">
    Intensidade (1..5): <input id="intensity" type="number" value="3" min="1" max="5" step="1">
  </div>

  <pre id="log" style="white-space:pre-wrap; margin-top:10px;"></pre>

<script>
(() => {
  "use strict";

  const $log = document.getElementById("log");

  let STOP = false;
  let RUN_ID = 0;

  function ts() { return Date.now(); }
  function logLine(s) { $log.textContent += `[${ts()}] ${s}\n`; }
  function resetLog() { $log.textContent = ""; logLine("Reset."); }
  function stopNow() { STOP = true; logLine("STOP requested."); }

  function alertVuln(testNum, msg, extraObj) {
    const extra = extraObj ? ("\n" + JSON.stringify(extraObj, null, 2)) : "";
    const full = `ALERTA TEST ${testNum}: ${msg}${extra}`;
    logLine(full);
    alert(full);
  }

  // =========================
  // Strong victim model
  // =========================
  function xorshift32(seed) {
    let x = seed >>> 0;
    return () => {
      x ^= (x << 13) >>> 0;
      x ^= (x >>> 17) >>> 0;
      x ^= (x << 5) >>> 0;
      return x >>> 0;
    };
  }

  function fillVictim(u8, seed) {
    const rnd = xorshift32(seed);
    for (let i = 0; i < u8.length; i++) {
      const r = rnd();
      u8[i] = (r ^ (r >>> 8) ^ (r >>> 16) ^ (r >>> 24)) & 0xFF;
    }
  }

  // block XOR32 checksum across whole buffer (validates 100% coverage)
  function blockXor32(u8, blockBytes) {
    const nBlocks = Math.ceil(u8.length / blockBytes);
    const out = new Uint32Array(nBlocks);
    const dv = new DataView(u8.buffer, u8.byteOffset, u8.byteLength);

    for (let b = 0; b < nBlocks; b++) {
      const start = b * blockBytes;
      const end = Math.min(u8.length, start + blockBytes);
      let acc = 0 >>> 0;

      // XOR 32-bit words (unaligned safe via DataView)
      let i = start;
      for (; i + 4 <= end; i += 4) {
        acc ^= dv.getUint32(i, true);
      }
      // tail bytes
      for (; i < end; i++) {
        acc ^= (u8[i] << ((i - start) & 3) * 8) >>> 0;
      }
      out[b] = acc >>> 0;
    }
    return out;
  }

  function snapshotVictim(u8, opts) {
    const blockBytes = opts.blockBytes || 256;
    const sum = blockXor32(u8, blockBytes);
    // also keep a small spot-sample (helps debug)
    const spots = [];
    const step = Math.max(1, Math.floor(u8.length / 16));
    for (let i = 0; i < u8.length; i += step) spots.push(u8[i]);
    return { blockBytes, sum, spots, len: u8.length };
  }

  function compareSnapshot(u8, snap) {
    if (u8.length !== snap.len) {
      return { ok: false, reason: "victim length changed", gotLen: u8.length, expLen: snap.len };
    }
    const now = blockXor32(u8, snap.blockBytes);
    if (now.length !== snap.sum.length) {
      return { ok: false, reason: "checksum blocks length mismatch", gotBlocks: now.length, expBlocks: snap.sum.length };
    }
    for (let i = 0; i < now.length; i++) {
      if (now[i] !== snap.sum[i]) {
        // gather a small window of bytes to show where it drifted
        const start = i * snap.blockBytes;
        const end = Math.min(u8.length, start + 32);
        const bytes = [];
        for (let j = start; j < end; j++) bytes.push(u8[j]);
        return {
          ok: false,
          reason: "checksum mismatch",
          blockIndex: i,
          exp: snap.sum[i] >>> 0,
          got: now[i] >>> 0,
          first32BytesOfBlock: bytes
        };
      }
    }
    // spot sample check too
    const spots = [];
    const step = Math.max(1, Math.floor(u8.length / 16));
    for (let i = 0; i < u8.length; i += step) spots.push(u8[i]);
    for (let k = 0; k < spots.length; k++) {
      if (spots[k] !== snap.spots[k]) {
        return { ok: false, reason: "spot sample mismatch", spotIndex: k, exp: snap.spots[k], got: spots[k] };
      }
    }
    return { ok: true };
  }

  function makeVictim(bytes, seed) {
    const ab = new ArrayBuffer(bytes);
    const u8 = new Uint8Array(ab);
    fillVictim(u8, seed);
    return { ab, u8 };
  }

  // =========================
  // Detach invariants
  // =========================
  function detachArrayBuffer(ab) {
    // Prefer structuredClone transfer when available; fallback to postMessage transfer
    if (typeof structuredClone === "function") {
      try { structuredClone(ab, { transfer: [ab] }); return true; } catch (_) {}
    }
    if (typeof postMessage === "function") {
      try { postMessage("x", "*", [ab]); return true; } catch (_) {}
    }
    return false;
  }

  function sampleDetachedBehavior(ab, views) {
    const out = { detachedAttempted: false, afterByteLength: null, viewSamples: [] };
    out.detachedAttempted = detachArrayBuffer(ab);
    out.afterByteLength = ab.byteLength;

    for (const v of views) {
      const s = { name: v.name, kind: v.kind };
      try {
        s.length = v.obj.length;
      } catch (e) {
        s.length = "THREW:" + (e && e.name ? e.name : "ERR");
      }
      try {
        s.byteLength = v.obj.byteLength;
      } catch (e) {
        s.byteLength = "THREW:" + (e && e.name ? e.name : "ERR");
      }
      try {
        // read index 0 as property access (for TypedArray)
        s.read0 = v.kind === "TA" ? v.obj[0] : "NA";
      } catch (e) {
        s.read0 = "THREW:" + (e && e.name ? e.name : "ERR");
      }
      try {
        if (v.kind === "TA") {
          // attempt write index 0; should be ignored if detached/length==0 (or throw in some engines)
          const before = (v.obj.length ? v.obj[0] : undefined);
          v.obj[0] = 0x7A;
          const after = (v.obj.length ? v.obj[0] : v.obj[0]);
          s.writeEffect = { before, after };
        } else {
          s.writeEffect = "NA";
        }
      } catch (e) {
        s.writeEffect = "THREW:" + (e && e.name ? e.name : "ERR");
      }
      out.viewSamples.push(s);
    }
    return out;
  }

  function checkDetachConsistency(testNum, repetitions) {
    // We expect consistency across repetitions in same engine:
    // - ab.byteLength becomes 0 after detach (if detach succeeded)
    // - TypedArray view lengths become 0 OR throw consistently; access must not be "sometimes live"
    const samples = [];
    for (let i = 0; i < repetitions; i++) {
      const ab = new ArrayBuffer(4096);
      const u8 = new Uint8Array(ab);
      const u32 = new Uint32Array(ab);
      // mark
      if (u8.length) u8[0] = 0xAA;

      const s = sampleDetachedBehavior(ab, [
        { name: "Uint8Array", kind: "TA", obj: u8 },
        { name: "Uint32Array", kind: "TA", obj: u32 },
      ]);
      samples.push(s);
    }

    // If detach isn't possible, skip silently (no false alert)
    const anyDetach = samples.some(x => x.detachedAttempted);
    if (!anyDetach) return;

    // Normalize signature for each repetition
    function sig(s) {
      const parts = [];
      parts.push("abLen=" + s.afterByteLength);
      for (const v of s.viewSamples) {
        parts.push(v.name + ":len=" + v.length + ":bl=" + v.byteLength + ":r0=" + v.read0 + ":we=" + JSON.stringify(v.writeEffect));
      }
      return parts.join("|");
    }

    const sig0 = sig(samples[0]);
    for (let i = 1; i < samples.length; i++) {
      const si = sig(samples[i]);
      if (si !== sig0) {
        alertVuln(testNum, "DETACH INCONSISTENT: comportamento pós-detach variou entre repetições (suspeito).", {
          rep0: samples[0],
          repN: samples[i]
        });
        return;
      }
    }

    // Extra: if detach succeeded, ab.byteLength should be 0 (spec-like). If not, only alert if it claims detach succeeded.
    for (const s of samples) {
      if (s.detachedAttempted && s.afterByteLength !== 0) {
        alertVuln(testNum, "DETACH SUSPECT: detach foi tentado mas ab.byteLength não ficou 0.", s);
        return;
      }
    }
  }

  // =========================
  // Subarray negative clamp invariants
  // =========================
  function expectedSubarrayRange(len, begin, end) {
    let b = begin | 0;
    let e = (end === undefined) ? len : (end | 0);

    if (b < 0) b = Math.max(len + b, 0);
    else b = Math.min(b, len);

    if (e < 0) e = Math.max(len + e, 0);
    else e = Math.min(e, len);

    if (e < b) e = b;
    return { b, e, length: e - b };
  }

  function checkNegativeSubarrayClamp(testNum) {
    const ab = new ArrayBuffer(256);
    const ta = new Uint8Array(ab);
    for (let i = 0; i < ta.length; i++) ta[i] = i & 0xFF;

    const begin = -50;
    const end = -20;
    const exp = expectedSubarrayRange(ta.length, begin, end);

    const sub = ta.subarray(begin, end);

    if (sub.length !== exp.length) {
      alertVuln(testNum, "SUBARRAY NEGATIVE CLAMP FAIL: length inesperado.", {
        taLen: ta.length, begin, end, exp, gotLen: sub.length
      });
      return;
    }

    // Verify view maps correct region: first/last bytes should match
    if (sub.length > 0) {
      const expFirst = ta[exp.b];
      const expLast = ta[exp.e - 1];
      const gotFirst = sub[0];
      const gotLast = sub[sub.length - 1];

      if (gotFirst !== expFirst || gotLast !== expLast) {
        alertVuln(testNum, "SUBARRAY NEGATIVE CLAMP FAIL: conteúdo não corresponde ao clamp esperado.", {
          expFirst, gotFirst, expLast, gotLast, exp
        });
        return;
      }

      // Writes should reflect into the *same underlying buffer* at the clamped location (normal alias),
      // but NOT become "mágico" fora da região.
      const marker = 0xCC;
      sub[0] = marker;
      if (ta[exp.b] !== marker) {
        alertVuln(testNum, "SUBARRAY WRITE FAIL: escrita não refletiu na posição clamped (inconsistente).", {
          pos: exp.b, expMarker: marker, got: ta[exp.b]
        });
        return;
      }

      // Ensure it did NOT write outside expected region:
      if (exp.b > 0 && ta[exp.b - 1] === marker) {
        alertVuln(testNum, "SUBARRAY WRITE OOR: escrita vazou para byte anterior à região (suspeito).", { pos: exp.b });
        return;
      }
      if (exp.e < ta.length && ta[exp.e] === marker) {
        alertVuln(testNum, "SUBARRAY WRITE OOR: escrita vazou para byte após a região (suspeito).", { pos: exp.e });
        return;
      }
    }
  }

  // =========================
  // Out-of-range TypedArray write invariants
  // =========================
  function checkTypedArrayOORWriteNoop(testNum) {
    const victim = makeVictim(4096, 0xA11CE551);
    const snap = snapshotVictim(victim.u8, { blockBytes: 128 });

    const ta = new Uint32Array(victim.ab);
    const idx = ta.length; // exactly out of range
    const before0 = ta.length ? ta[0] : 0;

    // Spec: setting out of range is a no-op (no throw)
    let threw = false;
    try { ta[idx] = 0xDEADBEEF; } catch (e) { threw = true; }

    // Either behavior is acceptable across engines? In practice TypedArray OOR write should not throw.
    // We'll only ALERT if victim bytes changed, or if behavior flips within repeats (handled elsewhere).
    const cmp = compareSnapshot(victim.u8, snap);
    if (!cmp.ok) {
      alertVuln(testNum, "TYPEDARRAY OOR WRITE CHANGED VICTIM (suspeito).", cmp);
      return;
    }
    // If it threw, that's weird but could be engine choice; we flag as "IMPOSSIBLE" only if inconsistent elsewhere.
    // Here: do nothing.
    void before0; void threw;
  }

  // =========================
  // Amplifiers (stress without false positives)
  // =========================
  function heapSpray(intensity) {
    const count = 50 * intensity;
    const size = 0x2000;
    const arr = [];
    for (let i = 0; i < count; i++) {
      const ab = new ArrayBuffer(size);
      const u32 = new Uint32Array(ab);
      for (let j = 0; j < u32.length; j += 64) u32[j] = (0x41414141 ^ i ^ j) >>> 0;
      arr.push(ab);
    }
    return arr;
  }

  function makeHoles(intensity) {
    const holes = [];
    const n = 200 * intensity;
    for (let i = 0; i < n; i++) holes.push(new ArrayBuffer(0x100));
    for (let i = 0; i < holes.length; i += 2) holes[i] = null;
    return holes;
  }

  function objectSpray(intensity) {
    const n = 400 * intensity;
    const out = [];
    for (let i = 0; i < n; i++) {
      const o = { a: i, b: i * 2, c: ("x" + i) };
      if ((i & 7) === 0) o.d = new ArrayBuffer(0x80);
      out.push(o);
    }
    return out;
  }

  function microtaskChurn(n) {
    let p = Promise.resolve();
    for (let i = 0; i < n; i++) p = p.then(() => {});
    return p;
  }

  // =========================
  // Core test template: victim snapshot -> stress -> verify victim unchanged
  // =========================
  async function crossBufferIsolationTest(testNum, label, stressFn, intensity) {
    const victim = makeVictim(64 * 1024, 0xC0FFEE00 ^ testNum);
    const snap = snapshotVictim(victim.u8, { blockBytes: 256 });

    // execute stress on separate allocations
    await stressFn(intensity);

    const cmp = compareSnapshot(victim.u8, snap);
    if (!cmp.ok) {
      alertVuln(testNum, `${label}: VICTIM CORRUPTED (cross-buffer mismatch).`, cmp);
    }
  }

  // =========================
  // Define tests 251..300
  // =========================
  const tests = [];

  // 251: Cross-buffer OOB write detection (sanity: OOR write is no-op + victim unchanged)
  tests.push(async (I) => {
    checkTypedArrayOORWriteNoop(251);
    await crossBufferIsolationTest(251, "Cross-buffer OOR write no-op verification", async () => {
      // do some additional noise allocations around
      heapSpray(I);
    }, I);
  });

  // 252: Buffer detach strict validation + consistency across repetitions
  tests.push(async () => {
    checkDetachConsistency(252, 5);
  });

  // 253: TypedArray.set cross-buffer check (set should throw on OOB source offset; victim must remain)
  tests.push(async (I) => {
    await crossBufferIsolationTest(253, "TypedArray.set cross-buffer isolation", async (intensity) => {
      const a = new Uint8Array(256);
      const b = new Uint8Array(128);
      a.fill(0x11); b.fill(0x22);
      // valid set
      a.set(b, 64);
      // invalid set should throw; we ignore exception as expected behavior
      try { a.set(b, 200); } catch (_) {}
      // some churn
      heapSpray(intensity);
    }, I);
  });

  // 254: Integer overflow wrap detection (allocation attempts) + victim unchanged
  tests.push(async (I) => {
    await crossBufferIsolationTest(254, "Integer overflow/wrap allocation attempts", async (intensity) => {
      const sizes = [0x40000000, 0x7fffffff];
      for (const s of sizes) { try { new ArrayBuffer(s); } catch (_) {} }
      objectSpray(intensity);
    }, I);
  });

  // 255: DataView strict bounds check
  tests.push(async () => {
    const ab = new ArrayBuffer(16);
    const dv = new DataView(ab);
    let ok = true;
    try { dv.getUint32(13, true); ok = false; } catch (_) {}
    // If it didn't throw, that's suspicious: it's truly OOB read.
    if (!ok) alertVuln(255, "DataView.getUint32 OOB did NOT throw (IMPOSSIBLE).");
  });

  // 256: Subarray cross-buffer check (ensure subarray is view on same buffer; no magic)
  tests.push(async () => {
    const ab = new ArrayBuffer(128);
    const ta = new Uint8Array(ab);
    for (let i = 0; i < ta.length; i++) ta[i] = i;
    const sub = ta.subarray(10, 20);
    sub[0] = 0xEE;
    if (ta[10] !== 0xEE) alertVuln(256, "subarray write did not reflect into same buffer (inconsistente).");
  });

  // 257: Negative index cross-buffer (CLAMP validation)
  tests.push(async () => {
    checkNegativeSubarrayClamp(257);
  });

  // 258..276: Cross-buffer checks around common array methods (victim snapshots + stress)
  const methodStress = [
    [258, "copyWithin cross-buffer check", async (I) => {
      const a = new Uint8Array(4096);
      for (let i = 0; i < a.length; i++) a[i] = i & 0xFF;
      a.copyWithin(100, 0, 512);
      heapSpray(I);
    }],
    [259, "fill cross-buffer check", async (I) => {
      const a = new Uint32Array(2048);
      a.fill(0xA5A5A5A5);
      objectSpray(I);
    }],
    [260, "reverse cross-buffer check", async (I) => {
      const a = Array.from({length: 2000}, (_,i)=>i);
      a.reverse();
      heapSpray(I);
    }],
    [261, "sort cross-buffer check", async (I) => {
      const a = Array.from({length: 2000}, (_,i)=> (i*1103515245 + 12345)>>>0);
      a.sort((x,y)=> (x|0)-(y|0));
      heapSpray(I);
    }],
    [262, "map cross-buffer check", async (I) => {
      const a = Array.from({length: 5000}, (_,i)=>i);
      const b = a.map(x => (x ^ 0x5a5a) & 0xffff);
      void b;
      objectSpray(I);
    }],
    [263, "filter cross-buffer check", async (I) => {
      const a = Array.from({length: 5000}, (_,i)=>i);
      const b = a.filter(x => (x & 7) === 0);
      void b;
      heapSpray(I);
    }],
    [264, "reduce cross-buffer check", async (I) => {
      const a = Array.from({length: 5000}, (_,i)=>i);
      const s = a.reduce((acc,v)=>acc+v, 0);
      void s;
      objectSpray(I);
    }],
    [265, "slice independence strict check", async (I) => {
      const a = new Uint8Array(1024);
      a.fill(0x11);
      const b = a.slice(100, 900);
      b[0] = 0x22;
      // slice should copy; original must not change
      if (a[100] === 0x22) alertVuln(265, "TypedArray.slice aliased original (IMPOSSIBLE).");
      heapSpray(I);
    }],
    [266, "ArrayBuffer.slice cross-buffer", async (I) => {
      const ab = new ArrayBuffer(1024);
      const u8 = new Uint8Array(ab);
      u8.fill(0x33);
      const ab2 = ab.slice(0, 512);
      const u82 = new Uint8Array(ab2);
      u82[0] = 0x44;
      if (u8[0] === 0x44) alertVuln(266, "ArrayBuffer.slice aliased original (IMPOSSIBLE).");
      objectSpray(I);
    }],
    [267, "Constructor array-like cross-buffer", async (I) => {
      const arrLike = { length: 4, 0: 1, 1: 2, 2: 3, 3: 4 };
      const ta = new Uint32Array(arrLike);
      if (ta.length !== 4 || ta[0] !== 1 || ta[3] !== 4) alertVuln(267, "Uint32Array(arrayLike) incoerente.");
      heapSpray(I);
    }],
    [268, "TypedArray.from cross-buffer", async (I) => {
      if (typeof Uint8Array.from === "function") {
        const ta = Uint8Array.from([1,2,3,4,5], x => x * 3);
        if (ta[0] !== 3 || ta[4] !== 15) alertVuln(268, "Uint8Array.from incoerente.");
      }
      objectSpray(I);
    }],
    [269, "TypedArray.of cross-buffer", async (I) => {
      if (typeof Uint8Array.of === "function") {
        const ta = Uint8Array.of(9,8,7,6);
        if (ta.length !== 4 || ta[0] !== 9 || ta[3] !== 6) alertVuln(269, "Uint8Array.of incoerente.");
      }
      heapSpray(I);
    }],
    [270, "every cross-buffer check", async (I) => {
      const a = Array.from({length: 5000}, (_,i)=>i);
      const ok = a.every(x => x >= 0);
      if (!ok) alertVuln(270, "every retornou false inesperado.");
      objectSpray(I);
    }],
    [271, "some cross-buffer check", async (I) => {
      const a = Array.from({length: 5000}, (_,i)=>i);
      const ok = a.some(x => x === 4099);
      if (!ok) alertVuln(271, "some retornou false inesperado.");
      heapSpray(I);
    }],
    [272, "find cross-buffer check", async (I) => {
      const a = Array.from({length: 5000}, (_,i)=>i);
      const v = a.find(x => x === 1234);
      if (v !== 1234) alertVuln(272, "find não encontrou valor esperado.");
      objectSpray(I);
    }],
    [273, "findIndex cross-buffer check", async (I) => {
      const a = Array.from({length: 5000}, (_,i)=>i);
      const idx = a.findIndex(x => x === 1234);
      if (idx !== 1234) alertVuln(273, "findIndex retornou índice inesperado.");
      heapSpray(I);
    }],
    [274, "entries iterator cross-buffer", async (I) => {
      const a = Array.from({length: 2000}, (_,i)=>i);
      let c = 0;
      for (const [k,v] of a.entries()) { c += (k === v) ? 1 : 0; if (k > 300) break; }
      if (c < 200) alertVuln(274, "entries iteration incoerente.");
      objectSpray(I);
    }],
    [275, "keys iterator cross-buffer", async (I) => {
      const a = Array.from({length: 2000}, (_,i)=>i);
      let last = -1, steps = 0;
      for (const k of a.keys()) { last = k; steps++; if (steps > 300) break; }
      if (last < 0) alertVuln(275, "keys iteration incoerente.");
      heapSpray(I);
    }],
    [276, "values iterator cross-buffer", async (I) => {
      const a = Array.from({length: 2000}, (_,i)=>i);
      let last = -1, steps = 0;
      for (const v of a.values()) { last = v; steps++; if (steps > 300) break; }
      if (last < 0) alertVuln(276, "values iteration incoerente.");
      objectSpray(I);
    }],
  ];

  for (const [num, label, fn] of methodStress) {
    tests.push(async (I) => crossBufferIsolationTest(num, label, fn, I));
  }

  // 277: Allocation pattern isolation
  tests.push(async (I) => crossBufferIsolationTest(277, "Allocation pattern isolation", async (intensity) => {
    makeHoles(intensity);
    heapSpray(intensity);
  }, I));

  // 278: Heap spray isolation check
  tests.push(async (I) => crossBufferIsolationTest(278, "Heap spray isolation", async (intensity) => {
    heapSpray(intensity * 2);
  }, I));

  // 279: Buffer reuse contamination check
  tests.push(async (I) => crossBufferIsolationTest(279, "Buffer reuse contamination", async (intensity) => {
    const pool = [];
    for (let i = 0; i < 200 * intensity; i++) pool.push(new ArrayBuffer(0x400));
    for (let i = 0; i < pool.length; i += 3) pool[i] = null;
    for (let i = 0; i < 200 * intensity; i++) pool.push(new ArrayBuffer(0x400));
  }, I));

  // 280: DataView ops cross-buffer
  tests.push(async (I) => crossBufferIsolationTest(280, "DataView operations cross-buffer", async (intensity) => {
    const ab = new ArrayBuffer(4096);
    const dv = new DataView(ab);
    for (let i = 0; i < 512; i++) dv.setUint32(i * 4, (0x11223344 ^ i) >>> 0, true);
    for (let i = 0; i < 16; i++) dv.getUint32(i * 4, true);
    heapSpray(intensity);
  }, I));

  // 281: SharedArrayBuffer cross-buffer (skip if unsupported)
  tests.push(async () => {
    if (typeof SharedArrayBuffer !== "function") return;
    const sab = new SharedArrayBuffer(1024);
    const u8 = new Uint8Array(sab);
    u8[0] = 1;
    if (u8[0] !== 1) alertVuln(281, "SharedArrayBuffer basic failed (incoerente).");
  });

  // 282: Atomics cross-buffer (skip if unsupported)
  tests.push(async () => {
    if (typeof Atomics !== "object" || typeof SharedArrayBuffer !== "function") return;
    const sab = new SharedArrayBuffer(1024);
    const ia = new Int32Array(sab);
    Atomics.store(ia, 0, 123);
    const v = Atomics.load(ia, 0);
    if (v !== 123) alertVuln(282, "Atomics load/store incoerente.");
  });

  // 283: BigInt64Array cross-buffer (skip if unsupported)
  tests.push(async () => {
    if (typeof BigInt64Array !== "function") return;
    const ab = new ArrayBuffer(64);
    const bi = new BigInt64Array(ab);
    bi[0] = 1n;
    if (bi[0] !== 1n) alertVuln(283, "BigInt64Array incoerente.");
  });

  // 284: Resizable ArrayBuffer cross-buffer (skip if unsupported)
  tests.push(async () => {
    // PS4/old WebKit typically doesn't support resizable buffers; do not false-alert.
    // If it exists, verify shrink -> access throws consistently.
    if (typeof ArrayBuffer !== "function") return;
    // feature probe: new ArrayBuffer(length, {maxByteLength}) is nonstandard in many engines
    let rab;
    try { rab = new ArrayBuffer(1024, { maxByteLength: 2048 }); } catch (_) { return; }
    const u8 = new Uint8Array(rab);
    u8[0] = 0xAA;
    let shrunk = false;
    try { rab.resize(16); shrunk = true; } catch (_) { return; }
    if (!shrunk) return;

    // After shrink, reading beyond new length should throw in DataView, and typed views should reflect new length
    const dv = new DataView(rab);
    let threw = false;
    try { dv.getUint32(32, true); } catch (_) { threw = true; }
    if (!threw) alertVuln(284, "Resizable AB: DataView read beyond after shrink did NOT throw (suspeito).");
  });

  // 285: Cross-type views cross-buffer
  tests.push(async (I) => crossBufferIsolationTest(285, "Cross-type views cross-buffer", async (intensity) => {
    const ab = new ArrayBuffer(4096);
    const u8 = new Uint8Array(ab);
    const u32 = new Uint32Array(ab);
    u32[0] = 0x12345678;
    if (!(u8[0] === 0x78 || u8[0] === 0x12)) {
      // endian dependent, but should be one of them
      alertVuln(285, "Cross-type view endian incoerente.", { u8_0: u8[0] });
    }
    heapSpray(intensity);
  }, I));

  // 286: Uint8ClampedArray cross-buffer
  tests.push(async (I) => crossBufferIsolationTest(286, "Uint8ClampedArray cross-buffer", async (intensity) => {
    if (typeof Uint8ClampedArray !== "function") return;
    const ab = new ArrayBuffer(64);
    const c = new Uint8ClampedArray(ab);
    c[0] = 300; // should clamp to 255
    if (c[0] !== 255) alertVuln(286, "Clamping falhou.", { got: c[0] });
    objectSpray(intensity);
  }, I));

  // 287: Int8Array cross-buffer
  tests.push(async (I) => crossBufferIsolationTest(287, "Int8Array wrap cross-buffer", async (intensity) => {
    const ab = new ArrayBuffer(16);
    const i8 = new Int8Array(ab);
    i8[0] = 128; // wraps to -128
    if (i8[0] !== -128) alertVuln(287, "Int8 wrap falhou.", { got: i8[0] });
    heapSpray(intensity);
  }, I));

  // 288: Massive allocation isolation (bounded)
  tests.push(async (I) => crossBufferIsolationTest(288, "Massive allocation isolation", async (intensity) => {
    // avoid kernel panic / DoS: keep bounded
    const mb = 8 * intensity; // 8..40 MB
    const buffers = [];
    for (let i = 0; i < mb; i++) {
      try { buffers.push(new ArrayBuffer(1024 * 1024)); } catch (_) { break; }
    }
    void buffers;
  }, I));

  // 289: Sequential operations isolation
  tests.push(async (I) => crossBufferIsolationTest(289, "Sequential ops isolation", async (intensity) => {
    const a = new Uint8Array(1024 * 32);
    a.fill(0x11);
    a.copyWithin(100, 0, 4000);
    a.fill(0x22, 2000, 6000);
    const b = a.slice(1000, 9000);
    b.reverse?.();
    await microtaskChurn(200 * intensity);
  }, I));

  // 290: Nested subarrays cross-buffer (negative + nested)
  tests.push(async () => {
    const ab = new ArrayBuffer(512);
    const ta = new Uint8Array(ab);
    for (let i = 0; i < ta.length; i++) ta[i] = i & 0xFF;

    const s1 = ta.subarray(-200);
    const s2 = s1.subarray(-100, -10);
    const exp = expectedSubarrayRange(ta.length, ta.length - 200 - 100, ta.length - 200 - 10);

    if (s2.length !== exp.length) {
      alertVuln(290, "Nested negative subarray clamp mismatch.", { got: s2.length, exp: exp.length });
    }
  });

  // 291: Frozen buffer cross-check (expected exception in most engines)
  tests.push(async () => {
    const ab = new ArrayBuffer(64);
    const u8 = new Uint8Array(ab);
    let threw = false;
    try { Object.freeze(u8); } catch (_) { threw = true; }
    // no alert; freezing typed array views is commonly rejected (PS4 log shows that)
    void threw;
  });

  // 292: Sealed buffer cross-check
  tests.push(async () => {
    const ab = new ArrayBuffer(64);
    const u8 = new Uint8Array(ab);
    let threw = false;
    try { Object.seal(u8); } catch (_) { threw = true; }
    void threw;
  });

  // 293: Proxy array cross-buffer (ensure it doesn't pretend to be typed array)
  tests.push(async () => {
    const ta = new Uint8Array(8);
    const p = new Proxy(ta, {
      get(t, prop, r) { return Reflect.get(t, prop, r); }
    });
    // Basic access must be consistent; no alert unless nonsense
    if (p[0] !== 0) alertVuln(293, "Proxy typed array basic read mismatch.", { got: p[0] });
  });

  // 294: Mixed endian DataView cross-buffer (consistency)
  tests.push(async () => {
    const ab = new ArrayBuffer(8);
    const dv = new DataView(ab);
    dv.setUint32(0, 0x12345678, true);
    const le = dv.getUint32(0, true);
    const be = dv.getUint32(0, false);
    if (le !== 0x12345678 || be !== 0x78563412) {
      alertVuln(294, "Endianness inconsistente.", { le, be });
    }
  });

  // 295: toString operations cross-buffer (no corruption checks; just run)
  tests.push(async (I) => crossBufferIsolationTest(295, "toString ops cross-buffer", async (intensity) => {
    const a = new Uint32Array(2048);
    for (let i = 0; i < a.length; i++) a[i] = i;
    const s = a.toString();
    void s;
    objectSpray(intensity);
  }, I));

  // 296: join operation cross-buffer
  tests.push(async (I) => crossBufferIsolationTest(296, "join cross-buffer", async (intensity) => {
    const a = Array.from({length: 2000}, (_,i)=>i);
    const s = a.join(",");
    void s;
    heapSpray(intensity);
  }, I));

  // 297: indexOf ops cross-buffer
  tests.push(async (I) => crossBufferIsolationTest(297, "indexOf cross-buffer", async (intensity) => {
    const a = Array.from({length: 10000}, (_,i)=>i);
    const idx = a.indexOf(9001);
    if (idx !== 9001) alertVuln(297, "indexOf retornou incorreto.", { idx });
    objectSpray(intensity);
  }, I));

  // 298: includes ops cross-buffer
  tests.push(async (I) => crossBufferIsolationTest(298, "includes cross-buffer", async (intensity) => {
    const a = [1,2,NaN,4];
    if (a.includes(NaN) !== true) alertVuln(298, "includes(NaN) incoerente.");
    heapSpray(intensity);
  }, I));

  // 299: forEach cross-buffer
  tests.push(async (I) => crossBufferIsolationTest(299, "forEach cross-buffer", async (intensity) => {
    const a = Array.from({length: 8000}, (_,i)=>i);
    let s = 0;
    a.forEach(v => { s += v; });
    void s;
    objectSpray(intensity);
  }, I));

  // 300: COMPREHENSIVE STRESS TEST (bounded + strong invariants)
  tests.push(async (I) => {
    // combined: detach consistency + negative subarray clamp + OOR write no-op + cross-buffer snapshot
    checkDetachConsistency(300, 5);
    checkNegativeSubarrayClamp(300);
    checkTypedArrayOORWriteNoop(300);

    await crossBufferIsolationTest(300, "Comprehensive stress (bounded)", async (intensity) => {
      makeHoles(intensity);
      heapSpray(intensity);
      objectSpray(intensity);
      await microtaskChurn(300 * intensity);
    }, I);
  });

  // sanity: ensure we have exactly 50 tests (251..300)
  if (tests.length !== 50) {
    logLine("INTERNAL WARN: expected 50 tests, got " + tests.length);
  }

  // =========================
  // Runner
  // =========================
  function withTimeout(promise, ms) {
    let t;
    const timeout = new Promise((_, rej) => {
      t = setTimeout(() => rej(new Error("TIMEOUT")), ms);
    });
    return Promise.race([promise.finally(() => clearTimeout(t)), timeout]);
  }

  async function runAll() {
    STOP = false;
    RUN_ID++;
    const runId = RUN_ID;

    const delayMs = Math.max(0, parseInt(document.getElementById("delayMs").value || "0", 10));
    const timeoutMs = Math.max(100, parseInt(document.getElementById("timeoutMs").value || "1200", 10));
    const intensity = Math.min(5, Math.max(1, parseInt(document.getElementById("intensity").value || "3", 10)));

    logLine("============================================================");
    logLine("Run ALL :: 50 tests (251..300)");
    logLine("============================================================");

    for (let i = 0; i < tests.length; i++) {
      if (STOP || runId !== RUN_ID) break;

      const testNum = 251 + i;
      try {
        const p = Promise.resolve(tests[i](intensity));
        await withTimeout(p, timeoutMs);
      } catch (e) {
        // Exceptions alone are not corruption; only alert if "impossible" patterns were detected by invariants.
        // So we just keep quiet here to avoid false positives.
      }

      if (delayMs) {
        await new Promise(r => setTimeout(r, delayMs));
      }
    }

    logLine("ALL DONE.");
  }

  // Wire UI
  document.getElementById("btnReset").onclick = resetLog;
  document.getElementById("btnStop").onclick = stopNow;
  document.getElementById("btnRunAll").onclick = runAll;

  // init
  resetLog();
})();
</script>
</body>
</html>
