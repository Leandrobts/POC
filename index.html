<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>PS4 WebKit – TRIAGE V2 (10 testes) Media/CSS/DOM</title>
<style>
  body { background:#000; color:#0f0; font-family:monospace; }
  button, input { margin:4px; font-size:14px; }
  #log { white-space:pre-wrap; font-size:12px; line-height:1.25; }
  .row { margin:8px 0; }
  .box { width:240px; height:140px; background:#300; margin:8px 0; }
</style>
</head>
<body>
<h2>PS4 WebKit – Memory Corruption TRIAGE V2 (10 testes)</h2>

<div class="row">
  <button onclick="runOne(1)">Test 1</button>
  <button onclick="runOne(2)">Test 2</button>
  <button onclick="runOne(3)">Test 3</button>
  <button onclick="runOne(4)">Test 4</button>
  <button onclick="runOne(5)">Test 5</button>
  <button onclick="runOne(6)">Test 6</button>
  <button onclick="runOne(7)">Test 7</button>
  <button onclick="runOne(8)">Test 8</button>
  <button onclick="runOne(9)">Test 9</button>
  <button onclick="runOne(10)">Test 10</button>
</div>

<div class="row">
  <button onclick="runAll()">Run ALL (1..10)</button>
  <button onclick="clearLog()">Clear</button>
  <label style="margin-left:10px;">Loop N:
    <input id="loopN" type="number" value="1" min="1" max="50" style="width:70px;">
  </label>
</div>

<pre id="log"></pre>

<script>
const logEl = document.getElementById("log");
function ts(){ return new Date().toISOString(); }
function log(m){ logEl.textContent += `[${ts()}] ${m}\n`; }
function clearLog(){ logEl.textContent=""; }

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

async function runOne(n){
  log(`\n=== TEST ${n} START ===`);
  try{
    await tests[n]();
  }catch(e){
    log(`[EXC] ${e && e.message ? e.message : e}`);
  }
  log(`=== TEST ${n} END ===`);
}

async function runAll(){
  const N = Math.max(1, Math.min(50, parseInt(document.getElementById("loopN").value||"1",10)));
  log(`\n=== RUN ALL START loopN=${N} ===`);
  for(let k=1;k<=N;k++){
    log(`\n--- LOOP ${k}/${N} ---`);
    for(let i=1;i<=10;i++){
      await runOne(i);
      await sleep(40);
    }
  }
  log(`\n=== RUN ALL END ===`);
}

/* =========================================================
   Helper: cria/remonta container para reduzir interferência
   ========================================================= */
function freshRoot(){
  let old=document.getElementById("root");
  if(old) old.remove();
  let r=document.createElement("div");
  r.id="root";
  document.body.appendChild(r);
  return r;
}

/* =========================================================
   10 TESTES
   ========================================================= */
const tests = {
  1: async function(){ // Media: rapid src swap + remove + load()
    const root=freshRoot();
    const v=document.createElement("video");
    root.appendChild(v);
    v.onloadedmetadata=()=>log("[video] loadedmetadata");
    v.onerror=()=>log("[video] error");
    log("[phase] set src then load()");
    v.src = "data:video/mp4;base64,"; // inválido de propósito
    try { v.load(); log("[phase] load() OK"); } catch(e){ log("[phase] load() EXC"); }
    await sleep(10);
    log("[phase] swap src rapidly");
    v.src = "";
    try { v.load(); log("[phase] load()2 OK"); } catch(e){ log("[phase] load()2 EXC"); }
    await sleep(10);
    log("[phase] remove during pending events");
    v.remove();
    // acesso pós-remove (não é prova sozinho, mas bom para pegar UAF real se houver)
    try { log(`[post] readyState=${v.readyState} networkState=${v.networkState}`); } catch(e){ log("[post] access EXC"); }
    await sleep(30);
  },

  2: async function(){ // Media: create/remove many <track> nodes quickly
    const root=freshRoot();
    const v=document.createElement("video");
    root.appendChild(v);
    log("[phase] add/remove tracks in burst");
    for(let i=0;i<60;i++){
      const tr=document.createElement("track");
      tr.kind="subtitles";
      tr.label="x"+i;
      v.appendChild(tr);
      if((i&1)===0) tr.remove();
      if(i%10===0) await sleep(1);
    }
    log("[phase] remove video");
    v.remove();
    await sleep(20);
  },

  3: async function(){ // CSS: filter+transform + detach/reattach around rAF
    const root=freshRoot();
    const d=document.createElement("div");
    d.className="box";
    d.textContent="CSS box";
    root.appendChild(d);

    await new Promise(resolve=>{
      requestAnimationFrame(()=>{
        log("[phase] apply heavy-ish styles");
        d.style.filter="blur(6px)";
        d.style.transform="translateZ(0) scale(1.01) rotate(0.01deg)";
        d.style.willChange="transform, filter";
        requestAnimationFrame(()=>{
          log("[phase] detach then reattach before reading layout");
          d.remove();
          root.appendChild(d);
          try{
            const r=d.getBoundingClientRect();
            log(`[post] rect w=${r.width} h=${r.height}`);
          }catch(e){
            log("[post] getBoundingClientRect EXC");
          }
          resolve();
        });
      });
    });
    await sleep(20);
  },

  4: async function(){ // CSS/Layout: forced reflow loop + remove mid-loop
    const root=freshRoot();
    const d=document.createElement("div");
    d.className="box";
    root.appendChild(d);

    log("[phase] reflow storm (bounded)");
    for(let i=0;i<120;i++){
      d.style.width = (200 + (i%30)) + "px";
      // força layout:
      try { d.offsetHeight; } catch(e){ log("[offsetHeight EXC]"); }
      if(i===60){
        log("[phase] remove at midpoint");
        d.remove();
      }
      if(i%25===0) await sleep(1);
    }
    // pós-remove
    try{ log("[post] offsetHeight="+d.offsetHeight); }catch(e){ log("[post] offsetHeight EXC"); }
    await sleep(20);
  },

  5: async function(){ // DOM: MutationObserver reentrancy + remove subtree
    const root=freshRoot();
    const host=document.createElement("div");
    root.appendChild(host);

    let hits=0;
    const mo=new MutationObserver((muts)=>{
      hits += muts.length;
      // reentrância: muta durante callback
      if(hits < 40){
        const s=document.createElement("span");
        s.textContent="x";
        host.appendChild(s);
        if(hits % 7 === 0 && host.firstChild) host.firstChild.remove();
      }
    });
    mo.observe(host,{childList:true,subtree:true});

    log("[phase] kick mutations then remove host while observer active");
    for(let i=0;i<10;i++){
      const p=document.createElement("p");
      p.textContent="p"+i;
      host.appendChild(p);
    }
    await sleep(5);
    host.remove(); // remove durante observer ainda vivo
    await sleep(10);
    mo.disconnect();
    log("[post] observer hits="+hits);
  },

  6: async function(){ // DOM: Range/Selection + node removal
    const root=freshRoot();
    const p=document.createElement("p");
    p.textContent="ABCDEFGHIJ0123456789KLMNOPQRST";
    root.appendChild(p);

    const range=document.createRange();
    range.setStart(p.firstChild, 2);
    range.setEnd(p.firstChild, 10);

    log("[phase] remove text node then use range");
    const tn=p.firstChild;
    tn.remove();

    try{
      const frag=range.cloneContents();
      log("[post] cloneContents childNodes="+frag.childNodes.length);
    }catch(e){
      log("[post] range.cloneContents EXC");
    }
    await sleep(20);
  },

  7: async function(){ // SVG: animate + remove during begin
    const root=freshRoot();
    const svgNS="http://www.w3.org/2000/svg";
    const svg=document.createElementNS(svgNS,"svg");
    svg.setAttribute("width","300");
    svg.setAttribute("height","120");
    const rect=document.createElementNS(svgNS,"rect");
    rect.setAttribute("x","0"); rect.setAttribute("y","10");
    rect.setAttribute("width","50"); rect.setAttribute("height","50");
    rect.setAttribute("fill","red");
    const anim=document.createElementNS(svgNS,"animate");
    anim.setAttribute("attributeName","x");
    anim.setAttribute("from","0");
    anim.setAttribute("to","240");
    anim.setAttribute("dur","0.05s");
    anim.setAttribute("repeatCount","1");
    rect.appendChild(anim);
    svg.appendChild(rect);
    root.appendChild(svg);

    log("[phase] start SVG animate then remove rect immediately");
    try{ anim.beginElement(); log("[phase] beginElement OK"); }catch(e){ log("[phase] beginElement EXC"); }
    rect.remove();
    // tenta acessar bbox (pode tocar layout interno)
    try{
      const bb=rect.getBBox();
      log(`[post] getBBox w=${bb.width} h=${bb.height}`);
    }catch(e){
      log("[post] getBBox EXC");
    }
    await sleep(30);
  },

  8: async function(){ // Iframe: set srcdoc, mutate, remove during load-ish
    const root=freshRoot();
    const f=document.createElement("iframe");
    f.style.width="320px";
    f.style.height="160px";
    root.appendChild(f);

    log("[phase] set srcdoc");
    f.srcdoc = "<!doctype html><meta charset=utf-8><body><div id=a>hi</div><script>setTimeout(()=>{document.getElementById('a').textContent='ok';},1)<\/script></body>";
    await sleep(10);

    log("[phase] remove iframe then try access contentWindow");
    f.remove();
    try{
      const w=f.contentWindow;
      log("[post] contentWindow is "+(w? "present":"null"));
    }catch(e){
      log("[post] contentWindow EXC");
    }
    await sleep(30);
  },

  9: async function(){ // Canvas: resize + context use after detach
    const root=freshRoot();
    const c=document.createElement("canvas");
    c.width=320; c.height=180;
    root.appendChild(c);

    const ctx=c.getContext("2d");
    log("[phase] draw + resize loop then remove canvas mid-loop");
    for(let i=0;i<80;i++){
      try{
        ctx.fillRect(i%50, i%40, 20, 10);
      }catch(e){
        log("[ctx fillRect EXC]");
      }
      if(i===40){
        c.remove();
        log("[phase] canvas removed");
      }
      if(i%10===0){
        c.width = 320 + (i%3);
        c.height = 180 + (i%3);
      }
      if(i%20===0) await sleep(1);
    }
    // pós-remove ainda tentando usar ctx
    try{ ctx.getImageData(0,0,1,1); log("[post] getImageData OK"); }catch(e){ log("[post] getImageData EXC"); }
    await sleep(20);
  },

  10: async function(){ // DOM: event dispatch on detached subtree + reattach during handler
    const root=freshRoot();
    const wrap=document.createElement("div");
    const btn=document.createElement("button");
    btn.textContent="B";
    wrap.appendChild(btn);
    root.appendChild(wrap);

    btn.addEventListener("click", ()=>{
      log("[handler] click: detach+reattach wrap");
      wrap.remove();
      root.appendChild(wrap);
      // força layout no meio do handler
      try{ wrap.offsetHeight; log("[handler] offsetHeight OK"); }catch(e){ log("[handler] offsetHeight EXC"); }
    }, {capture:true});

    log("[phase] dispatch click then remove root immediately");
    btn.click();
    root.remove();
    // pós-remove
    try{ btn.click(); log("[post] click again OK"); }catch(e){ log("[post] click EXC"); }
    await sleep(20);
  },
};
</script>
</body>
</html>
