            const view = new Uint32Array(victimBuffer);

                if (view[i] !== expectedSentinel) {
                    return {corrupted: true, index: i, value: view[i]};
                }
            }
            return {corrupted: false};
        }

            return arrayBuffer.byteLength === 0;

            try {

            } catch(e) {
                return true;
            }
        }

            for (let i = 0; i < expectedBytes.length; i++) {
                if (view[byteOffset + i] !== expectedBytes[i]) {
                    return false;
                }
            }
            return true;
