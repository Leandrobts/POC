
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PS4 PoCs — TypedArray Index Invariant + MessageChannel Drop</title>
</head>
<body>
  <h2>PS4 PoCs (no exploitation) — cada botão roda um cenário</h2>

  <div>
    <button id="btnReset">Reset log</button>
  </div>

  <hr>

  <h3>AB descriptor audit (não é “bug” por default)</h3>
  <button id="btnABDesc">POC: ArrayBuffer.prototype.byteLength descriptor audit</button>

  <hr>

  <h3>TypedArray index “configurable:true” (A/B/C/D)</h3>
  <button id="btnTA_A">POC A: Object.defineProperty em ta[0]</button>
  <button id="btnTA_B">POC B: Reflect.defineProperty em ta[0]</button>
  <button id="btnTA_C">POC C: Proxy invariants (defineProperty/getOwnPropertyDescriptor)</button>
  <button id="btnTA_D">POC D: Cross-realm (iframe) reproduce</button>

  <hr>

  <h3>MessageChannel transfer drop (T8)</h3>
  <div>
    N: <input id="mcN" type="number" value="30" min="1" step="1">
    Delay(ms): <input id="mcDelay" type="number" value="50" min="0" step="10">
    Timeout(ms): <input id="mcTimeout" type="number" value="1200" min="100" step="50">
  </div>
  <button id="btnMC">POC: MessageChannel transfer drop detector</button>

  <hr>

  <pre id="log" style="white-space:pre-wrap;"></pre>

<script>
(function(){
  "use strict";

  var $log = document.getElementById("log");

  function ts(){ return Date.now(); }
  function logLine(s){ $log.textContent += "["+ts()+"] " + s + "\n"; }
  function resetLog(){ $log.textContent = ""; logLine("Reset."); }

  function safeJson(x){
    try { return JSON.stringify(x, null, 2); }
    catch(e){ return String(x); }
  }

  function banner(title){
    logLine("============================================================");
    logLine(title);
    logLine("============================================================");
  }

  function alertBox(title, obj){
    var msg = title + "\n" + safeJson(obj);
    logLine("ALERTA: " + title + " " + safeJson(obj));
    try { alert(msg); } catch(_){}
  }

  // -------------------------
  // Victim checksum (cross-buffer corruption evidence)
  // -------------------------
  function xorshift32(seed){
    var x = seed >>> 0;
    return function(){
      x ^= (x << 13) >>> 0;
      x ^= (x >>> 17) >>> 0;
      x ^= (x << 5) >>> 0;
      return x >>> 0;
    };
  }

  function fillVictim(u8, seed){
    var rnd = xorshift32(seed);
    for (var i=0;i<u8.length;i++){
      var r = rnd();
      u8[i] = (r ^ (r>>>8) ^ (r>>>16) ^ (r>>>24)) & 0xFF;
    }
  }

  function blockXor32(u8, blockBytes){
    var nBlocks = Math.ceil(u8.length / blockBytes);
    var out = new Uint32Array(nBlocks);
    var dv = new DataView(u8.buffer, u8.byteOffset, u8.byteLength);

    for (var b=0;b<nBlocks;b++){
      var start = b*blockBytes;
      var end = Math.min(u8.length, start + blockBytes);
      var acc = 0 >>> 0;

      var i = start;
      for (; i + 4 <= end; i += 4) acc ^= dv.getUint32(i, true);
      for (; i < end; i++) acc ^= (u8[i] << (((i - start) & 3) * 8)) >>> 0;

      out[b] = acc >>> 0;
    }
    return out;
  }

  function snapshotVictim(u8, blockBytes){
    return {
      len: u8.length,
      blockBytes: blockBytes,
      sum: blockXor32(u8, blockBytes)
    };
  }

  function compareSnapshot(u8, snap){
    if (u8.length !== snap.len) return { ok:false, reason:"len changed", gotLen:u8.length, expLen:snap.len };
    var now = blockXor32(u8, snap.blockBytes);
    if (now.length !== snap.sum.length) return { ok:false, reason:"blocks len mismatch" };
    for (var i=0;i<now.length;i++){
      if (now[i] !== snap.sum[i]){
        return { ok:false, reason:"checksum mismatch", blockIndex:i, exp:(snap.sum[i]>>>0), got:(now[i]>>>0) };
      }
    }
    return { ok:true };
  }

  function withVictim(runFn, label){
    // 64KB victim, isolate from PoC allocations as much as possible
    var victimAB = new ArrayBuffer(64*1024);
    var victimU8 = new Uint8Array(victimAB);
    fillVictim(victimU8, (0xC0FFEE00 ^ (Date.now() & 0xffffffff)) >>> 0);
    var snap = snapshotVictim(victimU8, 256);

    var out = null;
    try { out = runFn(); }
    catch(e){ out = { threw:true, err:(e && e.name) ? e.name : "ERR" }; }

    var cmp = compareSnapshot(victimU8, snap);
    if (!cmp.ok){
      alertBox("EVIDÊNCIA DE CORRUPÇÃO (victim cross-buffer mudou): " + label, { cmp: cmp, result: out });
    } else {
      logLine("Victim integrity OK: " + label);
    }
    return out;
  }

  // -------------------------
  // Helpers
  // -------------------------
  function getDesc(obj, prop){
    try { return Object.getOwnPropertyDescriptor(obj, prop); }
    catch(e){ return "THREW:" + ((e && e.name) ? e.name : "ERR"); }
  }

  function getProtoDesc(proto, prop){
    try { return Object.getOwnPropertyDescriptor(proto, prop); }
    catch(e){ return "THREW:" + ((e && e.name) ? e.name : "ERR"); }
  }

  function makeIframe(){
    var f = document.createElement("iframe");
    f.style.display = "none";
    document.body.appendChild(f);
    return f;
  }
  function removeIframe(f){
    try { f.parentNode.removeChild(f); } catch(_){}
  }

  // -------------------------
  // POC: ArrayBuffer.prototype.byteLength audit
  // -------------------------
  function pocABDesc(){
    banner("POC: ArrayBuffer.prototype.byteLength descriptor audit");

    var desc = getProtoDesc(ArrayBuffer.prototype, "byteLength");
    logLine("Descriptor(ArrayBuffer.prototype.byteLength) = " + safeJson(desc));

    // Não chamar de bug só por configurable=true.
    // O spec define como accessor e detached => +0.
    var ab = new ArrayBuffer(16);
    var before = ab.byteLength;

    // Best-effort detach: MessageChannel/structuredClone/postMessage variam por engine.
    var detachedAttempted = false;
    try {
      if (typeof MessageChannel === "function"){
        var ch = new MessageChannel();
        ch.port1.postMessage(ab, [ab]);
        detachedAttempted = true;
      }
    } catch(_){}
    var after = ab.byteLength;

    logLine("Sample: beforeLen=" + before + " afterLen=" + after + " detachedAttempted=" + detachedAttempted);
    if (detachedAttempted && after !== 0 && after !== before){
      alertBox("AB.byteLength em estado estranho (nem 0 nem original)", { before: before, after: after });
    }
  }

  // -------------------------
  // TypedArray index invariant PoCs (A/B/C/D)
  // -------------------------
  function coreTAExperiment(mode){
    var ta = new Uint8Array(4);
    ta[0] = 7;

    var baseline = getDesc(ta, "0");
    logLine("Initial ta[0]=" + ta[0] + " baselineOwnDesc=" + safeJson(baseline));

    var defineRes = { ok:null, threw:false, err:null, desc:null };

    try {
      var d = { value: 9, writable: true, enumerable: true, configurable: true };
      if (mode === "A"){
        Object.defineProperty(ta, "0", d);
        defineRes.ok = true;
      } else if (mode === "B"){
        defineRes.ok = Reflect.defineProperty(ta, "0", d);
      } else if (mode === "C"){
        // via Proxy wrapper to stress invariant enforcement
        var p = new Proxy(ta, {});
        defineRes.ok = Reflect.defineProperty(p, "0", d);
      } else {
        // mode D handled elsewhere
      }
    } catch(e){
      defineRes.threw = true;
      defineRes.err = (e && e.name) ? e.name : "ERR";
    }

    defineRes.desc = getDesc(ta, "0");
    logLine("defineProperty result = " + safeJson(defineRes));
    logLine("After defineProperty ta[0] = " + ta[0]);

    // Try write & delete behaviors
    var afterWrite = null, del1 = null, del2 = null, descNow = null;
    try { ta[0] = 0x33; afterWrite = ta[0]; } catch(e){ afterWrite = "THREW:" + ((e && e.name) ? e.name : "ERR"); }
    try { del1 = delete ta[0]; } catch(e){ del1 = "THREW:" + ((e && e.name) ? e.name : "ERR"); }
    try { del2 = Reflect.deleteProperty(ta, "0"); } catch(e){ del2 = "THREW:" + ((e && e.name) ? e.name : "ERR"); }
    descNow = getDesc(ta, "0");

    var keys = null;
    try { keys = Reflect.ownKeys(ta); } catch(e){ keys = "THREW:" + ((e && e.name) ? e.name : "ERR"); }

    var out = {
      baselineOwnDesc: baseline,
      defineRes: defineRes,
      afterWrite: afterWrite,
      delete1: del1,
      delete2: del2,
      descNow: descNow,
      ownKeys: keys
    };

    logLine("After ta[0]=0x33 / deletes / keys => " + safeJson(out));

    // "Impossible" condition we care about:
    // - configurable:true on an integer index descriptor (very suspicious per spec rules).
    var cfg = null;
    try { cfg = !!(descNow && descNow.configurable); } catch(_){ cfg = null; }
    if (cfg === true){
      alertBox("TA index descriptor ficou configurable:true (suspeito / spec-violation)", out);
    }
    return out;
  }

  function pocTA_A(){
    banner("POC A: Object.defineProperty em ta[0]");
    withVictim(function(){ return coreTAExperiment("A"); }, "TA_A");
  }

  function pocTA_B(){
    banner("POC B: Reflect.defineProperty em ta[0]");
    withVictim(function(){ return coreTAExperiment("B"); }, "TA_B");
  }

  function pocTA_C(){
    banner("POC C: Proxy invariants (defineProperty via Proxy wrapper)");
    withVictim(function(){ return coreTAExperiment("C"); }, "TA_C");
  }

  function pocTA_D(){
    banner("POC D: Cross-realm iframe reproduce");
    withVictim(function(){
      var f = makeIframe();
      var w = f.contentWindow;
      var out = { ok:false, threw:false, err:null, desc:null, ta0:null };

      try {
        var TA = w.Uint8Array;
        var ta = new TA(4);
        ta[0] = 7;
        out.ok = Reflect.defineProperty(ta, "0", { value: 9, writable:true, enumerable:true, configurable:true });
        out.desc = w.Object.getOwnPropertyDescriptor(ta, "0");
        out.ta0 = ta[0];
      } catch(e){
        out.threw = true;
        out.err = (e && e.name) ? e.name : "ERR";
      }

      removeIframe(f);
      logLine("iframe result => " + safeJson(out));

      if (out.desc && out.desc.configurable === true){
        alertBox("Cross-realm: TA index configurable:true reproduzido", out);
      }
      return out;
    }, "TA_D");
  }

  // -------------------------
  // POC: MessageChannel transfer drop (T8)
  // -------------------------
  function wait(ms){ return new Promise(function(r){ setTimeout(r, ms); }); }

  function withTimeout(p, ms){
    return new Promise(function(resolve, reject){
      var t = setTimeout(function(){ reject(new Error("TIMEOUT")); }, ms);
      p.then(function(v){ clearTimeout(t); resolve(v); }, function(e){ clearTimeout(t); reject(e); });
    });
  }

  function pocMC(){
    banner("POC: MessageChannel transfer drop detector (T8)");

    if (typeof MessageChannel !== "function"){
      logLine("MessageChannel não disponível.");
      return;
    }

    var N = Math.max(1, parseInt(document.getElementById("mcN").value || "30", 10));
    var delayMs = Math.max(0, parseInt(document.getElementById("mcDelay").value || "50", 10));
    var timeoutMs = Math.max(100, parseInt(document.getElementById("mcTimeout").value || "1200", 10));

    logLine("Config :: N=" + N + " delayMs=" + delayMs + " timeoutMs=" + timeoutMs);

    withVictim(function(){
      var state = {
        ok_detach: 0,
        ok_clone: 0,
        transfer_throw: 0,
        drops_detach_path: 0,
        senderlen_impossible: 0,
        other: 0
      };

      var i = 0;

      function one(){
        return new Promise(function(resolve){
          var ch = new MessageChannel();
          var ab = new ArrayBuffer(4096);
          var u8 = new Uint8Array(ab);
          u8[0] = 0xAA;

          var got = undefined;
          ch.port2.onmessage = function(ev){ got = ev.data; };

          var threw = false;
          try { ch.port1.postMessage(ab, [ab]); }
          catch(e){ threw = true; }

          if (threw){
            state.transfer_throw++;
            return resolve();
          }

          // give event loop a chance
          setTimeout(function(){
            var senderLen = ab.byteLength;

            if (senderLen !== 0 && senderLen !== 4096){
              state.senderlen_impossible++;
              return resolve();
            }

            if (senderLen === 0){
              // detach path: receiver must exist and be readable
              if (!got){
                state.drops_detach_path++;
                return resolve();
              }
              try {
                var r8 = (Object.prototype.toString.call(got) === "[object ArrayBuffer]") ? new Uint8Array(got) :
                         (got && got.buffer ? new Uint8Array(got.buffer) : null);
                if (!r8 || r8.length !== 4096 || r8[0] !== 0xAA){
                  state.other++;
                } else {
                  state.ok_detach++;
                }
              } catch(_){
                state.other++;
              }
              return resolve();
            }

            if (senderLen === 4096){
              // clone path (best-effort): if got exists, must not alias.
              if (!got){
                state.ok_clone++;
                return resolve();
              }
              try {
                var r8c = (Object.prototype.toString.call(got) === "[object ArrayBuffer]") ? new Uint8Array(got) :
                          (got && got.buffer ? new Uint8Array(got.buffer) : null);
                if (!r8c){ state.ok_clone++; return resolve(); }
                var before = r8c[0];
                u8[0] = 0xBB;
                var after = r8c[0];
                if (before !== after){
                  state.other++;
                } else {
                  state.ok_clone++;
                }
              } catch(_){
                state.ok_clone++;
              }
              return resolve();
            }

            resolve();
          }, 0);
        });
      }

      function loop(){
        if (i >= N) return Promise.resolve();
        i++;
        var p = one();
        return withTimeout(p, timeoutMs).catch(function(){ state.other++; }).then(function(){
          if (!delayMs) return loop();
          return wait(delayMs).then(loop);
        });
      }

      return loop().then(function(){
        logLine("RESULTADOS: " + safeJson(state));
        if (state.drops_detach_path > 0){
          alertBox("MessageChannel: sender detached mas receiver veio undefined (DROP) — evidência de inconsistência", state);
        }
        return state;
      });
    }, "MC_T8");
  }

  // -------------------------
  // Wire UI
  // -------------------------
  document.getElementById("btnReset").onclick = resetLog;

  document.getElementById("btnABDesc").onclick = function(){
    banner("RUN :: AB descriptor audit");
    withVictim(function(){ return pocABDesc(); }, "ABDesc");
  };

  document.getElementById("btnTA_A").onclick = pocTA_A;
  document.getElementById("btnTA_B").onclick = pocTA_B;
  document.getElementById("btnTA_C").onclick = pocTA_C;
  document.getElementById("btnTA_D").onclick = pocTA_D;

  document.getElementById("btnMC").onclick = pocMC;

  resetLog();
})();
</script>
</body>
</html>
