<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>PS4 Memory Corruption Tests (401-450) - Basic</title>
</head>
<body>
  <h1>PS4 Memory Corruption Tests (401–450) — Basic (no CSS)</h1>

  <div>
    <button id="btnReset">Reset log</button>
    <button id="btnRunAll">Run ALL (401..450)</button>
    <button id="btnStop">Stop</button>
  </div>

  <div>
    Delay (ms): <input id="delayMs" type="number" value="80" min="0" step="10">
    Timeout por teste (ms): <input id="timeoutMs" type="number" value="1400" min="100" step="50">
    Intensidade (1..5): <input id="intensity" type="number" value="3" min="1" max="5" step="1">
    Modo:
    <select id="mode">
      <option value="balanced">balanced</option>
      <option value="pressure">pressure</option>
      <option value="teardown">teardown</option>
    </select>
  </div>

  <pre id="log"></pre>

<script>
(() => {
  "use strict";

  const $log = document.getElementById("log");
  let STOP = false;
  let RUN_ID = 0;

  function ts() { return Date.now(); }
  function logLine(s) { $log.textContent += `[${ts()}] ${s}\n`; }
  function resetLog() { $log.textContent = ""; logLine("Reset."); }
  function stopNow() { STOP = true; logLine("STOP requested."); }
  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  function alertVuln(testNum, msg, extraObj) {
    const extra = extraObj ? ("\n" + JSON.stringify(extraObj, null, 2)) : "";
    const full = `ALERTA TEST ${testNum}: ${msg}${extra}`;
    logLine(full);
    try { alert(full); } catch (_) {}
  }

  function withTimeout(promise, ms) {
    let t;
    const timeout = new Promise((_, rej) => { t = setTimeout(() => rej(new Error("TIMEOUT")), ms); });
    return Promise.race([promise.finally(() => clearTimeout(t)), timeout]);
  }

  // =========================
  // Victim model (strong)
  // =========================
  function xorshift32(seed) {
    let x = seed >>> 0;
    return () => {
      x ^= (x << 13) >>> 0;
      x ^= (x >>> 17) >>> 0;
      x ^= (x << 5) >>> 0;
      return x >>> 0;
    };
  }

  function fillVictim(u8, seed) {
    const rnd = xorshift32(seed);
    for (let i = 0; i < u8.length; i++) {
      const r = rnd();
      u8[i] = (r ^ (r >>> 8) ^ (r >>> 16) ^ (r >>> 24)) & 0xFF;
    }
  }

  function blockXor32(u8, blockBytes) {
    const nBlocks = Math.ceil(u8.length / blockBytes);
    const out = new Uint32Array(nBlocks);
    const dv = new DataView(u8.buffer, u8.byteOffset, u8.byteLength);

    for (let b = 0; b < nBlocks; b++) {
      const start = b * blockBytes;
      const end = Math.min(u8.length, start + blockBytes);
      let acc = 0 >>> 0;

      let i = start;
      for (; i + 4 <= end; i += 4) acc ^= dv.getUint32(i, true);
      for (; i < end; i++) acc ^= (u8[i] << (((i - start) & 3) * 8)) >>> 0;

      out[b] = acc >>> 0;
    }
    return out;
  }

  function snapshotVictim(u8, blockBytes) {
    const sum = blockXor32(u8, blockBytes);
    const spots = [];
    const step = Math.max(1, Math.floor(u8.length / 32));
    for (let i = 0; i < u8.length; i += step) spots.push(u8[i]);
    return { len: u8.length, blockBytes, sum, spots };
  }

  function compareSnapshot(u8, snap) {
    if (u8.length !== snap.len) return { ok:false, reason:"victim length changed", gotLen:u8.length, expLen:snap.len };

    const now = blockXor32(u8, snap.blockBytes);
    if (now.length !== snap.sum.length) return { ok:false, reason:"checksum blocks length mismatch", gotBlocks:now.length, expBlocks:snap.sum.length };

    for (let i = 0; i < now.length; i++) {
      if (now[i] !== snap.sum[i]) {
        const start = i * snap.blockBytes;
        const end = Math.min(u8.length, start + 32);
        const bytes = [];
        for (let j = start; j < end; j++) bytes.push(u8[j]);
        return { ok:false, reason:"checksum mismatch", blockIndex:i, exp:snap.sum[i]>>>0, got:now[i]>>>0, first32BytesOfBlock:bytes };
      }
    }

    const spots = [];
    const step = Math.max(1, Math.floor(u8.length / 32));
    for (let i = 0; i < u8.length; i += step) spots.push(u8[i]);

    for (let k = 0; k < spots.length; k++) {
      if (spots[k] !== snap.spots[k]) return { ok:false, reason:"spot sample mismatch", spotIndex:k, exp:snap.spots[k], got:spots[k] };
    }
    return { ok:true };
  }

  function makeVictim(bytes, seed) {
    const ab = new ArrayBuffer(bytes);
    const u8 = new Uint8Array(ab);
    fillVictim(u8, seed);
    return { ab, u8 };
  }

  // =========================
  // Helpers / Amplifiers (bounded)
  // =========================
  function heapSpray(intensity) {
    const count = 24 * intensity;
    const size = 0x4000;
    const arr = [];
    for (let i = 0; i < count; i++) {
      const ab = new ArrayBuffer(size);
      const u32 = new Uint32Array(ab);
      for (let j = 0; j < u32.length; j += 128) u32[j] = (0x41414141 ^ i ^ j) >>> 0;
      arr.push(ab);
    }
    return arr;
  }

  function makeHoles(intensity) {
    const holes = [];
    const n = 120 * intensity;
    for (let i = 0; i < n; i++) holes.push(new ArrayBuffer(0x180));
    for (let i = 0; i < holes.length; i += 2) holes[i] = null;
    return holes;
  }

  function objectSpray(intensity) {
    const n = 280 * intensity;
    const out = [];
    for (let i = 0; i < n; i++) {
      const o = { a:i, b:i*2, s:"x"+i };
      if ((i & 7) === 0) o.buf = new ArrayBuffer(0x80);
      out.push(o);
    }
    return out;
  }

  async function microtaskChurn(intensity) {
    let p = Promise.resolve();
    const n = 200 * intensity;
    for (let i = 0; i < n; i++) p = p.then(() => {});
    await p;
  }

  function maybePressure(mode, intensity) {
    if (mode !== "pressure") return null;
    const keep = [];
    keep.push(heapSpray(intensity));
    keep.push(makeHoles(intensity));
    keep.push(objectSpray(intensity));
    return keep;
  }

  function safeStructuredClone(obj, transferList) {
    if (typeof structuredClone !== "function") return { supported:false };
    try {
      const v = transferList ? structuredClone(obj, { transfer: transferList }) : structuredClone(obj);
      return { supported:true, value:v };
    } catch (e) {
      return { supported:true, error:(e && e.name) ? e.name : "ERR" };
    }
  }

  function expectedSubarrayRange(len, begin, end) {
    let b = begin | 0;
    let e = (end === undefined) ? len : (end | 0);

    if (b < 0) b = Math.max(len + b, 0); else b = Math.min(b, len);
    if (e < 0) e = Math.max(len + e, 0); else e = Math.min(e, len);
    if (e < b) e = b;
    return { b, e, length: e - b };
  }

  async function crossBufferIsolationTest(testNum, label, stressFn, intensity, mode) {
    const victim = makeVictim(64 * 1024, (0xC0FFEE00 ^ testNum) >>> 0);
    const snap = snapshotVictim(victim.u8, 256);

    const keep = maybePressure(mode, intensity);
    await microtaskChurn(Math.min(5, intensity));

    await stressFn(intensity, mode);

    const cmp = compareSnapshot(victim.u8, snap);
    if (!cmp.ok) alertVuln(testNum, label + ": VICTIM CORRUPTED (checksum mismatch).", cmp);

    void keep;
  }

  // =========================
  // Tests 401..450
  // =========================
  const tests = [];
  function addTest(num, name, fn) { tests.push({ num, name, fn }); }

  // 401: structuredClone transfer repeat consistency (signature of detach results stable)
  addTest(401, "structuredClone transfer repeat consistency", async () => {
    if (typeof structuredClone !== "function") return;
    const reps = 6;
    let sig0 = null;
    for (let i = 0; i < reps; i++) {
      const ab = new ArrayBuffer(2048);
      const u8 = new Uint8Array(ab);
      u8[0] = 0x5A;

      const res = safeStructuredClone(ab, [ab]);
      if (!res.supported || res.error) return;

      const senderLen = ab.byteLength;
      const recvTag = Object.prototype.toString.call(res.value);
      let recvLen = null, recv0 = null;
      try {
        const r8 = new Uint8Array(res.value);
        recvLen = r8.length;
        recv0 = r8[0];
      } catch (_) { return; }

      const sig = `senderLen=${senderLen}|recvTag=${recvTag}|recvLen=${recvLen}|recv0=${recv0}`;
      if (sig0 === null) sig0 = sig;
      else if (sig !== sig0) {
        alertVuln(401, "Transfer repeat inconsistente (assinatura mudou).", { base: sig0, got: sig });
        return;
      }
      if (senderLen !== 0) {
        alertVuln(401, "Transfer: senderLen != 0 após transfer.", { senderLen });
        return;
      }
      if (recvLen !== 2048 || recv0 !== 0x5A) {
        alertVuln(401, "Transfer: receiver payload/len inesperado.", { recvLen, recv0, recvTag });
        return;
      }
    }
  });

  // 402: typed array OOR read should be undefined (or stable) and must not mutate
  addTest(402, "TypedArray OOR read invariants (no mutation)", async () => {
    const ab = new ArrayBuffer(256);
    const ta = new Uint8Array(ab);
    for (let i = 0; i < ta.length; i++) ta[i] = i & 0xFF;
    const v = ta[999999];
    // v typically undefined; regardless, buffer must stay unchanged
    for (let i = 0; i < 16; i++) {
      if (ta[i] !== (i & 0xFF)) {
        alertVuln(402, "OOR read coincidiu com mutação (impossível).", { i, got: ta[i] });
        return;
      }
    }
    void v;
  });

  // 403: subarray clamp for extreme negatives (must equal full length)
  addTest(403, "subarray extreme clamp", async () => {
    const ta = new Uint8Array(100);
    const sub = ta.subarray(-1000000, 1000000);
    if (sub.length !== 100) alertVuln(403, "subarray clamp errado.", { gotLen: sub.length });
  });

  // 404: DataView OOR must throw or be consistent; must not write (checksum)
  addTest(404, "DataView OOR set checksum", async () => {
    const victim = makeVictim(4096, 0x404 ^ 0xC0DE);
    const snap = snapshotVictim(victim.u8, 128);
    const dv = new DataView(victim.ab);
    try { dv.setUint32(0x7fffffff, 0x11223344, true); } catch (_) {}
    const cmp = compareSnapshot(victim.u8, snap);
    if (!cmp.ok) alertVuln(404, "DataView OOR alterou victim.", cmp);
  });

  // 405: TypedArray.set with huge source length (proxy) must not corrupt victim
  addTest(405, "TypedArray.set with proxy huge length (cross-buffer)", async (intensity, mode) => {
    await crossBufferIsolationTest(405, "TA.set proxy huge length", async () => {
      const dst = new Uint8Array(256);
      const src = new Proxy({ length: 1 }, {
        get(t, p) {
          if (p === "length") return 1000000;
          if (p === "0") return 7;
          return t[p];
        }
      });
      try { dst.set(src, 0); } catch (_) {}
    }, intensity, mode);
  });

  // 406: ArrayBuffer slice must not alias (sanity)
  addTest(406, "ArrayBuffer.slice independence", async () => {
    const ab = new ArrayBuffer(64);
    const u8 = new Uint8Array(ab);
    u8[0] = 0x11;
    const ab2 = ab.slice(0);
    const v2 = new Uint8Array(ab2);
    const before = v2[0];
    u8[0] = 0x22;
    const after = v2[0];
    if (before !== after) alertVuln(406, "ArrayBuffer.slice aliasing detectado.", { before, after });
  });

  // 407: copyWithin with crazy args must not corrupt victim (cross-buffer)
  addTest(407, "copyWithin crazy args (cross-buffer)", async (intensity, mode) => {
    await crossBufferIsolationTest(407, "copyWithin crazy args", async () => {
      const ta = new Uint8Array(1024);
      ta.copyWithin(-99999, 0, 99999);
      ta.copyWithin(0, -99999, -1);
    }, intensity, mode);
  });

  // 408: fill with proxy valueOf + allocations (cross-buffer)
  addTest(408, "Array.fill proxy valueOf (cross-buffer)", async (intensity, mode) => {
    await crossBufferIsolationTest(408, "fill proxy valueOf", async () => {
      const a = new Array(2000);
      const v = new Proxy({ n: 7 }, {
        get(t, p) {
          if (p === "valueOf") return function() { new Uint8Array(new ArrayBuffer(4096)); return 7; };
          return t[p];
        }
      });
      a.fill(v);
    }, intensity, mode);
  });

  // 409: Map/Set toStringTag side effects (cross-buffer)
  addTest(409, "Symbol.toStringTag getter side effect (cross-buffer)", async (intensity, mode) => {
    await crossBufferIsolationTest(409, "toStringTag side effect", async () => {
      const obj = {};
      Object.defineProperty(obj, Symbol.toStringTag, { get() { new Uint8Array(new ArrayBuffer(4096)); return "X"; } });
      Object.prototype.toString.call(obj);
    }, intensity, mode);
  });

  // 410: DOMParser parse churn (if available) cross-buffer
  addTest(410, "DOMParser parse churn (cross-buffer)", async (intensity, mode) => {
    await crossBufferIsolationTest(410, "DOMParser churn", async () => {
      if (typeof DOMParser !== "function") return;
      const p = new DOMParser();
      for (let i = 0; i < 50 * intensity; i++) {
        p.parseFromString("<div><span>aa</span></div>", "text/html");
      }
    }, intensity, mode);
  });

  // 411: URL + Blob churn (if available) cross-buffer
  addTest(411, "Blob/URL churn (cross-buffer)", async (intensity, mode) => {
    await crossBufferIsolationTest(411, "Blob URL churn", async () => {
      if (typeof Blob !== "function" || !URL || typeof URL.createObjectURL !== "function") return;
      const urls = [];
      for (let i = 0; i < 20 * intensity; i++) {
        const b = new Blob([new Uint8Array(1024)]);
        const u = URL.createObjectURL(b);
        urls.push(u);
      }
      for (const u of urls) { try { URL.revokeObjectURL(u); } catch (_) {} }
    }, intensity, mode);
  });

  // 412: Promise.race churn (cross-buffer)
  addTest(412, "Promise.race churn (cross-buffer)", async (intensity, mode) => {
    await crossBufferIsolationTest(412, "Promise.race churn", async () => {
      const n = 120 * intensity;
      for (let i = 0; i < n; i++) {
        await Promise.race([Promise.resolve(i), Promise.resolve(i+1)]);
      }
    }, intensity, mode);
  });

  // 413: TypedArray.prototype.reduce with side alloc (cross-buffer)
  addTest(413, "TypedArray.reduce alloc side-effect (cross-buffer)", async (intensity, mode) => {
    await crossBufferIsolationTest(413, "TA.reduce alloc", async () => {
      const ta = new Uint8Array(4096);
      for (let i = 0; i < ta.length; i++) ta[i] = i & 0xFF;
      ta.reduce((acc, v, i) => {
        if ((i & 127) === 0) new Uint32Array(new ArrayBuffer(2048));
        return acc + v;
      }, 0);
    }, intensity, mode);
  });

  // 414: TypedArray.prototype.forEach side alloc (cross-buffer)
  addTest(414, "TypedArray.forEach alloc side-effect (cross-buffer)", async (intensity, mode) => {
    await crossBufferIsolationTest(414, "TA.forEach alloc", async () => {
      const ta = new Uint8Array(4096);
      ta.forEach((v, i) => { if ((i & 127) === 0) new Uint8Array(new ArrayBuffer(4096)); void v; });
    }, intensity, mode);
  });

  // 415: TypedArray.prototype.reverse aliasing sanity (same buffer views)
  addTest(415, "reverse aliasing sanity (same buffer views)", async () => {
    const ab = new ArrayBuffer(64);
    const a = new Uint8Array(ab);
    const b = new Uint8Array(ab);
    a[0] = 1; a[63] = 2;
    a.reverse();
    // Since b aliases, b should see changes deterministically
    if (b[0] !== 2 || b[63] !== 1) alertVuln(415, "Aliasing reverse inconsistente (mesmo buffer).", { b0: b[0], b63: b[63] });
  });

  // 416: Subarray write must stay in bounds (marker guard)
  addTest(416, "subarray write must not leak out-of-range", async () => {
    const ta = new Uint8Array(128);
    for (let i = 0; i < ta.length; i++) ta[i] = 0xAA;
    const begin = -20, end = -10;
    const exp = expectedSubarrayRange(ta.length, begin, end);
    const sub = ta.subarray(begin, end);
    if (sub.length !== exp.length) return;

    const marker = 0xCC;
    if (sub.length) sub[0] = marker;

    if (ta[exp.b] !== marker) alertVuln(416, "subarray write não refletiu no clamp esperado.", { pos: exp.b });
    if (exp.b > 0 && ta[exp.b - 1] === marker) alertVuln(416, "subarray write vazou para byte anterior.", { pos: exp.b - 1 });
    if (exp.e < ta.length && ta[exp.e] === marker) alertVuln(416, "subarray write vazou para byte posterior.", { pos: exp.e });
  });

  // 417: Frozen array-like into TypedArray.from must not corrupt victim (cross-buffer)
  addTest(417, "TypedArray.from frozen array-like (cross-buffer)", async (intensity, mode) => {
    await crossBufferIsolationTest(417, "TA.from frozen", async () => {
      const src = { length: 32 };
      for (let i = 0; i < 32; i++) src[i] = i;
      try { Object.freeze(src); } catch (_) {}
      try { Uint8Array.from(src); } catch (_) {}
    }, intensity, mode);
  });

  // 418: String.prototype.repeat huge-ish bounded (cross-buffer)
  addTest(418, "String repeat bounded (cross-buffer)", async (intensity, mode) => {
    await crossBufferIsolationTest(418, "String repeat", async () => {
      let s = "ab";
      s = s.repeat(2000 * intensity);
      s.indexOf("b");
    }, intensity, mode);
  });

  // 419: RegExp replace with function side-effect (cross-buffer)
  addTest(419, "RegExp replace callback side-effects (cross-buffer)", async (intensity, mode) => {
    await crossBufferIsolationTest(419, "RegExp replace cb", async () => {
      const re = /a/g;
      const s = "a".repeat(2000 * intensity);
      s.replace(re, () => { new Uint8Array(new ArrayBuffer(2048)); return "b"; });
    }, intensity, mode);
  });

  // 420: DOM teardown of iframes (teardown)
  addTest(420, "iframe create/remove churn (teardown)", async (intensity, mode) => {
    await crossBufferIsolationTest(420, "iframe churn", async () => {
      if (mode !== "teardown") return;
      const arr = [];
      for (let i = 0; i < 20 * intensity; i++) {
        const f = document.createElement("iframe");
        f.style.display = "none";
        document.body.appendChild(f);
        arr.push(f);
      }
      for (const f of arr) { try { f.remove(); } catch (_) {} }
    }, intensity, mode);
  });

  // 421: PostMessage clone (no transfer) must not alias (best-effort, no alert if not deliver)
  addTest(421, "postMessage clone independence (best-effort)", async () => {
    if (typeof postMessage !== "function") return;
    const ab = new ArrayBuffer(512);
    const u8 = new Uint8Array(ab);
    u8[0] = 0x11;

    let got;
    function handler(ev) { got = ev.data; }
    window.addEventListener("message", handler);

    try { postMessage(ab, "*"); } catch (_) { window.removeEventListener("message", handler); return; }
    await sleep(0);
    window.removeEventListener("message", handler);

    if (!got) return;
    const tag = Object.prototype.toString.call(got);
    if (tag !== "[object ArrayBuffer]") return;

    const r8 = new Uint8Array(got);
    const before = r8[0];
    u8[0] = 0x22;
    const after = r8[0];
    if (before !== after) alertVuln(421, "postMessage clone refletiu mutação do sender (aliasing impossível).", { before, after });
  });

  // 422-449: compact batch — pure cross-buffer stress variants
  // Each test differs in the kind of benign-but-stressful workload.
  for (let k = 422; k <= 449; k++) {
    addTest(k, "stress variant " + k + " (cross-buffer)", async (intensity, mode) => {
      await crossBufferIsolationTest(k, "stress variant " + k, async () => {
        const v = k % 7;

        if (v === 0) {
          // alloc + microtasks
          heapSpray(intensity);
          await microtaskChurn(intensity);
        } else if (v === 1) {
          // holes + churn
          makeHoles(intensity);
          await microtaskChurn(intensity);
        } else if (v === 2) {
          // object spray + stringify
          const o = objectSpray(intensity);
          try { JSON.stringify(o[0]); } catch (_) {}
        } else if (v === 3) {
          // typedarray map/filter/reduce chain
          const ta = new Uint8Array(8192);
          const m = ta.map((x, i) => (x ^ (i & 255)) & 255);
          const f = m.filter((x, i) => ((x + i) & 7) === 0);
          f.reduce((a, b) => a + b, 0);
        } else if (v === 4) {
          // dataview unaligned r/w
          const ab = new ArrayBuffer(4096);
          const dv = new DataView(ab);
          for (let off = 1; off < 64; off++) {
            dv.setUint32(off, (0x11223344 ^ off) >>> 0, true);
            dv.getUint32(off, true);
          }
        } else if (v === 5) {
          // regex + strings
          const s = ("ab".repeat(2000 * intensity));
          /b/g.test(s);
          s.replace(/a/g, "c");
        } else {
          // teardown-ish in JS objects
          const arr = [];
          for (let i = 0; i < 2000 * intensity; i++) arr.push({ i, s: "x"+i });
          arr.length = 0;
        }
      }, intensity, mode);
    });
  }

  // 450: Comprehensive victim integrity sweep (bigger victim)
  addTest(450, "Comprehensive victim integrity sweep (bigger)", async (intensity, mode) => {
    const victim = makeVictim(128 * 1024, 0x450 ^ 0xC0FFEE);
    const snap = snapshotVictim(victim.u8, 256);

    const keep = maybePressure(mode, intensity);
    await microtaskChurn(Math.min(5, intensity));

    // benign churn
    const tmp = [];
    for (let i = 0; i < 200 * intensity; i++) tmp.push(new Uint8Array(new ArrayBuffer(1024)));
    for (let i = 0; i < tmp.length; i += 3) tmp[i] = null;

    const cmp = compareSnapshot(victim.u8, snap);
    if (!cmp.ok) alertVuln(450, "Comprehensive: victim corrompido após churn benigno.", cmp);

    void keep;
  });

  // =========================
  // Runner
  // =========================
  async function runAll() {
    STOP = false;
    RUN_ID++;
    const runId = RUN_ID;

    const delayMs = Math.max(0, parseInt(document.getElementById("delayMs").value || "0", 10));
    const timeoutMs = Math.max(100, parseInt(document.getElementById("timeoutMs").value || "1400", 10));
    const intensity = Math.min(5, Math.max(1, parseInt(document.getElementById("intensity").value || "3", 10)));
    const mode = document.getElementById("mode").value;

    logLine("============================================================");
    logLine("Run ALL :: 50 tests (401..450)");
    logLine("Config :: mode=" + mode + " intensity=" + intensity + " timeout=" + timeoutMs + "ms delay=" + delayMs + "ms");
    logLine("============================================================");

    for (let i = 0; i < tests.length; i++) {
      if (STOP || runId !== RUN_ID) break;
      const t = tests[i];

      try {
        logLine("RUN :: TEST " + t.num + ": " + t.name);
        const p = Promise.resolve(t.fn(intensity, mode));
        await withTimeout(p, timeoutMs);
        logLine("DONE :: TEST " + t.num);
      } catch (e) {
        logLine("DONE :: TEST " + t.num + " (exception ignored: " + ((e && e.name) ? e.name : "ERR") + ")");
      }

      if (delayMs) await sleep(delayMs);
    }

    logLine("ALL DONE.");
  }

  document.getElementById("btnReset").onclick = resetLog;
  document.getElementById("btnStop").onclick = stopNow;
  document.getElementById("btnRunAll").onclick = runAll;

  resetLog();
})();
</script>
</body>
</html>
