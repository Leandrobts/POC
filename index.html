<!DOCTYPE html>
<meta charset="utf-8">
<title>PS4 TypedArray defineProperty index invariant (404 isolator)</title>
<pre id="log"></pre>
<button onclick="run()">Run</button>
<script>
const log = (s, o) => {
  const el = document.getElementById('log');
  el.textContent += s + (o ? "\n" + JSON.stringify(o, null, 2) : "") + "\n\n";
};

function run() {
  const ta = new Uint8Array(4);
  ta[0] = 7;

  log("Initial ta[0] =", { v: ta[0] });

  let threw = false, err = null;
  try {
    Object.defineProperty(ta, "0", { value: 9, writable: true, enumerable: true, configurable: true });
  } catch (e) {
    threw = true;
    err = e && e.name;
  }

  const d = Object.getOwnPropertyDescriptor(ta, "0");
  log("defineProperty result", { threw, err, desc: d });

  // PROVA 1: o elemento real mudou?
  log("After defineProperty ta[0] =", { v: ta[0] });

  // PROVA 2: escrita normal reflete no descriptor?
  ta[0] = 0x33;
  const d2 = Object.getOwnPropertyDescriptor(ta, "0");
  log("After ta[0]=0x33", { ta0: ta[0], descNow: d2 });

  // PROVA 3: deletar funciona? (se configurable=true, delete deveria funcionar)
  let delOk = false;
  try { delOk = delete ta[0]; } catch (_) {}
  const d3 = Object.getOwnPropertyDescriptor(ta, "0");
  log("After delete ta[0]", { delOk, ta0: ta[0], descNow: d3 });

  const ok = Reflect.defineProperty(ta, "0", { value: 9, writable: true, enumerable: true, configurable: true });
log("Reflect.defineProperty ok=", { ok });

  const del2 = Reflect.deleteProperty(ta, "0");
log("Reflect.deleteProperty", { del2 });

  // Chave extra: ownKeys
  log("ownKeys", { keys: Reflect.ownKeys(ta).slice(0, 20) });
}
</script>
