<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PS4 Memory Corruption Tests 302 isolado</title>
</head>
<body>
  <h1>PS4 Memory Corruption Tests (302) - Ultra-Rigorous</h1>

  <div>
    <button id="btnReset">Reset log</button>
    <button id="btnRunAll">Run 302</button>
    <button id="btnStop">Stop</button>
  </div>

  <div style="margin-top:8px;">
    Delay (ms): <input id="delayMs" type="number" value="80" min="0" step="10">
    Timeout por teste (ms): <input id="timeoutMs" type="number" value="1400" min="100" step="50">
    Intensidade (1..5): <input id="intensity" type="number" value="3" min="1" max="5" step="1">
  </div>

  <pre id="log" style="white-space:pre-wrap; margin-top:10px;"></pre>

<script>
(() => {
  "use strict";

  const $log = document.getElementById("log");

  let STOP = false;
  let RUN_ID = 0;

  function ts() { return Date.now(); }
  function logLine(s) { $log.textContent += `[${ts()}] ${s}\n`; }
  function resetLog() { $log.textContent = ""; logLine("Reset."); }
  function stopNow() { STOP = true; logLine("STOP requested."); }

  function alertVuln(testNum, msg, extraObj) {
    const extra = extraObj ? ("\n" + JSON.stringify(extraObj, null, 2)) : "";
    const full = `ALERTA TEST ${testNum}: ${msg}${extra}`;
    logLine(full);
    alert(full);
  }

  // =========================
  // Strong victim model
  // =========================
  function xorshift32(seed) {
    let x = seed >>> 0;
    return () => {
      x ^= (x << 13) >>> 0;
      x ^= (x >>> 17) >>> 0;
      x ^= (x << 5) >>> 0;
      return x >>> 0;
    };
  }

  function fillVictim(u8, seed) {
    const rnd = xorshift32(seed);
    for (let i = 0; i < u8.length; i++) {
      const r = rnd();
      u8[i] = (r ^ (r >>> 8) ^ (r >>> 16) ^ (r >>> 24)) & 0xFF;
    }
  }

  function blockXor32(u8, blockBytes) {
    const nBlocks = Math.ceil(u8.length / blockBytes);
    const out = new Uint32Array(nBlocks);
    const dv = new DataView(u8.buffer, u8.byteOffset, u8.byteLength);

    for (let b = 0; b < nBlocks; b++) {
      const start = b * blockBytes;
      const end = Math.min(u8.length, start + blockBytes);
      let acc = 0 >>> 0;

      let i = start;
      for (; i + 4 <= end; i += 4) acc ^= dv.getUint32(i, true);
      for (; i < end; i++) acc ^= (u8[i] << (((i - start) & 3) * 8)) >>> 0;

      out[b] = acc >>> 0;
    }
    return out;
  }

  function snapshotVictim(u8, opts) {
    const blockBytes = opts.blockBytes || 256;
    const sum = blockXor32(u8, blockBytes);

    const spots = [];
    const step = Math.max(1, Math.floor(u8.length / 16));
    for (let i = 0; i < u8.length; i += step) spots.push(u8[i]);

    return { blockBytes, sum, spots, len: u8.length };
  }

  function compareSnapshot(u8, snap) {
    if (u8.length !== snap.len) {
      return { ok: false, reason: "victim length changed", gotLen: u8.length, expLen: snap.len };
    }
    const now = blockXor32(u8, snap.blockBytes);
    if (now.length !== snap.sum.length) {
      return { ok: false, reason: "checksum blocks length mismatch", gotBlocks: now.length, expBlocks: snap.sum.length };
    }
    for (let i = 0; i < now.length; i++) {
      if (now[i] !== snap.sum[i]) {
        const start = i * snap.blockBytes;
        const end = Math.min(u8.length, start + 32);
        const bytes = [];
        for (let j = start; j < end; j++) bytes.push(u8[j]);
        return {
          ok: false,
          reason: "checksum mismatch",
          blockIndex: i,
          exp: snap.sum[i] >>> 0,
          got: now[i] >>> 0,
          first32BytesOfBlock: bytes
        };
      }
    }
    const spots = [];
    const step = Math.max(1, Math.floor(u8.length / 16));
    for (let i = 0; i < u8.length; i += step) spots.push(u8[i]);
    for (let k = 0; k < spots.length; k++) {
      if (spots[k] !== snap.spots[k]) {
        return { ok: false, reason: "spot sample mismatch", spotIndex: k, exp: snap.spots[k], got: spots[k] };
      }
    }
    return { ok: true };
  }

  function makeVictim(bytes, seed) {
    const ab = new ArrayBuffer(bytes);
    const u8 = new Uint8Array(ab);
    fillVictim(u8, seed);
    return { ab, u8 };
  }

  // =========================
  // Detach invariants
  // =========================
  function detachArrayBuffer(ab) {
    if (typeof structuredClone === "function") {
      try { structuredClone(ab, { transfer: [ab] }); return true; } catch (_) {}
    }
    if (typeof postMessage === "function") {
      try { postMessage("x", "*", [ab]); return true; } catch (_) {}
    }
    return false;
  }

  function sampleDetachedBehavior(ab, views) {
    const out = { detachedAttempted: false, afterByteLength: null, viewSamples: [] };
    out.detachedAttempted = detachArrayBuffer(ab);
    out.afterByteLength = ab.byteLength;

    for (const v of views) {
      const s = { name: v.name, kind: v.kind };
      try { s.length = v.obj.length; } catch (e) { s.length = "THREW:" + (e && e.name ? e.name : "ERR"); }
      try { s.byteLength = v.obj.byteLength; } catch (e) { s.byteLength = "THREW:" + (e && e.name ? e.name : "ERR"); }
      try { s.read0 = v.kind === "TA" ? v.obj[0] : "NA"; } catch (e) { s.read0 = "THREW:" + (e && e.name ? e.name : "ERR"); }
      try {
        if (v.kind === "TA") {
          const before = (v.obj.length ? v.obj[0] : undefined);
          v.obj[0] = 0x7A;
          const after = (v.obj.length ? v.obj[0] : v.obj[0]);
          s.writeEffect = { before, after };
        } else {
          s.writeEffect = "NA";
        }
      } catch (e) {
        s.writeEffect = "THREW:" + (e && e.name ? e.name : "ERR");
      }
      out.viewSamples.push(s);
    }
    return out;
  }

  function checkDetachConsistency(testNum, repetitions) {
    const samples = [];
    for (let i = 0; i < repetitions; i++) {
      const ab = new ArrayBuffer(4096);
      const u8 = new Uint8Array(ab);
      const u32 = new Uint32Array(ab);
      if (u8.length) u8[0] = 0xAA;

      const s = sampleDetachedBehavior(ab, [
        { name: "Uint8Array", kind: "TA", obj: u8 },
        { name: "Uint32Array", kind: "TA", obj: u32 },
      ]);
      samples.push(s);
    }

    const anyDetach = samples.some(x => x.detachedAttempted);
    if (!anyDetach) return;

    function sig(s) {
      const parts = [];
      parts.push("abLen=" + s.afterByteLength);
      for (const v of s.viewSamples) {
        parts.push(v.name + ":len=" + v.length + ":bl=" + v.byteLength + ":r0=" + v.read0 + ":we=" + JSON.stringify(v.writeEffect));
      }
      return parts.join("|");
    }

    const sig0 = sig(samples[0]);
    for (let i = 1; i < samples.length; i++) {
      const si = sig(samples[i]);
      if (si !== sig0) {
        alertVuln(testNum, "DETACH INCONSISTENT: comportamento pós-detach variou entre repetições (suspeito).", {
          rep0: samples[0],
          repN: samples[i]
        });
        return;
      }
    }

    for (const s of samples) {
      if (s.detachedAttempted && s.afterByteLength !== 0) {
        alertVuln(testNum, "DETACH SUSPECT: detach foi tentado mas ab.byteLength não ficou 0.", s);
        return;
      }
    }
  }

  // =========================
  // Subarray clamp invariants
  // =========================
  function expectedSubarrayRange(len, begin, end) {
    let b = begin | 0;
    let e = (end === undefined) ? len : (end | 0);

    if (b < 0) b = Math.max(len + b, 0);
    else b = Math.min(b, len);

    if (e < 0) e = Math.max(len + e, 0);
    else e = Math.min(e, len);

    if (e < b) e = b;
    return { b, e, length: e - b };
  }

  function checkNegativeSubarrayClamp(testNum) {
    const ab = new ArrayBuffer(256);
    const ta = new Uint8Array(ab);
    for (let i = 0; i < ta.length; i++) ta[i] = i & 0xFF;

    const begin = -50;
    const end = -20;
    const exp = expectedSubarrayRange(ta.length, begin, end);

    const sub = ta.subarray(begin, end);

    if (sub.length !== exp.length) {
      alertVuln(testNum, "SUBARRAY NEGATIVE CLAMP FAIL: length inesperado.", {
        taLen: ta.length, begin, end, exp, gotLen: sub.length
      });
      return;
    }

    if (sub.length > 0) {
      const expFirst = ta[exp.b];
      const expLast = ta[exp.e - 1];
      const gotFirst = sub[0];
      const gotLast = sub[sub.length - 1];

      if (gotFirst !== expFirst || gotLast !== expLast) {
        alertVuln(testNum, "SUBARRAY NEGATIVE CLAMP FAIL: conteúdo não corresponde ao clamp esperado.", {
          expFirst, gotFirst, expLast, gotLast, exp
        });
        return;
      }

      const marker = 0xCC;
      sub[0] = marker;
      if (ta[exp.b] !== marker) {
        alertVuln(testNum, "SUBARRAY WRITE FAIL: escrita não refletiu na posição clamped (inconsistente).", {
          pos: exp.b, expMarker: marker, got: ta[exp.b]
        });
        return;
      }

      if (exp.b > 0 && ta[exp.b - 1] === marker) {
        alertVuln(testNum, "SUBARRAY WRITE OOR: escrita vazou para byte anterior à região (suspeito).", { pos: exp.b });
        return;
      }
      if (exp.e < ta.length && ta[exp.e] === marker) {
        alertVuln(testNum, "SUBARRAY WRITE OOR: escrita vazou para byte após a região (suspeito).", { pos: exp.e });
        return;
      }
    }
  }

  // =========================
  // OOR TypedArray write invariant
  // =========================
  function checkTypedArrayOORWriteNoop(testNum) {
    const victim = makeVictim(4096, 0xA11CE551 ^ testNum);
    const snap = snapshotVictim(victim.u8, { blockBytes: 128 });

    const ta = new Uint32Array(victim.ab);
    const idx = ta.length; // out of range

    let threw = false;
    try { ta[idx] = 0xDEADBEEF; } catch (_) { threw = true; }

    const cmp = compareSnapshot(victim.u8, snap);
    if (!cmp.ok) {
      alertVuln(testNum, "TYPEDARRAY OOR WRITE CHANGED VICTIM (suspeito).", cmp);
      return;
    }

    void threw;
  }

  // =========================
  // Amplifiers (bounded)
  // =========================
  function heapSpray(intensity) {
    const count = 40 * intensity;
    const size = 0x2000;
    const arr = [];
    for (let i = 0; i < count; i++) {
      const ab = new ArrayBuffer(size);
      const u32 = new Uint32Array(ab);
      for (let j = 0; j < u32.length; j += 64) u32[j] = (0x41414141 ^ i ^ j) >>> 0;
      arr.push(ab);
    }
    return arr;
  }

  function makeHoles(intensity) {
    const holes = [];
    const n = 160 * intensity;
    for (let i = 0; i < n; i++) holes.push(new ArrayBuffer(0x100));
    for (let i = 0; i < holes.length; i += 2) holes[i] = null;
    return holes;
  }

  function objectSpray(intensity) {
    const n = 320 * intensity;
    const out = [];
    for (let i = 0; i < n; i++) {
      const o = { a: i, b: i * 2, c: ("x" + i) };
      if ((i & 7) === 0) o.d = new ArrayBuffer(0x80);
      out.push(o);
    }
    return out;
  }

  function microtaskChurn(n) {
    let p = Promise.resolve();
    for (let i = 0; i < n; i++) p = p.then(() => {});
    return p;
  }

  // =========================
  // Cross-buffer isolation harness
  // =========================
  async function crossBufferIsolationTest(testNum, label, stressFn, intensity) {
    const victim = makeVictim(64 * 1024, (0xC0FFEE00 ^ testNum) >>> 0);
    const snap = snapshotVictim(victim.u8, { blockBytes: 256 });

    await stressFn(intensity);

    const cmp = compareSnapshot(victim.u8, snap);
    if (!cmp.ok) {
      alertVuln(testNum, `${label}: VICTIM CORRUPTED (cross-buffer mismatch).`, cmp);
    }
  }

  // =========================
  // Helpers for new vectors
  // =========================
  function safeStructuredClone(obj, transferList) {
    if (typeof structuredClone !== "function") return { supported: false };
    try {
      if (transferList) return { supported: true, value: structuredClone(obj, { transfer: transferList }) };
      return { supported: true, value: structuredClone(obj) };
    } catch (e) {
      return { supported: true, error: (e && e.name) ? e.name : "ERR" };
    }
  }

  function makeIframe() {
    const f = document.createElement("iframe");
    f.style.display = "none";
    document.body.appendChild(f);
    return f;
  }

  function removeIframe(f) {
    try { f.remove(); } catch (_) {}
  }

  function postMessageTransferToSelf(ab) {
    // transfers AB away from current realm if allowed by browser
    try { postMessage("x", "*", [ab]); return true; } catch (_) { return false; }
  }

  async function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

  // =========================
  // Tests 301..350 (50 total)
  // =========================
  const tests = [];

  // 302 (FIX): MessageChannel transfer/clone invariants (no instanceof-only)
tests.push(async () => {
  if (typeof MessageChannel !== "function") return;

  const ch = new MessageChannel();
  const ab = new ArrayBuffer(4096);
  const u8 = new Uint8Array(ab);
  u8[0] = 0xAA;

  let got = undefined;
  ch.port2.onmessage = (ev) => { got = ev.data; };

  let postThrew = false;
  try { ch.port1.postMessage(ab, [ab]); }
  catch (e) { postThrew = true; }

  // Se nem conseguiu postar com transfer, não é sinal de corrupção.
  if (postThrew) return;

  await Promise.resolve();
  await new Promise(r => setTimeout(r, 0));

  const tag = Object.prototype.toString.call(got);

  // Classifica o payload recebido
  const isAB = (tag === "[object ArrayBuffer]") || (got && typeof got.byteLength === "number" && typeof got.slice === "function");
  const isView = (got && typeof got === "object" && typeof got.byteLength === "number" && typeof got.buffer === "object");

  const senderLen = ab.byteLength;

  // Interpretação:
  // - transfer real: senderLen == 0
  // - clone: senderLen == 4096
  if (senderLen !== 0 && senderLen !== 4096) {
    alertVuln(302, "MessageChannel: sender ab.byteLength ficou em estado impossível.", { senderLen, tag });
    return;
  }

  // Se transfer aconteceu, receiver precisa conter os dados.
  if (senderLen === 0) {
    if (!got) {
      alertVuln(302, "MessageChannel: sender detacheou mas receiver não recebeu nada.", { tag, gotType: typeof got });
      return;
    }

    let r0 = null, rLen = null;
    try {
      if (isAB) {
        const r8 = new Uint8Array(got);
        rLen = r8.length;
        r0 = r8[0];
      } else if (isView) {
        const r8 = (got instanceof Uint8Array) ? got : new Uint8Array(got.buffer);
        rLen = r8.length;
        r0 = r8[0];
      } else {
        alertVuln(302, "MessageChannel: receiver não é ArrayBuffer nem view após sender detach.", { tag });
        return;
      }
    } catch (e) {
      alertVuln(302, "MessageChannel: falha ao ler receiver após sender detach.", { tag, err: e && e.name });
      return;
    }

    if (rLen !== 4096 || r0 !== 0xAA) {
      alertVuln(302, "MessageChannel: receiver conteúdo/len inesperado após transfer.", { tag, rLen, r0 });
    }
    return;
  }

  // Se NÃO houve transfer (clone), valida independência (mutação não deve refletir)
  if (senderLen === 4096) {
    if (!got) return; // engines podem não entregar de forma previsível; não alerta.
    if (!isAB && !isView) return;

    let r8;
    try {
      r8 = isAB ? new Uint8Array(got) : (got instanceof Uint8Array ? got : new Uint8Array(got.buffer));
    } catch (_) { return; }

    const before = r8[0];
    u8[0] = 0xBB; // muta sender
    const after = r8[0];
    if (before !== after) {
      alertVuln(302, "MessageChannel: receiver refletiu mutação do sender (aliasing inesperado em clone).", { before, after, tag });
    }
  }
});

    
      

  // =========================
  // Runner
  // =========================
  function withTimeout(promise, ms) {
    let t;
    const timeout = new Promise((_, rej) => {
      t = setTimeout(() => rej(new Error("TIMEOUT")), ms);
    });
    return Promise.race([promise.finally(() => clearTimeout(t)), timeout]);
  }

  async function runAll() {
    STOP = false;
    RUN_ID++;
    const runId = RUN_ID;

    const delayMs = Math.max(0, parseInt(document.getElementById("delayMs").value || "0", 10));
    const timeoutMs = Math.max(100, parseInt(document.getElementById("timeoutMs").value || "1400", 10));
    const intensity = Math.min(5, Math.max(1, parseInt(document.getElementById("intensity").value || "3", 10)));

    logLine("============================================================");
    logLine("Run ALL :: 50 tests (301..350)");
    logLine("============================================================");

    for (let i = 0; i < tests.length; i++) {
      if (STOP || runId !== RUN_ID) break;

      try {
        const p = Promise.resolve(tests[i](intensity));
        await withTimeout(p, timeoutMs);
      } catch (e) {
        // Exceptions alone are not corruption signals; keep silent to avoid false positives.
      }

      if (delayMs) await new Promise(r => setTimeout(r, delayMs));
    }

    logLine("ALL DONE.");
  }

  // Wire UI
  document.getElementById("btnReset").onclick = resetLog;
  document.getElementById("btnStop").onclick = stopNow;
  document.getElementById("btnRunAll").onclick = runAll;

  // init
  resetLog();
})();
</script>
</body>
</html>
