// HEAP SPRAY CIRÚRGICO (Baseado em PS4_EXTERMINATOR_CLEAN.json)
    // Alvos: A8tBH (208b), FPuVH (176b, 104b)
    var sprayStore = [];
    function spray(size) {
        try {
            var len = size - 16; 
            if (len < 0) len = size;
            for (var i = 0; i < 3000; i++) {
                var ab = new ArrayBuffer(len);
                var v = new Uint8Array(ab);
                v.fill(0xCC);
                sprayStore.push(ab);
            }
        } catch (e) {}
    }

    // --- TEST 1: Huge String Serialization Overflow ---
    // Cria uma string massiva (perto do limite de 32 bits ou do limite de 640k do state)
    // e tenta empurrá-la para o histórico. O objetivo é causar overflow no cálculo do buffer
    // de serialização interno do WebKit.
    function runTest1() {
        log("Iniciando Test 1: Huge String State...");
        try {
            // Tenta criar string de ~10MB (pode ser ajustado se o navegador permitir mais)
            var huge = "A".repeat(10 * 1024 * 1024);
            
            // Tenta serializar
            history.pushState(huge, "huge", "?huge");
            
            // Verifica integridade
            if (history.state === huge) {
                log("Sucesso: String gigante salva e recuperada.", "ok");
            } else {
                log("ALERTA: String corrompida ou truncada!", "alert");
            }
        } catch(e) {
            // QuotaExceededError é esperado e seguro. Crash é sucesso.
            log("Erro (Safe): " + e.name);
        }
    }

    // --- TEST 2: Getter Destructor during PushState ---
    // O algoritmo de clonagem estruturada lê propriedades do objeto.
    // Usamos um getter para destruir o documento/iframe atual no meio da clonagem.
    function runTest2() {
        log("Iniciando Test 2: Getter Destructor...");
        var ifr = document.createElement('iframe');
        document.body.appendChild(ifr);
        
        var poison = {
            a: 1,
            get b() {
                log("Getter 'b' acionado durante clone. Destruindo iframe...");
                ifr.remove(); // Nuke context
                spray();
                return 2;
            }
        };

        try {
            // pushState no iframe que será destruído
            ifr.contentWindow.history.pushState(poison, "poison");
            log("PushState executed (Survived).", "ok");
        } catch(e) {
            log("Erro: " + e.message);
        }
    }

    // --- TEST 3: Proxy Cyclic Clone Stack Exhaustion ---
    // Usa um Proxy para criar referências dinâmicas durante a clonagem.
    // O objetivo é enganar a detecção de ciclos ou estourar a pilha de recursão
    // do serializador C++.
    function runTest3() {
        log("Iniciando Test 3: Proxy Cycle...");
        var p = new Proxy({}, {
            get: function(t, k) {
                // Retorna a si mesmo infinitamente quando lido
                return p;
            }
        });

        try {
            history.pushState(p, "cycle");
            log("ALERTA: Ciclo infinito aceito pelo pushState!", "alert");
        } catch(e) {
            // DataCloneError é o comportamento seguro
            if (e.name === "DataCloneError" || e.name === "InternalError") {
                log("Ciclo detectado/bloqueado (Safe).", "ok");
            } else {
                log("Erro incomum: " + e.name);
            }
        }
    }

    // --- TEST 4: History State Type Confusion (Silent) ---
    // Empurra tipos complexos (TypedArrays, Maps) e verifica se eles são
    // restaurados corretamente ou se sofrem mutação de tipo (ex: Map vira Object, ou bytes errados).
    function runTest4() {
        log("Iniciando Test 4: State Type Check...");
        var buffer = new Uint8Array([1, 2, 3, 4]);
        var map = new Map();
        map.set("key", "value");
        
        var state = { buf: buffer, m: map };
        
        try {
            history.pushState(state, "types");
            
            var s = history.state;
            var ok = true;
            
            if (!(s.buf instanceof Uint8Array) || s.buf[0] !== 1) {
                log("ALERTA: Uint8Array corrompido ou transformado!", "alert");
                ok = false;
            }
            
            if (!(s.m instanceof Map) || s.m.get("key") !== "value") {
                log("ALERTA: Map corrompido ou transformado!", "alert");
                ok = false;
            }
            
            if (ok) log("Tipos restaurados corretamente.", "ok");
            
        } catch(e) { log("Erro: " + e); }
    }

    // --- TEST 5: Back/Push Navigation Race (Race) ---
    // Tenta confundir o índice do histórico chamando back() e pushState()
    // em sucessão rápida (Race Condition na thread de UI/Loader).
    function runTest5() {
        log("Iniciando Test 5: Nav Race...");
        var initial = history.length;
        
        // Push inicial
        history.pushState(1, "1");
        
        // Race
        setTimeout(function() {
            history.back(); // Volta
            history.pushState(2, "2"); // Empurra novo topo
        }, 0);
        
        setTimeout(function() {
            log("Histórico final length: " + history.length);
            // Se o estado for inconsistente, o length pode estar errado ou o state ser null
            if (history.state === 2) log("Race venceu 'push' (Expected).", "ok");
            else if (history.state === 1) log("Race venceu 'back' (Expected).", "ok");
            else log("ALERTA: Estado inconsistente na navegação!", "alert");
        }, 100);
    }

    // --- TEST 6: Detached Iframe State Persistence (State) ---
    // Salva estado em um iframe, remove o iframe, e tenta ler o estado
    // através de uma referência mantida ao objeto history.
    // Verifica UAF ou vazamento de memória.
    function runTest6() {
        log("Iniciando Test 6: Detached State...");
        var ifr = document.createElement('iframe');
        document.body.appendChild(ifr);
        
        var h = ifr.contentWindow.history;
        h.pushState({ secret: 1337 }, "secret");
        
        // Remove iframe
        ifr.remove();
        spray(); // Tenta sobrescrever a memória do documento do iframe
        
        try {
            // Tenta acessar propriedade do objeto history órfão
            var s = h.state;
            if (s && s.secret === 1337) {
                log("State sobreviveu ao detach (Safe, geralmente).", "ok");
            } else {
                log("State inacessível ou limpo.", "ok");
            }
        } catch(e) {
            // SecurityError ou similar é bom
            log("Acesso a history órfão bloqueado: " + e.name, "ok");
        }
    }
// --- TEST 7: Iframe Nuke during Serialization (UAF) ---
    // Cria um objeto com um 'getter'. Passa esse objeto para o pushState de um Iframe.
    // Quando o serializador lê a propriedade, o getter remove o Iframe do DOM.
    // O serializador tenta continuar escrevendo no histórico de um documento destruído.
    function runTest7() {
        log("Iniciando Test 7: Serialization UAF...");
        var f = document.createElement('iframe');
        document.body.appendChild(f);
        
        var poison = {
            get kill() {
                log("Getter acionado. Destruindo contexto...");
                f.remove(); // Nuke
                spray();    // Ocupa memória
                return 0xDEAD;
            }
        };

        try {
            // Inicia clonagem estruturada no contexto do iframe
            f.contentWindow.history.pushState(poison, "uaf");
            log("PushState sobreviveu à destruição do contexto.", "ok");
        } catch(e) {
            log("Erro (Safe): " + e.message);
        }
    }

    // --- TEST 8: Object Graph Mutation during Clone (Heap) ---
    // Passa um objeto para pushState. Usa um getter para modificar a estrutura
    // do próprio objeto ENQUANTO ele está sendo clonado (deleta propriedades, muda tipos).
    // Isso tenta confundir o mapa de memória do serializador C++.
    function runTest8() {
        log("Iniciando Test 8: Graph Mutation...");
        var complex = { a: 1, b: 2, c: 3 };
        
        // Define getter em 'a'
        Object.defineProperty(complex, 'a', {
            get: function() {
                log("Mutando objeto durante clone...");
                delete complex.b;
                delete complex.c;
                complex.d = new Array(1000).fill(1); // Realoca memória do objeto?
                spray();
                return 1;
            }
        });

        try {
            history.pushState(complex, "mutate");
            // Verifica o que foi salvo
            var s = history.state;
            if (s && s.d) log("Objeto mutado salvo com sucesso.", "ok");
            else log("Objeto salvo incompleto (Safe).", "ok");
        } catch(e) {
            log("Erro: " + e.message);
        }
    }

    // --- TEST 9: Recursive State Explosion (Stack/Mem) ---
    // Cria uma cadeia de objetos profundamente aninhados (Linked List).
    // Tenta salvar no histórico. Testa os limites de recursão do serializador.
    function runTest9() {
        log("Iniciando Test 9: Stack Stress...");
        var root = { next: null };
        var curr = root;
        
        // Cria profundidade de 10.000 (Pode causar stack overflow se não tratado)
        for(var i=0; i<10000; i++) {
            curr.next = { val: i };
            curr = curr.next;
        }

        try {
            history.pushState(root, "stack");
            log("Profundidade de 10k aceita.", "ok");
        } catch(e) {
            // RangeError (Maximum call stack size) é o esperado
            if (e.name === "RangeError" || e.name === "DataCloneError") {
                log("Limite de pilha atingido (Safe).", "ok");
            } else {
                log("Erro inesperado: " + e.name);
            }
        }
    }

    // --- TEST 10: Null-Byte String Truncation (Silent) ---
    // Strings em C/C++ terminam em NULL (\0). Strings JS não.
    // Salva uma string com \0 no meio. Se ao recuperar ela estiver cortada,
    // houve erro de interpretação de memória no WebKit.
    function runTest10() {
        log("Iniciando Test 10: Null Byte Check...");
        var secret = "START\u0000HIDDEN";
        
        history.pushState(secret, "nullbyte");
        var retrieved = history.state;
        
        if (retrieved === secret) {
            log("String íntegra (Safe).", "ok");
        } else if (retrieved === "START") {
            log("ALERTA: String truncada no Null Byte! (Memory Corruption Potential)", "alert");
        } else {
            log("String corrompida de outra forma: " + retrieved, "alert");
        }
    }

    // --- TEST 11: PopState vs PushState Race (Race) ---
    // Dispara navegação (back) e tenta sobrescrever o estado (replaceState)
    // dentro do evento popstate. Testa a consistência do ponteiro de histórico atual.
    function runTest11() {
        log("Iniciando Test 11: Pop/Replace Race...");
        
        // Setup
        history.pushState({v:1}, "1");
        history.pushState({v:2}, "2");
        
        var raceWin = false;
        
        window.onpopstate = function(e) {
            log("Popstate (Back) disparado.");
            // Tenta substituir o estado "1" para o qual voltamos
            // Se o motor ainda não atualizou o ponteiro, pode substituir o "2" ou falhar
            history.replaceState({v:99}, "race");
            
            if (history.state.v === 99) {
                log("ReplaceState venceu dentro do evento.", "ok");
            } else {
                log("ALERTA: ReplaceState falhou silenciosamente.", "alert");
            }
            window.onpopstate = null;
        };
        
        history.back();
    }

    // --- TEST 12: URL Parsing & Encoding Logic (State) ---
    // Tenta empurrar URLs com caracteres de controle ou codificações duplas.
    // Verifica se o navegador aceita URLs que podem causar spoofing ou crashes no parser.
    function runTest12() {
        log("Iniciando Test 12: URL Parsing...");
        // Caractere NULL URL-encoded e caracteres de controle
        var weirdURL = "?test=%00&hack=%0a";
        
        try {
            history.pushState({}, "url", weirdURL);
            
            // Verifica o que está na barra (location.search)
            // Cuidado: ler location pode recarregar se mal feito, lemos apenas a propriedade
            var loc = window.location.search;
            
            log("URL Pushed: " + loc);
            if (loc.indexOf("%00") !== -1 || loc.indexOf("\0") !== -1) {
                log("ALERTA: URL com Null Byte aceita!", "alert");
            } else {
                log("URL sanitizada ou normalizada.", "ok");
            }
        } catch(e) {
            // SecurityError é comum se o navegador for rigoroso
            log("Bloqueio de segurança (Safe): " + e.name, "ok");
        }
    }
// --- TEST 13: Property Deletion during Serialize (UAF) ---
    // Cria um objeto onde um getter deleta uma propriedade vizinha
    // ENQUANTO o serializador está processando o objeto.
    // O objetivo é fazer o motor C++ acessar a propriedade deletada (que ele já mapeou).
    function runTest13() {
        log("Iniciando Test 13: Serialize Deletion...");
        var obj = {
            // Getter malicioso é processado primeiro
            get a() {
                log("Getter 'a' executando. Deletando 'b'...");
                delete obj.b; // Remove a propriedade 'b'
                spray();      // Tenta ocupar a memória liberada
                return 1;
            },
            b: { large: new Array(1000).fill("A") } // Objeto alvo
        };

        try {
            history.pushState(obj, "uaf");
            
            // Verifica se o estado salvo está corrompido
            var s = history.state;
            if (s && s.b === undefined) {
                log("Propriedade deletada foi ignorada (Safe).", "ok");
            } else {
                log("ALERTA: Estado inconsistente salvo!", "alert");
            }
        } catch(e) {
            log("Erro (Safe): " + e.message);
        }
    }

    // --- TEST 14: Deeply Nested Array Stack Overflow (Crash) ---
    // Cria um array aninhado recursivamente até o limite da engine.
    // Tenta serializar. Se o motor usar recursão na stack C++ sem checagem,
    // causa Stack Overflow e crasha a aba.
    function runTest14() {
        log("Iniciando Test 14: Stack Overflow...");
        var depth = 0;
        var root = [];
        var curr = root;
        
        // Tenta criar 20.000 níveis de aninhamento
        try {
            for(var i=0; i<20000; i++) {
                var next = [];
                curr.push(next);
                curr = next;
                depth++;
            }
        } catch(e) { log("Limite de JS atingido em " + depth); }

        try {
            log("Serializando profundidade " + depth + "...");
            history.pushState(root, "stack");
            log("Serialização profunda aceita.", "ok");
        } catch(e) {
            if (e.name === "RangeError" || e.name === "InternalError") {
                log("Stack Overflow prevenido (Safe).", "ok");
            } else {
                log("Erro incomum: " + e.name);
            }
        }
    }

    // --- TEST 15: Map/Set Iterator Invalidation (Heap) ---
    // Passa um Map para o pushState.
    // Usa um getter (como chave) para adicionar/remover itens do Map
    // DURANTE a serialização do próprio Map.
    // Isso corrompe o iterador interno do serializador.
    function runTest15() {
        log("Iniciando Test 15: Map Iterator Invalid...");
        var m = new Map();
        var key = {
            toString: function() {
                log("Key toString. Limpando Map...");
                m.clear(); // Esvazia o mapa enquanto ele é lido
                spray();
                return "key";
            }
        };
        
        m.set(key, "value");
        m.set("padding", "data");

        try {
            history.pushState(m, "map");
            var s = history.state;
            log("Map salvo size: " + (s ? s.size : "null"));
        } catch(e) {
            log("Erro: " + e.message);
        }
    }

    // --- TEST 16: Float64 -0 Preservation (Silent) ---
    // Testa a fidelidade binária do serializador.
    // O valor -0 (zero negativo) tem representação binária diferente de +0.
    // Se o serializador converter para inteiro ou simplificar, o sinal perde-se.
    function runTest16() {
        log("Iniciando Test 16: Negative Zero...");
        var state = { z: -0, p: +0, n: NaN };
        
        history.pushState(state, "math");
        var s = history.state;
        
        // Verifica se -0 foi preservado (1/-0 = -Infinity)
        var isNegZero = (1 / s.z) === -Infinity;
        var isPosZero = (1 / s.p) === Infinity;
        
        if (isNegZero && isPosZero) {
            log("Precisão de Float preservada (Safe).", "ok");
        } else {
            log("ALERTA: Perda de precisão! -0 virou +0.", "alert");
        }
    }

    // --- TEST 17: History.go vs PushState Storm (Race) ---
    // Uma condição de corrida violenta entre navegar no histórico (thread de UI/Loader)
    // e adicionar novos estados (thread JS).
    function runTest17() {
        log("Iniciando Test 17: History Storm...");
        var stop = false;
        
        // Popula histórico
        for(var i=0; i<10; i++) history.pushState(i, ""+i);
        
        // Loop de Navegação
        var navInt = setInterval(function() {
            if(stop) return;
            var r = Math.floor(Math.random() * 5) - 2; // -2 a +2
            if(r !== 0) history.go(r);
        }, 10);
        
        // Loop de Push
        var pushInt = setInterval(function() {
            if(stop) return;
            try {
                history.pushState({data: Math.random()}, "race");
            } catch(e) {}
        }, 10);
        
        setTimeout(function() {
            stop = true;
            clearInterval(navInt);
            clearInterval(pushInt);
            log("Storm finalizado. Verifique estabilidade.", "ok");
        }, 2000);
    }

    // --- TEST 18: Document.open State Persistence (State) ---

        log("Limpando documento via document.open()...");

        document.close();
        
        // Tenta recuperar o estado após o wipe

        var res = document.getElementById('res');
        
        if (s === secret) {
            res.innerHTML = "<b style='color:red'>ALERTA: History.state persistiu após document.open()!</b>";
        } else {
            res.innerHTML = "<b style='color:green'>State limpo ou nulo (Safe).</b>";
        }
    }
 // --- TEST 19: Proxy Revocation during Serialize (UAF) ---
    // Cria um Proxy revogável. Passa para o pushState.
    // Um getter dentro do proxy revoga o próprio proxy enquanto o serializador o lê.
    // O motor C++ pode tentar acessar o alvo do proxy que agora é nulo/inválido.
    function runTest19() {
        log("Iniciando Test 19: Proxy Revocation...");
        var p = Proxy.revocable({a: 1, b: 2}, {
            get: function(t, k) {
                if (k === 'b') {
                    log("Revogando proxy durante leitura...");
                    p.revoke();
                    spray(); // Tenta ocupar memória
                }
                return t[k];
            }
        });

        try {
            history.pushState(p.proxy, "revoke");
            log("PushState lidou com proxy revogado (Safe).", "ok");
        } catch(e) {
            // TypeError é esperado
            log("Erro (Safe): " + e.message);
        }
    }

    // --- TEST 20: ArrayBuffer Transfer Trap (Heap) ---
    // Serializa um objeto contendo um ArrayBuffer.
    // Usa um getter para transferir (detach) esse buffer para um Worker

 // --- TEST 43: ImageBitmap/Buffer Transfer UAF (UAF) ---
    // Cria um ImageBitmap (ou ArrayBuffer). Passa para pushState.
    // Um getter intercepta a leitura e transfere o recurso para um Worker (neuter/detach),
    // invalidando a memória que o pushState estava prestes a ler.
    function runTest43() {
        log("Iniciando Test 43: Bitmap/Buffer Transfer...");
        
        // Fallback para ArrayBuffer se ImageBitmap não suportado
        var resource;
        var useBitmap = false;
        
        if (window.createImageBitmap) {
            var canvas = document.createElement('canvas');
            canvas.width = 100; canvas.height = 100;
            try {
                // Tenta criar bitmap (Promessa)
                createImageBitmap(canvas).then(function(bmp) {
                    resource = bmp;
                    useBitmap = true;
                    execute();
                });
            } catch(e) { executeArrayBuffer(); }
        } else {
            executeArrayBuffer();
        }

        function executeArrayBuffer() {
            resource = new ArrayBuffer(1024 * 1024);
            execute();
        }

        function execute() {
            var w = new Worker(URL.createObjectURL(new Blob([""], {type: 'text/javascript'})));
            var obj = {
                get trap() {
                    log("Transferindo recurso (" + (useBitmap ? "Bitmap" : "Buffer") + ")...");
                    w.postMessage(resource, [resource]); // Detach/Neuter
                    spray();
                    return "trapped";
                },
                payload: resource // O clone tentará ler isso
            };

            try {
                history.pushState(obj, "uaf_transfer");
                
                // Validação
                var s = history.state;
                if (useBitmap) {
                    if (s.payload.width === 0) log("Bitmap detachado tratado (Safe).", "ok");
                    else log("Bitmap salvo (Verificar integridade).", "ok");
                } else {
                    if (s.payload.byteLength === 0) log("Buffer detachado tratado (Safe).", "ok");
                    else log("Buffer salvo com dados (Cópia pré-detach).", "ok");
                }
            } catch(e) {
                log("DataCloneError (Safe): " + e.name);
            }
        }
    }

    // --- TEST 44: Recursive Proxy Stack Smash (Crash) ---
    // Cria um Proxy que retorna a si mesmo recursivamente.
    // Tenta serializar. O motor deve detectar o ciclo ou estourar a pilha (Stack Overflow).
    // Se o estouro de pilha não for protegido por "Guard Pages", causa crash do processo.
    function runTest44() {
        log("Iniciando Test 44: Proxy Stack Smash...");
        var p = new Proxy({}, {
            get: function(t, k) {
                return p; // Retorna a si mesmo infinitamente
            }
        });

        try {
            history.pushState(p, "stack_smash");
            log("Ciclo infinito detectado (Safe).", "ok");
        } catch(e) {
            if (e.name === "InternalError" || e.name === "RangeError" || e.name === "DataCloneError") {
                log("Limite de pilha/Ciclo tratado: " + e.name, "ok");
            } else {
                log("Erro: " + e.name);
            }
        }
    }

    // --- TEST 45: Property Map Deletion Race (Heap) ---
    // Cria um objeto com muitas propriedades.
    // Um getter no meio do objeto deleta todas as propriedades restantes.
    // O serializador C++ itera sobre as chaves do objeto. Se ele não checar a existência
    // a cada passo, vai ler memória não alocada (Hash Map Corruption).
    function runTest45() {
        log("Iniciando Test 45: Map Deletion...");
        var obj = {};
        
        // Propriedade gatilho
        Object.defineProperty(obj, 'aaa_trigger', {
            get: function() {
                log("Deletando propriedades futuras...");
                delete obj.zzz_target;
                delete obj.zzz_target2;
                spray();
                return 1;
            },
            enumerable: true
        });

        obj.zzz_target = "I should be deleted";
        obj.zzz_target2 = "Me too";

        try {
            history.pushState(obj, "map_del");
            
            var s = history.state;
            if (s.zzz_target === undefined) {
                log("Propriedades deletadas ignoradas (Safe).", "ok");
            } else {
                log("ALERTA: Propriedade deletada foi revivida/lida!", "alert");
            }
        } catch(e) {
            log("Erro: " + e.message);
        }
    }

    // --- TEST 46: Sparse Array Uninitialized Memory (Silent) ---
    // Empurra um array esparso (com buracos).
    // Verifica se os buracos são lidos como 'null/undefined' (seguro)
    // ou se vazam lixo de memória (inseguro).
    function runTest46() {
        log("Iniciando Test 46: Sparse Leak...");
        var arr = new Array(100);
        arr[0] = "start";
        arr[99] = "end";
        // Índices 1-98 são "holes"
        
        history.pushState(arr, "sparse");
        
        var s = history.state;
        var hole = s[50];
        
        if (hole === null || hole === undefined) {
            log("Buraco lido como null/undefined (Safe).", "ok");
        } else {
            log("ALERTA: Buraco contém dados! Val: " + hole, "alert");
        }
    }

    // --- TEST 47: rAF vs PushState Flood (Race) ---
    // Usa requestAnimationFrame (rAF) para sincronizar com a renderização.
    // Tenta floodar pushState dentro do rAF para ver se causa starvation da thread de UI.
    function runTest47() {
        log("Iniciando Test 47: rAF Flood...");
        var count = 0;
        var start = performance.now();
        
        function loop() {
            if (performance.now() - start > 1000) {
                log("Flood finalizado. Count: " + count, "ok");
                return;
            }
            try {
                // Tenta empurrar estado a cada frame
                history.replaceState({c: count}, "raf");
                count++;
            } catch(e) {}
            requestAnimationFrame(loop);
        }
        
        requestAnimationFrame(loop);
    }

    // --- TEST 48: State Object Identity Check (State) ---
    // Verifica se history.state retorna uma NOVA referência a cada acesso.
    // Se retornar a mesma referência interna do motor, permite corrupção de estado
    // sem chamar pushState (basta mutar o objeto retornado).
    function runTest48() {
        log("Iniciando Test 48: State Identity...");
        history.pushState({chk: 1}, "id");
        
        var s1 = history.state;
        var s2 = history.state;
        
        // Verifica identidade
        if (s1 === s2) {
            log("ALERTA: history.state retorna a MESMA referência! (Múltiplos acessos)", "alert");
            
            // Teste de corrupção
            s1.chk = 999;
            if (history.state.chk === 999) {
                log("CRÍTICO: Estado mutável sem pushState!", "alert");
            }
        } else {
            log("history.state retorna cópias frescas (Safe/Deep Copy).", "ok");
        }
    }

// --- TEST 49: Object Property Delete UAF (Target: 208b) ---
    // O serializador itera sobre as chaves do objeto. 
    // Usamos um getter na chave 'A' para deletar a chave 'B'.
    // Se o motor não revalidar a existência de 'B', acessa memória inválida.
    function runTest49() {
        log("Iniciando Test 49: Property Delete UAF...");
        var obj = {};
        
        Object.defineProperty(obj, 'A_trap', {
            enumerable: true,
            get: function() {
                log("Getter A. Deletando B e spraying 208b...");
                delete obj.B_target; // Remove chave futura
                spray(208); // Tenta preencher o slot de memória
                return 1;
            }
        });
        
        obj.B_target = { payload: "Target Data" };
        
        try {
            history.pushState(obj, "uaf_208");
            var s = history.state;
            
            if (s.B_target === undefined) {
                log("Propriedade deletada foi ignorada (Safe).", "ok");
            } else {
                log("ALERTA: Propriedade deletada foi lida!", "alert");
            }
        } catch(e) {
            log("Erro (Safe): " + e.message);
        }
    }

    // --- TEST 50: Array Length Shrink Race (Target: 176b) ---
    // Serializa um Array. Um getter em um dos primeiros índices
    // reduz o length do array para 0. O serializador continua lendo índices OOB?
    function runTest50() {
        log("Iniciando Test 50: Array Shrink UAF...");
        var arr = [1, 2, 3, 4];
        
        // Define getter no índice 0
        Object.defineProperty(arr, '0', {
            get: function() {
                log("Lendo índice 0. Encolhendo array e spraying 176b...");
                arr.length = 0; // Zera
                spray(176);
                return "trap";
            }
        });

        try {
            history.pushState(arr, "uaf_176");
            var s = history.state;
            
            log("State recuperado length: " + (s ? s.length : "null"));
            
            // Se leu elementos além do 0, houve leitura OOB
            if (s && s.length > 1 && s[1] !== undefined) {
                log("ALERTA: Serializador leu índices fantasma!", "alert");
            } else {
                log("Array truncado corretamente.", "ok");
            }
        } catch(e) {
            log("Erro: " + e.message);
        }
    }

    // --- TEST 51: Map Iterator Invalidation (Target: 104b) ---
    // Serializa um Map. O getter da chave limpa o mapa.
    // Tenta corromper o estado interno do iterador do Map.
    function runTest51() {
        log("Iniciando Test 51: Map Iterator UAF...");
        var m = new Map();
        var key = {
            toString: function() {
                log("Key toString. Limpando Map e spraying 104b...");
                m.clear(); 
                spray(104);
                return "key";
            }
        };
        
        m.set(key, 1);
        m.set("ghost", 2);

        try {
            history.pushState(m, "uaf_104");
            var s = history.state;
            
            if (s.size === 0) log("Map salvo vazio (Safe).", "ok");
            else log("Map salvo com tamanho inesperado: " + s.size, "alert");
        } catch(e) {
            log("Erro: " + e.message);
        }
    }

    // --- TEST 52: BigInt 64-bit Integrity (Silent) ---
    // Verifica se BigInts grandes são serializados sem perda de bits
    // (truncamento para 32-bit ou conversão para Double).
    function runTest52() {
        log("Iniciando Test 52: BigInt Integrity...");
        if (typeof BigInt === 'undefined') return log("BigInt não suportado.");
        
        // Um número que usa mais de 53 bits (limite do Double)
        var huge = 9007199254740993n; // MAX_SAFE_INTEGER + 2
        
        try {
            history.pushState(huge, "bigint");
            var s = history.state;
            
            if (s === huge) {
                log("BigInt 64-bit preservado.", "ok");
            } else {
                log("ALERTA: BigInt corrompido! (" + s + " vs " + huge + ")", "alert");
            }
        } catch(e) {
            log("Erro: " + e.message);
        }
    }

    // --- TEST 53: Nested PopState Push Flood (Race) ---
    // Dispara history.back() e, dentro do evento popstate, dispara pushState repetidamente.
    // Tenta corromper a pilha de histórico causando uma colisão de ponteiros de navegação.
    function runTest53() {
        log("Iniciando Test 53: Nested Pop/Push Race...");
        
        // Setup
        history.pushState(0, "0");
        history.pushState(1, "1");
        
        var count = 0;
        window.onpopstate = function() {
            if (count > 5) return;
            count++;
            log("Popstate " + count + ". Flooding pushState...");
            try {
                history.pushState({flood: count}, "flood");
                history.replaceState({flood: count}, "flood");
            } catch(e) {}
        };
        
        // Trigger
        history.back();
        
        setTimeout(function() {
            window.onpopstate = null;
            log("Final State: " + JSON.stringify(history.state));
            log("Teste finalizado. Verifique estabilidade.", "ok");
        }, 500);
    }

    // --- TEST 54: DOMException Clone Leak (State) ---
    // DOMException não era clonável historicamente. 
    // Motores modernos suportam, mas implementações antigas podem vazar ponteiros internos
    // ou falhar ao copiar propriedades como 'stack'.
    function runTest54() {
        log("Iniciando Test 54: DOMException Clone...");
        try {
            // Gera uma exceção real
            document.querySelectorAll("div:invalid-pseudo");
        } catch(origErr) {
            try {
                history.pushState(origErr, "error");
                var s = history.state;
                
                log("Erro clonado name: " + s.name);
                log("Erro clonado message: " + s.message);
                
                // Verifica se propriedades internas persistiram
                if (s.name === "SyntaxError" && s.message) {
                    log("DOMException clonado corretamente.", "ok");
                } else {
                    log("ALERTA: Objeto de erro incompleto.", "alert");
                }
            } catch(e) {
                log("Não clonável (DataCloneError): " + e.name, "ok");
            }
        }
    }
