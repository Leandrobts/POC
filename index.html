<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>PS4 Advanced API + Exploit Surface Suite</title>
<style>
body { background:#0e1118; color:#c8d4e8; font-family: monospace; padding:20px; }
button { margin:5px; padding:10px; cursor:pointer; }
#log { white-space:pre-wrap; border:1px solid #333; padding:10px; height:400px; overflow:auto;}
</style>
</head>
<body>

<h2>PS4 Browser Test Suite</h2>

<button onclick="runAll()">Run Capability + Limits + Context</button>
<button onclick="runExploit()">Run Exploit Surface (⚠️)</button>

<div id="log"></div>

<script type="module">

// ================= LOG =================
function logMsg(msg){
    const log = document.getElementById("log");
    log.textContent += msg + "\n";
    log.scrollTop = log.scrollHeight;
}

// ================= CAPABILITY =================
async function runCapabilityTests(log){
    log("=== Capability Tests ===");

    try {
        let sab = new SharedArrayBuffer(1024);
        let view = new Int32Array(sab);
        Atomics.add(view, 0, 1);
        log("[SAB] functional");
    } catch(e){ log("[SAB] restricted"); }

    try {
        let req = indexedDB.open("test");
        req.onsuccess = ()=>log("[IndexedDB] working");
        req.onerror = ()=>log("[IndexedDB] error");
    } catch(e){ log("[IndexedDB] exception"); }

    try {
        let wasm = new Uint8Array([0,97,115,109,1,0,0,0]);
        await WebAssembly.instantiate(wasm);
        log("[WASM] working");
    } catch(e){ log("[WASM] broken"); }
}

// ================= LIMITS =================
function runLimitsTests(log){
    log("=== Limits Tests ===");

    try {
        let size = 1<<20;
        while(size < (1<<28)){
            new ArrayBuffer(size);
            size*=2;
        }
        log("[ArrayBuffer] large alloc OK");
    } catch(e){ log("[ArrayBuffer] limit hit"); }

    try {
        let s="A";
        while(s.length < 1e7) s+=s;
        log("[String] large OK");
    } catch(e){ log("[String] limit"); }
}

// ================= CONTEXT =================
function runContextTests(log){
    log("=== Context Tests ===");

    try {
        let worker = new Worker(URL.createObjectURL(new Blob([`
            postMessage(typeof WebAssembly);
        `])));
        worker.onmessage = e=>log("[Worker] WASM="+e.data);
    } catch(e){ log("[Worker] failed"); }

    try {
        let iframe = document.createElement("iframe");
        document.body.appendChild(iframe);
        log("[iframe] fetch="+typeof iframe.contentWindow.fetch);
    } catch(e){ log("[iframe] failed"); }

    let t1 = performance.now();
    let t2 = performance.now();
    log("[Timing] delta="+(t2-t1));
}

// ================= EXPLOIT =================
async function runExploitSurfaceTests(log){
    log("=== Exploit Surface ===");

    // TypedArray stress
    try{
        let arr=[];
        for(let i=0;i<5000;i++){
            let ab=new ArrayBuffer(0x1000);
            arr.push(new Uint8Array(ab));
        }
        log("[TypedArray] stress done");
    }catch(e){ log("[TypedArray] crash?"); }

    // Array hole
    try{
        let a=[1.1,2.2];
        a[1000]=3.3;
        for(let i=0;i<5000;i++){ a.push(i); a.shift(); }
        log("[ArrayHole] ok");
    }catch(e){ log("[ArrayHole] exception"); }

    // postMessage race
    try{
        let ab=new ArrayBuffer(1024);
        let ch=new MessageChannel();
        for(let i=0;i<500;i++){
            ch.port2.postMessage(ab,[ab]);
            ab=new ArrayBuffer(1024);
        }
        log("[postMessage] race done");
    }catch(e){ log("[postMessage] error"); }

    // MutationObserver
    try{
        let d=document.createElement("div");
        document.body.appendChild(d);
        let obs=new MutationObserver(()=>{ d.innerHTML="X"; });
        obs.observe(d,{childList:true});
        for(let i=0;i<500;i++){
            let s=document.createElement("span");
            d.appendChild(s);
            d.removeChild(s);
        }
        log("[MutationObserver] ok");
    }catch(e){ log("[MutationObserver] error"); }

    // JIT
    try{
        function f(o){return o.x+1;}
        for(let i=0;i<50000;i++) f({x:1});
        let r=f({x:"A"});
        log("[JIT] result="+r);
    }catch(e){ log("[JIT] error"); }
}

// ================= RUNNERS =================
async function runAll(){
    logMsg("=== RUN ALL ===");
    await runCapabilityTests(logMsg);
    runLimitsTests(logMsg);
    runContextTests(logMsg);
}

async function runExploit(){
    logMsg("=== RUN EXPLOIT ===");
    await runExploitSurfaceTests(logMsg);
}

</script>
</body>
</html>
