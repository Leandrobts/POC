<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>PS4 – 25x ArrayBuffer Detach Races (Part 2)</title>
</head>
<body>
<h2>PS4 – 25x ArrayBuffer / TypedArray detachment races (PARTE 2: T26–T50)</h2>
<p>Log apenas <b>[ALERTA]</b>. Se travar/CE = sinal forte.</p>

<button onclick="clearLog()">Limpar</button>
<button onclick="runAll()">Rodar 25 testes</button>

<pre id="log"></pre>

<script>
/* ===== harness ===== */
var L=document.getElementById("log"), ALERTS=0;
function log(s){ L.textContent += s+"\n"; }
function ALERT(s){ ALERTS++; log("[ALERTA] "+s); }
function clearLog(){ L.textContent=""; ALERTS=0; }
function now(){ return Date.now?Date.now():(new Date()).getTime(); }
function sleep(ms,cb){ setTimeout(cb,ms); }

function u8hash(u8){
  var h=2166136261>>>0,i;
  for(i=0;i<u8.length;i++){ h^=u8[i]; h=(h*16777619)>>>0; }
  return ("00000000"+h.toString(16)).slice(-8);
}
function makeAB(n){
  var ab=new ArrayBuffer(n), u8=new Uint8Array(ab);
  for(var i=0;i<u8.length;i++) u8[i]=(i*73+19)&255;
  return ab;
}
function detachViaMessageChannel(ab, cb){
  try{
    var ch=new MessageChannel();
    ch.port2.onmessage=function(){ try{ch.port1.close();ch.port2.close();}catch(e){} cb(true); };
    ch.port1.postMessage({b:ab}, [ab]);
    setTimeout(function(){ cb(true); }, 20);
  }catch(e){ cb(false,e); }
}
function check(tag, ab, before, view){
  var bl=0, vbl=0;
  try{ bl=ab.byteLength; }catch(e){ bl=-1; }
  try{ vbl=view?view.byteLength:-1; }catch(e2){ vbl=-1; }
  if(bl===0 && vbl>0) ALERT(tag+": view.byteLength>0 com ab.byteLength==0 (contradição)");
  if(bl===0){
    var ghost=0;
    try{
      if(view && view.length>=8){
        for(var i=0;i<8;i++) if(view[i]===before[i]) ghost++;
      }
    }catch(e3){}
    if(ghost>=6) ALERT(tag+": ghost read após detach ghost="+ghost);
  }else{
    try{
      var h0=u8hash(before), h1=u8hash(new Uint8Array(ab));
      if(h0!==h1) ALERT(tag+": hash mudou sem escrita aparente "+h0+"->"+h1);
    }catch(e4){}
  }
}

/* ===== runner ===== */
var tests=[];
function add(id,name,fn){ tests.push({id:id,name:name,run:fn}); }
function runSeries(list,done){
  var i=0;
  function step(){
    if(i>=list.length) return done&&done();
    var t=list[i++];
    try{ t.run(function(){ setTimeout(step,5); }); }
    catch(e){ ALERT("T"+t.id+" harness exception: "+e); setTimeout(step,5); }
  }
  step();
}
function runAll(){
  clearLog();
  var start=now();
  log("Iniciando 25 testes (Part 2)...");
  runSeries(tests,function(){
    log("=== FINAL === dt="+(((now()-start)/1000).toFixed(2))+"s ALERTAS="+ALERTS);
  });
}

/* ===== T26–T50 ===== */

// T26: detach during Uint8Array.prototype.reverse
add(26,"reverse detach",function(next){
  var ab=makeAB(1024), u8=new Uint8Array(ab), before=u8.slice(0);
  Promise.resolve().then(function(){ detachViaMessageChannel(ab,function(){}); });
  try{ u8.reverse(); }catch(e){}
  sleep(25,function(){ check("T26",ab,before,u8); next(); });
});

// T27: detach during Uint8Array.prototype.every
add(27,"every detach",function(next){
  var ab=makeAB(512), u8=new Uint8Array(ab), before=u8.slice(0), c=0;
  try{
    u8.every(function(v){
      c++; if(c===2) detachViaMessageChannel(ab,function(){});
      return v>=0;
    });
  }catch(e){}
  sleep(25,function(){ check("T27",ab,before,u8); next(); });
});

// T28: detach during Uint8Array.prototype.some
add(28,"some detach",function(next){
  var ab=makeAB(512), u8=new Uint8Array(ab), before=u8.slice(0), c=0;
  try{
    u8.some(function(v){
      c++; if(c===2) detachViaMessageChannel(ab,function(){});
      return v===255;
    });
  }catch(e){}
  sleep(25,function(){ check("T28",ab,before,u8); next(); });
});

// T29: detach during Uint8Array.prototype.findIndex via Array.prototype
add(29,"findIndex detach",function(next){
  var ab=makeAB(512), u8=new Uint8Array(ab), before=u8.slice(0), c=0;
  try{
    Array.prototype.findIndex.call(u8,function(v){
      c++; if(c===3) detachViaMessageChannel(ab,function(){});
      return v===0x7f;
    });
  }catch(e){}
  sleep(25,function(){ check("T29",ab,before,u8); next(); });
});

// T30: detach during Uint8Array.prototype.includes
add(30,"includes detach",function(next){
  var ab=makeAB(1024), u8=new Uint8Array(ab), before=u8.slice(0);
  setTimeout(function(){ detachViaMessageChannel(ab,function(){}); },0);
  try{ u8.includes(0x41); }catch(e){}
  sleep(35,function(){ check("T30",ab,before,u8); next(); });
});

// T31: detach during String.fromCharCode apply on view bytes
add(31,"String.fromCharCode detach",function(next){
  var ab=makeAB(256), u8=new Uint8Array(ab), before=u8.slice(0);
  Promise.resolve().then(function(){ detachViaMessageChannel(ab,function(){}); });
  try{
    // bounded to avoid DoS
    var arr=[];
    for(var i=0;i<64;i++) arr.push(u8[i]);
    String.fromCharCode.apply(null, arr);
  }catch(e){}
  sleep(25,function(){ check("T31",ab,before,u8); next(); });
});

// T32: detach during Uint32Array constructor from detached AB (post-detach)
add(32,"new view post-detach invariants",function(next){
  var ab=makeAB(128), before=new Uint8Array(ab).slice(0);
  detachViaMessageChannel(ab,function(ok){
    if(ok){
      try{
        var u32=new Uint32Array(ab);
        if(ab.byteLength===0 && u32.byteLength>0) ALERT("T32: new Uint32Array byteLength>0 em AB detached");
      }catch(e){}
      check("T32",ab,before,new Uint8Array(ab));
    }
    next();
  });
});

// T33: detach while using Atomics-like pattern (no Atomics needed) read/write spin (bounded)
add(33,"bounded spin read/write with detach",function(next){
  var ab=makeAB(1024), u8=new Uint8Array(ab), before=u8.slice(0);
  setTimeout(function(){ detachViaMessageChannel(ab,function(){}); },0);
  try{
    for(var i=0;i<2000;i++){
      var j=i&63;
      u8[j] = (u8[j]^0x11)&255;
    }
  }catch(e){}
  sleep(35,function(){ check("T33",ab,before,u8); next(); });
});

// T34: detach during Uint8Array.prototype.set from same buffer (overlap)
add(34,"set overlap detach",function(next){
  var ab=makeAB(1024), u8=new Uint8Array(ab), before=u8.slice(0);
  Promise.resolve().then(function(){ detachViaMessageChannel(ab,function(){}); });
  try{ u8.set(u8.subarray(0,128), 256); }catch(e){}
  sleep(25,function(){ check("T34",ab,before,u8); next(); });
});

// T35: detach while reading via DataView in try/catch loop
add(35,"DataView loop detach",function(next){
  var ab=makeAB(512), before=new Uint8Array(ab).slice(0), dv=new DataView(ab);
  setTimeout(function(){ detachViaMessageChannel(ab,function(){}); },0);
  try{ for(var i=0;i<32;i++) dv.getUint16(i*2,true); }catch(e){}
  sleep(35,function(){ check("T35",ab,before,new Uint8Array(ab)); next(); });
});

// T36: detach then attempt ArrayBuffer.transfer-like via slice (post)
add(36,"post-detach slice invariants",function(next){
  var ab=makeAB(256), before=new Uint8Array(ab).slice(0);
  detachViaMessageChannel(ab,function(ok){
    if(ok){
      try{
        var ab2=ab.slice(0);
        if(ab.byteLength===0 && ab2.byteLength>0) ALERT("T36: slice gerou ab2 não-vazio após detach");
      }catch(e){}
      check("T36",ab,before,new Uint8Array(ab));
    }
    next();
  });
});

// T37: detach during Uint8Array.prototype.toString (via Array.prototype.join)
add(37,"join detach",function(next){
  var ab=makeAB(512), u8=new Uint8Array(ab), before=u8.slice(0);
  Promise.resolve().then(function(){ detachViaMessageChannel(ab,function(){}); });
  try{ Array.prototype.join.call(u8,","); }catch(e){}
  sleep(25,function(){ check("T37",ab,before,u8); next(); });
});

// T38: detach during TypedArray.buffer property access storm (bounded)
add(38,"buffer access storm detach",function(next){
  var ab=makeAB(1024), u8=new Uint8Array(ab), before=u8.slice(0);
  setTimeout(function(){ detachViaMessageChannel(ab,function(){}); },0);
  try{ for(var i=0;i<2000;i++) { var b=u8.buffer; } }catch(e){}
  sleep(35,function(){ check("T38",ab,before,u8); next(); });
});

// T39: detach during creation of many views referencing same AB
add(39,"many views detach",function(next){
  var ab=makeAB(2048), before=new Uint8Array(ab).slice(0);
  var views=[];
  for(var i=0;i<32;i++) views.push(new Uint8Array(ab, i*8, 16));
  detachViaMessageChannel(ab,function(ok){
    if(ok){
      for(var j=0;j<views.length;j++){
        try{
          if(ab.byteLength===0 && views[j].byteLength>0) ALERT("T39: view["+j+"] byteLength>0 após detach");
        }catch(e){}
      }
      check("T39",ab,before,new Uint8Array(ab));
    }
    next();
  });
});

// T40: detach while iterating keys() iterator of TypedArray
add(40,"keys() iterator detach",function(next){
  var ab=makeAB(512), u8=new Uint8Array(ab), before=u8.slice(0);
  var it = null;
  try{ it = u8.keys(); }catch(e){ return next(); }
  Promise.resolve().then(function(){ detachViaMessageChannel(ab,function(){}); });
  try{
    var n=0, r;
    while(n<64 && !(r=it.next()).done){ n++; }
  }catch(e2){}
  sleep(25,function(){ check("T40",ab,before,u8); next(); });
});

// T41: detach while iterating values() iterator
add(41,"values() iterator detach",function(next){
  var ab=makeAB(512), u8=new Uint8Array(ab), before=u8.slice(0);
  var it=null;
  try{ it=u8.values(); }catch(e){ return next(); }
  setTimeout(function(){ detachViaMessageChannel(ab,function(){}); },0);
  try{
    var n=0, r;
    while(n<64 && !(r=it.next()).done){ n++; }
  }catch(e2){}
  sleep(35,function(){ check("T41",ab,before,u8); next(); });
});

// T42: detach during TypedArray.prototype.entries iterator
add(42,"entries() iterator detach",function(next){
  var ab=makeAB(512), u8=new Uint8Array(ab), before=u8.slice(0);
  var it=null;
  try{ it=u8.entries(); }catch(e){ return next(); }
  Promise.resolve().then(function(){ detachViaMessageChannel(ab,function(){}); });
  try{
    var n=0, r;
    while(n<64 && !(r=it.next()).done){ n++; }
  }catch(e2){}
  sleep(25,function(){ check("T42",ab,before,u8); next(); });
});

// T43: detach during TypedArray.prototype.slice (view method)
add(43,"TypedArray.slice detach",function(next){
  var ab=makeAB(1024), u8=new Uint8Array(ab), before=u8.slice(0);
  setTimeout(function(){ detachViaMessageChannel(ab,function(){}); },0);
  try{ u8.slice(0,128); }catch(e){}
  sleep(35,function(){ check("T43",ab,before,u8); next(); });
});

// T44: detach during TypedArray.prototype.filter
add(44,"filter detach",function(next){
  var ab=makeAB(512), u8=new Uint8Array(ab), before=u8.slice(0), c=0;
  try{
    u8.filter(function(v){
      c++; if(c===2) detachViaMessageChannel(ab,function(){});
      return (v&1)===0;
    });
  }catch(e){}
  sleep(25,function(){ check("T44",ab,before,u8); next(); });
});

// T45: detach during TypedArray.prototype.forEach
add(45,"forEach detach",function(next){
  var ab=makeAB(512), u8=new Uint8Array(ab), before=u8.slice(0), c=0;
  try{
    u8.forEach(function(v){
      c++; if(c===3) detachViaMessageChannel(ab,function(){});
    });
  }catch(e){}
  sleep(25,function(){ check("T45",ab,before,u8); next(); });
});

// T46: detach during TypedArray.prototype.find
add(46,"find detach",function(next){
  var ab=makeAB(512), u8=new Uint8Array(ab), before=u8.slice(0), c=0;
  try{
    u8.find(function(v){
      c++; if(c===2) detachViaMessageChannel(ab,function(){});
      return v===0x22;
    });
  }catch(e){}
  sleep(25,function(){ check("T46",ab,before,u8); next(); });
});

// T47: detach and then JSON stringify typed array (should not resurrect)
add(47,"JSON stringify after detach",function(next){
  var ab=makeAB(256), u8=new Uint8Array(ab), before=u8.slice(0);
  detachViaMessageChannel(ab,function(ok){
    if(ok){
      try{ JSON.stringify(u8); }catch(e){}
      check("T47",ab,before,u8);
    }
    next();
  });
});

// T48: detach during Promise.all microtask churn
add(48,"Promise.all + detach",function(next){
  var ab=makeAB(1024), u8=new Uint8Array(ab), before=u8.slice(0);
  Promise.all([Promise.resolve(1),Promise.resolve(2)]).then(function(){
    detachViaMessageChannel(ab,function(){});
  });
  try{ for(var i=0;i<256;i++) { var x=u8[i]; } }catch(e){}
  sleep(35,function(){ check("T48",ab,before,u8); next(); });
});

// T49: detach during creation of Uint8ClampedArray
add(49,"Uint8ClampedArray detach",function(next){
  var ab=makeAB(512), before=new Uint8Array(ab).slice(0);
  setTimeout(function(){ detachViaMessageChannel(ab,function(){}); },0);
  try{ new Uint8ClampedArray(ab); }catch(e){}
  sleep(35,function(){ check("T49",ab,before,new Uint8Array(ab)); next(); });
});

// T50: detach during nested timers (2-level)
add(50,"nested timers detach",function(next){
  var ab=makeAB(1024), u8=new Uint8Array(ab), before=u8.slice(0);
  setTimeout(function(){
    setTimeout(function(){ detachViaMessageChannel(ab,function(){}); }, 0);
    try{ for(var i=0;i<128;i++) u8[i]^=0x33; }catch(e){}
  },0);
  sleep(60,function(){ check("T50",ab,before,u8); next(); });
});
</script>
